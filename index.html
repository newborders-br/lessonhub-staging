<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LessonHub v2.0.0-alpha.3 · Clean Admin Writer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#fbfaf7;--paper:#fffdf9;--ink:#181512;--muted:#746d66;--soft:#a49b93;--line:rgba(24,21,18,.15);--line2:rgba(24,21,18,.07);--wash:rgba(255,253,249,.84);--danger:#9d2d25;--ok:#28745a;--warn:#8a641f;--shadow:0 28px 80px rgba(35,28,20,.055)}
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:radial-gradient(circle at 12% -8%,rgba(190,165,126,.14),transparent 28%),var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}textarea{resize:vertical;min-height:88px}.shell{width:min(1280px,calc(100% - 32px));margin:0 auto;padding:28px 0 70px}.mast{display:flex;justify-content:space-between;gap:18px;align-items:end;border-bottom:1px solid var(--ink);padding:16px 0 18px;margin-bottom:16px}.logo{font-family:Georgia,serif;font-size:54px;line-height:.82;letter-spacing:-.075em;font-weight:400}.kicker{font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted)}.subtle{font-size:13px;color:var(--muted);line-height:1.55}.hero,.panel,.card,.item,.modal-box{background:var(--wash);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(18px)}.hero{border-color:var(--ink);padding:24px;margin-bottom:18px}.hero h2{font-family:Georgia,serif;font-size:44px;line-height:.92;letter-spacing:-.06em;font-weight:400;margin-bottom:10px}.btn{border:1px solid var(--ink);background:transparent;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.14em}.btn:hover{background:var(--ink);color:var(--paper)}.btn.soft{border-color:var(--line);color:var(--muted)}.btn.small{padding:7px 9px;font-size:10px}.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.tabs{display:flex;gap:15px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:14px;margin:18px 0 20px}.tabs button{border:0;background:transparent;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.15em;padding:0 0 4px;border-bottom:1px solid transparent}.tabs button.active,.tabs button:hover{color:var(--ink);border-bottom-color:var(--ink)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{min-height:108px;padding:20px;display:flex;flex-direction:column;justify-content:space-between}.num{font-family:Georgia,serif;font-size:38px;letter-spacing:-.06em;line-height:.9;word-break:break-word}.label{font-size:10px;text-transform:uppercase;letter-spacing:.17em;color:var(--muted)}.panel{padding:20px;margin-bottom:16px}.panel-title{display:flex;justify-content:space-between;gap:14px;align-items:end;border-bottom:1px solid var(--ink);padding-bottom:10px;margin-bottom:14px}.panel-title h3{font-family:Georgia,serif;font-size:27px;font-weight:400;letter-spacing:-.04em}.list{display:grid;gap:10px}.item{padding:16px}.item-title{font-family:Georgia,serif;font-size:24px;font-weight:400;letter-spacing:-.045em}.meta{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.45}.info{margin-top:12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:8px 14px;border-top:1px solid var(--line2);padding-top:10px}.info div{font-size:12px;color:var(--muted);line-height:1.4}.info b{font-weight:500;color:var(--ink)}.actions{display:flex;gap:11px;flex-wrap:wrap;margin-top:12px}.actions button{border:0;background:transparent;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.13em;border-bottom:1px solid transparent;padding:0 0 3px}.actions button:hover{color:var(--ink);border-bottom-color:var(--ink)}.empty{border:1px dashed var(--line);padding:28px;text-align:center;color:var(--muted);background:rgba(255,255,255,.32)}.empty h3{font-family:Georgia,serif;font-size:27px;font-weight:400;letter-spacing:-.04em;color:var(--ink);margin-bottom:8px}.footer{border-top:1px solid var(--line);padding:14px 0 26px;margin-top:22px;display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:11px}.status{white-space:pre-wrap;margin-top:12px;font-size:12px;color:var(--muted);line-height:1.5}.bad{color:var(--danger)}.good{color:var(--ok)}.warn{color:var(--warn)}.modal{position:fixed;inset:0;background:rgba(24,21,18,.38);z-index:80;display:none;align-items:center;justify-content:center;padding:18px}.modal.active{display:flex}.modal-box{width:min(960px,100%);max-height:92vh;overflow:auto;padding:26px}.modal-head{display:flex;justify-content:space-between;gap:18px;border-bottom:1px solid var(--ink);padding-bottom:12px;margin-bottom:16px}.modal-head h2{font-family:Georgia,serif;font-size:34px;font-weight:400;letter-spacing:-.05em}.x{border:0;background:transparent;text-transform:uppercase;letter-spacing:.14em;font-size:10px;color:var(--muted)}.field{display:grid;gap:6px;margin-bottom:12px}.field label{font-size:10px;text-transform:uppercase;letter-spacing:.17em;color:var(--muted)}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.72);padding:11px 12px;color:var(--ink)}.top-status{min-height:18px;margin-top:8px}.pill{display:inline-flex;gap:6px;align-items:center;border:1px solid var(--line);padding:5px 7px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.35)}@media(max-width:840px){.shell{width:min(100% - 24px,1280px);padding-top:22px}.mast,.two,.three,.grid{grid-template-columns:1fr;display:grid}.logo{font-size:44px}.hero h2{font-size:36px}.modal{align-items:flex-start}.modal-box{margin-top:12px}}
</style>
</head>
<body>
<div class="shell">
<header class="mast"><div><h1 class="logo">Lesson<br>Hub</h1><p class="kicker" style="margin-top:12px">v2.0.0-alpha.3 · Clean Admin Writer</p></div><div style="text-align:right"><p class="kicker" id="sessionMini">iniciando</p><p class="subtle top-status" id="topStatus"></p></div></header>
<main id="app"></main>
<footer class="footer"><span>Erik Azevedo (@prof.erikazevedo)</span><span id="footerMode">Supabase backend</span></footer>
</div>
<div class="modal" id="modal"><div class="modal-box"><div class="modal-head"><div><h2 id="modalTitle">Modal</h2><p class="subtle" id="modalSub"></p></div><button class="x" onclick="closeModal()">fechar</button></div><div id="modalBody"></div></div></div>
<script>
const SUPABASE_URL="https://ezgaqcxrbticangnnryo.supabase.co";
const SUPABASE_KEY="sb_publishable_k-Ch1aS1UkRR-OlDzAbH-Q_B4a8e7kE";
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
const App={loading:false,tab:"today",profile:null,user:null,email:"",student:null,students:[],lessons:[],payments:[],materials:[],links:[],studentLessons:[],studentPayments:[],studentMaterialsByLesson:{}};

function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function $(id){return document.getElementById(id)}
function val(id){return ($(id)?.value||"").trim()}
function money(n){return Number(String(n||"").replace(",", "."))||0}
function fmtDate(d){if(!d)return"—";const p=String(d).slice(0,10).split("-");return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d}
function fmtMoney(n){return(Number(n)||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function setTop(msg,kind=""){const el=$("topStatus");if(el){el.className="subtle top-status "+kind;el.textContent=msg||""}}
function setMini(msg){$("sessionMini").textContent=msg||""}
function setFooter(msg){$("footerMode").textContent=msg||""}
function timeout(p,label,ms=20000){let t;const to=new Promise((_,rej)=>t=setTimeout(()=>rej(new Error((label||"Operação")+" demorou mais de "+Math.round(ms/1000)+"s.")),ms));return Promise.race([p,to]).finally(()=>clearTimeout(t))}
function empty(t,x){return`<div class="empty"><h3>${esc(t)}</h3><p>${esc(x)}</p></div>`}
function openModal(title,sub,body){$("modalTitle").textContent=title;$("modalSub").textContent=sub||"";$("modalBody").innerHTML=body;$("modal").classList.add("active")}
function closeModal(){$("modal").classList.remove("active")}
function driveId(url){let m=String(url||"").match(/\/d\/([^\/]+)/);return m?m[1]:""}
function drivePreview(url){url=String(url||"").trim();if(!url)return"";let m=url.match(/\/presentation\/d\/([^\/]+)/);if(m)return`https://docs.google.com/presentation/d/${m[1]}/preview`;m=url.match(/\/document\/d\/([^\/]+)/);if(m)return`https://docs.google.com/document/d/${m[1]}/preview`;m=url.match(/\/spreadsheets\/d\/([^\/]+)/);if(m)return`https://docs.google.com/spreadsheets/d/${m[1]}/preview`;m=url.match(/\/file\/d\/([^\/]+)/);if(m)return`https://drive.google.com/file/d/${m[1]}/preview`;return url}
function driveDownload(url){url=String(url||"").trim();if(!url)return"";let m=url.match(/\/presentation\/d\/([^\/]+)/);if(m)return`https://docs.google.com/presentation/d/${m[1]}/export/pdf`;m=url.match(/\/document\/d\/([^\/]+)/);if(m)return`https://docs.google.com/document/d/${m[1]}/export?format=pdf`;m=url.match(/\/file\/d\/([^\/]+)/);if(m)return`https://drive.google.com/uc?export=download&id=${m[1]}`;return url}

async function signIn(){setTop("abrindo Google…");const redirectTo=location.href.split("#")[0].split("?")[0];const{error}=await client.auth.signInWithOAuth({provider:"google",options:{redirectTo}});if(error){setTop("erro no login: "+error.message,"bad");alert(error.message)}}
async function signOut(){setTop("saindo…");await client.auth.signOut();Object.assign(App,{profile:null,user:null,email:"",student:null,students:[],lessons:[],payments:[],materials:[],links:[],studentLessons:[],studentPayments:[],studentMaterialsByLesson:{}});renderLogin();setTop("")}
async function boot(){if(App.loading)return;App.loading=true;try{setMini("restaurando");setTop("restaurando sessão…");const{data,error}=await timeout(client.auth.getSession(),"Sessão",30000);if(error)throw error;if(!data.session){renderLogin();return}App.user=data.session.user;App.email=(App.user.email||"").toLowerCase();await loadProfile()}catch(e){renderSessionProblem(e.message||String(e))}finally{App.loading=false;setTop("")}}
client.auth.onAuthStateChange(async(event,session)=>{if(event==="SIGNED_OUT"){renderLogin();return}if(event==="SIGNED_IN"&&session&&!App.loading){App.user=session.user;App.email=(session.user.email||"").toLowerCase();await loadProfile()}})
async function loadProfile(){setMini(App.email||"conectado");setTop("buscando perfil…");const{data,error}=await timeout(client.from("profiles").select("*").eq("email",App.email).maybeSingle(),"Profile",20000);if(error)throw error;if(!data){renderUnauthorized();return}App.profile=data;if(data.role==="admin"){await loadAdmin();return}if(data.role==="student"){await loadStudent(data.student_id);return}renderUnauthorized("Role desconhecida: "+data.role)}
function renderLogin(){setMini("não conectado");setFooter("login necessário");$("app").innerHTML=`<section class="hero"><h2>Entrar no LessonHub</h2><p class="subtle">Backend Supabase. Entre com Google para acessar professor ou portal do aluno.</p><div class="btn-row"><button class="btn" onclick="signIn()">entrar com Google</button></div></section>`}
function renderSessionProblem(msg){setMini("sessão em espera");setFooter("recuperação");$("app").innerHTML=`<section class="hero"><h2>Sessão em espera</h2><p class="subtle">Não vou deslogar automaticamente. Tente restaurar a sessão ou sair.</p><div class="status bad">${esc(msg)}</div><div class="btn-row"><button class="btn" onclick="boot()">tentar novamente</button><button class="btn soft" onclick="signOut()">sair</button></div></section>`}
function renderUnauthorized(extra=""){setFooter("acesso não autorizado");$("app").innerHTML=`<section class="hero"><h2>Acesso não autorizado</h2><p class="subtle">O e-mail ${esc(App.email)} ainda não está vinculado ao LessonHub.</p>${extra?`<div class="status bad">${esc(extra)}</div>`:""}<div class="btn-row"><button class="btn" onclick="signOut()">sair</button></div></section>`}

async function loadAdmin(){setFooter("professor");setTop("carregando painel…");const q=[client.from("students").select("*").order("created_at",{ascending:false}),client.from("lessons").select("*").order("date",{ascending:true}),client.from("payments").select("*").order("created_at",{ascending:false}),client.from("materials").select("*").order("created_at",{ascending:false}),client.from("lesson_materials").select("*")];const [s,l,p,m,ln]=await timeout(Promise.all(q),"Carregar admin",30000);const errs=[s.error,l.error,p.error,m.error,ln.error].filter(Boolean);if(errs.length)throw new Error(errs.map(e=>e.message).join("\n"));App.students=s.data||[];App.lessons=l.data||[];App.payments=p.data||[];App.materials=m.data||[];App.links=ln.data||[];renderAdmin();setTop("")}
function adminTabs(){return`<div class="tabs"><button class="${App.tab==='today'?'active':''}" onclick="App.tab='today';renderAdmin()">Hoje</button><button class="${App.tab==='students'?'active':''}" onclick="App.tab='students';renderAdmin()">Alunos</button><button class="${App.tab==='lessons'?'active':''}" onclick="App.tab='lessons';renderAdmin()">Aulas</button><button class="${App.tab==='materials'?'active':''}" onclick="App.tab='materials';renderAdmin()">Materiais</button><button class="${App.tab==='finance'?'active':''}" onclick="App.tab='finance';renderAdmin()">Financeiro</button><button class="${App.tab==='system'?'active':''}" onclick="App.tab='system';renderAdmin()">Sistema</button></div>`}
function renderAdmin(){setMini(App.email);$("app").innerHTML=`<section class="hero"><h2>Professor</h2><p class="subtle">Admin Writer limpo. Crie dados básicos no Supabase sem SQL.</p><div class="btn-row"><button class="btn" onclick="openStudentForm()">novo aluno</button><button class="btn" onclick="openLessonForm()">nova aula</button><button class="btn" onclick="openPaymentForm()">nova mensalidade</button><button class="btn" onclick="openMaterialForm()">anexar material</button><button class="btn soft" onclick="signOut()">sair</button></div></section><div class="grid"><div class="card"><div class="num">${App.students.length}</div><div class="label">alunos</div></div><div class="card"><div class="num">${App.lessons.length}</div><div class="label">aulas</div></div><div class="card"><div class="num">${App.payments.length}</div><div class="label">mensalidades</div></div><div class="card"><div class="num">${App.materials.length}</div><div class="label">materiais</div></div></div>${adminTabs()}${renderAdminTab()}`}
function studentName(id){return(App.students.find(s=>s.id===id)||{}).name||"Aluno"}
function materialsForLesson(id){const ids=App.links.filter(x=>x.lesson_id===id).map(x=>x.material_id);return App.materials.filter(m=>ids.includes(m.id))}
function renderAdminTab(){if(App.tab==="students")return panel("Alunos",`<button class="btn small" onclick="openStudentForm()">novo aluno</button>`,App.students.map(s=>`<div class="item"><div class="item-title">${esc(s.name)}</div><div class="meta">${esc([s.email,s.language,s.active_course_name,s.active_course_level,s.status].filter(Boolean).join(" · "))}</div><div class="actions"><button onclick="openStudentForm('${s.id}')">editar</button><button onclick="previewStudent('${s.id}')">ver como aluno</button><button onclick="openLessonForm('', '${s.id}')">nova aula</button></div></div>`).join("")||empty("Sem alunos","Cadastre o primeiro aluno."));if(App.tab==="lessons")return panel("Aulas",`<button class="btn small" onclick="openLessonForm()">nova aula</button>`,App.lessons.map(l=>`<div class="item"><div class="item-title">${esc(fmtDate(l.date))}${l.start_time?' · '+esc(String(l.start_time).slice(0,5)):''}</div><div class="meta">${esc(studentName(l.student_id))} · ${esc([l.title,l.course_name,l.level,l.unit].filter(Boolean).join(" · "))}</div><div class="info"><div><b>Materiais:</b> ${materialsForLesson(l.id).length}</div><div><b>Status:</b> ${esc(l.status||"agendada")}</div></div><div class="actions"><button onclick="openLessonForm('${l.id}')">editar</button><button onclick="openLinkMaterial('${l.id}')">vincular material</button></div></div>`).join("")||empty("Sem aulas","Crie uma aula."));if(App.tab==="materials")return panel("Materiais",`<button class="btn small" onclick="openMaterialForm()">anexar material</button>`,App.materials.map(m=>`<div class="item"><div class="item-title">${esc(m.title_student||m.title_internal||"Material")}</div><div class="meta">${esc([m.type,m.student_visible?'visível':'oculto',m.download_allowed?'download ok':'sem download'].filter(Boolean).join(" · "))}</div><div class="actions"><button onclick="openMaterialForm('${m.id}')">editar</button>${m.drive_preview_url?`<button onclick="window.open('${esc(m.drive_preview_url)}','_blank')">abrir</button>`:""}</div></div>`).join("")||empty("Sem materiais","Anexe um link do Drive."));if(App.tab==="finance")return panel("Financeiro",`<button class="btn small" onclick="openPaymentForm()">nova mensalidade</button>`,App.payments.map(p=>`<div class="item"><div class="item-title">${esc(studentName(p.student_id))} · ${esc(p.month||"Mensalidade")}</div><div class="meta">${esc(p.status||"pendente")} · ${fmtMoney(p.amount)} · ${p.expected_lessons||0} aulas · próximo: ${fmtDate(p.next_payment_date)}</div><div class="actions"><button onclick="openPaymentForm('${p.id}')">editar</button></div></div>`).join("")||empty("Sem mensalidades","Cadastre uma mensalidade."));if(App.tab==="system")return panel("Sistema",``,diagnosticsHtml());return`<div class="two">${panel("Próximas aulas","",App.lessons.slice(0,6).map(l=>`<div class="item"><div class="item-title">${fmtDate(l.date)}${l.start_time?' · '+String(l.start_time).slice(0,5):''}</div><div class="meta">${esc(studentName(l.student_id))} · ${esc([l.title,l.course_name,l.level].filter(Boolean).join(" · "))}</div></div>`).join("")||empty("Sem aulas","Nenhuma aula cadastrada."))}${panel("Alunos recentes","",App.students.slice(0,6).map(s=>`<div class="item"><div class="item-title">${esc(s.name)}</div><div class="meta">${esc([s.email,s.active_course_name,s.active_course_level].filter(Boolean).join(" · "))}</div></div>`).join("")||empty("Sem alunos","Nenhum aluno cadastrado."))}</div>`}
function panel(title,action,body){return`<section class="panel"><div class="panel-title"><h3>${title}</h3><div>${action||""}</div></div><div class="list">${body}</div></section>`}
function diagnosticsHtml(){return`<div class="item"><div class="item-title">Diagnóstico de escrita</div><div class="meta">Testa se RLS/policies permitem o professor gravar dados. Cria registros fake marcados como diagnóstico.</div><div class="btn-row"><button class="btn" onclick="runWriteDiagnostics()">testar escrita</button><button class="btn soft" onclick="loadAdmin()">recarregar painel</button></div><div class="status" id="diagOut"></div></div>`}
async function runWriteDiagnostics(){const out=$("diagOut");out.textContent="rodando…";try{const email="diag+"+Date.now()+"@lessonhub.test";const st=await doSave("diag student",client.from("students").insert({name:"Diagnóstico",email,language:"Teste",active_course_name:"Diagnóstico",active_course_level:"Teste",status:"ativo"}).select().single());const pr=await doSave("diag profile",client.from("profiles").upsert({email,role:"student",student_id:st.id},{onConflict:"email"}));const le=await doSave("diag lesson",client.from("lessons").insert({student_id:st.id,date:new Date().toISOString().slice(0,10),start_time:"12:00",title:"Diagnóstico",student_visible:true}).select().single());const pa=await doSave("diag payment",client.from("payments").insert({student_id:st.id,month:"diag",amount:1,status:"pago",expected_lessons:1}).select().single());const mt=await doSave("diag material",client.from("materials").insert({title_internal:"Diagnóstico",title_student:"Diagnóstico",type:"material",student_visible:true}).select().single());const lm=await doSave("diag link",client.from("lesson_materials").upsert({lesson_id:le.id,material_id:mt.id},{onConflict:"lesson_id,material_id"}));out.className="status good";out.textContent="Diagnóstico aprovado. Escrita básica funcionando.";await loadAdmin()}catch(e){out.className="status bad";out.textContent=e.message||String(e)}}
async function doSave(label,p){const r=await timeout(p,label,20000);if(r.error)throw new Error(label+": "+r.error.message);return r.data}

function studentOptions(sel=""){return App.students.map(s=>`<option value="${s.id}" ${s.id===sel?'selected':''}>${esc(s.name)} · ${esc(s.email||"")}</option>`).join("")}
function lessonOptions(sel=""){return App.lessons.map(l=>`<option value="${l.id}" ${l.id===sel?'selected':''}>${esc(studentName(l.student_id))} · ${fmtDate(l.date)} · ${esc(l.title||"Aula")}</option>`).join("")}
function materialOptions(sel=""){return App.materials.map(m=>`<option value="${m.id}" ${m.id===sel?'selected':''}>${esc(m.title_student||m.title_internal||"Material")}</option>`).join("")}

function openStudentForm(id=""){const s=App.students.find(x=>x.id===id)||{};openModal(id?"Editar aluno":"Novo aluno","Salva students e cria profile de aluno.",`<div class="two"><div class="field"><label>Nome</label><input id="stName" value="${esc(s.name||"")}"></div><div class="field"><label>E-mail</label><input id="stEmail" value="${esc(s.email||"")}"></div></div><div class="three"><div class="field"><label>Idioma</label><input id="stLanguage" value="${esc(s.language||"Português")}"></div><div class="field"><label>Curso ativo</label><input id="stCourse" value="${esc(s.active_course_name||"")}"></div><div class="field"><label>Nível ativo</label><input id="stLevel" value="${esc(s.active_course_level||"")}"></div></div><div class="two"><div class="field"><label>Telefone</label><input id="stPhone" value="${esc(s.phone||"")}"></div><div class="field"><label>Status</label><select id="stStatus">${["ativo","pausado","arquivado"].map(x=>`<option ${x===(s.status||"ativo")?"selected":""}>${x}</option>`).join("")}</select></div></div><div class="field"><label>Notas</label><textarea id="stNotes">${esc(s.notes||"")}</textarea></div><button class="btn" onclick="saveStudent('${id}')">salvar aluno</button><div class="status" id="formStatus"></div>`)}
async function saveStudent(id=""){const row={name:val("stName"),email:val("stEmail").toLowerCase(),phone:val("stPhone"),language:val("stLanguage"),active_course_name:val("stCourse"),active_course_level:val("stLevel"),status:val("stStatus"),notes:val("stNotes")};if(!row.name||!row.email)return alert("Nome e e-mail são obrigatórios.");await saveFlow("Salvando aluno…",async()=>{let st;if(id){st=await doSave("atualizar aluno",client.from("students").update(row).eq("id",id).select().single())}else{st=await doSave("salvar aluno",client.from("students").upsert(row,{onConflict:"email"}).select().single())}await doSave("criar profile",client.from("profiles").upsert({email:st.email,role:"student",student_id:st.id},{onConflict:"email"}))})}

function openLessonForm(id="",studentId=""){const l=App.lessons.find(x=>x.id===id)||{};studentId=studentId||l.student_id||"";openModal(id?"Editar aula":"Nova aula","Salva aula para um aluno.",`<div class="field"><label>Aluno</label><select id="lsStudent">${studentOptions(studentId)}</select></div><div class="two"><div class="field"><label>Data</label><input id="lsDate" type="date" value="${esc(l.date||"")}"></div><div class="field"><label>Horário</label><input id="lsTime" type="time" value="${esc(l.start_time?String(l.start_time).slice(0,5):"")}"></div></div><div class="three"><div class="field"><label>Idioma</label><input id="lsLanguage" value="${esc(l.language||"")}"></div><div class="field"><label>Curso</label><input id="lsCourse" value="${esc(l.course_name||"")}"></div><div class="field"><label>Nível</label><input id="lsLevel" value="${esc(l.level||"")}"></div></div><div class="two"><div class="field"><label>Unidade</label><input id="lsUnit" value="${esc(l.unit||"")}"></div><div class="field"><label>Título</label><input id="lsTitle" value="${esc(l.title||"Aula")}"></div></div><div class="three"><div class="field"><label>Status</label><select id="lsStatus">${["agendada","concluída","cancelada","reposição","pendente"].map(x=>`<option ${x===(l.status||"agendada")?"selected":""}>${x}</option>`).join("")}</select></div><div class="field"><label>Planejamento</label><select id="lsPlan">${["a planejar","preparado"].map(x=>`<option ${x===(l.plan_status||"a planejar")?"selected":""}>${x}</option>`).join("")}</select></div><div class="field"><label>Materiais</label><select id="lsMatStatus">${["pendente","preparado","liberado"].map(x=>`<option ${x===(l.materials_status||"pendente")?"selected":""}>${x}</option>`).join("")}</select></div></div><div class="field"><label>Notas</label><textarea id="lsNotes">${esc(l.notes||"")}</textarea></div><button class="btn" onclick="saveLesson('${id}')">salvar aula</button><div class="status" id="formStatus"></div>`)}
async function saveLesson(id=""){const row={student_id:val("lsStudent"),date:val("lsDate")||null,start_time:val("lsTime")||null,language:val("lsLanguage"),course_name:val("lsCourse"),level:val("lsLevel"),unit:val("lsUnit"),title:val("lsTitle")||"Aula",status:val("lsStatus"),plan_status:val("lsPlan"),materials_status:val("lsMatStatus"),student_visible:true,notes:val("lsNotes")};if(!row.student_id)return alert("Escolha aluno.");await saveFlow("Salvando aula…",async()=>{if(id)await doSave("atualizar aula",client.from("lessons").update(row).eq("id",id));else await doSave("criar aula",client.from("lessons").insert(row))})}

function openPaymentForm(id=""){const p=App.payments.find(x=>x.id===id)||{};openModal(id?"Editar mensalidade":"Nova mensalidade","Mensalidade simples vinculada ao aluno.",`<div class="field"><label>Aluno</label><select id="payStudent">${studentOptions(p.student_id||"")}</select></div><div class="three"><div class="field"><label>Mês</label><input id="payMonth" placeholder="2026-05" value="${esc(p.month||"")}"></div><div class="field"><label>Valor</label><input id="payAmount" inputmode="decimal" value="${esc(p.amount||"")}"></div><div class="field"><label>Status</label><select id="payStatus">${["pendente","pago","atrasado"].map(x=>`<option ${x===(p.status||"pendente")?"selected":""}>${x}</option>`).join("")}</select></div></div><div class="two"><div class="field"><label>Aulas previstas</label><input id="payLessons" type="number" value="${esc(p.expected_lessons||4)}"></div><div class="field"><label>Próximo pagamento</label><input id="payNext" type="date" value="${esc(p.next_payment_date||"")}"></div></div><button class="btn" onclick="savePayment('${id}')">salvar mensalidade</button><div class="status" id="formStatus"></div>`)}
async function savePayment(id=""){const row={student_id:val("payStudent"),month:val("payMonth"),amount:money(val("payAmount")),status:val("payStatus"),expected_lessons:Number(val("payLessons"))||4,next_payment_date:val("payNext")||null};if(!row.student_id)return alert("Escolha aluno.");await saveFlow("Salvando mensalidade…",async()=>{if(id)await doSave("atualizar mensalidade",client.from("payments").update(row).eq("id",id));else await doSave("criar mensalidade",client.from("payments").insert(row))})}

function openMaterialForm(id=""){const m=App.materials.find(x=>x.id===id)||{};openModal(id?"Editar material":"Anexar material","Por enquanto o anexo usa link compartilhado do Drive. Google Picker/upload entram depois.",`<div class="two"><div class="field"><label>Título interno</label><input id="mtInternal" value="${esc(m.title_internal||"")}"></div><div class="field"><label>Título para aluno</label><input id="mtStudent" value="${esc(m.title_student||"")}"></div></div><div class="three"><div class="field"><label>Tipo</label><select id="mtType">${["handout","homework","audio","video","answer key","transcript","test","rubric","presentation","material"].map(x=>`<option ${x===(m.type||"handout")?"selected":""}>${x}</option>`).join("")}</select></div><div class="field"><label>Visível ao aluno</label><select id="mtVisible"><option value="true" ${m.student_visible!==false?"selected":""}>sim</option><option value="false" ${m.student_visible===false?"selected":""}>não</option></select></div><div class="field"><label>Download permitido</label><select id="mtDownload"><option value="true" ${m.download_allowed!==false?"selected":""}>sim</option><option value="false" ${m.download_allowed===false?"selected":""}>não</option></select></div></div><div class="field"><label>Anexar do Drive — link compartilhado</label><input id="mtUrl" value="${esc(m.drive_preview_url||m.drive_download_url||"")}" placeholder="cole link do Google Drive/Docs/Slides"></div><div class="field"><label>Nota para aluno</label><textarea id="mtNote">${esc(m.student_note||"")}</textarea></div><div class="field"><label>Vincular a uma aula agora</label><select id="mtLesson"><option value="">não vincular agora</option>${lessonOptions("")}</select></div><button class="btn" onclick="saveMaterial('${id}')">salvar material</button><div class="status" id="formStatus"></div>`)}
async function saveMaterial(id=""){const raw=val("mtUrl");const row={title_internal:val("mtInternal"),title_student:val("mtStudent")||val("mtInternal")||"Material",type:val("mtType"),drive_file_id:driveId(raw),drive_preview_url:drivePreview(raw),drive_download_url:driveDownload(raw),student_visible:val("mtVisible")==="true",download_allowed:val("mtDownload")==="true",student_note:val("mtNote")};await saveFlow("Salvando material…",async()=>{let mt;if(id)mt=await doSave("atualizar material",client.from("materials").update(row).eq("id",id).select().single());else mt=await doSave("criar material",client.from("materials").insert(row).select().single());const lessonId=val("mtLesson");if(lessonId)await doSave("vincular material",client.from("lesson_materials").upsert({lesson_id:lessonId,material_id:mt.id},{onConflict:"lesson_id,material_id"}))})}
function openLinkMaterial(lessonId){openModal("Vincular material","Escolha um material existente para esta aula.",`<div class="field"><label>Material</label><select id="linkMat">${materialOptions("")}</select></div><button class="btn" onclick="saveLinkMaterial('${lessonId}')">vincular</button><div class="status" id="formStatus"></div>`)}
async function saveLinkMaterial(lessonId){const materialId=val("linkMat");if(!materialId)return alert("Escolha material.");await saveFlow("Vinculando…",async()=>{await doSave("vincular material",client.from("lesson_materials").upsert({lesson_id:lessonId,material_id:materialId},{onConflict:"lesson_id,material_id"}))})}
async function saveFlow(msg,fn){const fs=$("formStatus");if(fs){fs.className="status warn";fs.textContent=msg}setTop(msg,"warn");try{await fn();if(fs){fs.className="status good";fs.textContent="Salvo."}setTop("salvo","good");closeModal();await loadAdmin()}catch(e){if(fs){fs.className="status bad";fs.textContent=e.message||String(e)}setTop("erro ao salvar","bad");alert(e.message||String(e))}}

function lessonOptions(sel=""){return App.lessons.map(l=>`<option value="${l.id}" ${l.id===sel?'selected':''}>${esc(studentName(l.student_id))} · ${fmtDate(l.date)} · ${esc(l.title||"Aula")}</option>`).join("")}
function materialOptions(sel=""){return App.materials.map(m=>`<option value="${m.id}" ${m.id===sel?'selected':''}>${esc(m.title_student||m.title_internal||"Material")}</option>`).join("")}

async function previewStudent(id){await loadStudent(id,true)}
async function loadStudent(studentId,asAdmin=false){setFooter(asAdmin?"prévia aluno":"aluno");let st;if(studentId){const r=await timeout(client.from("students").select("*").eq("id",studentId).maybeSingle(),"Student",20000);if(r.error)throw r.error;st=r.data}else{st=null}if(!st){renderUnauthorized("Student não encontrado.");return}App.student=st;const lr=await timeout(client.from("lessons").select("*").eq("student_id",st.id).eq("student_visible",true).order("date",{ascending:true}),"Aulas do aluno",20000);if(lr.error)throw lr.error;App.studentLessons=lr.data||[];const pr=await timeout(client.from("payments").select("*").eq("student_id",st.id).order("created_at",{ascending:false}),"Financeiro do aluno",20000);App.studentPayments=pr.error?[]:(pr.data||[]);await loadStudentMaterials();renderStudentPortal(asAdmin)}
async function loadStudentMaterials(){App.studentMaterialsByLesson={};const ids=App.studentLessons.map(l=>l.id);if(!ids.length)return;const link=await client.from("lesson_materials").select("lesson_id, material_id").in("lesson_id",ids);if(link.error)return;const matIds=[...new Set((link.data||[]).map(x=>x.material_id))];if(!matIds.length)return;const mats=await client.from("materials").select("*").in("id",matIds).eq("student_visible",true);if(mats.error)return;for(const l of link.data||[]){const m=(mats.data||[]).find(x=>x.id===l.material_id);if(!m)continue;App.studentMaterialsByLesson[l.lesson_id] ||= [];App.studentMaterialsByLesson[l.lesson_id].push(m)}}
function studentTabs(active){return`<div class="tabs"><button class="${active==='today'?'active':''}" onclick="renderStudentPortal()">Hoje</button><button class="${active==='lessons'?'active':''}" onclick="renderStudentLessons()">Aulas</button><button class="${active==='materials'?'active':''}" onclick="renderStudentMaterials()">Biblioteca</button><button class="${active==='finance'?'active':''}" onclick="renderStudentFinance()">Financeiro</button></div>`}
function renderStudentPortal(asAdmin=false){const s=App.student;const next=App.studentLessons.find(l=>!l.date||l.date>=new Date().toISOString().slice(0,10))||App.studentLessons[0];const pay=App.studentPayments[0];$("app").innerHTML=`<section class="hero"><h2>Olá, ${esc(s.name)}.</h2><p class="subtle">${esc(s.language||"Idioma não definido")} · ${esc(s.active_course_name||"Curso não definido")} · ${esc(s.active_course_level||"Nível não definido")}</p><div class="btn-row">${App.profile?.role==="admin"?`<button class="btn" onclick="loadAdmin()">voltar ao professor</button>`:""}<button class="btn soft" onclick="signOut()">sair</button></div></section>${studentTabs("today")}<div class="grid"><div class="card"><div class="num">${next?fmtDate(next.date).slice(0,5):"—"}</div><div class="label">próxima aula</div></div><div class="card"><div class="num">${next?.start_time?String(next.start_time).slice(0,5):"—"}</div><div class="label">horário</div></div><div class="card"><div class="num">${Object.values(App.studentMaterialsByLesson).flat().length}</div><div class="label">materiais</div></div><div class="card"><div class="num">${pay?.status||"—"}</div><div class="label">mensalidade</div></div></div><div class="two">${panel("Próxima aula","",next?lessonCard(next):empty("Nenhuma aula","Suas aulas aparecerão aqui."))}${panel("Financeiro","",pay?paymentCard(pay):empty("Sem mensalidade","Nenhuma mensalidade cadastrada."))}</div>`}
function lessonCard(l){const mats=App.studentMaterialsByLesson[l.id]||[];return`<div class="item"><div class="item-title">${esc(fmtDate(l.date))}${l.start_time?' · '+esc(String(l.start_time).slice(0,5)):''}</div><div class="meta">${esc([l.title,l.course_name,l.level,l.unit].filter(Boolean).join(" · "))}</div><div class="info"><div><b>Materiais:</b> ${mats.length?mats.length+" liberado(s)":"ainda não liberados"}</div><div><b>Status:</b> ${esc(l.status||"agendada")}</div></div><div class="actions">${mats[0]?`<button onclick="openStudentMaterial('${mats[0].id}')">abrir material</button>`:""}</div></div>`}
function paymentCard(p){return`<div class="item"><div class="item-title">${esc(p.month||"Mensalidade")}</div><div class="meta">${esc(p.status||"pendente")} · ${fmtMoney(p.amount)} · ${p.expected_lessons||0} aulas previstas</div><div class="info"><div><b>Próximo pagamento:</b> ${p.next_payment_date?fmtDate(p.next_payment_date):"—"}</div></div></div>`}
function renderStudentLessons(){$("app").innerHTML=`<section class="hero"><h2>Aulas</h2><p class="subtle">Histórico e próximas aulas.</p></section>${studentTabs("lessons")}${panel("Suas aulas","",App.studentLessons.map(lessonCard).join("")||empty("Nenhuma aula","Nenhuma aula visível."))}`}
function renderStudentMaterials(){const all=[];for(const l of App.studentLessons){for(const m of App.studentMaterialsByLesson[l.id]||[])all.push({l,m})}$("app").innerHTML=`<section class="hero"><h2>Biblioteca</h2><p class="subtle">Materiais liberados.</p></section>${studentTabs("materials")}${panel("Materiais","",all.map(x=>`<div class="item"><div class="item-title">${esc(x.m.title_student||x.m.title_internal||"Material")}</div><div class="meta">${esc(["Aula de "+fmtDate(x.l.date),x.l.unit,x.m.student_note].filter(Boolean).join(" · "))}</div><div class="actions"><button onclick="openStudentMaterial('${x.m.id}')">abrir</button></div></div>`).join("")||empty("Nenhum material","Nenhum material liberado."))}`}
function renderStudentFinance(){$("app").innerHTML=`<section class="hero"><h2>Financeiro</h2><p class="subtle">Resumo simples.</p></section>${studentTabs("finance")}${panel("Mensalidades","",App.studentPayments.map(paymentCard).join("")||empty("Sem mensalidade","Nenhuma mensalidade cadastrada."))}`}
function openStudentMaterial(id){const all=Object.values(App.studentMaterialsByLesson).flat();const m=all.find(x=>x.id===id);if(!m)return alert("Material não encontrado.");const url=m.drive_preview_url||m.drive_download_url;if(!url)return alert("Material sem URL.");window.open(url,"_blank")}
boot();
</script>
</body>
</html>
