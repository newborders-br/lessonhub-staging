<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LessonHub v2.0.0-alpha.2 · Admin Writer mínimo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#fbfaf7;--paper:#fffdf9;--ink:#181512;--muted:#756e67;--line:rgba(24,21,18,.14);--line2:rgba(24,21,18,.07);--wash:rgba(255,253,249,.74);--shadow:0 28px 80px rgba(35,28,20,.055)}
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:radial-gradient(circle at 12% -8%,rgba(190,165,126,.14),transparent 28%),var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button{font:inherit;cursor:pointer}.shell{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:30px 0 70px}.mast{border-bottom:1px solid var(--ink);padding:18px 0 20px;margin-bottom:16px;display:flex;justify-content:space-between;gap:20px;align-items:end}.logo{font-family:Georgia,serif;font-size:54px;line-height:.82;letter-spacing:-.075em;font-weight:400}.kicker{font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted)}.subtle{font-size:13px;color:var(--muted);line-height:1.55}.hero,.panel,.card,.item{background:var(--wash);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(18px)}.hero{border-color:var(--ink);padding:24px;margin-bottom:18px}.hero h2{font-family:Georgia,serif;font-size:44px;line-height:.92;letter-spacing:-.06em;font-weight:400;margin-bottom:10px}.btn{border:1px solid var(--ink);background:transparent;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.14em}.btn:hover{background:var(--ink);color:var(--paper)}.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}.card{min-height:120px;padding:20px;display:flex;flex-direction:column;justify-content:space-between}.num{font-family:Georgia,serif;font-size:38px;letter-spacing:-.06em;line-height:.9;word-break:break-word}.label{font-size:10px;text-transform:uppercase;letter-spacing:.17em;color:var(--muted)}.two{display:grid;grid-template-columns:1.08fr .92fr;gap:16px}.panel{padding:20px;margin-bottom:16px}.panel-title{display:flex;justify-content:space-between;gap:14px;align-items:end;border-bottom:1px solid var(--ink);padding-bottom:10px;margin-bottom:14px}.panel-title h3{font-family:Georgia,serif;font-weight:400;font-size:27px;letter-spacing:-.04em}.list{display:grid;gap:10px}.item{padding:16px}.item-title{font-family:Georgia,serif;font-size:24px;font-weight:400;letter-spacing:-.045em}.meta{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.45}.info{margin-top:12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:8px 14px;border-top:1px solid var(--line2);padding-top:10px}.info div{font-size:12px;color:var(--muted);line-height:1.4}.info b{font-weight:500;color:var(--ink)}.actions{display:flex;gap:11px;flex-wrap:wrap;margin-top:12px}.actions button{border:0;background:transparent;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.13em;border-bottom:1px solid transparent;padding:0 0 3px}.actions button:hover{color:var(--ink);border-bottom-color:var(--ink)}.tabs{display:flex;gap:15px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:14px;margin:18px 0 20px}.tabs button{border:0;background:transparent;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.15em;padding:0 0 4px;border-bottom:1px solid transparent}.tabs button.active,.tabs button:hover{color:var(--ink);border-bottom-color:var(--ink)}.empty{border:1px dashed var(--line);padding:28px;text-align:center;color:var(--muted);background:rgba(255,255,255,.32)}.empty h3{font-family:Georgia,serif;font-size:27px;font-weight:400;letter-spacing:-.04em;color:var(--ink);margin-bottom:8px}.footer{border-top:1px solid var(--line);padding:14px 0 26px;margin-top:22px;display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:11px}.status{white-space:pre-wrap;margin-top:12px;font-size:12px;color:var(--muted);line-height:1.5}.bad{color:#9d2d25}.good{color:#28745a}.gate{position:fixed;inset:0;background:var(--bg);z-index:50;display:none;align-items:center;justify-content:center;text-align:center;padding:24px}.gate.active{display:flex}.gate h2{font-family:Georgia,serif;font-size:44px;font-weight:400;letter-spacing:-.06em;margin-bottom:10px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px 12px}.form-grid .wide{grid-column:1/-1}.field{display:grid;gap:5px}.field label{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:var(--muted)}input,select,textarea{width:100%;border:1px solid var(--line);background:rgba(255,253,249,.66);color:var(--ink);font:inherit;font-size:13px;padding:10px 11px;outline:none;border-radius:0}textarea{min-height:72px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:var(--ink);background:var(--paper)}.save-line{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px}.mini-status{font-size:12px;color:var(--muted);white-space:pre-wrap}.writer-stack{display:grid;gap:14px}.writer-note{font-size:12px;color:var(--muted);line-height:1.5;border-top:1px solid var(--line2);padding-top:10px;margin-top:10px}@media(max-width:800px){.form-grid{grid-template-columns:1fr}}@media(max-width:800px){.shell{width:min(100% - 24px,1180px);padding-top:22px}.mast,.two,.grid{grid-template-columns:1fr;display:grid}.logo{font-size:44px}.hero h2{font-size:36px}}
</style>
</head>
<body>
<div class="gate active" id="gate"><div><h2>Carregando LessonHub…</h2><p class="subtle" id="gateText">Verificando sessão com segurança.</p></div></div>
<div class="shell">
<header class="mast"><div><h1 class="logo">Lesson<br>Hub</h1><p class="kicker" style="margin-top:12px">v2.0.0-alpha.2 · Admin Writer mínimo</p></div><p class="kicker" id="sessionMini">backend prototype</p></header>
<main id="app"></main>
<footer class="footer"><span>Erik Azevedo (@prof.erikazevedo)</span><span id="footerMode">Supabase Auth</span></footer>
</div>
<script>
const SUPABASE_URL = "https://ezgaqcxrbticangnnryo.supabase.co";
const SUPABASE_KEY = "sb_publishable_k-Ch1aS1UkRR-OlDzAbH-Q_B4a8e7kE";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
let state={session:null,user:null,email:"",profile:null,student:null,lessons:[],payments:[],materialsByLesson:{},adminCounts:null,adminLists:null};
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmtDate(d){if(!d)return "—";const p=String(d).slice(0,10).split("-");return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d}
function fmtMoney(n){return (Number(n)||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function gate(msg,show=true){document.getElementById("gateText").textContent=msg||"Carregando.";document.getElementById("gate").classList.toggle("active",!!show)}
function empty(t,x){return `<div class="empty"><h3>${esc(t)}</h3><p>${esc(x)}</p></div>`}
function tab(active){return `<div class="tabs"><button class="${active==='today'?'active':''}" onclick="renderStudentPortal()">Hoje</button><button class="${active==='lessons'?'active':''}" onclick="renderLessons()">Aulas</button><button class="${active==='materials'?'active':''}" onclick="renderMaterials()">Biblioteca</button><button class="${active==='finance'?'active':''}" onclick="renderFinance()">Financeiro</button></div>`}
async function signIn(){const redirectTo=window.location.href.split("#")[0].split("?")[0];const {error}=await client.auth.signInWithOAuth({provider:"google",options:{redirectTo}});if(error)alert("Erro no login: "+error.message)}
async function signOut(){gate("Saindo…");await client.auth.signOut();state={session:null,user:null,email:"",profile:null,student:null,lessons:[],payments:[],materialsByLesson:{},adminCounts:null,adminLists:null};renderLogin();gate("",false)}
async function init(){gate("Verificando sessão…");const {data,error}=await client.auth.getSession();if(error){renderLogin("Erro ao recuperar sessão: "+error.message);gate("",false);return}if(!data.session){renderLogin();gate("",false);return}state.session=data.session;state.user=data.session.user;state.email=(state.user.email||"").toLowerCase();await loadRoleAndData();gate("",false)}
client.auth.onAuthStateChange(async(event,session)=>{if(event==="SIGNED_IN"&&session){state.session=session;state.user=session.user;state.email=(session.user.email||"").toLowerCase();await loadRoleAndData();gate("",false)}})
function renderLogin(msg=""){document.getElementById("sessionMini").textContent="não conectado";document.getElementById("footerMode").textContent="login necessário";document.getElementById("app").innerHTML=`<section class="hero"><h2>Entrar no LessonHub</h2><p class="subtle">Esta versão alpha usa Supabase Auth. O e-mail logado precisa existir em profiles.</p><div class="btn-row"><button class="btn" onclick="signIn()">entrar com Google</button></div><div class="status ${msg?'bad':''}">${esc(msg||"Aguardando login.")}</div></section>`}
async function loadRoleAndData(){gate("Buscando perfil…");document.getElementById("sessionMini").textContent=state.email;const {data:profile,error}=await client.from("profiles").select("*").eq("email",state.email).maybeSingle();if(error){renderLogin("Erro ao consultar profile:\n"+error.message+"\n\nSe for policy/RLS, rode o SQL de policies da alpha.1.");return}if(!profile){renderUnauthorized();return}state.profile=profile;if(profile.role==="admin"){await loadAdmin();return}if(profile.role==="student"){await loadStudent(profile);return}renderUnauthorized("Role desconhecida: "+profile.role)}
function renderUnauthorized(extra=""){document.getElementById("footerMode").textContent="acesso não autorizado";document.getElementById("app").innerHTML=`<section class="hero"><h2>Acesso não autorizado</h2><p class="subtle">O e-mail ${esc(state.email)} ainda não está vinculado ao LessonHub.</p>${extra?`<div class="status bad">${esc(extra)}</div>`:""}<div class="btn-row"><button class="btn" onclick="signOut()">sair</button></div></section>`}
async function loadAdmin(){gate("Carregando painel professor…");document.getElementById("footerMode").textContent="professor";const [students,lessons,payments,materials,recentStudents,upcomingLessons,allStudents,allLessons,allMaterials]=await Promise.all([client.from("students").select("id",{count:"exact",head:true}),client.from("lessons").select("id",{count:"exact",head:true}),client.from("payments").select("id",{count:"exact",head:true}),client.from("materials").select("id",{count:"exact",head:true}),client.from("students").select("*").order("created_at",{ascending:false}).limit(5),client.from("lessons").select("*").order("date",{ascending:true}).limit(5),client.from("students").select("*").order("name",{ascending:true}).limit(100),client.from("lessons").select("*").order("date",{ascending:false}).limit(100),client.from("materials").select("*").order("created_at",{ascending:false}).limit(100)]);const errors=[students.error,lessons.error,payments.error,materials.error,recentStudents.error,upcomingLessons.error,allStudents.error,allLessons.error,allMaterials.error].filter(Boolean);if(errors.length){renderLogin("Erro ao carregar admin:
"+errors.map(e=>e.message).join("
"));return}state.adminCounts={students:students.count,lessons:lessons.count,payments:payments.count,materials:materials.count};state.adminLists={students:recentStudents.data||[],lessons:upcomingLessons.data||[],allStudents:allStudents.data||[],allLessons:allLessons.data||[],allMaterials:allMaterials.data||[]};renderAdmin()}
function renderAdmin(){const c=state.adminCounts||{};const lists=state.adminLists||{students:[],lessons:[],allStudents:[],allLessons:[],allMaterials:[]};document.getElementById("app").innerHTML=`<section class="hero"><h2>Professor</h2><p class="subtle">Admin reconhecido pelo Supabase Auth. Alpha.2 adiciona escrita mínima no backend: aluno, aula, mensalidade, material e vínculo.</p><div class="btn-row"><button class="btn" onclick="signOut()">sair</button></div></section><div class="grid"><div class="card"><div class="num">${c.students??"—"}</div><div class="label">alunos</div></div><div class="card"><div class="num">${c.lessons??"—"}</div><div class="label">aulas</div></div><div class="card"><div class="num">${c.payments??"—"}</div><div class="label">mensalidades</div></div><div class="card"><div class="num">${c.materials??"—"}</div><div class="label">materiais</div></div></div><section class="panel"><div class="panel-title"><h3>Admin Writer mínimo</h3><span class="kicker">sem SQL para uso básico</span></div><div class="writer-stack">${adminWriterForms(lists)}</div><p class="writer-note">Esta versão mantém a estética da alpha.1.1.1 e só adiciona escrita mínima. Se algum salvamento falhar por RLS, será necessário aplicar policies de INSERT/UPDATE para admin.</p></section><div class="two"><section class="panel"><div class="panel-title"><h3>Alunos recentes</h3></div><div class="list">${lists.students.map(s=>`<div class="item"><div class="item-title">${esc(s.name)}</div><div class="meta">${esc([s.email,s.language,s.active_course_name,s.active_course_level].filter(Boolean).join(" · "))}</div></div>`).join("")||empty("Sem alunos","Nenhum aluno cadastrado.")}</div></section><section class="panel"><div class="panel-title"><h3>Próximas aulas</h3></div><div class="list">${lists.lessons.map(lessonCardAdmin).join("")||empty("Sem aulas","Nenhuma aula cadastrada.")}</div></section></div>`}

function optStudents(){const list=(state.adminLists&&state.adminLists.allStudents)||[];return list.map(s=>`<option value="${esc(s.id)}">${esc(s.name||s.email||s.id)}</option>`).join("")}
function optLessons(){const list=(state.adminLists&&state.adminLists.allLessons)||[];return list.map(l=>`<option value="${esc(l.id)}">${esc([fmtDate(l.date),l.start_time?String(l.start_time).slice(0,5):"",l.title].filter(Boolean).join(" · "))}</option>`).join("")}
function optMaterials(){const list=(state.adminLists&&state.adminLists.allMaterials)||[];return list.map(m=>`<option value="${esc(m.id)}">${esc(m.title_student||m.type||m.id)}</option>`).join("")}
function adminWriterForms(lists){const studentOptions=optStudents();const lessonOptions=optLessons();const materialOptions=optMaterials();return `<div class="two"><div class="item"><div class="item-title">Criar aluno</div><div class="form-grid" style="margin-top:12px"><div class="field"><label>Nome</label><input id="wStudentName" placeholder="Nome do aluno"></div><div class="field"><label>E-mail Google</label><input id="wStudentEmail" placeholder="email@gmail.com"></div><div class="field"><label>Idioma</label><input id="wStudentLanguage" value="Português"></div><div class="field"><label>Nível</label><input id="wStudentLevel" placeholder="Starter"></div><div class="field wide"><label>Curso ativo</label><input id="wStudentCourse" placeholder="Portuguese for English Speakers"></div></div><div class="save-line"><button class="btn" onclick="saveStudent()">salvar aluno</button><span class="mini-status" id="wStudentStatus"></span></div></div><div class="item"><div class="item-title">Criar aula</div><div class="form-grid" style="margin-top:12px"><div class="field wide"><label>Aluno</label><select id="wLessonStudent">${studentOptions||'<option value="">Cadastre um aluno primeiro</option>'}</select></div><div class="field"><label>Data</label><input id="wLessonDate" type="date"></div><div class="field"><label>Horário</label><input id="wLessonTime" type="time"></div><div class="field"><label>Título</label><input id="wLessonTitle" placeholder="Aula 1"></div><div class="field"><label>Unidade</label><input id="wLessonUnit" placeholder="Unit 0A"></div><div class="field"><label>Curso</label><input id="wLessonCourse" placeholder="Portuguese for English Speakers"></div><div class="field"><label>Nível</label><input id="wLessonLevel" placeholder="Starter"></div><div class="field"><label>Visível ao aluno</label><select id="wLessonVisible"><option value="true">sim</option><option value="false">não</option></select></div></div><div class="save-line"><button class="btn" onclick="saveLesson()">salvar aula</button><span class="mini-status" id="wLessonStatus"></span></div></div></div><div class="two"><div class="item"><div class="item-title">Criar mensalidade</div><div class="form-grid" style="margin-top:12px"><div class="field wide"><label>Aluno</label><select id="wPaymentStudent">${studentOptions||'<option value="">Cadastre um aluno primeiro</option>'}</select></div><div class="field"><label>Mês</label><input id="wPaymentMonth" placeholder="2026-05"></div><div class="field"><label>Valor</label><input id="wPaymentAmount" type="number" step="0.01" placeholder="400"></div><div class="field"><label>Status</label><select id="wPaymentStatus"><option value="pago">pago</option><option value="pendente">pendente</option><option value="included in package">included in package</option></select></div><div class="field"><label>Aulas previstas</label><input id="wPaymentExpected" type="number" value="4"></div><div class="field"><label>Próximo pagamento</label><input id="wPaymentNext" type="date"></div></div><div class="save-line"><button class="btn" onclick="savePayment()">salvar mensalidade</button><span class="mini-status" id="wPaymentStatusMsg"></span></div></div><div class="item"><div class="item-title">Criar material</div><div class="form-grid" style="margin-top:12px"><div class="field"><label>Tipo</label><select id="wMaterialType"><option value="presentation">presentation</option><option value="handout">handout</option><option value="homework">homework</option><option value="audio">audio</option><option value="video">video</option><option value="answer key">answer key</option><option value="transcript">transcript</option><option value="test">test</option><option value="rubric">rubric</option><option value="extra">extra</option></select></div><div class="field"><label>Título aluno</label><input id="wMaterialTitle" placeholder="Slides"></div><div class="field wide"><label>Link Drive</label><input id="wMaterialUrl" placeholder="https://docs.google.com/..."></div><div class="field wide"><label>Observação aluno</label><input id="wMaterialNote" placeholder="Opcional"></div><div class="field"><label>Visível ao aluno</label><select id="wMaterialVisible"><option value="true">sim</option><option value="false">não</option></select></div></div><div class="save-line"><button class="btn" onclick="saveMaterial()">salvar material</button><span class="mini-status" id="wMaterialStatus"></span></div></div></div><div class="item"><div class="item-title">Vincular material à aula</div><div class="form-grid" style="margin-top:12px"><div class="field"><label>Aula</label><select id="wLinkLesson">${lessonOptions||'<option value="">Crie uma aula primeiro</option>'}</select></div><div class="field"><label>Material</label><select id="wLinkMaterial">${materialOptions||'<option value="">Crie um material primeiro</option>'}</select></div></div><div class="save-line"><button class="btn" onclick="saveLink()">vincular</button><span class="mini-status" id="wLinkStatus"></span></div></div>`}
function setMini(id,msg,good=false){const el=document.getElementById(id);if(el){el.textContent=msg;el.className="mini-status "+(good?"good":"bad")}}
function driveIdFromUrl(url){const s=String(url||"");let m=s.match(/\/d\/([^/]+)/);if(m)return m[1];m=s.match(/[?&]id=([^&]+)/);return m?m[1]:""}
function previewFromDrive(url){const id=driveIdFromUrl(url);if(!id)return url||"";return `https://docs.google.com/presentation/d/${id}/preview`}
function downloadFromDrive(url){const id=driveIdFromUrl(url);if(!id)return url||"";return `https://docs.google.com/presentation/d/${id}/export/pdf`}
async function saveStudent(){const name=document.getElementById("wStudentName").value.trim();const email=document.getElementById("wStudentEmail").value.trim().toLowerCase();if(!name||!email){setMini("wStudentStatus","Nome e e-mail são obrigatórios.");return}setMini("wStudentStatus","Salvando…",true);const studentPayload={name,email,language:document.getElementById("wStudentLanguage").value.trim()||null,active_course_name:document.getElementById("wStudentCourse").value.trim()||null,active_course_level:document.getElementById("wStudentLevel").value.trim()||null};const sr=await client.from("students").insert(studentPayload).select("*").single();if(sr.error){setMini("wStudentStatus",sr.error.message);return}const pr=await client.from("profiles").insert({email,role:"student",student_id:sr.data.id}).select("*").maybeSingle();if(pr.error){setMini("wStudentStatus","Aluno criado, mas profile falhou: "+pr.error.message);await loadAdmin();return}setMini("wStudentStatus","Aluno criado.",true);await loadAdmin()}
async function saveLesson(){const student_id=document.getElementById("wLessonStudent").value;if(!student_id){setMini("wLessonStatus","Escolha um aluno.");return}setMini("wLessonStatus","Salvando…",true);const payload={student_id,date:document.getElementById("wLessonDate").value||null,start_time:document.getElementById("wLessonTime").value||null,title:document.getElementById("wLessonTitle").value.trim()||null,unit:document.getElementById("wLessonUnit").value.trim()||null,course_name:document.getElementById("wLessonCourse").value.trim()||null,level:document.getElementById("wLessonLevel").value.trim()||null,student_visible:document.getElementById("wLessonVisible").value==="true"};const r=await client.from("lessons").insert(payload).select("*").single();if(r.error){setMini("wLessonStatus",r.error.message);return}setMini("wLessonStatus","Aula criada.",true);await loadAdmin()}
async function savePayment(){const student_id=document.getElementById("wPaymentStudent").value;if(!student_id){setMini("wPaymentStatusMsg","Escolha um aluno.");return}setMini("wPaymentStatusMsg","Salvando…",true);const payload={student_id,month:document.getElementById("wPaymentMonth").value.trim()||null,amount:Number(document.getElementById("wPaymentAmount").value||0),status:document.getElementById("wPaymentStatus").value,expected_lessons:Number(document.getElementById("wPaymentExpected").value||0),next_payment_date:document.getElementById("wPaymentNext").value||null};const r=await client.from("payments").insert(payload).select("*").single();if(r.error){setMini("wPaymentStatusMsg",r.error.message);return}setMini("wPaymentStatusMsg","Mensalidade criada.",true);await loadAdmin()}
async function saveMaterial(){const url=document.getElementById("wMaterialUrl").value.trim();if(!url){setMini("wMaterialStatus","Informe o link do Drive.");return}setMini("wMaterialStatus","Salvando…",true);const payload={type:document.getElementById("wMaterialType").value,title_student:document.getElementById("wMaterialTitle").value.trim()||null,drive_file_id:driveIdFromUrl(url)||null,drive_preview_url:previewFromDrive(url),drive_download_url:downloadFromDrive(url),student_note:document.getElementById("wMaterialNote").value.trim()||null,student_visible:document.getElementById("wMaterialVisible").value==="true"};const r=await client.from("materials").insert(payload).select("*").single();if(r.error){setMini("wMaterialStatus",r.error.message);return}setMini("wMaterialStatus","Material criado.",true);await loadAdmin()}
async function saveLink(){const lesson_id=document.getElementById("wLinkLesson").value;const material_id=document.getElementById("wLinkMaterial").value;if(!lesson_id||!material_id){setMini("wLinkStatus","Escolha aula e material.");return}setMini("wLinkStatus","Vinculando…",true);const r=await client.from("lesson_materials").insert({lesson_id,material_id}).select("*").maybeSingle();if(r.error){setMini("wLinkStatus",r.error.message);return}setMini("wLinkStatus","Vínculo criado.",true);await loadAdmin()}

function lessonCardAdmin(l){return `<div class="item"><div class="item-title">${esc(fmtDate(l.date))}${l.start_time?" · "+esc(String(l.start_time).slice(0,5)):""}</div><div class="meta">${esc([l.title,l.course_name,l.level,l.unit].filter(Boolean).join(" · "))}</div></div>`}
async function loadStudent(profile){gate("Carregando portal do aluno…");document.getElementById("footerMode").textContent="aluno";let student=null;if(profile.student_id){const r=await client.from("students").select("*").eq("id",profile.student_id).maybeSingle();if(r.error){renderLogin("Erro ao buscar student:\n"+r.error.message);return}student=r.data}if(!student){const r=await client.from("students").select("*").eq("email",state.email).maybeSingle();if(r.error){renderLogin("Erro ao buscar student por email:\n"+r.error.message);return}student=r.data}if(!student){renderUnauthorized("Profile existe, mas student não foi encontrado.");return}state.student=student;const lr=await client.from("lessons").select("*").eq("student_id",student.id).eq("student_visible",true).order("date",{ascending:true});if(lr.error){renderLogin("Erro ao buscar aulas:\n"+lr.error.message);return}state.lessons=lr.data||[];const pr=await client.from("payments").select("*").eq("student_id",student.id).order("month",{ascending:false});if(!pr.error)state.payments=pr.data||[];await loadMaterialsForLessons();renderStudentPortal()}
async function loadMaterialsForLessons(){state.materialsByLesson={};const ids=state.lessons.map(l=>l.id);if(!ids.length)return;const link=await client.from("lesson_materials").select("lesson_id, material_id").in("lesson_id",ids);if(link.error){console.warn(link.error);return}const matIds=[...new Set((link.data||[]).map(x=>x.material_id))];if(!matIds.length)return;const mats=await client.from("materials").select("*").in("id",matIds).eq("student_visible",true);if(mats.error){console.warn(mats.error);return}for(const l of link.data||[]){const m=(mats.data||[]).find(x=>x.id===l.material_id);if(!m)continue;state.materialsByLesson[l.lesson_id] ||= [];state.materialsByLesson[l.lesson_id].push(m)}}
function renderStudentPortal(){const s=state.student;const next=state.lessons.find(l=>!l.date||l.date>=new Date().toISOString().slice(0,10))||state.lessons[0];const pay=state.payments[0];document.getElementById("app").innerHTML=`<section class="hero"><h2>Olá, ${esc(s.name)}.</h2><p class="subtle">${esc(s.language||"Idioma não definido")} · ${esc(s.active_course_name||"Curso não definido")} · ${esc(s.active_course_level||"Nível não definido")}</p><div class="btn-row"><button class="btn" onclick="signOut()">sair</button></div></section>${tab("today")}<div class="grid"><div class="card"><div class="num">${next?fmtDate(next.date).slice(0,5):"—"}</div><div class="label">próxima aula</div></div><div class="card"><div class="num">${next?.start_time?String(next.start_time).slice(0,5):"—"}</div><div class="label">horário</div></div><div class="card"><div class="num">${Object.values(state.materialsByLesson).flat().length}</div><div class="label">materiais</div></div><div class="card"><div class="num">${pay?.status||"—"}</div><div class="label">mensalidade</div></div></div><div class="two"><section class="panel"><div class="panel-title"><h3>Próxima aula</h3></div>${next?lessonCard(next):empty("Nenhuma aula","Suas aulas aparecerão aqui quando forem cadastradas.")}</section><section class="panel"><div class="panel-title"><h3>Financeiro</h3></div>${pay?paymentCard(pay):empty("Sem mensalidade","Nenhuma mensalidade cadastrada ainda.")}</section></div>`}
function lessonCard(l){const mats=state.materialsByLesson[l.id]||[];return `<div class="item"><div class="item-title">${esc(fmtDate(l.date))}${l.start_time?" · "+esc(String(l.start_time).slice(0,5)):""}</div><div class="meta">${esc([l.title,l.course_name,l.level,l.unit].filter(Boolean).join(" · "))}</div><div class="info"><div><b>Materiais:</b> ${mats.length?mats.length+" liberado(s)":"ainda não liberados"}</div><div><b>Status:</b> ${esc(l.status||"agendada")}</div></div><div class="actions"><button onclick="renderLessons()">ver aulas</button>${mats[0]?`<button onclick="openMaterial('${mats[0].id}')">abrir material</button>`:""}</div></div>`}
function paymentCard(p){return `<div class="item"><div class="item-title">${esc(p.month||"Mensalidade")}</div><div class="meta">${esc(p.status||"pendente")} · ${fmtMoney(p.amount)} · ${p.expected_lessons||0} aulas previstas</div><div class="info"><div><b>Próximo pagamento:</b> ${p.next_payment_date?fmtDate(p.next_payment_date):"—"}</div></div></div>`}
function renderLessons(){document.getElementById("app").innerHTML=`<section class="hero"><h2>Aulas</h2><p class="subtle">Aulas carregadas diretamente do Supabase.</p><div class="btn-row"><button class="btn" onclick="signOut()">sair</button></div></section>${tab("lessons")}<section class="panel"><div class="panel-title"><h3>Suas aulas</h3></div><div class="list">${state.lessons.map(lessonCard).join("")||empty("Nenhuma aula","Nenhuma aula visível no backend.")}</div></section>`}
function renderMaterials(){const all=[];for(const l of state.lessons){for(const m of state.materialsByLesson[l.id]||[])all.push({l,m})}document.getElementById("app").innerHTML=`<section class="hero"><h2>Biblioteca</h2><p class="subtle">Materiais liberados para este aluno.</p><div class="btn-row"><button class="btn" onclick="signOut()">sair</button></div></section>${tab("materials")}<section class="panel"><div class="panel-title"><h3>Materiais</h3></div><div class="list">${all.map(x=>materialCard(x.m,x.l)).join("")||empty("Nenhum material","Nenhum material liberado ainda.")}</div></section>`}
function materialCard(m,l){const title=m.title_student||typeLabel(m.type);const meta=["Aula de "+fmtDate(l.date),l.unit,m.student_note].filter(Boolean).join(" · ");return `<div class="item"><div class="item-title">${esc(title)}</div><div class="meta">${esc(meta)}</div><div class="actions"><button onclick="openMaterial('${m.id}')">abrir</button></div></div>`}
function typeLabel(type){const labels={handout:"Handout",homework:"Homework",audio:"Audio",video:"Video","answer key":"Answer key",transcript:"Transcript",test:"Test",rubric:"Rubric",presentation:"Slides"};return labels[String(type||"").toLowerCase()]||"Material"}
function openMaterial(id){const all=Object.values(state.materialsByLesson).flat();const m=all.find(x=>x.id===id);if(!m)return alert("Material não encontrado.");const url=m.drive_preview_url||m.drive_download_url;if(!url)return alert("Material encontrado, mas ainda sem URL do Drive.");window.open(url,"_blank")}
function renderFinance(){document.getElementById("app").innerHTML=`<section class="hero"><h2>Financeiro</h2><p class="subtle">Resumo simples para o aluno.</p><div class="btn-row"><button class="btn" onclick="signOut()">sair</button></div></section>${tab("finance")}<section class="panel"><div class="panel-title"><h3>Mensalidades</h3></div><div class="list">${state.payments.map(paymentCard).join("")||empty("Sem mensalidade","Nenhuma mensalidade cadastrada ainda.")}</div></section>`}
init();
</script>

<script id="lessonhub-alpha1-1-gate-session-hotfix">
(function(){
'use strict';

let LH_LOADING_201 = false;
let LH_LAST_LOAD_201 = 0;

function gate201(msg, show=true){
  const gt=document.getElementById("gate");
  const txt=document.getElementById("gateText");
  if(txt) txt.textContent = msg || "Carregando.";
  if(gt) gt.classList.toggle("active", !!show);
}

async function withTimeout201(promise, label, ms=9000){
  let timer;
  const timeout = new Promise((_, reject)=>{
    timer=setTimeout(()=>reject(new Error((label||"Operação")+" demorou demais. Tente F5 ou verifique Supabase/RLS.")), ms);
  });
  try { return await Promise.race([promise, timeout]); }
  finally { clearTimeout(timer); }
}

async function safeLoad201(){
  if (LH_LOADING_201) return;
  const now=Date.now();
  if (now - LH_LAST_LOAD_201 < 900) return;
  LH_LOADING_201 = true;
  LH_LAST_LOAD_201 = now;
  try{
    gate201("Verificando sessão…", true);
    const sessionRes = await withTimeout201(client.auth.getSession(), "Sessão", 8000);
    const session = sessionRes && sessionRes.data && sessionRes.data.session;
    if(!session){
      if(typeof renderLogin === "function") renderLogin();
      return;
    }
    state.session=session;
    state.user=session.user;
    state.email=(session.user.email||"").toLowerCase();
    await withTimeout201(loadRoleAndData(), "Busca de perfil", 12000);
  }catch(e){
    console.error("LessonHub alpha.1.1 recovery", e);
    if(typeof renderLogin === "function"){
      renderLogin("A sessão existe, mas o carregamento travou:\\n"+(e.message||e));
    }
  }finally{
    gate201("", false);
    LH_LOADING_201 = false;
  }
}

window.signOut = async function signOut201(){
  try{
    gate201("Saindo…", true);
    await client.auth.signOut();
  }catch(e){
    console.warn(e);
  }finally{
    state={session:null,user:null,email:"",profile:null,student:null,lessons:[],payments:[],materialsByLesson:{},adminCounts:null,adminLists:null};
    if(typeof renderLogin === "function") renderLogin();
    gate201("", false);
  }
};

window.lessonHubRecoverSession201 = safeLoad201;

document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState === "visible"){
    const gateEl=document.getElementById("gate");
    if(gateEl && gateEl.classList.contains("active")){
      setTimeout(()=>safeLoad201(), 250);
    }
  }
});

window.addEventListener("focus", ()=>{
  const gateEl=document.getElementById("gate");
  if(gateEl && gateEl.classList.contains("active")){
    setTimeout(()=>safeLoad201(), 250);
  }
});

setInterval(()=>{
  const gateEl=document.getElementById("gate");
  const app=document.getElementById("app");
  if(gateEl && gateEl.classList.contains("active") && app && app.innerHTML.trim()){
    gate201("", false);
  }
}, 2500);

})();
</script>
