uted);line-height:1.5}.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}.badge{border:1px solid var(--line);padding:3px 7px;font-size:10px;text-transform:uppercase;letter-spacing:.11em;color:var(--muted);background:rgba(255,255,255,.35)}.badge.ok{color:var(--ok);border-color:rgba(40,116,90,.35)}.badge.bad{color:var(--bad);border-color:rgba(157,45,37,.35)}.badge.warn{color:var(--warn);border-color:rgba(160,108,27,.35)}.badge.blue{color:var(--blue);border-color:rgba(49,95,143,.35)}.empty{padding:34px;text-align:center;border:1px dashed var(--line);color:var(--soft);background:rgba(255,255,255,.35)}

body.student-mode .shell{display:none}body:not(.student-mode) .student-shell{display:none}.student-hero{border:1px solid var(--ink);padding:24px;margin-bottom:16px;background:rgba(255,253,249,.72);box-shadow:var(--shadow)}.student-hero h2{font-size:46px;line-height:.95}.student-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}.student-lesson,.student-resource{border:1px solid var(--line);background:rgba(255,255,255,.35);padding:15px;margin-bottom:10px}.student-lesson-title{font-family:Georgia,serif;font-size:24px;letter-spacing:-.04em}.viewer-frame iframe{width:min(1000px,calc(100vw - 28px));height:calc(100vh - 100px);border:0;background:white;box-shadow:0 25px 70px rgba(24,21,18,.12)}.danger-note{border-left:1px solid var(--bad);padding-left:12px;color:var(--bad)}
@media(max-width:900px){.shell,.student-shell{width:min(100% - 24px,1440px);padding-top:18px}.mast,.grid,.two,.three,.student-grid{grid-template-columns:1fr}.datebox{text-align:left}.brand h1{font-size:42px}.page-head{display:block}.actions{margin-left:0}.login-logo{font-size:56px}}
</style>

<script>
'use strict';
const CONFIG={
  VERSION:'1.14-alpha',
  ADMIN_EMAIL:'zruc04@gmail.com',
  LOCAL_KEY:'lessonhub_v1_11_alpha_data',
  LEGACY_KEYS:['lessonhub_v1_4_data','lessonhub_v1_3_2_data','lessonhub_v1_3_1_data','lessonhub_v1_3_data','lessonhub_v1_2_data','aula_api_v1_data','aula_api_v0_1_data'],
  DRIVE_CLIENT_ID:'202101444725-2v9bi94fms696a02593gb1ks3ukk3j45.apps.googleusercontent.com',
  DRIVE_SCOPES:'openid email profile https://www.googleapis.com/auth/drive.file',
  DRIVE_FOLDER:'LessonHub',
  DRIVE_DATA_FILE:'lessonhub_data.json',
  DRIVE_PORTAL_FOLDER:'portals',
  DRIVE_BACKUP_FOLDER:'backups',
  BACKUP_RETENTION_DAYS:30,
  SB_URL:'https://ezgaqcxrbticangnnryo.supabase.co',
  SB_KEY:'sb_publishable_k-Ch1aS1UkRR-OlDzAbH-Q_B4a8e7kE',
  SB_TABLE:'lh_backups'
};
let DB=blankDB();
let STATE={page:'dashboard',mode:'boot',userEmail:'',tokenClient:null,accessToken:null,driveReady:false,driveFolderId:null,driveDataFileId:null,drivePortalFolderId:null,sb:null,saveTimer:null,source:'none',logs:[],studentPortal:null,studentPage:'today',currentMaterialId:null,lastSupabaseSave:null,lastDriveSave:null,lastError:'',silentTried:false};
function $(id){return document.getElementById(id)}
function uid(p='id'){return p+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8)}
function today(){return new Date().toISOString().slice(0,10)}
function nowIso(){return new Date().toISOString()}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function slug(s){return String(s||'arquivo').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,60)||'arquivo'}
function sanitizeEmail(email){return String(email||'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'student'}
function fmtDate(d){if(!d)return '—';const p=String(d).slice(0,10).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d}
function fmtShort(d){if(!d)return '—';const p=String(d).slice(0,10).split('-');return p.length===3?`${p[2]}/${p[1]}`:d}
function money(n){return (Number(n)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function badge(t,c=''){return `<span class="badge ${c}">${esc(t)}</span>`}
function byId(arr,id){return (arr||[]).find(x=>x.id===id)}
function log(msg,type='info'){STATE.logs.unshift({at:nowIso(),msg,type});STATE.logs=STATE.logs.slice(0,60);console.log('[LessonHub]',msg);renderHealthSafe()}
function toast(msg){const el=$('toast');el.textContent=msg;el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',3000)}
function status(msg,ms=2500){const el=$('statusbar');el.textContent=msg;el.style.display='block';clearTimeout(el._t);if(ms)el._t=setTimeout(()=>el.style.display='none',ms)}
function showGate(title='Carregando LessonHub…',text='Aguardando autenticação. Nenhum dado sensível aparece antes do login.'){const g=$('privacyGate');if(!g)return;g.classList.remove('hidden');const h=g.querySelector('h2');if(h)h.textContent=title;const p=$('privacyText');if(p)p.textContent=text;$('loginScreen')?.classList.add('hidden');$('adminShell')?.classList.add('hidden');$('studentShell')?.classList.add('hidden')}
function rememberSession(email,role){try{localStorage.setItem('lessonhub_last_email',String(email||''));localStorage.setItem('lessonhub_last_role',String(role||''));}catch(e){}}
function lastSession(){try{return{email:localStorage.getItem('lessonhub_last_email')||'',role:localStorage.getItem('lessonhub_last_role')||''}}catch(e){return{email:'',role:''}}}
function forgetSession(){try{localStorage.removeItem('lessonhub_last_email');localStorage.removeItem('lessonhub_last_role')}catch(e){};showLogin('Sessão local encerrada. Entre com Google novamente.')}
window.forgetSession=forgetSession;

function dataCount(d=DB){return ['students','lessons','materials','packages','plannedLessons','courseUnits','assessments','formLogs'].reduce((s,k)=>s+((d[k]||[]).length),0)}
function sizeOf(d=DB){return new Blob([JSON.stringify(d)]).size}
function newer(a,b){return String(a?.meta?.updatedAt||'')>String(b?.meta?.updatedAt||'')}
function blankDB(){return{meta:{version:CONFIG.VERSION,updatedAt:nowIso(),createdAt:nowIso(),authority:'Supabase JSON backend · Drive files · local cache',business:{cnpj:'',razaoSocial:'',endereco:''}},students:[],lessons:[],materials:[],courses:[],payments:[],packages:[],plannedLessons:[],courseUnits:[],assessments:[],formLogs:[]}}
function normalizeDB(input){const d=input&&typeof input==='object'?input:blankDB();d.meta=d.meta||{};d.meta.version=CONFIG.VERSION;d.meta.authority='Supabase JSON backend · Drive files · local cache';d.meta.business=d.meta.business||{cnpj:'',razaoSocial:'',endereco:''};['students','lessons','materials','courses','payments','packages','plannedLessons','courseUnits','assessments','formLogs'].forEach(k=>d[k]=Array.isArray(d[k])?d[k]:[]);
  d.courses.forEach(c=>{c.id=c.id||uid('course');c.name=c.name||'Curso';c.kind=c.kind||'';c.color=c.color||'#8b3a1f';c.status=c.status||'ativo';c.description=c.description||'';c.createdAt=c.createdAt||nowIso()});
  d.students.forEach(s=>{s.id=s.id||uid('student');s.name=s.name||'Aluno';s.email=String(s.email||s.loginEmail||'').trim().toLowerCase();s.status=s.status||'ativo';s.activeCourseLevel=s.activeCourseLevel||s.level||'';s.activeCourseName=s.activeCourseName||s.activeCourseLevel||'';s.courseId=s.courseId||'';s.defaultLessonValue=Number(s.defaultLessonValue)||0;s.goal=s.goal||'';s.notes=s.notes||s.importantNotes||''});
  d.lessons.forEach(l=>{l.id=l.id||uid('lesson');l.studentId=l.studentId||'';l.courseId=l.courseId||'';l.date=l.date||'';l.startTime=l.startTime||l.time||'';l.title=l.title||'Aula';l.level=l.level||'';l.unit=l.unit||l.topic||'';l.status=l.status||l.pedStatus||'agendada';l.planStatus=l.planStatus||'a planejar';l.finStatus=l.finStatus||'paga';l.value=Number(l.value)||0;l.notes=l.notes||'';l.materialsStatus=l.materialsStatus||'pendente';l.studentPortalVisible=l.studentPortalVisible!==false;l.paymentId=l.paymentId||l.packageId||'';l.packageId=l.paymentId;l.prepMinutes=Number(l.prepMinutes)||0;l.cancelNoticeOk=typeof l.cancelNoticeOk==='boolean'?l.cancelNoticeOk:false});
  d.materials.forEach(m=>{m.id=m.id||uid('mat');m.title=m.title||'Material';m.type=m.type||'material';m.studentId=m.studentId||'';m.lessonId=m.lessonId||'';m.plannedLessonId=m.plannedLessonId||'';m.studentVisible=typeof m.studentVisible==='boolean'?m.studentVisible:true;m.downloadAllowed=typeof m.downloadAllowed==='boolean'?m.downloadAllowed:true;m.attachments=Array.isArray(m.attachments)?m.attachments:[];m.notes=m.notes||'';m.createdAt=m.createdAt||nowIso()});
  // Migração: packages antigos viram payments
  d.packages.forEach(p=>{if(!d.payments.some(pay=>pay.id===p.id)){const lessonsLinked=d.lessons.filter(l=>l.paymentId===p.id).map(l=>l.id);d.payments.push({id:p.id,studentId:p.studentId||'',createdAt:p.createdAt||nowIso(),valor:Number(p.valor||p.amount)||0,paid:typeof p.paid==='boolean'?p.paid:false,paidAt:p.paidAt||'',method:p.method||'',notes:p.notes||'',lessonIds:lessonsLinked,migratedFromPackage:true,aulasContratadas:Number(p.aulasContratadas||p.lessonCount)||0})}});
  d.payments.forEach(p=>{p.id=p.id||uid('pay');p.studentId=p.studentId||'';p.createdAt=p.createdAt||nowIso();p.valor=Number(p.valor)||0;p.paid=typeof p.paid==='boolean'?p.paid:false;p.paidAt=p.paidAt||'';p.method=p.method||'';p.notes=p.notes||'';p.lessonIds=Array.isArray(p.lessonIds)?p.lessonIds:[]});
  return d}
function saveLocal(){DB.meta.updatedAt=nowIso();DB.meta.version=CONFIG.VERSION;localStorage.setItem(CONFIG.LOCAL_KEY,JSON.stringify(DB));localStorage.setItem('lessonhub_v1_4_data',JSON.stringify(DB));}
function loadLocal(){for(const k of [CONFIG.LOCAL_KEY,...CONFIG.LEGACY_KEYS]){try{const raw=localStorage.getItem(k);if(raw){const d=normalizeDB(JSON.parse(raw));if(dataCount(d)>0||k===CONFIG.LOCAL_KEY)return d}}catch(e){}}return blankDB()}
function scheduleSave(){saveLocal();clearTimeout(STATE.saveTimer);STATE.saveTimer=setTimeout(async()=>{await saveRemoteAll()},900);render()}
async function saveRemoteAll(){if(STATE.mode!=='admin')return;await sbSaveDB();await driveSaveDB();await autoPublishPortals()}
function portalFingerprint(snap){if(!snap)return '';try{return JSON.stringify({l:snap.lessons,m:snap.materials,f:snap.finance,s:snap.student})}catch(e){return String(Math.random())}}
async function autoPublishPortals(){
  if(STATE.mode!=='admin')return;
  STATE.portalHashes=STATE.portalHashes||{};
  let published=0,failed=0;
  for(const st of DB.students.filter(s=>s.email&&s.status!=='arquivado')){
    const snap=snapshotForStudent(st.id);
    if(!snap)continue;
    const fp=portalFingerprint(snap);
    if(STATE.portalHashes[st.id]===fp)continue;
    let okSb=await sbWrite(st.email,snap);
    let okDrive=false;
    if(STATE.driveReady)okDrive=await driveSavePortal(snap);
    if(okSb||okDrive){STATE.portalHashes[st.id]=fp;published++;}
    else failed++;
  }
  if(published>0)status(published+' portal(is) de aluno atualizado(s) automaticamente.',3000);
  if(failed>0)log(failed+' portal(is) não publicado(s) automaticamente. Verifique conexão/Supabase.','warn');
}
function studentName(id){return byId(DB.students,id)?.name||'—'}
function lessonTitle(l){return `${studentName(l.studentId)} — ${fmtShort(l.date)}${l.startTime?' · '+l.startTime:''}`}
function lessonMaterials(l){return DB.materials.filter(m=>m.studentVisible&&(m.lessonId===l.id || (!m.lessonId&&m.studentId===l.studentId))) }
function financeForStudent(id){const pays=DB.payments.filter(p=>p.studentId===id).sort((a,b)=>String(b.createdAt).localeCompare(String(a.createdAt)));const allLinkedIds=new Set();pays.forEach(p=>p.lessonIds.forEach(lid=>allLinkedIds.add(lid)));const linkedLessons=DB.lessons.filter(l=>allLinkedIds.has(l.id));const aCobrar=DB.lessons.filter(l=>l.studentId===id&&!allLinkedIds.has(l.id)&&lessonCountsForPackage(l));const futureLinked=linkedLessons.filter(l=>l.date>=today()&&l.status==='agendada');const consumedLinked=linkedLessons.filter(l=>lessonCountsForPackage(l));const ltv=pays.filter(p=>p.paid).reduce((s,p)=>s+(Number(p.valor)||0),0);const pending=pays.filter(p=>!p.paid).reduce((s,p)=>s+(Number(p.valor)||0),0);const expected=pays.filter(p=>!p.paid).reduce((s,p)=>s+(Number(p.valor)||0),0)+aCobrar.length*(byId(DB.students,id)?.defaultLessonValue||0);const lastPaid=pays.filter(p=>p.paid).sort((a,b)=>String(b.paidAt).localeCompare(String(a.paidAt)))[0];return{pays,linkedLessons,futureLinked,consumedLinked,aCobrar,ltv,pending,expected,status:aCobrar.length>0?'a cobrar':pending>0?'pendente':'em dia',lastPaidAt:lastPaid?.paidAt||''}}
function lessonCountsForPackage(l){return l.status==='dada'||(l.status==='cancelada'&&l.cancelNoticeOk===false)}
function snapshotForStudent(studentId){const st=byId(DB.students,studentId);if(!st||!st.email)return null;const lessons=DB.lessons.filter(l=>l.studentId===studentId&&l.studentPortalVisible!==false).sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));const mats=DB.materials.filter(m=>m.studentVisible&&(m.studentId===studentId||lessons.some(l=>l.id===m.lessonId))).map(m=>({...m}));return{meta:{kind:'studentPortal',version:CONFIG.VERSION,generatedAt:nowIso(),studentEmail:st.email},student:{id:st.id,name:st.name,email:st.email,course:st.activeCourseName,level:st.activeCourseLevel},lessons,materials:mats,finance:financeForStudent(studentId)}}

function sb(){if(!STATE.sb)STATE.sb=supabase.createClient(CONFIG.SB_URL,CONFIG.SB_KEY);return STATE.sb}
async function sbRead(email){try{const {data,error}=await sb().from(CONFIG.SB_TABLE).select('data,updated_at').eq('user_email',String(email).toLowerCase()).maybeSingle();if(error)throw error;return data?.data||null}catch(e){STATE.lastError=e.message||String(e);log('Supabase read falhou: '+STATE.lastError,'error');return null}}
async function sbWrite(email,data){try{const payload={user_email:String(email).toLowerCase(),data,updated_at:nowIso()};const {error}=await sb().from(CONFIG.SB_TABLE).upsert(payload,{onConflict:'user_email'});if(error)throw error;STATE.lastSupabaseSave=new Date();log('Supabase salvo para '+email,'ok');return true}catch(e){STATE.lastError=e.message||String(e);log('Supabase save falhou: '+STATE.lastError+' · dados mantidos no cache/Drive quando possível','error');return false}}
async function sbDelete(email){try{const {error}=await sb().from(CONFIG.SB_TABLE).delete().eq('user_email',String(email).toLowerCase());if(error)throw error;log('Supabase: linha de '+email+' apagada','ok');return true}catch(e){STATE.lastError=e.message||String(e);log('Supabase delete falhou: '+STATE.lastError,'error');return false}}
async function sbSaveDB(){if(!STATE.userEmail)return false;DB.meta.updatedAt=nowIso();return sbWrite(STATE.userEmail,DB)}

function initGoogleDrive(){STATE.tokenClient=google.accounts.oauth2.initTokenClient({client_id:CONFIG.DRIVE_CLIENT_ID,scope:CONFIG.DRIVE_SCOPES,callback:handleGoogleToken})}
function driveSignIn(){if(STATE.tokenClient)STATE.tokenClient.requestAccessToken({prompt:'consent'});else showLogin('Aguarde o carregamento do Google.')} window.driveSignIn=driveSignIn;
async function handleGoogleToken(resp){STATE.silentDriveAttempt=false;if(resp.error){showLogin('Erro de autenticação.');return}showGate('Carregando LessonHub…','Login recebido. Carregando dados e sincronizações.');STATE.accessToken=resp.access_token;let email='';try{const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+STATE.accessToken}});if(r.ok){const u=await r.json();email=String(u.email||'').toLowerCase()}}catch(e){}STATE.userEmail=email;if(!email){showLogin('Não consegui ler o e-mail da conta.');return}log('Login Google: '+email,'ok');if(email===CONFIG.ADMIN_EMAIL){rememberSession(email,'admin');await bootAdmin()}else{rememberSession(email,'student');await bootStudent(email)}}
async function driveApi(path,opts={}){const r=await fetch('https://www.googleapis.com/drive/v3/'+path,{...opts,headers:{Authorization:'Bearer '+STATE.accessToken,...(opts.headers||{})}});if(!r.ok)throw new Error('Drive '+r.status);return r.json()}
async function driveEnsureFolder(name,parentId=''){const q=parentId?`name='${name}' and '${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`:`name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;const found=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name)');if(found.files?.[0])return found.files[0].id;const body={name,mimeType:'application/vnd.google-apps.folder'};if(parentId)body.parents=[parentId];const made=await driveApi('files?fields=id',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return made.id}
async function driveSetup(){try{STATE.driveFolderId=await driveEnsureFolder(CONFIG.DRIVE_FOLDER);STATE.drivePortalFolderId=await driveEnsureFolder(CONFIG.DRIVE_PORTAL_FOLDER,STATE.driveFolderId);STATE.driveDataFileId=await driveEnsureJsonFile(CONFIG.DRIVE_DATA_FILE,STATE.driveFolderId);STATE.driveReady=true;log('Drive pronto','ok');if(STATE.mode==='admin')buildNav();return true}catch(e){STATE.lastError=e.message||String(e);log('Drive setup falhou: '+STATE.lastError,'error');return false}}
async function driveEnsureJsonFile(name,folderId){const q=`name='${name}' and '${folderId}' in parents and trashed=false`;const r=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name)');if(r.files?.[0])return r.files[0].id;const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name,parents:[folderId]})],{type:'application/json'}));form.append('file',new Blob([JSON.stringify(blankDB())],{type:'application/json'}));const res=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});return (await res.json()).id}
async function driveReadJson(fileId){try{const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:'Bearer '+STATE.accessToken}});if(!r.ok)return null;return await r.json()}catch(e){return null}}
async function driveWriteJson(fileId,name,data){if(!fileId)return false;try{const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name})],{type:'application/json'}));form.append('file',new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));const r=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`,{method:'PATCH',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});if(!r.ok)throw new Error('Drive write '+r.status);STATE.lastDriveSave=new Date();log('Drive JSON salvo','ok');return true}catch(e){STATE.lastError=e.message||String(e);log('Drive write falhou: '+STATE.lastError,'error');return false}}
async function driveSaveDB(){if(!STATE.driveReady)return false;DB.meta.updatedAt=nowIso();return driveWriteJson(STATE.driveDataFileId,CONFIG.DRIVE_DATA_FILE,DB)}
async function driveSavePortal(snap){if(!STATE.driveReady||!snap?.student?.email)return false;try{const name='portal_'+sanitizeEmail(snap.student.email)+'.json';const q=`name='${name}' and '${STATE.drivePortalFolderId}' in parents and trashed=false`;const found=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name)');let id=found.files?.[0]?.id;if(!id){const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name,parents:[STATE.drivePortalFolderId]})],{type:'application/json'}));form.append('file',new Blob([JSON.stringify(snap,null,2)],{type:'application/json'}));const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});id=(await r.json()).id}else{await driveWriteJson(id,name,snap)}await driveShare(id,snap.student.email,false);return true}catch(e){log('Drive portal falhou: '+(e.message||e),'error');return false}}
async function driveUploadFile(file,studentId=''){if(!STATE.driveReady||!file)return null;try{const st=byId(DB.students,studentId);const folderName=studentId?`alunos-${slug(st?.name||studentId)}`:'biblioteca';const parent=await driveEnsureFolder(folderName,STATE.driveFolderId);const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name:file.name,parents:[parent]})],{type:'application/json'}));form.append('file',file);const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink,mimeType,name,size',{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});if(!r.ok)throw new Error('Upload '+r.status);const data=await r.json();log('Arquivo enviado ao Drive: '+file.name,'ok');return{id:data.id,name:data.name||file.name,type:data.mimeType||file.type,size:Number(data.size)||file.size,driveId:data.id,driveLink:data.webViewLink||'',createdAt:nowIso()}}catch(e){STATE.lastError=e.message||String(e);log('Upload Drive falhou: '+STATE.lastError,'error');return null}}
async function driveShare(fileId,email,allowDownload=true){try{await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}/permissions?sendNotificationEmail=false`,{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken,'Content-Type':'application/json'},body:JSON.stringify({type:'user',role:'reader',emailAddress:email})});if(!allowDownload){await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?fields=id`,{method:'PATCH',headers:{Authorization:'Bearer '+STATE.accessToken,'Content-Type':'application/json'},body:JSON.stringify({copyRequiresWriterPermission:true})})}return true}catch(e){log('Share falhou: '+(e.message||e),'error');return false}}
async function dailyBackupIfDue(){if(!STATE.driveReady||STATE.mode!=='admin')return;try{const today=nowIso().slice(0,10);const lastBackup=localStorage.getItem('lessonhub_last_backup_date');if(lastBackup===today){log('Backup diário do Drive já feito hoje ('+today+').','ok');return}const folderId=await driveEnsureFolder(CONFIG.DRIVE_BACKUP_FOLDER,STATE.driveFolderId);const name='lessonhub-backup-'+today+'.json';const q=`name='${name}' and '${folderId}' in parents and trashed=false`;const found=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id)');if(found.files?.[0]){localStorage.setItem('lessonhub_last_backup_date',today);log('Backup '+today+' já existe no Drive. Marcado como feito.','ok');return}const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name,parents:[folderId]})],{type:'application/json'}));form.append('file',new Blob([JSON.stringify(DB,null,2)],{type:'application/json'}));const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});if(!r.ok)throw new Error('Backup upload '+r.status);localStorage.setItem('lessonhub_last_backup_date',today);log('Backup diário '+today+' salvo no Drive.','ok');await pruneOldBackups(folderId);}catch(e){log('Backup diário falhou: '+(e.message||e),'warn');}}
async function pruneOldBackups(folderId){try{const q=`'${folderId}' in parents and trashed=false`;const found=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name,createdTime)&pageSize=200');const files=(found.files||[]).filter(f=>/^lessonhub-backup-\d{4}-\d{2}-\d{2}\.json$/.test(f.name));const cutoff=Date.now()-CONFIG.BACKUP_RETENTION_DAYS*24*60*60*1000;let removed=0;for(const f of files){const ts=new Date(f.createdTime).getTime();if(ts<cutoff){await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}`,{method:'DELETE',headers:{Authorization:'Bearer '+STATE.accessToken}});removed++;}}if(removed>0)log('Backups antigos podados: '+removed+' arquivo(s) removidos.','ok');}catch(e){log('Poda de backups falhou: '+(e.message||e),'warn');}}
async function driveFindPortal(email){try{const name='portal_'+sanitizeEmail(email)+'.json';const q=`name='${name}' and trashed=false`;const r=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name)');if(!r.files?.[0])return null;return driveReadJson(r.files[0].id)}catch(e){return null}}

async function bootAdmin(){status('Carregando dados…',0);await driveSetup();const local=loadLocal();const remote=await sbRead(STATE.userEmail);let driveData=null;if(STATE.driveReady)driveData=await driveReadJson(STATE.driveDataFileId);let chosen=normalizeDB(local);STATE.source='local';if(remote&&dataCount(remote)>0&&(dataCount(chosen)===0||newer(remote,chosen))){chosen=normalizeDB(remote);STATE.source='supabase'}if(driveData&&dataCount(driveData)>0&&(dataCount(chosen)===0||newer(driveData,chosen))){chosen=normalizeDB(driveData);STATE.source='drive'}DB=chosen;saveLocal();status('Fonte: '+STATE.source);showAdmin();await sbSaveDB();dailyBackupIfDue().catch(()=>{});}
function cacheStudentPortal(email,snap){try{localStorage.setItem('lessonhub_student_portal_'+sanitizeEmail(email),JSON.stringify({cachedAt:nowIso(),snap}))}catch(e){}}
function loadCachedStudentPortal(email){try{const raw=localStorage.getItem('lessonhub_student_portal_'+sanitizeEmail(email));if(!raw)return null;const o=JSON.parse(raw);return o&&o.snap?o.snap:null}catch(e){return null}}
async function bootStudent(email){status('Carregando portal do aluno…',0);let snap=await sbRead(email);if(!snap||snap.meta?.kind!=='studentPortal'){await driveSetup();snap=await driveFindPortal(email)}if(snap&&snap.student){STATE.studentPortal=snap;cacheStudentPortal(email,snap);showStudent();status('Portal carregado');return}
  const cached=loadCachedStudentPortal(email);if(cached&&cached.student){STATE.studentPortal=cached;showStudent();status('Portal carregado do cache local. Sem conexão com Supabase/Drive.',5000);log('Portal do aluno restaurado do cache para '+email,'ok');return}
  try{const localDB=loadLocal();const st=(localDB.students||[]).find(s=>String(s.email||'').toLowerCase()===String(email).toLowerCase());if(st){const savedDB=DB;DB=localDB;const live=snapshotForStudent(st.id);DB=savedDB;if(live){STATE.studentPortal=live;cacheStudentPortal(email,live);showStudent();status('Portal gerado a partir dos dados locais deste navegador.',5000);log('Portal do aluno gerado do DB local para '+email,'ok');return}}}catch(e){}
  STATE.studentPortal={unauthorized:true,email};showStudent();status('Acesso não autorizado')}

function buildNav(){const pages=[['dashboard','Today'],['students','Students'],['lessons','Lessons'],['courses','Courses'],['materials','Materials'],['finance','Finance'],['portal','Student Portal'],['health','Health']];const driveBtn=STATE.driveReady?`<button class="linkbtn" onclick="driveSignIn()" title="Drive conectado">Drive ✓</button>`:`<button class="btn soft" onclick="driveSignIn()" title="Conecte para enviar arquivos">⚠ conectar Drive</button>`;$('nav').innerHTML=pages.map(p=>`<button data-page="${p[0]}" onclick="showPage('${p[0]}')">${p[1]}</button>`).join('')+`<div class="actions"><button class="linkbtn" onclick="exportBackup()">backup</button><button class="linkbtn" onclick="backupInput.click()">importar</button>${driveBtn}<button class="linkbtn" onclick="forgetSession()">sair</button></div>`}
function showPage(p){STATE.page=p;document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));$('page-'+p)?.classList.add('active');document.querySelectorAll('[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===p));render()}
function pageHead(title,sub,actions=''){return `<div class="page-head"><div class="page-title"><h2>${title}</h2><p>${sub}</p></div><div class="toolbar-left">${actions}</div></div>`}
function render(){if(STATE.mode!=='admin')return;buildNav();document.querySelectorAll('[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===STATE.page));renderDashboard();renderStudents();renderLessons();renderCourses();renderMaterials();renderFinanceAdmin();renderPortalAdmin();renderHealth()}
function renderDashboard(){const todayLessons=DB.lessons.filter(l=>l.date===today());const toPlan=DB.lessons.filter(l=>l.planStatus==='a planejar');$('page-dashboard').innerHTML=pageHead('Today','Núcleo consolidado: alunos, aulas, materiais, portal e sincronização.',`<button class="btn" onclick="openLessonModal()">nova aula</button>`)+`<div class="grid"><div class="card"><div class="num">${DB.students.length}</div><div class="label">alunos</div></div><div class="card"><div class="num">${todayLessons.length}</div><div class="label">aulas hoje</div></div><div class="card"><div class="num">${toPlan.length}</div><div class="label">a planejar</div></div><div class="card"><div class="num">${STATE.source}</div><div class="label">fonte carregada</div></div></div><div class="two"><div class="panel"><div class="panel-title">Aulas de hoje</div><div class="list">${todayLessons.map(lessonCard).join('')||'<div class="empty">Nenhuma aula hoje.</div>'}</div></div><div class="panel"><div class="panel-title">Últimos logs</div>${logList()}</div></div>`}
function renderStudents(q=''){const query=String(q).toLowerCase();const rows=DB.students.filter(s=>(s.name+' '+s.email+' '+s.activeCourseName).toLowerCase().includes(query)).sort((a,b)=>a.name.localeCompare(b.name));$('page-students').innerHTML=pageHead('Students','Cadastro essencial, e-mail do portal e curso ativo.',`<button class="btn" onclick="openStudentModal()">novo aluno</button>`)+`<div class="toolbar"><input class="search" placeholder="buscar aluno..." oninput="renderStudents(this.value)"></div><div class="list">${rows.map(studentCard).join('')||'<div class="empty">Nenhum aluno cadastrado.</div>'}</div>`}
function studentCard(s){const lessons=DB.lessons.filter(l=>l.studentId===s.id);const next=lessons.filter(l=>!l.date||l.date>=today()).sort((a,b)=>String(a.date).localeCompare(String(b.date)))[0];const fin=financeForStudent(s.id);const course=s.courseId?byId(DB.courses,s.courseId):null;const courseBadge=course?`<span class="badge" style="background:${esc(course.color||'#8b3a1f')}22;color:${esc(course.color||'#8b3a1f')};border-color:${esc(course.color||'#8b3a1f')}44">${esc(course.name)}</span>`:badge('sem curso','warn');return `<div class="item"><div class="item-title">${esc(s.name)}</div><div class="badges">${badge(s.status)}${badge(s.email||'sem e-mail',s.email?'ok':'warn')}${courseBadge}${badge(`${lessons.length} aulas`)}${badge('LTV '+money(fin.ltv),'ok')}${fin.aCobrar.length>0?badge(fin.aCobrar.length+' a cobrar','warn'):''}</div><div class="meta">${next?`Próxima: ${fmtDate(next.date)} ${esc(next.startTime||'')}`:'Sem próxima aula.'}<br>${esc(s.goal||'Sem objetivo registrado.')}</div><div class="row-actions"><button class="linkbtn" onclick="openStudentModal('${s.id}')">editar</button><button class="linkbtn" onclick="openLessonModal('${s.id}')">nova aula</button><button class="linkbtn" onclick="openPaymentModal('${s.id}')">novo pagamento</button><button class="linkbtn" onclick="previewStudent('${s.id}')">preview</button><button class="linkbtn" onclick="deleteStudent('${s.id}')">excluir</button></div></div>`}
function renderLessons(q=''){const query=String(q).toLowerCase();const rows=DB.lessons.filter(l=>(l.title+' '+studentName(l.studentId)+' '+l.date+' '+l.status).toLowerCase().includes(query)).sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')));$('page-lessons').innerHTML=pageHead('Lessons','Aulas reais salvas no DB único.',`<button class="btn" onclick="openLessonModal()">nova aula</button>`)+`<div class="toolbar"><input class="search" placeholder="buscar aula..." oninput="renderLessons(this.value)"></div><div class="list">${rows.map(lessonCard).join('')||'<div class="empty">Sem aulas.</div>'}</div>`}
function lessonCard(l){return `<div class="item"><div class="item-title">${esc(lessonTitle(l))}</div><div class="badges">${badge(l.title,'blue')}${badge(l.status)}${badge(l.planStatus||'')}${badge(l.finStatus||'')}${badge(money(l.value))}${badge(lessonMaterials(l).length+' materiais','ok')}</div><div class="meta">${esc(l.notes||'Sem notas.')}</div><div class="row-actions"><button class="linkbtn" onclick="openLessonModal('${l.studentId}','${l.id}')">editar</button><button class="linkbtn" onclick="openMaterialModal('${l.studentId}','','${l.id}')">material</button><button class="linkbtn" onclick="deleteItem('lessons','${l.id}')">excluir</button></div></div>`}
function renderMaterials(q=''){const query=String(q).toLowerCase();const rows=DB.materials.filter(m=>(m.title+' '+m.type+' '+studentName(m.studentId)).toLowerCase().includes(query)).sort((a,b)=>String(b.createdAt||'').localeCompare(String(a.createdAt||'')));$('page-materials').innerHTML=pageHead('Materials','Metadados no Supabase, arquivos no Drive.',`<button class="btn" onclick="openMaterialModal()">novo material</button>`)+`<div class="toolbar"><input class="search" placeholder="buscar material..." oninput="renderMaterials(this.value)"></div><div class="list">${rows.map(materialCard).join('')||'<div class="empty">Sem materiais.</div>'}</div>`}
function materialCard(m){const att=m.attachments?.[0];const pending=att&&att.pendingUpload;const hasFile=att&&att.driveLink;const fileBadge=pending?badge('arquivo pendente','warn'):hasFile?badge('Drive','ok'):badge('sem arquivo','warn');const openBtn=hasFile?`<button class="linkbtn" onclick="openMaterialViewer('${m.id}')">abrir</button>`:'';const uploadBtn=pending?`<button class="linkbtn" onclick="replaceMaterial('${m.id}')">subir arquivo</button>`:`<button class="linkbtn" onclick="replaceMaterial('${m.id}')">${hasFile?'substituir arquivo':'anexar arquivo'}</button>`;return `<div class="item"><div class="item-title">${esc(m.title)}</div><div class="badges">${badge(m.type,'blue')}${badge(studentName(m.studentId))}${badge(m.studentVisible?'visível aluno':'interno',m.studentVisible?'ok':'warn')}${fileBadge}</div><div class="meta">${esc(m.notes||'')}${att?`<br>Arquivo: ${esc(att.name||'arquivo')}${pending?' (aguardando upload pro Drive)':''}`:''}</div><div class="row-actions">${openBtn}<button class="linkbtn" onclick="openMaterialModal('${m.studentId||''}','${m.id}','${m.lessonId||''}')">editar</button>${uploadBtn}<button class="linkbtn" onclick="toggleMaterial('${m.id}')">${m.studentVisible?'ocultar':'mostrar'}</button><button class="linkbtn" onclick="deleteItem('materials','${m.id}')">excluir</button></div></div>`}
function renderPortalAdmin(){const rows=DB.students.filter(s=>s.email);$('page-portal').innerHTML=pageHead('Student Portal','Os portais são publicados automaticamente sempre que você salva uma aula, material ou aluno.','')+`<div class="panel"><div class="panel-title">Portais dos alunos</div><div class="list">${rows.map(s=>{const snap=snapshotForStudent(s.id);const pub=(STATE.portalHashes&&STATE.portalHashes[s.id]);return `<div class="item"><div class="item-title">${esc(s.name)}</div><div class="badges">${badge(s.email,'blue')}${badge((snap?.lessons||[]).length+' aulas')}${badge((snap?.materials||[]).length+' materiais','ok')}${badge(pub?'publicado':'aguardando 1º save',pub?'ok':'warn')}</div><div class="meta">${pub?'Portal sincronizado. O aluno vê a versão mais recente ao entrar.':'Salve uma aula ou material deste aluno para publicar o portal.'}</div><div class="row-actions"><button class="linkbtn" onclick="previewStudent('${s.id}')">preview</button></div></div>`}).join('')||'<div class="empty">Cadastre alunos com e-mail para que tenham portal.</div>'}</div></div>`}
function renderHealth(){const html=pageHead('Health','Diagnóstico do núcleo consolidado.',`<button class="btn" onclick="manualSaveAll()">salvar agora</button><button class="btn soft" onclick="exportBackup()">backup JSON</button>`)+`<div class="grid"><div class="card"><div class="num">${CONFIG.VERSION}</div><div class="label">versão</div></div><div class="card"><div class="num">${STATE.source}</div><div class="label">fonte inicial</div></div><div class="card"><div class="num">${STATE.driveReady?'OK':'—'}</div><div class="label">Drive files</div></div><div class="card"><div class="num">${sizeOf()}</div><div class="label">bytes JSON</div></div></div><div class="two"><div class="panel"><div class="panel-title">Arquitetura</div><div class="meta"><b>Supabase:</b> backend JSON de dados e portais. Se aparecer RLS, precisa liberar policy no Supabase.<br><b>Drive:</b> arquivos reais, links e fallback JSON/portal.<br><b>localStorage:</b> cache operacional.<br><b>Usuário:</b> ${esc(STATE.userEmail||'—')}<br><b>Último Supabase:</b> ${STATE.lastSupabaseSave?STATE.lastSupabaseSave.toLocaleTimeString('pt-BR'):'—'}<br><b>Último Drive:</b> ${STATE.lastDriveSave?STATE.lastDriveSave.toLocaleTimeString('pt-BR'):'—'}<br><b>Erro:</b> ${esc(STATE.lastError||'—')}</div></div><div class="panel"><div class="panel-title">Logs</div>${logList()}</div></div>`;$('page-health').innerHTML=html}
function renderHealthSafe(){if(STATE.mode==='admin'&&STATE.page==='health')try{renderHealth()}catch(e){}}
function renderCourses(){const rows=DB.courses.filter(c=>c.status!=='arquivado').sort((a,b)=>a.name.localeCompare(b.name));const arquivados=DB.courses.filter(c=>c.status==='arquivado');$('page-courses').innerHTML=pageHead('Courses','Produtos pedagógicos da New Borders. Idioma é atributo, não curso.',`<button class="btn" onclick="openCourseModal()">novo curso</button>`)+`<div class="list">${rows.map(courseCard).join('')||'<div class="empty">Nenhum curso cadastrado. Crie o primeiro para começar a categorizar alunos e aulas.</div>'}</div>${arquivados.length?`<div class="panel" style="margin-top:24px;opacity:0.7"><div class="panel-title">Arquivados (${arquivados.length})</div><div class="list">${arquivados.map(courseCard).join('')}</div></div>`:''}`}
function courseCard(c){const studentsCount=DB.students.filter(s=>s.courseId===c.id).length;const lessonsCount=DB.lessons.filter(l=>l.courseId===c.id).length;const dot=`<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${esc(c.color||'#8b3a1f')};margin-right:6px;vertical-align:middle"></span>`;return `<div class="item"><div class="item-title">${dot}${esc(c.name)}</div><div class="badges">${c.kind?badge(c.kind,'blue'):''}${badge(c.status,c.status==='ativo'?'ok':c.status==='arquivado'?'warn':'')}${badge(studentsCount+' aluno(s)')}${badge(lessonsCount+' aula(s)','ok')}</div>${c.description?`<div class="meta">${esc(c.description)}</div>`:''}<div class="row-actions"><button class="linkbtn" onclick="openCourseModal('${c.id}')">editar</button><button class="linkbtn" onclick="archiveCourse('${c.id}')">${c.status==='arquivado'?'reativar':'arquivar'}</button><button class="linkbtn" onclick="deleteCourse('${c.id}')">excluir</button></div></div>`}
function openCourseModal(id=''){const c=byId(DB.courses,id)||{};openModal(id?'Editar curso':'Novo curso','Produto pedagógico (ex: New Borders English, Foundations Travel, PLE).',`<div class="form"><div class="field"><label>Nome do curso</label><input id="courseName" value="${esc(c.name||'')}" placeholder="ex: New Borders English"></div><div class="two"><div class="field"><label>Tipo / linha</label><input id="courseKind" value="${esc(c.kind||'')}" placeholder="ex: principal, plugin, desenvolvimento"></div><div class="field"><label>Cor (visual)</label><input id="courseColor" type="color" value="${esc(c.color||'#8b3a1f')}"></div></div><div class="field"><label>Status</label><select id="courseStatus">${['ativo','desenvolvimento','futuro','arquivado'].map(x=>`<option ${(c.status||'ativo')===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Descrição (opcional)</label><textarea id="courseDescription">${esc(c.description||'')}</textarea></div><button class="btn" onclick="saveCourse('${id}')">salvar</button></div>`)}
function saveCourse(id=''){const name=$('courseName').value.trim();if(!name){toast('Nome obrigatório.');return}const c=byId(DB.courses,id)||{id:uid('course'),createdAt:nowIso()};c.name=name;c.kind=$('courseKind').value.trim();c.color=$('courseColor').value||'#8b3a1f';c.status=$('courseStatus').value;c.description=$('courseDescription').value.trim();if(!id)DB.courses.push(c);closeModal();scheduleSave();toast(id?'Curso atualizado.':'Curso criado.')}
function archiveCourse(id){const c=byId(DB.courses,id);if(!c)return;c.status=c.status==='arquivado'?'ativo':'arquivado';scheduleSave();toast(c.status==='arquivado'?'Curso arquivado.':'Curso reativado.')}
function deleteCourse(id){const c=byId(DB.courses,id);if(!c)return;const studentsCount=DB.students.filter(s=>s.courseId===id).length;const lessonsCount=DB.lessons.filter(l=>l.courseId===id).length;if(studentsCount>0||lessonsCount>0){if(!confirm(`Excluir "${c.name}"? Esse curso está em ${studentsCount} aluno(s) e ${lessonsCount} aula(s). Eles ficarão sem curso vinculado mas não serão apagados. Considere arquivar em vez de excluir.`))return}else if(!confirm(`Excluir "${c.name}"?`))return;DB.students.forEach(s=>{if(s.courseId===id)s.courseId=''});DB.lessons.forEach(l=>{if(l.courseId===id)l.courseId=''});DB.courses=DB.courses.filter(x=>x.id!==id);scheduleSave();toast('Curso excluído. Alunos e aulas ficaram sem curso.')}
function renderFinanceAdmin(){const ativos=DB.students.filter(s=>s.status==='ativo');const rows=ativos.map(s=>{const fin=financeForStudent(s.id);return{s,fin}});const ym=today().slice(0,7);const monthLessonsDadas=DB.lessons.filter(l=>lessonCountsForPackage(l)&&String(l.date).slice(0,7)===ym);const monthPaymentsPaid=DB.payments.filter(p=>p.paid&&String(p.paidAt).slice(0,7)===ym);const recebido=monthPaymentsPaid.reduce((s,p)=>s+(Number(p.valor)||0),0);const pendente=rows.reduce((s,r)=>s+r.fin.pending,0);const aCobrarTotal=rows.reduce((s,r)=>s+r.fin.aCobrar.length,0);const totalPrepMin=DB.lessons.filter(l=>lessonCountsForPackage(l)).reduce((s,l)=>s+(Number(l.prepMinutes)||0),0);const totalDada=DB.lessons.filter(l=>lessonCountsForPackage(l)).length;const avgPrep=totalDada?Math.round(totalPrepMin/totalDada):0;const totalRevenueAll=DB.payments.filter(p=>p.paid).reduce((s,p)=>s+(Number(p.valor)||0),0);const totalLessonsAll=DB.lessons.filter(l=>lessonCountsForPackage(l)&&l.paymentId).length;const ticketMedio=totalLessonsAll?totalRevenueAll/totalLessonsAll:0;const totalRealHours=totalLessonsAll+(totalPrepMin/60);const ticketReal=totalRealHours?totalRevenueAll/totalRealHours:0;const semanasDoMes=4.33;const ocupacao=Math.round((monthLessonsDadas.length/(semanasDoMes*8))*100);$('page-finance').innerHTML=pageHead('Finance','Pagamentos vinculados a aulas, fechamento mensal e KPIs operacionais.',`<button class="btn" onclick="closeMonth()">fechar mês</button> <button class="btn soft" onclick="openBusinessSettings()">dados fiscais</button>`)+`<div class="grid"><div class="card"><div class="num">${money(recebido)}</div><div class="label">recebido no mês</div></div><div class="card"><div class="num">${money(pendente)}</div><div class="label">pendente</div></div><div class="card"><div class="num">${aCobrarTotal}</div><div class="label">aulas a cobrar</div></div><div class="card"><div class="num">${money(totalRevenueAll)}</div><div class="label">LTV total</div></div></div><div class="grid"><div class="card"><div class="num">${money(ticketMedio)}</div><div class="label">ticket médio por aula</div></div><div class="card"><div class="num">${money(ticketReal)}</div><div class="label">ticket real por hora total</div></div><div class="card"><div class="num">${avgPrep}min</div><div class="label">prep média/aula</div></div><div class="card"><div class="num">${ocupacao}%</div><div class="label">ocupação do teto 8h</div></div></div><div class="panel"><div class="panel-title">Alunos e pagamentos</div><div class="list">${rows.map(({s,fin})=>financeStudentCard(s,fin)).join('')||'<div class="empty">Nenhum aluno ativo.</div>'}</div></div>`}
function financeStudentCard(s,fin){const future=fin.futureLinked.length;const consumed=fin.consumedLinked.length;const cobrar=fin.aCobrar.length;const courseName=s.courseId?byId(DB.courses,s.courseId)?.name:'';const courseBadge=courseName?badge(courseName,'blue'):'';const summary=`<div class="meta">${fin.pays.length} pagamento(s) · ${consumed} aula(s) dadas vinculadas · ${future} agendadas vinculadas${cobrar>0?` · <span style="color:#a63a2a">${cobrar} a cobrar</span>`:''}</div>`;return `<div class="item"><div class="item-title">${esc(s.name)}</div><div class="badges">${courseBadge}${badge(s.email||'sem e-mail',s.email?'ok':'warn')}${badge(fin.status,fin.status==='em dia'?'ok':'warn')}${badge('LTV '+money(fin.ltv),'blue')}${fin.pending>0?badge(money(fin.pending)+' pendente','warn'):''}</div>${summary}<div class="row-actions"><button class="linkbtn" onclick="openPaymentModal('${s.id}')">novo pagamento</button><button class="linkbtn" onclick="openFinanceDetail('${s.id}')">histórico</button></div></div>`}
function openPaymentModal(studentId,id=''){const st=byId(DB.students,studentId);if(!st)return;const editing=id?byId(DB.payments,id):null;const linkedIds=editing?new Set(editing.lessonIds):new Set();const allLinkedElsewhere=new Set();DB.payments.forEach(p=>{if(p.id!==id)p.lessonIds.forEach(lid=>allLinkedElsewhere.add(lid))});const availableLessons=DB.lessons.filter(l=>l.studentId===studentId&&!allLinkedElsewhere.has(l.id)).sort((a,b)=>String(a.date||'9999').localeCompare(String(b.date||'9999')));const defaultVal=st.defaultLessonValue||0;openModal(editing?'Editar pagamento':'Novo pagamento',`Selecione as aulas que este pagamento cobre. Inclui aulas futuras (já agendadas) e aulas a cobrar (passadas).`,`<div class="form"><div class="field"><label>Aluno</label><input value="${esc(st.name)}" disabled></div><div class="two"><div class="field"><label>Valor (R$)</label><input id="payValor" type="number" step="0.01" min="0" value="${editing?editing.valor:''}" placeholder="auto: soma das aulas"></div><div class="field"><label>Status</label><select id="payPaid"><option value="false" ${editing&&!editing.paid?'selected':''}>pendente</option><option value="true" ${editing&&editing.paid?'selected':''}>pago</option></select></div></div><div class="two"><div class="field"><label>Data do pagamento</label><input id="payDate" type="date" value="${editing?.paidAt?String(editing.paidAt).slice(0,10):today()}"></div><div class="field"><label>Método</label><input id="payMethod" value="${esc(editing?.method||'')}" placeholder="PIX, transferência, ..."></div></div><div class="field"><label>Aulas cobertas por este pagamento</label><div id="payLessonsList" style="max-height:280px;overflow-y:auto;border:1px solid var(--line,#ddd);border-radius:4px;padding:8px;background:var(--paper-2,#f8f5f0)">${availableLessons.length?availableLessons.map(l=>{const checked=linkedIds.has(l.id);const dateStr=l.date?fmtDate(l.date):'sem data';const statusBadge=l.status==='dada'?' · <span style="color:#4a6b3a">dada</span>':l.status==='cancelada'&&!l.cancelNoticeOk?' · <span style="color:#a63a2a">falta paga</span>':l.status==='agendada'?' · <span style="color:#777">agendada</span>':' · '+l.status;return `<label style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;cursor:pointer"><input type="checkbox" class="payLessonCheck" data-id="${l.id}" data-value="${l.value||defaultVal}" ${checked?'checked':''}> <span>${dateStr} · ${esc(l.title||'Aula')}${l.startTime?' · '+l.startTime:''}${statusBadge}</span></label>`}).join(''):'<div class="empty" style="padding:8px">Nenhuma aula disponível. Crie aulas pra este aluno primeiro, depois vincule.</div>'}</div><div class="meta subtle" style="margin-top:6px"><span id="payCountSummary">${linkedIds.size} aula(s) selecionada(s)</span> · <a href="#" onclick="event.preventDefault();paySelectNextN('${studentId}',4)" style="margin-left:8px">vincular próximas 4</a> · <a href="#" onclick="event.preventDefault();paySelectNextN('${studentId}',8)">próximas 8</a> · <a href="#" onclick="event.preventDefault();paySelectAllACobrar('${studentId}')">só as "a cobrar"</a></div></div><div class="field"><label>Notas (opcional)</label><textarea id="payNotes">${esc(editing?.notes||'')}</textarea></div><button class="btn" onclick="savePayment('${studentId}','${id}')">${editing?'salvar alterações':'criar pagamento'}</button></div>`);setTimeout(()=>{const cb=document.querySelectorAll('.payLessonCheck');cb.forEach(c=>c.addEventListener('change',updatePaymentSummary));updatePaymentSummary()},50)}
function updatePaymentSummary(){const checks=[...document.querySelectorAll('.payLessonCheck:checked')];const summary=$('payCountSummary');if(summary)summary.textContent=checks.length+' aula(s) selecionada(s)';const valorEl=$('payValor');if(valorEl&&!valorEl.value){const total=checks.reduce((s,c)=>s+(Number(c.dataset.value)||0),0);if(total>0)valorEl.placeholder='sugestão: R$ '+total.toFixed(2).replace('.',',')}}
function paySelectNextN(studentId,n){const allLinkedElsewhere=new Set();DB.payments.forEach(p=>p.lessonIds.forEach(lid=>allLinkedElsewhere.add(lid)));const futureLessons=DB.lessons.filter(l=>l.studentId===studentId&&!allLinkedElsewhere.has(l.id)&&(!l.date||l.date>=today())).sort((a,b)=>String(a.date||'9999').localeCompare(String(b.date||'9999'))).slice(0,n);const ids=new Set(futureLessons.map(l=>l.id));document.querySelectorAll('.payLessonCheck').forEach(c=>{c.checked=ids.has(c.dataset.id)});updatePaymentSummary()}
function paySelectAllACobrar(studentId){const allLinkedElsewhere=new Set();DB.payments.forEach(p=>p.lessonIds.forEach(lid=>allLinkedElsewhere.add(lid)));const aCobrar=DB.lessons.filter(l=>l.studentId===studentId&&!allLinkedElsewhere.has(l.id)&&lessonCountsForPackage(l));const ids=new Set(aCobrar.map(l=>l.id));document.querySelectorAll('.payLessonCheck').forEach(c=>{c.checked=ids.has(c.dataset.id)});updatePaymentSummary()}
function savePayment(studentId,id=''){const checks=[...document.querySelectorAll('.payLessonCheck:checked')].map(c=>c.dataset.id);const sumFromLessons=[...document.querySelectorAll('.payLessonCheck:checked')].reduce((s,c)=>s+(Number(c.dataset.value)||0),0);const valor=Number($('payValor').value)||sumFromLessons||0;const paidStatus=$('payPaid').value==='true';const dateStr=$('payDate').value;const method=$('payMethod').value.trim();const notes=$('payNotes').value.trim();if(checks.length===0&&!confirm('Nenhuma aula selecionada. Criar pagamento mesmo assim? (Você pode vincular aulas depois.)'))return;const p=id?byId(DB.payments,id):{id:uid('pay'),studentId,createdAt:nowIso()};p.valor=valor;p.paid=paidStatus;p.paidAt=paidStatus?(dateStr?dateStr+'T12:00:00.000Z':nowIso()):'';p.method=method;p.notes=notes;p.lessonIds=checks;DB.lessons.forEach(l=>{if(checks.includes(l.id))l.paymentId=p.id;else if(l.paymentId===p.id)l.paymentId=''});if(!id)DB.payments.push(p);closeModal();scheduleSave();toast(id?'Pagamento atualizado.':'Pagamento criado com '+checks.length+' aula(s) vinculada(s).')}
function markPaymentPaid(payId){const p=byId(DB.payments,payId);if(!p)return;p.paid=true;p.paidAt=nowIso();scheduleSave();toast('Pagamento marcado como pago.')}
function openFinanceDetail(studentId){const st=byId(DB.students,studentId);const fin=financeForStudent(studentId);openModal('Histórico financeiro · '+st.name,`LTV acumulado: ${money(fin.ltv)} · Pendente: ${money(fin.pending)}`,`<div class="form"><div class="panel"><div class="panel-title">Pagamentos (${fin.pays.length})</div><div class="list">${fin.pays.map(p=>{const lessons=DB.lessons.filter(l=>p.lessonIds.includes(l.id));const given=lessons.filter(l=>lessonCountsForPackage(l)).length;const future=lessons.filter(l=>!lessonCountsForPackage(l)).length;return `<div class="item"><div class="item-title">${money(p.valor)}${p.method?' · '+esc(p.method):''}</div><div class="badges">${badge(p.paid?'pago':'pendente',p.paid?'ok':'warn')}${badge(lessons.length+' aula(s)')}${given?badge(given+' já dadas','ok'):''}${future?badge(future+' agendadas','blue'):''}</div><div class="meta subtle">Criado ${fmtDate(p.createdAt)}${p.paid&&p.paidAt?' · pago em '+fmtDate(p.paidAt):''}</div><div class="row-actions">${!p.paid?`<button class="linkbtn" onclick="markPaymentPaid('${p.id}');closeModal();openFinanceDetail('${studentId}')">marcar pago</button>`:''}<button class="linkbtn" onclick="openPaymentModal('${studentId}','${p.id}')">editar / vincular aulas</button>${p.paid?`<button class="linkbtn" onclick="printReceipt('${p.id}')">imprimir recibo</button>`:''}<button class="linkbtn" onclick="deletePayment('${p.id}','${studentId}')">excluir</button></div></div>`}).join('')||'<div class="empty">Sem histórico de pagamentos.</div>'}</div></div></div>`)}
function deletePayment(payId,studentId){const p=byId(DB.payments,payId);if(!p)return;if(!confirm('Excluir este pagamento? As aulas vinculadas voltarão para "a cobrar".'))return;DB.lessons.filter(l=>l.paymentId===payId).forEach(l=>l.paymentId='');DB.payments=DB.payments.filter(x=>x.id!==payId);scheduleSave();closeModal();if(studentId)openFinanceDetail(studentId);toast('Pagamento excluído.')}
function closeMonth(){const ym=today().slice(0,7);const ativos=DB.students.filter(s=>s.status==='ativo');const relatorio=ativos.map(s=>{const fin=financeForStudent(s.id);const aulasMes=DB.lessons.filter(l=>l.studentId===s.id&&lessonCountsForPackage(l)&&String(l.date).slice(0,7)===ym);const aCobrar=aulasMes.filter(l=>!l.paymentId);const linked=aulasMes.filter(l=>l.paymentId);return{s,fin,aulasMes,aCobrar,linked}}).filter(r=>r.aulasMes.length>0);const html=relatorio.map(r=>`<div class="item"><div class="item-title">${esc(r.s.name)}</div><div class="meta">${r.aulasMes.length} aula(s) dadas no mês · ${r.linked.length} já pagas · ${r.aCobrar.length} a cobrar</div>${r.aCobrar.length>0?`<div class="meta" style="color:#a63a2a">Registrar pagamento das ${r.aCobrar.length} aula(s) "a cobrar"? <button class="linkbtn" onclick="openPaymentModal('${r.s.id}')">novo pagamento</button></div>`:''}${r.fin.pays.filter(p=>p.paid&&String(p.paidAt).slice(0,7)===ym).map(p=>`<div class="meta"><button class="linkbtn" onclick="printReceipt('${p.id}')">imprimir recibo de ${money(p.valor)}</button></div>`).join('')}</div>`).join('')||'<div class="empty">Sem aulas dadas neste mês.</div>';openModal('Fechamento de '+ym,'Resumo do mês. Registre pagamento de aulas "a cobrar" e imprima recibos dos pagamentos pagos do mês.',`<div class="form"><div class="list">${html}</div></div>`)}
function openBusinessSettings(){const b=DB.meta.business||{};openModal('Dados fiscais','Aparecem no recibo. Apenas você vê.',`<div class="form"><div class="field"><label>CNPJ</label><input id="bizCnpj" value="${esc(b.cnpj||'')}" placeholder="00.000.000/0000-00"></div><div class="field"><label>Razão social / nome</label><input id="bizRazao" value="${esc(b.razaoSocial||'')}" placeholder="Erik Azevedo · New Borders"></div><div class="field"><label>Endereço</label><textarea id="bizEnd">${esc(b.endereco||'')}</textarea></div><button class="btn" onclick="saveBusinessSettings()">salvar</button></div>`)}

function saveLesson(id=''){
  try{
    const studentEl=$('studentId'), dateEl=$('lessonDate'), timeEl=$('lessonTime'), titleEl=$('lessonTitle'), levelEl=$('lessonLevel'), unitEl=$('lessonUnit'), statusEl=$('lessonStatus'), prepEl=$('lessonPrep'), cancelEl=$('lessonCancel'), notesEl=$('lessonNotes'), courseEl=$('lessonCourseId'), valueEl=$('lessonValue');
    if(!studentEl){toast('Erro: campo de aluno não encontrado. Reabra a janela da aula.');log('saveLesson: studentId inexistente','error');return}
    let sid=studentEl.value;
    if(!sid&&DB.students.length===1)sid=DB.students[0].id;
    if(!sid){toast('Escolha um aluno antes de salvar a aula.');return}
    const l=byId(DB.lessons,id)||{id:uid('lesson'),createdAt:nowIso()};
    l.studentId=sid;
    l.courseId=(courseEl&&courseEl.value)||byId(DB.students,sid)?.courseId||'';
    l.date=(dateEl&&dateEl.value)||today();
    l.startTime=(timeEl&&timeEl.value)||'';
    l.title=((titleEl&&titleEl.value)||'').trim()||'Aula';
    l.level=((levelEl&&levelEl.value)||'').trim()||(byId(DB.students,sid)?.activeCourseLevel||'');
    l.unit=((unitEl&&unitEl.value)||'').trim();
    l.status=(statusEl&&statusEl.value)||'agendada';
    l.value=Number((valueEl&&valueEl.value)||0)||0;
    l.prepMinutes=Number((prepEl&&prepEl.value)||0)||0;
    l.cancelNoticeOk=(cancelEl&&cancelEl.value)==='true';
    l.planStatus=l.planStatus||'a planejar';
    l.notes=((notesEl&&notesEl.value)||'').trim();
    l.materialsStatus=l.materialsStatus||'pendente';
    l.studentPortalVisible=l.studentPortalVisible!==false;
    if(!l.paymentId)l.paymentId='';
    if(!id&&!DB.lessons.some(x=>x.id===l.id))DB.lessons.push(l);
    saveLocal();
    closeModal();
    STATE.page='lessons';
    showPage('lessons');
    setTimeout(()=>saveRemoteAll(),80);
    toast('Aula salva localmente. Sincronizando…');
    log('Aula salva localmente: '+l.title,'ok');
  }catch(err){
    console.error('saveLesson failed',err);
    log('Erro ao salvar aula: '+(err.message||err),'error');
    toast('Erro ao salvar aula: '+(err.message||err));
  }
}

v class="label">pendente</div></div></div>${aCobrarBlock}${pending.length?`<div class="student-panel"><div class="student-panel-title">Pagamentos pendentes</div><div class="list">${pending.map(paymentBlock).join('')}</div></div>`:''}${paid.length?`<div class="student-panel"><div class="student-panel-title">Pagamentos quitados</div><div class="list">${paid.map(paymentBlock).join('')}</div></div>`:''}`}
function studentLessonCard(l,mats){const lm=mats.filter(m=>m.lessonId===l.id||!m.lessonId);return `<div class="student-lesson"><div class="student-lesson-title">${esc(fmtDate(l.date))}${l.startTime?' · '+esc(l.startTime):''}</div><div class="badges">${badge(l.title,'blue')}${badge(lm.length+' materiais','ok')}</div><p class="subtle" style="margin-top:8px">${esc(l.notes||'')}</p>${lm.slice(0,4).map(studentMaterialCard).join('')}</div>`}
function studentMaterialCard(m){const att=m.attachments?.[0];const hasFile=att&&att.driveLink;return `<div class="student-resource"><div class="item-title">${esc(m.title)}</div><div class="badges">${badge(m.type||'material','blue')}${badge(hasFile?'arquivo disponível':'arquivo a caminho',hasFile?'ok':'warn')}</div>${m.notes?`<div class="meta">${esc(m.notes)}</div>`:''}<div class="row-actions">${hasFile?`<button class="linkbtn" onclick="openStudentMaterial('${m.id}')">abrir</button>`:`<span class="subtle">A professora está preparando o arquivo.</span>`}</div></div>`}
function openStudentMaterial(id){const snap=STATE.studentPortal;if(!snap)return;const m=(snap.materials||[]).find(x=>x.id===id);if(!m)return;const att=m.attachments?.[0];if(!att?.driveLink){toast('Arquivo ainda não disponível.');return}$('viewerTitle').textContent=m.title;$('viewerSub').textContent=att.name||'';const src=String(att.driveLink).replace('/view','/preview').replace(/[\?&]usp=[^&]*/g,'').replace(/\?$/,'');$('viewerFrame').innerHTML=`<iframe src="${esc(src)}" allow="autoplay" allowfullscreen></iframe>`;$('viewerModal').style.display='flex'}

function exportBackup(){saveLocal();const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lessonhub_v1_11_2_alpha_backup_'+today()+'.json';a.click();URL.revokeObjectURL(a.href);toast('Backup exportado.')}
function importBackup(file){if(!file)return;const r=new FileReader();r.onload=()=>{try{DB=normalizeDB(JSON.parse(r.result));saveLocal();scheduleSave();toast('Backup importado.')}catch(e){toast('Erro ao importar.')}};r.readAsText(file)}

Object.assign(window,{openStudentModal,saveStudent,deleteStudent,openLessonModal,saveLesson,openMaterialModal,saveMaterial,replaceMaterial,toggleMaterial,openMaterialViewer,openStudentMaterial,deleteItem,closeViewer,closeModal,showPage,showStudentPage,previewStudent,manualSaveAll,exportBackup,importBackup,forgetSession,driveSignIn,openPaymentModal,savePayment,markPaymentPaid,deletePayment,openFinanceDetail,printReceipt,closeMonth,openBusinessSettings,saveBusinessSettings,paySelectNextN,paySelectAllACobrar,updatePaymentSummary,openCourseModal,saveCourse,archiveCourse,deleteCourse});
function boot(){
  document.title='LessonHub v1.14-alpha — Cursos + Pagamento Vinculado';
  $('dateBox').innerHTML=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})+'<br>session cache + robust lesson save';
  const sess=lastSession();
  const hasLocal=(()=>{try{return !!localStorage.getItem(CONFIG.LOCAL_KEY)||!!localStorage.getItem('lessonhub_v1_4_data')}catch(e){return false}})();
  if(sess.email&&sess.role==='admin'&&hasLocal){
    STATE.userEmail=sess.email;
    STATE.source='local session';
    DB=loadLocal();
    showAdmin();
    status('Sessão local restaurada. Reconectando o Drive…',4500);
    log('Sessão local restaurada para '+sess.email,'ok');
    STATE.pendingDriveReconnect=true;
  }else if(sess.email&&sess.role==='student'){
    const cached=loadCachedStudentPortal(sess.email);
    if(cached&&cached.student){
      STATE.userEmail=sess.email;
      STATE.studentPortal=cached;
      showStudent();
      status('Portal carregado. Buscando atualizações…',2500);
      log('Sessão do aluno restaurada do cache para '+sess.email,'ok');
      // refresh em segundo plano: busca versão nova do Supabase mesmo com cache
      (async()=>{try{const fresh=await sbRead(sess.email);if(fresh&&fresh.meta?.kind==='studentPortal'&&fresh.student){const oldFp=JSON.stringify({l:cached.lessons,m:cached.materials,f:cached.finance});const newFp=JSON.stringify({l:fresh.lessons,m:fresh.materials,f:fresh.finance});if(oldFp!==newFp){STATE.studentPortal=fresh;cacheStudentPortal(sess.email,fresh);if(STATE.mode==='student'&&typeof renderStudent==='function')renderStudent();status('Portal atualizado.',3000);log('Portal do aluno atualizado do Supabase em segundo plano.','ok');}}}catch(e){log('Refresh do portal falhou: '+(e.message||e),'warn');}})();
    }else{
      showGate('Carregando portal…','Tentando restaurar a sessão do aluno.');
      setTimeout(()=>{
        if(STATE.mode!=='student'){
          showLogin('Sua sessão expirou. Clique em "Entrar com Google" para abrir seu portal.');
          log('Restauração silenciosa do aluno falhou (popup bloqueado ou sessão expirada). Voltando ao login.','warn');
        }
      },4500);
    }
  }else{
    showLogin('Carregando autenticação Google...');
  }
  const wait=setInterval(()=>{
    if(window.google&&google.accounts&&google.accounts.oauth2){
      clearInterval(wait);
      initGoogleDrive();
      if(STATE.mode==='login') $('loginMsg').textContent='Pronto para entrar.';
      if(sess.email&&sess.role==='student'&&STATE.mode!=='student'){
        try{STATE.tokenClient.requestAccessToken({prompt:''})}catch(e){if(STATE.mode!=='student')showLogin('Entre com Google para abrir o portal do aluno.')}
      }
      if(STATE.pendingDriveReconnect&&STATE.mode==='admin'){
        STATE.pendingDriveReconnect=false;
        STATE.silentDriveAttempt=true;
        try{
          STATE.tokenClient.requestAccessToken({prompt:''});
          // Se em 4s nao houve resposta, presume que virou popup e desiste
          setTimeout(()=>{
            if(STATE.silentDriveAttempt&&!STATE.driveReady&&STATE.mode==='admin'){
              STATE.silentDriveAttempt=false;
              log('Reconexão silenciosa do Drive não respondeu em 4s (provavelmente virou popup). Use o botão "⚠ conectar Drive" quando precisar.','warn');
              status('Drive não reconectou automaticamente. Clique em "⚠ conectar Drive" quando precisar enviar arquivos.',5000);
            }
          },4000);
        }catch(e){
          STATE.silentDriveAttempt=false;
          log('Reconexão automática do Drive falhou. Use o botão conectar Drive.','warn');
        }
      }
    }
  },200);
  setTimeout(()=>{if(!STATE.tokenClient&&STATE.mode==='login')$('loginMsg').textContent='Erro ao carregar autenticação Google. Recarregue a página.'},10000);
}
window.addEventListener('load',boot);
</script>
