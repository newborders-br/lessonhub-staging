<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#f5f1e9">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=Geist:wght@300..600&family=Geist+Mono:wght@400..500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<title>LessonHub v1.16.9-alpha — New Borders</title>
<style>
/* ============================================================
   LessonHub v1.16 · Sprint 1 — Tokens + Tipografia
   Bloco 0+1+2 do editorial.html
   ============================================================ */
:root{
  --paper:#f5f1e9;
  --paper2:#faf7f0;
  --ink:#1a1714;
  --ink2:#3a342d;
  --muted:#857b71;
  --soft:#b4aba0;
  --line:rgba(26,23,20,.16);
  --line2:rgba(26,23,20,.08);
  --rust:#9a4626;
  --rust-soft:#c97a55;
  --ok:#3e6b4a;
  --warn:#8a6312;
  --bad:#9a4626;
  --blue:#315f8f;
  /* aliases de compatibilidade */
  --bg:var(--paper);
  --shadow:none;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Geist',ui-sans-serif,system-ui,sans-serif;
  font-size:14.5px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"ss01","cv11";
}
button,input,textarea,select{font:inherit;color:inherit}
button{cursor:pointer;background:none;border:0;padding:0}
a{color:inherit}
.hidden{display:none!important}

/* ---------- shell: rail + main ---------- */
body.student-mode #adminShell{display:none}
body:not(.student-mode) #studentShell{display:none}

#adminShell{min-height:100vh;display:grid;grid-template-columns:88px 1fr}
.rail{border-right:1px solid var(--line);padding:28px 0 28px 22px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;justify-content:space-between;background:var(--paper)}
.mark{font-family:'Instrument Serif',Georgia,serif;font-size:30px;line-height:.85;letter-spacing:-.04em;font-weight:400}
.mark em{font-style:italic;color:var(--rust)}
.rail-meta{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);writing-mode:vertical-rl;transform:rotate(180deg);line-height:1.6;margin-top:auto}
.rail-foot{font-family:'Geist Mono',ui-monospace,monospace;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);line-height:1.6}
.main-content{padding:28px 56px 80px;max-width:1280px;width:100%}

/* ---------- topbar ---------- */
.topbar{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--ink);padding-bottom:18px;margin-bottom:28px;gap:24px;flex-wrap:wrap}
.crumbs{font-family:'Geist Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.crumbs b{color:var(--ink);font-weight:500}
.topbar-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.datebox{font-family:'Geist Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);text-align:right;line-height:1.7}
.datebox b{color:var(--ink);font-weight:500}

/* ---------- nav ---------- */
.nav{display:flex;gap:20px;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:28px;flex-wrap:wrap}
.nav button,.linkbtn{font-family:'Geist',sans-serif;font-size:13.5px;color:var(--muted);padding-bottom:3px;border-bottom:1px solid transparent;transition:color .12s,border-color .12s;font-weight:400;letter-spacing:.01em}
.nav button:hover,.linkbtn:hover{color:var(--ink)}
.nav button.active{color:var(--ink);border-bottom-color:var(--rust)}
.actions{margin-left:auto;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.page{display:none}.page.active{display:block}

/* ---------- page head ---------- */
.page-head{display:flex;justify-content:space-between;gap:20px;align-items:end;margin-bottom:24px}
.page-title h2{
  font-family:'Instrument Serif',Georgia,serif;
  font-weight:400;font-size:54px;line-height:.9;
  letter-spacing:-.035em;
}
.page-title p{
  font-family:'Newsreader',Georgia,serif;
  font-size:16px;color:var(--ink2);margin-top:8px;line-height:1.45;
}

/* ---------- layout grids ---------- */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

/* ---------- cards (KPI) ---------- */
.card{
  padding:22px;min-height:120px;
  display:flex;flex-direction:column;justify-content:space-between;
  border:1px solid var(--line);background:var(--paper2);
}
.card .num{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:42px;letter-spacing:-.04em;font-weight:400;line-height:.9;
}
.card .num em{font-style:italic;color:var(--rust)}
.label{
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:10px;text-transform:uppercase;letter-spacing:.18em;
  color:var(--muted);margin-top:10px;
}

/* ---------- panels ---------- */
.panel{border:1px solid var(--line);background:var(--paper2);padding:20px;margin-bottom:16px}
.panel-title{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:24px;font-weight:400;letter-spacing:-.03em;
  border-bottom:1px solid var(--ink);padding-bottom:10px;margin-bottom:14px;
}

/* ---------- list items ---------- */
.list{display:grid;gap:0}
.item{
  padding:16px 0;
  border-bottom:1px solid var(--line);
}
.item:last-child{border-bottom:0}
.item-title{
  font-family:'Newsreader',Georgia,serif;
  font-size:20px;font-weight:400;letter-spacing:-.015em;line-height:1.15;
  margin-bottom:6px;
}
.item:hover{background:rgba(154,70,38,.025)}
.meta{font-size:13.5px;color:var(--ink2);line-height:1.5}
.subtle{color:var(--muted);font-size:13px;line-height:1.55}

/* ---------- badges → estado tipográfico (bloco 4) ---------- */
.badges{display:flex;gap:12px;flex-wrap:wrap;margin:6px 0;align-items:baseline}
/* manter compatibilidade .badge mas no novo visual */
.badge{
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);
  /* sem caixa, sem fundo, sem borda — só tipografia */
}
.badge.ok{color:var(--ok)}
.badge.warn{color:var(--warn)}
.badge.bad,.badge.danger{color:var(--bad)}
.badge.blue{color:var(--blue)}
/* tag-state: alias explícito do bloco 4 */
.tag-state{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase}
.tag-state.ok{color:var(--ok)}
.tag-state.warn{color:var(--warn)}
.tag-state.todo{color:var(--rust)}

/* ---------- row-actions ---------- */
.row-actions{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-top:10px}
.linkbtn{
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);border-bottom:1px solid transparent;
  transition:color .12s,border-color .12s;
}
.linkbtn:hover{color:var(--rust);border-bottom-color:var(--rust)}

/* ---------- empty state ---------- */
.empty{
  padding:40px;text-align:center;
  border:1px dashed var(--line);
  color:var(--soft);
  font-family:'Newsreader',Georgia,serif;
  font-style:italic;font-size:16px;
}

/* ---------- toolbar + search ---------- */
.toolbar{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:18px}
input[type=text].search,input.search{
  background:transparent;
  border:0;border-bottom:1px solid var(--ink);
  padding:6px 0;outline:none;
  color:var(--ink);font-size:15px;
  font-family:'Newsreader',Georgia,serif;
  min-width:240px;
}
input[type=text].search::placeholder,input.search::placeholder{color:var(--soft);font-style:italic}
input[type=text].search:focus,input.search:focus{border-bottom-color:var(--rust)}

/* ---------- forms ---------- */
.form{display:grid;gap:14px}
.field{display:grid;gap:5px}
.field label,.micro{
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);
}
input:not(.search),textarea,select{
  width:100%;
  background:transparent;
  border:0;border-bottom:1px solid var(--line);
  padding:8px 0;outline:none;color:var(--ink);
  font-size:14.5px;
  border-radius:0;
}
textarea{min-height:80px;resize:vertical;border:1px solid var(--line);padding:10px}
input:focus,textarea:focus,select:focus{border-bottom-color:var(--rust);background:transparent}
textarea:focus{border-color:var(--rust)}

/* ---------- botões ---------- */
.btn{
  border:1px solid var(--ink);
  padding:10px 16px;
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink);
  transition:all .12s;
  border-radius:0;
  background:transparent;
}
.btn:hover{background:var(--ink);color:var(--paper)}
.btn.soft{border-color:var(--line);color:var(--muted)}
.btn.soft:hover{border-color:var(--ink);color:var(--ink);background:transparent}
.btn.danger{border-color:var(--bad);color:var(--bad)}
.btn.danger:hover{background:var(--bad);color:var(--paper)}
.btn.rust{border-color:var(--rust);color:var(--rust)}
.btn.rust:hover{background:var(--rust);color:var(--paper)}

/* ---------- modal ---------- */
.modal{
  position:fixed;inset:0;
  background:rgba(26,23,20,.52);
  display:none;align-items:center;justify-content:center;
  padding:22px;z-index:80;
}
.modal-box{
  width:min(880px,100%);max-height:90vh;overflow:auto;
  padding:28px;
  background:var(--paper2);
  border:1px solid var(--ink);
}
.modal-head{
  display:flex;justify-content:space-between;gap:16px;
  margin-bottom:16px;border-bottom:1px solid var(--ink);padding-bottom:12px;
}
.modal-title{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:28px;letter-spacing:-.03em;font-weight:400;
}
.modal-sub{font-family:'Newsreader',Georgia,serif;font-size:15px;color:var(--ink2);margin-top:4px}

/* ---------- toast + statusbar ---------- */
.toast{
  position:fixed;right:18px;bottom:18px;
  background:var(--ink);color:var(--paper);
  padding:12px 16px;font-size:12px;
  font-family:'Geist Mono',ui-monospace,monospace;
  letter-spacing:.1em;text-transform:uppercase;
  display:none;z-index:100;
}
.statusbar{
  position:fixed;left:18px;bottom:18px;z-index:70;
  border:1px solid var(--line);background:var(--paper2);
  padding:9px 14px;font-size:10px;text-transform:uppercase;
  letter-spacing:.14em;color:var(--muted);display:none;
}

/* ---------- login ---------- */
#loginScreen{
  position:fixed;inset:0;z-index:90;background:var(--paper);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:28px;text-align:center;
}
.login-logo{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:80px;font-weight:400;letter-spacing:-.05em;line-height:.85;
}
.login-logo em{font-style:italic;color:var(--rust)}
.google-btn{
  display:flex;align-items:center;gap:12px;
  padding:14px 28px;background:#fff;border:1px solid var(--line);
  font-size:15px;color:var(--ink2);cursor:pointer;
}
.privacy-gate{
  position:fixed;inset:0;z-index:89;
  display:flex;align-items:center;justify-content:center;
  text-align:center;padding:28px;background:var(--paper);color:var(--ink);
}
.privacy-gate h2{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:clamp(36px,8vw,58px);line-height:.9;
  letter-spacing:-.06em;font-weight:400;margin-bottom:16px;
}
.privacy-gate p{max-width:540px;margin:0 auto;color:var(--muted);font-size:14px;line-height:1.55}

/* ---------- student portal shell ---------- */
.student-shell{
  min-height:100vh;display:grid;
  grid-template-columns:88px 1fr;
}
body.portal-mode{background:#fbf9f3}
body.portal-mode .rail{background:#fbf9f3;border-right-color:var(--line2)}
.student-hero{
  border-bottom:1px solid var(--ink);padding:28px 0 28px;margin-bottom:24px;
}
.student-hero h2{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:54px;line-height:.9;letter-spacing:-.035em;font-weight:400;
}
.student-hero h2 em{font-style:italic;color:var(--rust)}
.student-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.student-card{
  padding:20px;min-height:100px;
  display:flex;flex-direction:column;justify-content:space-between;
  border:1px solid var(--line);background:var(--paper2);
}
.student-card .num{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:38px;letter-spacing:-.04em;font-weight:400;line-height:.9;
}
.student-panel{border:1px solid var(--line);background:var(--paper2);padding:20px;margin-bottom:16px}
.student-panel-title{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:22px;font-weight:400;letter-spacing:-.03em;
  border-bottom:1px solid var(--ink);padding-bottom:10px;margin-bottom:14px;
}
.student-lesson,.student-resource{
  border-bottom:1px solid var(--line);padding:14px 0;
}
.student-lesson-title{
  font-family:'Newsreader',Georgia,serif;
  font-size:20px;letter-spacing:-.015em;
}

/* ---------- student nav ---------- */
.student-nav{display:flex;gap:20px;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:24px;flex-wrap:wrap}
.student-nav button{font-family:'Geist',sans-serif;font-size:13.5px;color:var(--muted);padding-bottom:3px;border-bottom:1px solid transparent;transition:color .12s,border-color .12s}
.student-nav button.active{color:var(--ink);border-bottom-color:var(--rust)}
.student-nav button:hover{color:var(--ink)}

/* ---------- viewer ---------- */
.viewer-frame iframe{
  width:min(1000px,calc(100vw - 28px));
  height:calc(100vh - 100px);
  border:0;background:white;
}
@media(max-width:700px){
}

/* ---------- misc ---------- */
.danger-note{border-left:2px solid var(--bad);padding-left:12px;color:var(--bad)}

/* ---------- hero (bloco 5 Today) ---------- */
.hero{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(0,1fr);gap:64px;align-items:end;margin-bottom:44px;padding-bottom:32px;border-bottom:1px solid var(--line)}
.hero h1{font-family:'Instrument Serif',Georgia,serif;font-weight:400;font-size:72px;line-height:.9;letter-spacing:-.035em}
.hero h1 em{font-style:italic;color:var(--rust)}
.hero .lede{font-family:'Newsreader',Georgia,serif;font-size:18px;line-height:1.45;color:var(--ink2);max-width:46ch}
.hero .lede strong{font-weight:500;color:var(--ink)}
.cols-2{display:grid;grid-template-columns:minmax(0,2fr) minmax(0,1fr);gap:48px}
.section-title{font-family:'Geist Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--ink);padding-bottom:10px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:baseline}
.section-title .count{color:var(--soft)}
/* lesson-row */
.lesson-row{display:grid;grid-template-columns:104px 1fr auto;gap:24px;padding:18px 0;border-bottom:1px solid var(--line);align-items:start}
.lesson-row:last-child{border-bottom:0}
.lesson-time{font-family:'Instrument Serif',Georgia,serif;font-size:38px;line-height:.9;letter-spacing:-.025em}
.lesson-time .ampm{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;color:var(--muted);letter-spacing:.14em;display:block;margin-top:4px;text-transform:uppercase}
.lesson-body .name{font-family:'Newsreader',Georgia,serif;font-size:22px;line-height:1.1;letter-spacing:-.015em;margin-bottom:4px}
.lesson-body .course{font-family:'Geist Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.lesson-body .topic{font-size:14px;color:var(--ink2);max-width:48ch;line-height:1.5}
.lesson-meta{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:130px}
.lesson-meta .val{font-family:'Geist Mono',ui-monospace,monospace;font-size:12px;color:var(--muted)}
/* sidebar metrics */
.side-stack{display:flex;flex-direction:column;gap:24px}
.metric{border-top:1px solid var(--ink);padding-top:14px}
.metric .num{font-family:'Instrument Serif',Georgia,serif;font-size:58px;line-height:.9;letter-spacing:-.03em}
.metric .num em{font-style:italic;color:var(--rust)}
.metric .lbl{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:6px}
.metric .delta{font-size:13px;color:var(--ink2);margin-top:4px}
/* bloco 6 students list */
.students-toolbar{display:flex;justify-content:space-between;align-items:center;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.student-row{display:grid;grid-template-columns:1.6fr 1.4fr 1fr 1fr 40px;gap:24px;padding:18px 0;border-bottom:1px solid var(--line);align-items:center;cursor:pointer;transition:background .12s}
.student-row:hover{background:rgba(154,70,38,.03)}
.student-row.head{cursor:default;border-bottom:1px solid var(--ink);padding:10px 0;font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.student-row.head:hover{background:transparent}
.s-name{font-family:'Newsreader',Georgia,serif;font-size:20px;line-height:1.1;letter-spacing:-.015em}
.s-name small{display:block;font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-top:3px}
.s-course{font-size:13.5px;color:var(--ink2)}
.s-course em{font-style:normal;color:var(--muted);font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.08em;display:block;margin-top:2px}
.s-next{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;color:var(--ink);letter-spacing:.04em}
.s-next small{color:var(--muted);display:block;margin-top:2px;letter-spacing:.14em;text-transform:uppercase;font-size:9.5px}
.s-fin{font-family:'Geist Mono',ui-monospace,monospace;font-size:11.5px;color:var(--ink)}
.s-fin small{display:block;font-size:9.5px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
.s-fin.warn{color:var(--rust)}
.s-arrow{text-align:right;font-family:'Instrument Serif',Georgia,serif;font-size:22px;color:var(--soft);transition:color .12s,transform .12s}
.student-row:hover .s-arrow{color:var(--rust);transform:translateX(3px)}
/* ---------- curso detalhe (bloco 10) ---------- */
.course-head{display:grid;grid-template-columns:minmax(0,1.6fr) minmax(0,1fr);gap:48px;align-items:end;border-bottom:1px solid var(--ink);padding-bottom:28px;margin-bottom:36px}
.course-head h1{font-family:'Instrument Serif',Georgia,serif;font-size:clamp(48px,7vw,84px);line-height:.88;letter-spacing:-.04em;font-weight:400}
.course-head h1 em{font-style:italic;color:var(--rust)}
.course-head dl{display:grid;grid-template-columns:1fr 1fr;gap:14px 24px}
.course-head dl dt{font-family:'Geist Mono',ui-monospace,monospace;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.course-head dl dd{font-family:'Geist Mono',monospace;font-size:12.5px;color:var(--ink2);letter-spacing:.02em}
.course-head dl dd em{font-style:italic;color:var(--rust)}
.unit-block{border-top:1px solid var(--line);padding:0}
.unit-block:first-of-type{border-top:1px solid var(--ink)}
.unit-block .uh{display:grid;grid-template-columns:96px 1fr auto auto;gap:24px;align-items:baseline;cursor:pointer;padding:20px 0;transition:background .12s;user-select:none}
.unit-block .uh:hover{background:rgba(154,70,38,.03)}
.unit-block .uno{font-family:'Instrument Serif',Georgia,serif;font-size:42px;line-height:1;letter-spacing:-.03em;color:var(--ink);transition:color .12s}
.unit-block.open .uno{color:var(--rust)}
.unit-block .un{font-family:'Newsreader',Georgia,serif;font-size:22px;line-height:1.15;letter-spacing:-.015em}
.unit-block .un small{display:block;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.unit-block .ucount{font-family:'Geist Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.04em;text-align:right;white-space:nowrap}
.unit-block .uchev{font-family:'Instrument Serif',Georgia,serif;font-size:24px;color:var(--soft);transition:transform .15s,color .12s;line-height:1}
.unit-block.open .uchev{transform:rotate(90deg);color:var(--rust)}
.unit-block .ubody{display:none;padding:8px 0 28px 120px}

function sanitizeEmail(email){return String(email||'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'student'}
function fmtDate(d){if(!d)return '—';const p=String(d).slice(0,10).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d}
function fmtShort(d){if(!d)return '—';const p=String(d).slice(0,10).split('-');return p.length===3?`${p[2]}/${p[1]}`:d}
function money(n){return (Number(n)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function badge(t,c=''){if(!t)return '';const cls=c==='ok'?'ok':c==='warn'?'warn':c==='bad'||c==='danger'?'warn':c==='blue'?'':c;return `<span class="badge ${cls}">${esc(String(t))}</span>`}

function blankDB(){return{meta:{version:CONFIG.VERSION,updatedAt:nowIso(),createdAt:nowIso(),authority:'Supabase JSON backend · Drive files · local cache',business:{cnpj:'',razaoSocial:'',endereco:''}},students:[],lessons:[],materials:[],courses:[],units:[],plannedLessons:[],payments:[],packages:[],courseUnits:[],assessments:[],formLogs:[]}}
function normalizeDB(input){const d=input&&typeof input==='object'?input:blankDB();d.meta=d.meta||{};d.meta.version=CONFIG.VERSION;d.meta.authority='Supabase JSON backend · Drive files · local cache';d.meta.business=d.meta.business||{cnpj:'',razaoSocial:'',endereco:''};['students','lessons','materials','courses','units','plannedLessons','payments','packages','courseUnits','assessments','formLogs'].forEach(k=>d[k]=Array.isArray(d[k])?d[k]:[]);
  d.courses.forEach(c=>{c.id=c.id||uid('course');c.name=c.name||'Curso';c.kind=c.kind||'';c.color=c.color||'#8b3a1f';c.status=c.status||'ativo';c.description=c.description||'';c.createdAt=c.createdAt||nowIso()});

  d.lessons.forEach(l=>{l.id=l.id||uid('lesson');l.studentId=l.studentId||'';l.courseId=l.courseId||'';l.plannedLessonId=l.plannedLessonId||'';l.date=l.date||'';l.startTime=l.startTime||l.time||'';l.title=l.title||'Aula';l.level=l.level||'';l.unit=l.unit||l.topic||'';l.status=l.status||l.pedStatus||'agendada';l.planStatus=l.planStatus||'a planejar';l.finStatus=l.finStatus||'paga';l.value=Number(l.value)||0;l.notes=l.notes||'';l.studentNotes=l.studentNotes||'';l.materialsStatus=l.materialsStatus||'pendente';l.studentPortalVisible=l.studentPortalVisible!==false;l.paymentId=l.paymentId||l.packageId||'';l.packageId=l.paymentId;l.prepMinutes=Number(l.prepMinutes)||0;l.cancelNoticeOk=typeof l.cancelNoticeOk==='boolean'?l.cancelNoticeOk:false});
  d.materials.forEach(m=>{m.id=m.id||uid('mat');m.title=m.title||'Material';m.type=m.type||'material';m.studentId=m.studentId||'';m.lessonId=m.lessonId||'';m.plannedLessonId=m.plannedLessonId||'';m.studentVisible=typeof m.studentVisible==='boolean'?m.studentVisible:true;m.downloadAllowed=typeof m.downloadAllowed==='boolean'?m.downloadAllowed:true;m.attachments=Array.isArray(m.attachments)?m.attachments:[];m.notes=m.notes||'';m.createdAt=m.createdAt||nowIso()});
  // Migração: packages antigos viram payments
  d.packages.forEach(p=>{if(!d.payments.some(pay=>pay.id===p.id)){const lessonsLinked=d.lessons.filter(l=>l.paymentId===p.id).map(l=>l.id);d.payments.push({id:p.id,studentId:p.studentId||'',createdAt:p.createdAt||nowIso(),valor:Number(p.valor||p.amount)||0,paid:typeof p.paid==='boolean'?p.paid:false,paidAt:p.paidAt||'',method:p.method||'',notes:p.notes||'',lessonIds:lessonsLinked,migratedFromPackage:true,aulasContratadas:Number(p.aulasContratadas||p.lessonCount)||0})}});
  d.payments.forEach(p=>{p.id=p.id||uid('pay');p.studentId=p.studentId||'';p.createdAt=p.createdAt||nowIso();p.valor=Number(p.valor)||0;p.paid=typeof p.paid==='boolean'?p.paid:false;p.paidAt=p.paidAt||'';p.method=p.method||'';p.notes=p.notes||'';p.lessonIds=Array.isArray(p.lessonIds)?p.lessonIds:[]});
  return d}

function loadLocal(){for(const k of [CONFIG.LOCAL_KEY,...CONFIG.LEGACY_KEYS]){try{const raw=localStorage.getItem(k);if(raw){const d=normalizeDB(JSON.parse(raw));if(dataCount(d)>0||k===CONFIG.LOCAL_KEY)return d}}catch(e){}}return blankDB()}

async function saveRemoteAll(){if(STATE.mode!=='admin')return;await sbSaveDB();await driveSaveDB();await autoPublishPortals()}
function portalFingerprint(snap){if(!snap)return '';try{return JSON.stringify({l:snap.lessons,m:snap.materials,f:snap.finance,s:snap.student})}catch(e){return String(Math.random())}}
async function autoPublishPortals(){
  if(STATE.mode!=='admin')return;
  STATE.portalHashes=STATE.portalHashes||{};
  let published=0,failed=0;
  for(const st of DB.students.filter(s=>s.email&&s.status!=='arquivado')){
    const snap=snapshotForStudent(st.id);
    if(!snap)continue;
    const fp=portalFingerprint(snap);
    if(STATE.portalHashes[st.id]===fp)continue;
    let okSb=await sbWrite(st.email,snap);
    let okDrive=false;
    if(STATE.driveReady)okDrive=await driveSavePortal(snap);
    if(okSb||okDrive){STATE.portalHashes[st.id]=fp;published++;}
    else failed++;
  }
  if(published>0)status(published+' portal(is) de aluno atualizado(s) automaticamente.',3000);
  if(failed>0)log(failed+' portal(is) não publicado(s) automaticamente. Verifique conexão/Supabase.','warn');
}
function studentName(id){return byId(DB.students,id)?.name||'—'}
function lessonTitle(l){return `${studentName(l.studentId)} — ${fmtShort(l.date)}${l.startTime?' · '+l.startTime:''}`}
function lessonMaterials(l){return DB.materials.filter(m=>m.studentVisible&&(m.lessonId===l.id || (!m.lessonId&&m.studentId===l.studentId))) }
function financeForStudent(id){const pays=DB.payments.filter(p=>p.studentId===id).sort((a,b)=>String(b.createdAt).localeCompare(String(a.createdAt)));const allLinkedIds=new Set();pays.forEach(p=>p.lessonIds.forEach(lid=>allLinkedIds.add(lid)));const linkedLessons=DB.lessons.filter(l=>allLinkedIds.has(l.id));const aCobrar=DB.lessons.filter(l=>l.studentId===id&&!allLinkedIds.has(l.id)&&lessonCountsForPackage(l));const futureLinked=linkedLessons.filter(l=>l.date>=today()&&l.status==='agendada');const consumedLinked=linkedLessons.filter(l=>lessonCountsForPackage(l));const ltv=pays.filter(p=>p.paid).reduce((s,p)=>s+(Number(p.valor)||0),0);const realPays=pays.filter(p=>!(p.auto&&!Number(p.valor)));const pending=realPays.filter(p=>!p.paid&&Number(p.valor)>0).reduce((s,p)=>s+(Number(p.valor)||0),0);const lastPaid=pays.filter(p=>p.paid).sort((a,b)=>String(b.paidAt).localeCompare(String(a.paidAt)))[0];return{pays,linkedLessons,futureLinked,consumedLinked,aCobrar,ltv,pending,status:aCobrar.length>0?'a cobrar':pending>0?'pendente':'em dia',lastPaidAt:lastPaid?.paidAt||''}}
function lessonCountsForPackage(l){return l.status==='dada'||(l.status==='cancelada'&&l.cancelNoticeOk===false)}
function snapshotForStudent(studentId){const st=byId(DB.students,studentId);if(!st||!st.email)return null;const lessons=DB.lessons.filter(l=>l.studentId===studentId&&l.studentPortalVisible!==false).sort((a,b)=>String(a.date||'').localeCompare(String(b.date||''))).map(l=>{const c={...l};delete c.notes;delete c.prepMinutes;delete c.paymentId;delete c.packageId;delete c.value;return c});const mats=DB.materials.filter(m=>m.studentVisible&&(m.studentId===studentId||lessons.some(l=>l.id===m.lessonId))).map(m=>({...m}));return{meta:{kind:'studentPortal',version:CONFIG.VERSION,generatedAt:nowIso(),studentEmail:st.email},student:{id:st.id,name:st.name,email:st.email,course:st.activeCourseName,level:st.activeCourseLevel},lessons,materials:mats,finance:financeForStudent(studentId)}}

function youtubeEmbedSrc(url){const m=String(url||'').match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})/);return m?'https://www.youtube.com/embed/'+m[1]+'?rel=0&modestbranding=1&autoplay=1':null}
function buildViewerHtml(att,title,downloadAllowed){
  const ytSrc=youtubeEmbedSrc(att?.youtubeUrl||att?.driveLink||'');
  if(ytSrc){
    return `<div class="cinema-frame"><div class="cinema-top"><span>${esc(title)}</span><span>YouTube</span></div><div style="width:100%;max-width:880px;aspect-ratio:16/9;margin:40px auto;padding:0 40px"><iframe src="${ytSrc}" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen style="width:100%;height:100%;border:0;display:block;aspect-ratio:16/9"></iframe></div><div class="cinema-bottom"><span>${esc(title)}</span><span>vídeo</span></div></div>`;
  }
  if(att?.driveLink){
    const fileId=String(att.driveId||att.driveLink).match(/[-\w]{25,}/)?.[0]||'';
    const src=fileId?`https://drive.google.com/file/d/${fileId}/preview?rm=minimal`:String(att.driveLink).replace('/view','/preview').replace(/[\?&]usp=[^&]*/g,'').replace(/\?$/,'');
    return `<div class="cinema-frame"><div class="cinema-top"><span>${esc(title)}</span><span>Drive · ${downloadAllowed?'download liberado':'só visualização'}</span></div><iframe src="${esc(src)}" allow="autoplay" allowfullscreen></iframe><div class="cinema-bottom"><span>${esc(att.name||title)}</span><span>setas do teclado pra navegar</span></div></div>`;
  }
  return `<div style="padding:80px;text-align:center"><p style="font-family:'Newsreader',serif;font-size:18px;color:var(--muted);font-style:italic">Sem arquivo disponível para visualização.</p></div>`;
}
function openMaterialViewer(id){const m=byId(DB.materials,id);if(!m)return;const att=m.attachments?.[0];const t=$('viewerTitle');const s=$('viewerSub');const f=$('viewerFrame');const dl=$('viewerDlBtn');const screen=$('viewerScreen');if(!t||!s||!f||!screen)return;t.textContent=m.title;s.textContent=[m.type,att?.name].filter(Boolean).join(' · ');f.innerHTML=buildViewerHtml(att,m.title,m.downloadAllowed!==false);if(dl){if(att?.driveLink&&m.downloadAllowed!==false){dl.style.display='block';dl.onclick=()=>window.open(att.driveLink,'_blank')}else{dl.style.display='none'}}screen.style.display='block';document.body.style.overflow='hidden';screen.scrollTop=0}

function sb(){if(!STATE.sb)STATE.sb=supabase.createClient(CONFIG.SB_URL,CONFIG.SB_KEY);return STATE.sb}
async function sbRead(email){try{const {data,error}=await sb().from(CONFIG.SB_TABLE).select('data,updated_at').eq('user_email',String(email).toLowerCase()).maybeSingle();if(error)throw error;return data?.data||null}catch(e){STATE.lastError=e.message||String(e);log('Supabase read falhou: '+STATE.lastError,'error');return null}}
async function sbWrite(email,data){try{const payload={user_email:String(email).toLowerCase(),data,updated_at:nowIso()};const {error}=await sb().from(CONFIG.SB_TABLE).upsert(payload,{onConflict:'user_email'});if(error)throw error;STATE.lastSupabaseSave=new Date();log('Supabase salvo para '+email,'ok');return true}catch(e){STATE.lastError=e.message||String(e);log('Supabase save falhou: '+STATE.lastError+' · dados mantidos no cache/Drive quando possível','error');return false}}
async function sbDelete(email){try{const {error}=await sb().from(CONFIG.SB_TABLE).delete().eq('user_email',String(email).toLowerCase());if(error)throw error;log('Supabase: linha de '+email+' apagada','ok');return true}catch(e){STATE.lastError=e.message||String(e);log('Supabase delete falhou: '+STATE.lastError,'error');return false}}
async function sbSaveDB(){if(!STATE.userEmail)return false;DB.meta.updatedAt=nowIso();return sbWrite(STATE.userEmail,DB)}

function initGoogleDrive(){STATE.tokenClient=google.accounts.oauth2.initTokenClient({client_id:CONFIG.DRIVE_CLIENT_ID,scope:CONFIG.DRIVE_SCOPES,callback:handleGoogleToken})}
function driveSignIn(){if(STATE.tokenClient)STATE.tokenClient.requestAccessToken({prompt:'consent'});else showLogin('Aguarde o carregamento do Google.')} window.driveSignIn=driveSignIn;
async function handleGoogleToken(resp){STATE.silentDriveAttempt=false;if(resp.error){showLogin('Erro de autenticação.');return}showGate('Carregando LessonHub…','Login recebido. Carregando dados e sincronizações.');STATE.accessToken=resp.access_token;let email='';try{const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+STATE.accessToken}});if(r.ok){const u=await r.json();email=String(u.email||'').toLowerCase()}}catch(e){}STATE.userEmail=email;if(!email){showLogin('Não consegui ler o e-mail da conta.');return}log('Login Google: '+email,'ok');if(email===CONFIG.ADMIN_EMAIL){rememberSession(email,'admin');await bootAdmin()}else{rememberSession(email,'student');await bootStudent(email)}}
async function driveApi(path,opts={}){const r=await fetch('https://www.googleapis.com/drive/v3/'+path,{...opts,headers:{Authorization:'Bearer '+STATE.accessToken,...(opts.headers||{})}});if(!r.ok)throw new Error('Drive '+r.status);return r.json()}
async function driveEnsureFolder(name,parentId=''){const q=parentId?`name='${name}' and '${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`:`name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;const found=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name)');if(found.files?.[0])return found.files[0].id;const body={name,mimeType:'application/vnd.google-apps.folder'};if(parentId)body.parents=[parentId];const made=await driveApi('files?fields=id',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return made.id}
async function driveSetup(){try{STATE.driveFolderId=await driveEnsureFolder(CONFIG.DRIVE_FOLDER);STATE.drivePortalFolderId=await driveEnsureFolder(CONFIG.DRIVE_PORTAL_FOLDER,STATE.driveFolderId);STATE.driveDataFileId=await driveEnsureJsonFile(CONFIG.DRIVE_DATA_FILE,STATE.driveFolderId);STATE.driveReady=true;log('Drive pronto','ok');if(STATE.mode==='admin')buildNav();return true}catch(e){STATE.lastError=e.message||String(e);log('Drive setup falhou: '+STATE.lastError,'error');return false}}
async function driveEnsureJsonFile(name,folderId){const q=`name='${name}' and '${folderId}' in parents and trashed=false`;const r=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name)');if(r.files?.[0])return r.files[0].id;const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name,parents:[folderId]})],{type:'application/json'}));form.append('file',new Blob([JSON.stringify(blankDB())],{type:'application/json'}));const res=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});return (await res.json()).id}
async function driveReadJson(fileId){try{const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:'Bearer '+STATE.accessToken}});if(!r.ok)return null;return await r.json()}catch(e){return null}}
async function driveWriteJson(fileId,name,data){if(!fileId)return false;try{const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name})],{type:'application/json'}));form.append('file',new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));const r=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`,{method:'PATCH',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});if(!r.ok)throw new Error('Drive write '+r.status);STATE.lastDriveSave=new Date();log('Drive JSON salvo','ok');return true}catch(e){STATE.lastError=e.message||String(e);log('Drive write falhou: '+STATE.lastError,'error');return false}}
async function driveSaveDB(){if(!STATE.driveReady)return false;DB.meta.updatedAt=nowIso();return driveWriteJson(STATE.driveDataFileId,CONFIG.DRIVE_DATA_FILE,DB)}
async function driveSavePortal(snap){if(!STATE.driveReady||!snap?.student?.email)return false;try{const name='portal_'+sanitizeEmail(snap.student.email)+'.json';const q=`name='${name}' and '${STATE.drivePortalFolderId}' in parents and trashed=false`;const found=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name)');let id=found.files?.[0]?.id;if(!id){const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name,parents:[STATE.drivePortalFolderId]})],{type:'application/json'}));form.append('file',new Blob([JSON.stringify(snap,null,2)],{type:'application/json'}));const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});id=(await r.json()).id}else{await driveWriteJson(id,name,snap)}await driveShare(id,snap.student.email,false);return true}catch(e){log('Drive portal falhou: '+(e.message||e),'error');return false}}
async function driveUploadFile(file,studentId=''){if(!STATE.driveReady||!file)return null;try{const st=byId(DB.students,studentId);const folderName=studentId?`alunos-${slug(st?.name||studentId)}`:'biblioteca';const parent=await driveEnsureFolder(folderName,STATE.driveFolderId);const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name:file.name,parents:[parent]})],{type:'application/json'}));form.append('file',file);const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink,mimeType,name,size',{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});if(!r.ok)throw new Error('Upload '+r.status);const data=await r.json();log('Arquivo enviado ao Drive: '+file.name,'ok');return{id:data.id,name:data.name||file.name,type:data.mimeType||file.type,size:Number(data.size)||file.size,driveId:data.id,driveLink:data.webViewLink||'',createdAt:nowIso()}}catch(e){STATE.lastError=e.message||String(e);log('Upload Drive falhou: '+STATE.lastError,'error');return null}}
async function driveShare(fileId,email,allowDownload=true){try{await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}/permissions?sendNotificationEmail=false`,{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken,'Content-Type':'application/json'},body:JSON.stringify({type:'user',role:'reader',emailAddress:email})});if(!allowDownload){await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?fields=id`,{method:'PATCH',headers:{Authorization:'Bearer '+STATE.accessToken,'Content-Type':'application/json'},body:JSON.stringify({copyRequiresWriterPermission:true})})}return true}catch(e){log('Share falhou: '+(e.message||e),'error');return false}}
async function dailyBackupIfDue(){if(!STATE.driveReady||STATE.mode!=='admin')return;try{const today=nowIso().slice(0,10);const lastBackup=localStorage.getItem('lessonhub_last_backup_date');if(lastBackup===today){log('Backup diário do Drive já feito hoje ('+today+').','ok');return}const folderId=await driveEnsureFolder(CONFIG.DRIVE_BACKUP_FOLDER,STATE.driveFolderId);const name='lessonhub-backup-'+today+'.json';const q=`name='${name}' and '${folderId}' in parents and trashed=false`;const found=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id)');if(found.files?.[0]){localStorage.setItem('lessonhub_last_backup_date',today);log('Backup '+today+' já existe no Drive. Marcado como feito.','ok');return}const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name,parents:[folderId]})],{type:'application/json'}));form.append('file',new Blob([JSON.stringify(DB,null,2)],{type:'application/json'}));const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});if(!r.ok)throw new Error('Backup upload '+r.status);localStorage.setItem('lessonhub_last_backup_date',today);log('Backup diário '+today+' salvo no Drive.','ok');await pruneOldBackups(folderId);}catch(e){log('Backup diário falhou: '+(e.message||e),'warn');}}
async function pruneOldBackups(folderId){try{const q=`'${folderId}' in parents and trashed=false`;const found=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name,createdTime)&pageSize=200');const files=(found.files||[]).filter(f=>/^lessonhub-backup-\d{4}-\d{2}-\d{2}\.json$/.test(f.name));const cutoff=Date.now()-CONFIG.BACKUP_RETENTION_DAYS*24*60*60*1000;let removed=0;for(const f of files){const ts=new Date(f.createdTime).getTime();if(ts<cutoff){await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}`,{method:'DELETE',headers:{Authorization:'Bearer '+STATE.accessToken}});removed++;}}if(removed>0)log('Backups antigos podados: '+removed+' arquivo(s) removidos.','ok');}catch(e){log('Poda de backups falhou: '+(e.message||e),'warn');}}
async function driveFindPortal(email){try{const name='portal_'+sanitizeEmail(email)+'.json';const q=`name='${name}' and trashed=false`;const r=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name)');if(!r.files?.[0])return null;return driveReadJson(r.files[0].id)}catch(e){return null}}

async function bootAdmin(){status('Carregando dados…',0);await driveSetup();const local=loadLocal();const remote=await sbRead(STATE.userEmail);let driveData=null;if(STATE.driveReady)driveData=await driveReadJson(STATE.driveDataFileId);let chosen=normalizeDB(local);STATE.source='local';if(remote&&dataCount(remote)>0&&(dataCount(chosen)===0||newer(remote,chosen))){chosen=normalizeDB(remote);STATE.source='supabase'}if(driveData&&dataCount(driveData)>0&&(dataCount(chosen)===0||newer(driveData,chosen))){chosen=normalizeDB(driveData);STATE.source='drive'}DB=chosen;saveLocal();status('Fonte: '+STATE.source);showAdmin();await sbSaveDB();dailyBackupIfDue().catch(()=>{});}
function cacheStudentPortal(email,snap){try{localStorage.setItem('lessonhub_student_portal_'+sanitizeEmail(email),JSON.stringify({cachedAt:nowIso(),snap}))}catch(e){}}
function loadCachedStudentPortal(email){try{const raw=localStorage.getItem('lessonhub_student_portal_'+sanitizeEmail(email));if(!raw)return null;const o=JSON.parse(raw);return o&&o.snap?o.snap:null}catch(e){return null}}
async function bootStudent(email){status('Carregando portal do aluno…',0);let snap=await sbRead(email);if(!snap||snap.meta?.kind!=='studentPortal'){await driveSetup();snap=await driveFindPortal(email)}if(snap&&snap.student){STATE.studentPortal=snap;cacheStudentPortal(email,snap);showStudent();status('Portal carregado');return}
  const cached=loadCachedStudentPortal(email);if(cached&&cached.student){STATE.studentPortal=cached;showStudent();status('Portal carregado do cache local. Sem conexão com Supabase/Drive.',5000);log('Portal do aluno restaurado do cache para '+email,'ok');return}
  try{const localDB=loadLocal();const st=(localDB.students||[]).find(s=>String(s.email||'').toLowerCase()===String(email).toLowerCase());if(st){const savedDB=DB;DB=localDB;const live=snapshotForStudent(st.id);DB=savedDB;if(live){STATE.studentPortal=live;cacheStudentPortal(email,live);showStudent();status('Portal gerado a partir dos dados locais deste navegador.',5000);log('Portal do aluno gerado do DB local para '+email,'ok');return}}}catch(e){}
  STATE.studentPortal={unauthorized:true,email};showStudent();status('Acesso não autorizado')}

function renderStudents(q=''){

  const tableRows=rows.map(s=>{
    const fin=financeForStudent(s.id);
    const course=s.courseId?byId(DB.courses,s.courseId):null;
    const allLessons=DB.lessons.filter(l=>l.studentId===s.id);
    const next=allLessons.filter(l=>l.date>=today()).sort((a,b)=>String(a.date).localeCompare(String(b.date)))[0];
    const sinceDate=s.createdAt?new Date(s.createdAt).toLocaleDateString('pt-BR',{month:'short',year:'numeric'}):'';
    const nextStr=next?`${fmtShort(next.date)}${next.startTime?' · '+next.startTime.slice(0,5):''}`:'-';
    const nextState=next?(next.planStatus==='preparada'?'preparada':'a planejar'):'';

    return `<div class="student-row" onclick="showStudentFicha('${s.id}')">

      <div class="s-course">${esc(courseStr)}<em>${levelStr?levelStr+' · ':''} ${aulas} aula${aulas!==1?'s':''}</em></div>
      <div class="s-next">${esc(nextStr)}<small>${esc(nextState)}</small></div>

}

function renderLessons(q='',periodo='todas'){
  const query=String(q||'').toLowerCase();
  const tod=today();
  const d=new Date(tod);const dow=d.getDay();
  const seg=new Date(d);seg.setDate(d.getDate()-(dow===0?6:dow-1));
  const dom=new Date(seg);dom.setDate(seg.getDate()+6);
  const segStr=seg.toISOString().slice(0,10);
  const domStr=dom.toISOString().slice(0,10);

function renderMaterials(q=''){
  const query=String(q||'').toLowerCase();
  const mats=DB.materials.filter(m=>!query||(m.title+' '+m.type+' '+(studentName(m.studentId)||'')).toLowerCase().includes(query));

  // Separar: com curso vs sem curso
  const comCurso=mats.filter(m=>{
    const l=byId(DB.lessons,m.lessonId);
    return l?.courseId||(m.plannedLessonId&&byId(DB.plannedLessons,m.plannedLessonId)?.courseId);
  });
  const semCurso=mats.filter(m=>!comCurso.includes(m));

  // Agrupar comCurso por curso → unidade → ficha
  const porCurso={};
  comCurso.forEach(m=>{
    const l=m.lessonId?byId(DB.lessons,m.lessonId):null;
    const pl=m.plannedLessonId?byId(DB.plannedLessons,m.plannedLessonId):null;
    const cid=l?.courseId||pl?.courseId||'';
    const uid2=pl?.unitId||'';
    const pid=m.plannedLessonId||'';
    if(!porCurso[cid])porCurso[cid]={units:{},outras:[]};
    if(uid2){
      if(!porCurso[cid].units[uid2])porCurso[cid].units[uid2]={planned:{},outras:[]};
      if(pid){
        if(!porCurso[cid].units[uid2].planned[pid])porCurso[cid].units[uid2].planned[pid]=[];
        porCurso[cid].units[uid2].planned[pid].push(m);
      } else {
        porCurso[cid].units[uid2].outras.push(m);
      }
    } else {
      porCurso[cid].outras.push(m);
    }
  });

  // Agrupar semCurso por aluno → data → título
  const porAluno={};
  semCurso.forEach(m=>{
    const sid=m.studentId||'__sem_aluno';
    if(!porAluno[sid])porAluno[sid]=[];
    porAluno[sid].push(m);
  });

  let html='';

  // Renderizar por curso
  const cursoIds=Object.keys(porCurso).sort((a,b)=>{
    const ca=byId(DB.courses,a)?.name||'';
    const cb=byId(DB.courses,b)?.name||'';
    return ca.localeCompare(cb);
  });

  cursoIds.forEach(cid=>{
    const c=byId(DB.courses,cid);
    const dot=c?.color?`<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${esc(c.color)};margin-right:8px;vertical-align:middle"></span>`:'';
    html+=`<div class="panel" style="margin-bottom:20px"><div class="panel-title" style="font-size:15px">${dot}${esc(c?.name||'Curso desconhecido')}</div>`;

    const {units,outras}=porCurso[cid];

    // Unidades em ordem
    const unitIds=Object.keys(units).sort((a,b)=>{
      const ua=byId(DB.units,a);const ub=byId(DB.units,b);
      return (ua?.order||0)-(ub?.order||0)||(ua?.name||'').localeCompare(ub?.name||'');
    });

    unitIds.forEach(uid2=>{
      const u=byId(DB.units,uid2);
      html+=`<div style="margin:10px 0 4px;padding:6px 0;border-bottom:1px solid var(--line,#ddd)"><span class="subtle" style="font-size:11px;text-transform:uppercase;letter-spacing:.08em">${esc(u?.code||'')} ${esc(u?.name||'Unidade')}</span></div>`;

      const {planned,outras:outrasFicha}=units[uid2];

      // Fichas em ordem
      const planIds=Object.keys(planned).sort((a,b)=>{
        const pa=byId(DB.plannedLessons,a);const pb=byId(DB.plannedLessons,b);
        return (pa?.order||0)-(pb?.order||0)||(pa?.code||'').localeCompare(pb?.code||'');
      });

      planIds.forEach(pid=>{
        const pl=byId(DB.plannedLessons,pid);
        html+=`<div style="margin:6px 0 2px;padding:4px 8px;background:var(--paper-2,#f5f2eb);font-size:12px"><b>${esc(pl?.code||'')} ${esc(pl?.title||'Aula planejada')}</b></div>`;
        html+=`<div class="list" style="margin-bottom:4px">${planned[pid].map(materialCard).join('')}</div>`;
      });

      if(outrasFicha.length){
        html+=`<div style="margin:6px 0 2px;padding:4px 8px;font-size:12px;color:#888">Outras aulas</div>`;
        html+=`<div class="list">${outrasFicha.sort((a,b)=>String(a.createdAt).localeCompare(String(b.createdAt))).map(materialCard).join('')}</div>`;
      }
    });

    if(outras.length){
      if(unitIds.length)html+=`<div style="margin:10px 0 4px;padding:6px 0;border-bottom:1px solid var(--line,#ddd)"><span class="subtle" style="font-size:11px;text-transform:uppercase;letter-spacing:.08em">Sem unidade</span></div>`;
      html+=`<div class="list">${outras.sort((a,b)=>String(a.createdAt).localeCompare(String(b.createdAt))).map(materialCard).join('')}</div>`;
    }

    html+='</div>';
  });

  // Renderizar por aluno (sem curso)
  if(Object.keys(porAluno).length){
    html+=`<div class="panel" style="margin-bottom:20px"><div class="panel-title" style="font-size:15px">Sem curso vinculado</div>`;
    Object.keys(porAluno).sort((a,b)=>(studentName(a)||'').localeCompare(studentName(b)||'')).forEach(sid=>{
      const name=studentName(sid)||'Sem aluno';
      html+=`<div style="margin:10px 0 4px;padding:6px 0;border-bottom:1px solid var(--line,#ddd)"><span class="subtle" style="font-size:11px;text-transform:uppercase;letter-spacing:.08em">${esc(name)}</span></div>`;
      const sorted=porAluno[sid].sort((a,b)=>{
        const la=byId(DB.lessons,a.lessonId);const lb=byId(DB.lessons,b.lessonId);
        return String(la?.date||'').localeCompare(String(lb?.date||''))||a.title.localeCompare(b.title);
      });
      html+=`<div class="list">${sorted.map(materialCard).join('')}</div>`;
    });
    html+='</div>';
  }

  $('page-materials').innerHTML=pageHead('Materials','Metadados no Supabase, arquivos no Drive.',`<button class="btn" onclick="openMaterialModal()">novo material</button>`)+`<div class="toolbar"><input class="search" placeholder="buscar material..." oninput="renderMaterials(this.value)" value="${esc(q)}"></div>${html||'<div class="empty">Sem materiais.</div>'}`
}

<textarea id="plStudentNotes" rows="5">${esc(p.studentNotes||'')}</textarea></div>`}else if(tab==='material'){tabContent=plannedMaterialsList(id,mats,'material',courseId,unitId)}else if(tab==='homework'){tabContent=plannedMaterialsList(id,hws,'homework',courseId,unitId)}openModal(id?'Editar aula planejada':'Nova aula planejada','Ficha pedagógica. Reutilizada toda vez que esta aula é dada pra um aluno.',`<div class="form">${tabBtns}${tabContent}${tab==='ficha'||tab==='notas'?`<button class="btn" onclick="savePlannedLesson('${courseId}','${unitId}','${id}','${tab}')">salvar</button>`:''}</div>`)}

function openRelatorioFinanceiro(){
  const meses=[];const hoje=today();
  for(let i=0;i<12;i++){const d=new Date(hoje);d.setMonth(d.getMonth()-i);meses.push(d.toISOString().slice(0,7));}
  const ym=prompt('Mês do relatório (AAAA-MM):',hoje.slice(0,7));
  if(!ym||!/^\d{4}-\d{2}$/.test(ym)){if(ym!==null)toast('Formato inválido. Use AAAA-MM.');return;}
  gerarRelatorioMensal(ym);
}

function gerarRelatorioMensal(ym){
  const biz=DB.meta?.business||{};
  const nomeMes=new Date(ym+'-15').toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  // Aulas dadas no mês (dada ou falta paga) — regime de competência
  const aulasMes=DB.lessons.filter(l=>lessonCountsForPackage(l)&&String(l.date).slice(0,7)===ym);

  // Para cada aula: valor rateado do pagamento vinculado, ou valor unitário da aula, ou defaultLessonValue do aluno
  const linhasAulas=[];
  aulasMes.sort((a,b)=>String(a.date).localeCompare(String(b.date))).forEach(l=>{
    const st=byId(DB.students,l.studentId);
    const pay=DB.payments.find(p=>p.lessonIds?.includes(l.id)&&!(p.auto&&!p.valor));
    const qtd=pay?.lessonIds?.length||1;
    // Valor: rateio do pagamento > valor da aula > valor padrão do aluno > 0
    const valorUnit=pay?(Number(pay.valor)||0)/qtd:(Number(l.value)||Number(st?.defaultLessonValue)||0);
    const status=pay?.paid?'Pago':pay?'Aguardando pagamento':'A cobrar';
    linhasAulas.push({data:fmtDate(l.date),aluno:st?.name||'—',titulo:l.title||'Aula',status,valor:valorUnit,pago:!!pay?.paid,temPagamento:!!pay});
  });

  // Regime de competência: receita = valor de TODAS as aulas dadas no mês (pagas ou não)
  // Isso reflete o trabalho feito, independente de quando o dinheiro entrou
  const totalBruto=linhasAulas.reduce((s,r)=>s+r.valor,0);
  const totalPago=linhasAulas.filter(r=>r.pago).reduce((s,r)=>s+r.valor,0);
  const totalACobrar=linhasAulas.filter(r=>!r.pago).reduce((s,r)=>s+r.valor,0);

  // KPIs baseados no total de aulas dadas (não só pagas)
  const prepMin=aulasMes.reduce((s,l)=>s+(Number(l.prepMinutes)||0),0);
  const totalHorasReais=aulasMes.length+(prepMin/60);
  const semanasDoMes=4.33;
  // Ticket médio = receita bruta do mês ÷ aulas dadas (regime competência)
  const ticketMedio=aulasMes.length?totalBruto/aulasMes.length:0;
  // Ticket real = receita bruta ÷ horas totais (aula + prep)
  const ticketReal=totalHorasReais?totalBruto/totalHorasReais:0;
  const alunosAtivos=new Set(aulasMes.map(l=>l.studentId)).size;
  const horasSemanais=totalHorasReais/semanasDoMes;

  const linhasHtml=linhasAulas.map(r=>`
    <tr class="${r.pago?'pago':'acobrar'}">
      <td>${r.data}</td>
      <td>${esc(r.aluno)}</td>
      <td>${esc(r.titulo)}</td>
      <td class="status ${r.pago?'tag-pago':'tag-pend'}">${r.status}</td>
      <td class="val">${money(r.valor)}</td>
    </tr>`).join('');

  const html=`<!doctype html><html><head><meta charset="utf-8">
  <title>Relatório · ${nomeMes}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Georgia,serif;max-width:720px;margin:40px auto;padding:32px;color:#1a1a1a;font-size:13px;line-height:1.6}
    .head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #1a1a1a;padding-bottom:14px;margin-bottom:28px}
    .head h1{font-size:20px;letter-spacing:-.3px}
    .head .meta{text-align:right;color:#666;font-size:12px;line-height:1.8}
    h2{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#999;margin:28px 0 8px;padding-bottom:6px;border-bottom:1px solid #e8e8e8}
    table{width:100%;border-collapse:collapse}
    th{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#aaa;padding:6px 10px;border-bottom:2px solid #e8e8e8;text-align:left;font-weight:normal}
    td{padding:8px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
    tr.acobrar td{color:#888}
    .val{text-align:right;font-variant-numeric:tabular-nums;font-family:Georgia,serif}
    th.val{text-align:right}

function autoCreatePendingPayments(){
  let changed=false;
  DB.students.filter(s=>s.status==='ativo').forEach(st=>{
    const allLinkedIds=new Set(DB.payments.flatMap(p=>p.lessonIds||[]));
    const unpaid=DB.lessons.filter(l=>l.studentId===st.id&&lessonCountsForPackage(l)&&!allLinkedIds.has(l.id));
    const existingPending=DB.payments.find(p=>p.studentId===st.id&&!p.paid&&p.auto);
    if(unpaid.length){
      if(existingPending){
        const newIds=unpaid.map(l=>l.id);
        const same=newIds.length===existingPending.lessonIds.length&&newIds.every(id=>existingPending.lessonIds.includes(id));
        if(!same){existingPending.lessonIds=newIds;existingPending.valor=unpaid.length*(Number(st.defaultLessonValue)||0);changed=true;}
      } else {
        DB.payments.push({id:uid('pay'),studentId:st.id,paid:false,paidAt:'',method:'',notes:'',valor:unpaid.length*(Number(st.defaultLessonValue)||0),lessonIds:unpaid.map(l=>l.id),createdAt:nowIso(),auto:true});
        changed=true;
      }
    } else if(existingPending){
      DB.payments=DB.payments.filter(p=>p.id!==existingPending.id);
      changed=true;
    }
  });
  if(changed)saveLocal();
}

      ${[

function openPaymentModal(studentId,id=''){const st=byId(DB.students,studentId);if(!st)return;const editing=id?byId(DB.payments,id):null;const linkedIds=editing?new Set(editing.lessonIds):new Set();const allLinkedElsewhere=new Set();DB.payments.forEach(p=>{if(p.id!==id)p.lessonIds.forEach(lid=>allLinkedElsewhere.add(lid))});const availableLessons=DB.lessons.filter(l=>l.studentId===studentId&&!allLinkedElsewhere.has(l.id)).sort((a,b)=>String(a.date||'9999').localeCompare(String(b.date||'9999')));const defaultVal=st.defaultLessonValue||0;openModal(editing?'Editar pagamento':'Novo pagamento',`Selecione as aulas que este pagamento cobre. Inclui aulas futuras (já agendadas) e aulas a cobrar (passadas).`,`<div class="form"><div class="field"><label>Aluno</label><input value="${esc(st.name)}" disabled></div><div class="two"><div class="field"><label>Valor (R$)</label><input id="payValor" type="number" step="0.01" min="0" value="${editing?editing.valor:''}" placeholder="auto: soma das aulas"></div><div class="field"><label>Status</label><select id="payPaid"><option value="false" ${editing&&!editing.paid?'selected':''}>pendente</option><option value="true" ${editing&&editing.paid?'selected':''}>pago</option></select></div></div><div class="two"><div class="field"><label>Data do pagamento</label><input id="payDate" type="date" value="${editing?.paidAt?String(editing.paidAt).slice(0,10):today()}"></div><div class="field"><label>Método</label><input id="payMethod" value="${esc(editing?.method||'')}" placeholder="PIX, transferência, ..."></div></div><div class="field"><label>Aulas cobertas por este pagamento</label><div id="payLessonsList" style="max-height:280px;overflow-y:auto;border:1px solid var(--line,#ddd);border-radius:4px;padding:8px;background:var(--paper-2,#f8f5f0)">${availableLessons.length?availableLessons.map(l=>{const checked=linkedIds.has(l.id);const dateStr=l.date?fmtDate(l.date):'sem data';const statusBadge=l.status==='dada'?' · <span style="color:#4a6b3a">dada</span>':l.status==='cancelada'&&!l.cancelNoticeOk?' · <span style="color:#a63a2a">falta paga</span>':l.status==='agendada'?' · <span style="color:#777">agendada</span>':' · '+l.status;return `<label style="display:grid;grid-template-columns:20px 1fr;gap:6px;align-items:start;padding:6px 4px;border-bottom:1px solid var(--line-soft,#eee);font-size:13px;cursor:pointer;line-height:1.4"><input type="checkbox" class="payLessonCheck" data-id="${l.id}" data-value="${l.value||defaultVal}" ${checked?'checked':''} style="margin-top:2px"> <span><b>${dateStr}${l.startTime?' · '+l.startTime:''}</b> · ${esc(l.title||'Aula')}${statusBadge}${(l.value||defaultVal)?` <span style="color:#777;font-size:12px">(${money(l.value||defaultVal)})</span>`:''}</span></label>`}).join(''):'<div class="empty" style="padding:8px">Nenhuma aula disponível. Crie aulas pra este aluno primeiro, depois vincule.</div>'}</div><div class="meta subtle" style="margin-top:6px"><span id="payCountSummary">${linkedIds.size} aula(s) selecionada(s)</span> · <a href="#" onclick="event.preventDefault();paySelectNextN('${studentId}',4)" style="margin-left:8px">vincular próximas 4</a> · <a href="#" onclick="event.preventDefault();paySelectNextN('${studentId}',8)">próximas 8</a> · <a href="#" onclick="event.preventDefault();paySelectAllACobrar('${studentId}')">só as "a cobrar"</a></div></div><div class="field"><label>Notas (opcional)</label><textarea id="payNotes">${esc(editing?.notes||'')}</textarea></div><button class="btn" onclick="savePayment('${studentId}','${id}')">${editing?'salvar alterações':'criar pagamento'}</button></div>`);setTimeout(()=>{const cb=document.querySelectorAll('.payLessonCheck');cb.forEach(c=>c.addEventListener('change',updatePaymentSummary));updatePaymentSummary()},50)}

async function applyPlannedLesson(){const pid=$('pullPlanned')?.value;if(!pid){toast('Escolha uma aula planejada primeiro.');return}const p=byId(DB.plannedLessons,pid);if(!p){toast('Aula planejada não encontrada.');return}const copyText=$('pullCopyText')?.checked;const copyNotes=$('pullCopyNotes')?.checked;const copyMats=$('pullCopyMats')?.checked;if(copyText){if($('lessonTitle'))$('lessonTitle').value=p.title;if($('lessonUnit')){const u=byId(DB.units,p.unitId);$('lessonUnit').value=p.content||(u?u.name:'')}if($('lessonLevel')&&p.level)$('lessonLevel').value=p.level;if($('lessonCourseId')&&p.courseId)$('lessonCourseId').value=p.courseId}if(copyNotes){if($('lessonNotes'))$('lessonNotes').value=p.privateNotes||'';if($('lessonStudentNotes'))$('lessonStudentNotes').value=p.studentNotes||''}STATE._pullPlannedId=pid;STATE._pullCopyMats=copyMats;toast('Aplicado. Salve a aula pra confirmar.'+(copyMats?' Materiais serão copiados ao salvar.':''))}
function saveLesson(id=''){
  try{
    const studentEl=$('studentId'), dateEl=$('lessonDate'), timeEl=$('lessonTime'), titleEl=$('lessonTitle'), levelEl=$('lessonLevel'), unitEl=$('lessonUnit'), statusEl=$('lessonStatus'), prepEl=$('lessonPrep'), cancelEl=$('lessonCancel'), notesEl=$('lessonNotes'), courseEl=$('lessonCourseId'), valueEl=$('lessonValue'), planEl=$('lessonPlanStatus'), studentNotesEl=$('lessonStudentNotes');
    if(!studentEl){toast('Erro: campo de aluno não encontrado. Reabra a janela da aula.');log('saveLesson: studentId inexistente','error');return}

    l.studentId=sid;
    l.courseId=(courseEl&&courseEl.value)||byId(DB.students,sid)?.courseId||'';
    l.date=(dateEl&&dateEl.value)||today();
    l.startTime=(timeEl&&timeEl.value)||'';
    l.title=((titleEl&&titleEl.value)||'').trim()||'Aula';
    l.level=((levelEl&&levelEl.value)||'').trim()||(byId(DB.students,sid)?.activeCourseLevel||'');
    l.unit=((unitEl&&unitEl.value)||'').trim();

    l.prepMinutes=Number((prepEl&&prepEl.value)||0)||0;

    l.planStatus=(planEl&&planEl.value)||l.planStatus||'a planejar';

    l.materialsStatus=l.materialsStatus||'pendente';
    l.studentPortalVisible=l.studentPortalVisible!==false;
    if(!l.paymentId)l.paymentId='';
    // Aplicar puxada de aula planejada (se houve)
    const isNew=!id&&!DB.lessons.some(x=>x.id===l.id);
    if(isNew&&STATE._pullPlannedId&&STATE._pullCopyMats){
      const sourceMats=DB.materials.filter(m=>m.plannedLessonId===STATE._pullPlannedId&&!m.studentId);
      const st=byId(DB.students,sid);

      if(st?.email&&newMat.studentVisible&&STATE.driveReady){for(const a of newMat.attachments||[]){if(a.driveId){driveShare(a.driveId,st.email,newMat.downloadAllowed!==false).then(ok=>{if(ok){a.sharedWith=a.sharedWith||[];if(!a.sharedWith.includes(st.email))a.sharedWith.push(st.email);scheduleSave();}});}}}});
      log('Materiais copiados da aula planejada: '+sourceMats.length,'ok');
    }
    if(isNew&&STATE._pullPlannedId){l.plannedLessonId=STATE._pullPlannedId}
    STATE._pullPlannedId=null;STATE._pullCopyMats=false;
    if(isNew)DB.lessons.push(l);
    saveLocal();
    closeModal();
    STATE.page='lessons';
    showPage('lessons');
    setTimeout(()=>saveRemoteAll(),80);
    toast('Aula salva localmente. Sincronizando…');
    log('Aula salva localmente: '+l.title,'ok');
  }catch(err){
    console.error('saveLesson failed',err);
    log('Erro ao salvar aula: '+(err.message||err),'error');
    toast('Erro ao salvar aula: '+(err.message||err));
  }
}

async function attachFileToCurrentMaterial(file){const m=byId(DB.materials,STATE.currentMaterialId);if(!file||!m)return;if(!STATE.driveReady){toast('Conecte o Google Drive primeiro (botão no topo) e tente novamente.');return}const att=await driveUploadFile(file,m.studentId);if(att){m.attachments=[att];if(m.studentId&&m.studentVisible){const st=byId(DB.students,m.studentId);if(st?.email&&att.driveId){if(await driveShare(att.driveId,st.email,true)){att.sharedWith=[st.email];}}}scheduleSave();toast('Arquivo enviado ao Drive.');}else{toast('Falha no upload. Tente reconectar o Drive.');}}
