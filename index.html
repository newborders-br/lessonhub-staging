uted);line-height:1.5}.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}.badge{border:1px solid var(--line);padding:3px 7px;font-size:10px;text-transform:uppercase;letter-spacing:.11em;color:var(--muted);background:rgba(255,255,255,.35)}.badge.ok{color:var(--ok);border-color:rgba(40,116,90,.35)}.badge.bad{color:var(--bad);border-color:rgba(157,45,37,.35)}.badge.warn{color:var(--warn);border-color:rgba(160,108,27,.35)}.badge.blue{color:var(--blue);border-color:rgba(49,95,143,.35)}.empty{padding:34px;text-align:center;border:1px dashed var(--line);color:var(--soft);background:rgba(255,255,255,.35)}

body.student-mode .shell{display:none}body:not(.student-mode) .student-shell{display:none}.student-hero{border:1px solid var(--ink);padding:24px;margin-bottom:16px;background:rgba(255,253,249,.72);box-shadow:var(--shadow)}.student-hero h2{font-size:46px;line-height:.95}.student-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}.student-lesson,.student-resource{border:1px solid var(--line);background:rgba(255,255,255,.35);padding:15px;margin-bottom:10px}.student-lesson-title{font-family:Georgia,serif;font-size:24px;letter-spacing:-.04em}.viewer-frame iframe{width:min(1000px,calc(100vw - 28px));height:calc(100vh - 100px);border:0;background:white;box-shadow:0 25px 70px rgba(24,21,18,.12)}.danger-note{border-left:1px solid var(--bad);padding-left:12px;color:var(--bad)}
@media(max-width:900px){.shell,.student-shell{width:min(100% - 24px,1440px);padding-top:18px}.mast,.grid,.two,.three,.student-grid{grid-template-columns:1fr}.datebox{text-align:left}.brand h1{font-size:42px}.page-head{display:block}.actions{margin-left:0}.login-logo{font-size:56px}}
</style>

<script>
'use strict';
const CONFIG={
  VERSION:'1.11.3-alpha',
  ADMIN_EMAIL:'zruc04@gmail.com',
  LOCAL_KEY:'lessonhub_v1_11_alpha_data',
  LEGACY_KEYS:['lessonhub_v1_4_data','lessonhub_v1_3_2_data','lessonhub_v1_3_1_data','lessonhub_v1_3_data','lessonhub_v1_2_data','aula_api_v1_data','aula_api_v0_1_data'],
  DRIVE_CLIENT_ID:'202101444725-2v9bi94fms696a02593gb1ks3ukk3j45.apps.googleusercontent.com',
  DRIVE_SCOPES:'openid email profile https://www.googleapis.com/auth/drive.file',
  DRIVE_FOLDER:'LessonHub',
  DRIVE_DATA_FILE:'lessonhub_data.json',
  DRIVE_PORTAL_FOLDER:'portals',
  SB_URL:'https://ezgaqcxrbticangnnryo.supabase.co',
  SB_KEY:'sb_publishable_k-Ch1aS1UkRR-OlDzAbH-Q_B4a8e7kE',
  SB_TABLE:'lh_backups'
};
let DB=blankDB();
let STATE={page:'dashboard',mode:'boot',userEmail:'',tokenClient:null,accessToken:null,driveReady:false,driveFolderId:null,driveDataFileId:null,drivePortalFolderId:null,sb:null,saveTimer:null,source:'none',logs:[],studentPortal:null,studentPage:'today',currentMaterialId:null,lastSupabaseSave:null,lastDriveSave:null,lastError:'',silentTried:false};
function $(id){return document.getElementById(id)}
function uid(p='id'){return p+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8)}
function today(){return new Date().toISOString().slice(0,10)}
function nowIso(){return new Date().toISOString()}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function slug(s){return String(s||'arquivo').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,60)||'arquivo'}
function sanitizeEmail(email){return String(email||'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'student'}
function fmtDate(d){if(!d)return '—';const p=String(d).slice(0,10).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d}
function fmtShort(d){if(!d)return '—';const p=String(d).slice(0,10).split('-');return p.length===3?`${p[2]}/${p[1]}`:d}
function money(n){return (Number(n)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function badge(t,c=''){return `<span class="badge ${c}">${esc(t)}</span>`}
function byId(arr,id){return (arr||[]).find(x=>x.id===id)}
function log(msg,type='info'){STATE.logs.unshift({at:nowIso(),msg,type});STATE.logs=STATE.logs.slice(0,60);console.log('[LessonHub]',msg);renderHealthSafe()}
function toast(msg){const el=$('toast');el.textContent=msg;el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',3000)}
function status(msg,ms=2500){const el=$('statusbar');el.textContent=msg;el.style.display='block';clearTimeout(el._t);if(ms)el._t=setTimeout(()=>el.style.display='none',ms)}
function showGate(title='Carregando LessonHub…',text='Aguardando autenticação. Nenhum dado sensível aparece antes do login.'){const g=$('privacyGate');if(!g)return;g.classList.remove('hidden');const h=g.querySelector('h2');if(h)h.textContent=title;const p=$('privacyText');if(p)p.textContent=text;$('loginScreen')?.classList.add('hidden');$('adminShell')?.classList.add('hidden');$('studentShell')?.classList.add('hidden')}
function rememberSession(email,role){try{localStorage.setItem('lessonhub_last_email',String(email||''));localStorage.setItem('lessonhub_last_role',String(role||''));}catch(e){}}
function lastSession(){try{return{email:localStorage.getItem('lessonhub_last_email')||'',role:localStorage.getItem('lessonhub_last_role')||''}}catch(e){return{email:'',role:''}}}
function forgetSession(){try{localStorage.removeItem('lessonhub_last_email');localStorage.removeItem('lessonhub_last_role')}catch(e){};showLogin('Sessão local encerrada. Entre com Google novamente.')}
window.forgetSession=forgetSession;

function dataCount(d=DB){return ['students','lessons','materials','packages','plannedLessons','courseUnits','assessments','formLogs'].reduce((s,k)=>s+((d[k]||[]).length),0)}
function sizeOf(d=DB){return new Blob([JSON.stringify(d)]).size}
function newer(a,b){return String(a?.meta?.updatedAt||'')>String(b?.meta?.updatedAt||'')}
function blankDB(){return{meta:{version:CONFIG.VERSION,updatedAt:nowIso(),createdAt:nowIso(),authority:'Supabase JSON backend · Drive files · local cache'},students:[],lessons:[],materials:[],packages:[],plannedLessons:[],courseUnits:[],assessments:[],formLogs:[]}}
function normalizeDB(input){const d=input&&typeof input==='object'?input:blankDB();d.meta=d.meta||{};d.meta.version=CONFIG.VERSION;d.meta.authority='Supabase JSON backend · Drive files · local cache';['students','lessons','materials','packages','plannedLessons','courseUnits','assessments','formLogs'].forEach(k=>d[k]=Array.isArray(d[k])?d[k]:[]);d.students.forEach(s=>{s.id=s.id||uid('student');s.name=s.name||'Aluno';s.email=String(s.email||s.loginEmail||'').trim().toLowerCase();s.status=s.status||'ativo';s.activeCourseLevel=s.activeCourseLevel||s.level||'';s.activeCourseName=s.activeCourseName||s.activeCourseLevel||'';s.defaultLessonValue=Number(s.defaultLessonValue)||0;s.goal=s.goal||'';s.notes=s.notes||s.importantNotes||''});d.lessons.forEach(l=>{l.id=l.id||uid('lesson');l.studentId=l.studentId||'';l.date=l.date||'';l.startTime=l.startTime||l.time||'';l.title=l.title||'Aula';l.level=l.level||'';l.unit=l.unit||l.topic||'';l.status=l.status||l.pedStatus||'agendada';l.planStatus=l.planStatus||'a planejar';l.finStatus=l.finStatus||'paga';l.value=Number(l.value)||0;l.notes=l.notes||'';l.materialsStatus=l.materialsStatus||'pendente';l.studentPortalVisible=l.studentPortalVisible!==false});d.materials.forEach(m=>{m.id=m.id||uid('mat');m.title=m.title||'Material';m.type=m.type||'material';m.studentId=m.studentId||'';m.lessonId=m.lessonId||'';m.plannedLessonId=m.plannedLessonId||'';m.studentVisible=typeof m.studentVisible==='boolean'?m.studentVisible:true;m.downloadAllowed=typeof m.downloadAllowed==='boolean'?m.downloadAllowed:true;m.attachments=Array.isArray(m.attachments)?m.attachments:[];m.notes=m.notes||'';m.createdAt=m.createdAt||nowIso()});d.packages.forEach(p=>{p.id=p.id||uid('pack');p.studentId=p.studentId||'';p.month=p.month||today().slice(0,7);p.lessonCount=Number(p.lessonCount)||4;p.amount=Number(p.amount)||0;p.status=p.status||'pendente';p.nextPaymentDate=p.nextPaymentDate||''});return d}
function saveLocal(){DB.meta.updatedAt=nowIso();DB.meta.version=CONFIG.VERSION;localStorage.setItem(CONFIG.LOCAL_KEY,JSON.stringify(DB));localStorage.setItem('lessonhub_v1_4_data',JSON.stringify(DB));}
function loadLocal(){for(const k of [CONFIG.LOCAL_KEY,...CONFIG.LEGACY_KEYS]){try{const raw=localStorage.getItem(k);if(raw){const d=normalizeDB(JSON.parse(raw));if(dataCount(d)>0||k===CONFIG.LOCAL_KEY)return d}}catch(e){}}return blankDB()}
function scheduleSave(){saveLocal();clearTimeout(STATE.saveTimer);STATE.saveTimer=setTimeout(async()=>{await saveRemoteAll()},900);render()}
async function saveRemoteAll(){if(STATE.mode!=='admin')return;await sbSaveDB();await driveSaveDB()}
function studentName(id){return byId(DB.students,id)?.name||'—'}
function lessonTitle(l){return `${studentName(l.studentId)} — ${fmtShort(l.date)}${l.startTime?' · '+l.startTime:''}`}
function lessonMaterials(l){return DB.materials.filter(m=>m.studentVisible&&(m.lessonId===l.id || (!m.lessonId&&m.studentId===l.studentId))) }
function financeForStudent(id){const packs=DB.packages.filter(p=>p.studentId===id).sort((a,b)=>String(b.month).localeCompare(String(a.month)));const current=packs[0];const pending=DB.lessons.filter(l=>l.studentId===id&&l.finStatus==='pendente').reduce((s,l)=>s+(Number(l.value)||0),0);return{current,packs,pending,status:pending>0||current?.status==='pendente'?'pendente':'em dia'}}
function snapshotForStudent(studentId){const st=byId(DB.students,studentId);if(!st||!st.email)return null;const lessons=DB.lessons.filter(l=>l.studentId===studentId&&l.studentPortalVisible!==false).sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));const mats=DB.materials.filter(m=>m.studentVisible&&(m.studentId===studentId||lessons.some(l=>l.id===m.lessonId))).map(m=>({...m}));return{meta:{kind:'studentPortal',version:CONFIG.VERSION,generatedAt:nowIso(),studentEmail:st.email},student:{id:st.id,name:st.name,email:st.email,course:st.activeCourseName,level:st.activeCourseLevel},lessons,materials:mats,finance:financeForStudent(studentId)}}
function showAdmin(){STATE.mode='admin';document.body.classList.remove('student-mode');$('privacyGate').classList.add('hidden');$('loginScreen').classList.add('hidden');$('adminShell').classList.remove('hidden');$('studentShell').classList.add('hidden');render()}
function showStudent(){STATE.mode='student';document.body.classList.add('student-mode');$('privacyGate').classList.add('hidden');$('loginScreen').classList.add('hidden');$('studentShell').classList.remove('hidden');$('adminShell').classList.add('hidden');renderStudent()}
function showLogin(msg=''){STATE.mode='login';$('privacyGate').classList.add('hidden');$('loginScreen').classList.remove('hidden');$('loginMsg').textContent=msg}
function openModal(title,sub,body){$('modalTitle').textContent=title;$('modalSub').textContent=sub||'';$('modalBody').innerHTML=body;$('modal').style.display='flex'}
function closeModal(){$('modal').style.display='none'}
function closeViewer(){$('viewerModal').style.display='none';$('viewerFrame').innerHTML=''}

function sb(){if(!STATE.sb)STATE.sb=supabase.createClient(CONFIG.SB_URL,CONFIG.SB_KEY);return STATE.sb}
async function sbRead(email){try{const {data,error}=await sb().from(CONFIG.SB_TABLE).select('data,updated_at').eq('user_email',String(email).toLowerCase()).maybeSingle();if(error)throw error;return data?.data||null}catch(e){STATE.lastError=e.message||String(e);log('Supabase read falhou: '+STATE.lastError,'error');return null}}
async function sbWrite(email,data){try{const payload={user_email:String(email).toLowerCase(),data,updated_at:nowIso()};const {error}=await sb().from(CONFIG.SB_TABLE).upsert(payload,{onConflict:'user_email'});if(error)throw error;STATE.lastSupabaseSave=new Date();log('Supabase salvo para '+email,'ok');return true}catch(e){STATE.lastError=e.message||String(e);log('Supabase save falhou: '+STATE.lastError+' · dados mantidos no cache/Drive quando possível','error');return false}}
async function sbSaveDB(){if(!STATE.userEmail)return false;DB.meta.updatedAt=nowIso();return sbWrite(STATE.userEmail,DB)}
async function publishPortal(studentId){const snap=snapshotForStudent(studentId);if(!snap){toast('Aluno sem e-mail.');return false}let okSb=await sbWrite(snap.student.email,snap);let okDrive=false;if(STATE.driveReady){okDrive=await driveSavePortal(snap)}else if(STATE.accessToken){await driveSetup();okDrive=await driveSavePortal(snap)}if(okSb||okDrive){toast(okSb&&okDrive?'Portal publicado no Supabase e Drive.':okDrive?'Portal publicado no Drive. Supabase bloqueado por RLS.':'Portal salvo no Supabase.');return true}toast('Portal não publicado. Verifique Supabase/Drive.');return false}
async function publishAllPortals(){let ok=0;for(const s of DB.students.filter(s=>s.email)){if(await publishPortal(s.id))ok++}toast(`${ok} portal(is) publicado(s).`);render()}

function initGoogleDrive(){STATE.tokenClient=google.accounts.oauth2.initTokenClient({client_id:CONFIG.DRIVE_CLIENT_ID,scope:CONFIG.DRIVE_SCOPES,callback:handleGoogleToken})}
function driveSignIn(){if(STATE.tokenClient)STATE.tokenClient.requestAccessToken({prompt:'consent'});else showLogin('Aguarde o carregamento do Google.')} window.driveSignIn=driveSignIn;
async function handleGoogleToken(resp){if(resp.error){showLogin('Erro de autenticação.');return}showGate('Carregando LessonHub…','Login recebido. Carregando dados e sincronizações.');STATE.accessToken=resp.access_token;let email='';try{const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+STATE.accessToken}});if(r.ok){const u=await r.json();email=String(u.email||'').toLowerCase()}}catch(e){}STATE.userEmail=email;if(!email){showLogin('Não consegui ler o e-mail da conta.');return}log('Login Google: '+email,'ok');if(email===CONFIG.ADMIN_EMAIL){rememberSession(email,'admin');await bootAdmin()}else{rememberSession(email,'student');await bootStudent(email)}}
async function driveApi(path,opts={}){const r=await fetch('https://www.googleapis.com/drive/v3/'+path,{...opts,headers:{Authorization:'Bearer '+STATE.accessToken,...(opts.headers||{})}});if(!r.ok)throw new Error('Drive '+r.status);return r.json()}
async function driveEnsureFolder(name,parentId=''){const q=parentId?`name='${name}' and '${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`:`name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;const found=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name)');if(found.files?.[0])return found.files[0].id;const body={name,mimeType:'application/vnd.google-apps.folder'};if(parentId)body.parents=[parentId];const made=await driveApi('files?fields=id',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return made.id}
async function driveSetup(){try{STATE.driveFolderId=await driveEnsureFolder(CONFIG.DRIVE_FOLDER);STATE.drivePortalFolderId=await driveEnsureFolder(CONFIG.DRIVE_PORTAL_FOLDER,STATE.driveFolderId);STATE.driveDataFileId=await driveEnsureJsonFile(CONFIG.DRIVE_DATA_FILE,STATE.driveFolderId);STATE.driveReady=true;log('Drive pronto','ok');return true}catch(e){STATE.lastError=e.message||String(e);log('Drive setup falhou: '+STATE.lastError,'error');return false}}
async function driveEnsureJsonFile(name,folderId){const q=`name='${name}' and '${folderId}' in parents and trashed=false`;const r=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name)');if(r.files?.[0])return r.files[0].id;const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name,parents:[folderId]})],{type:'application/json'}));form.append('file',new Blob([JSON.stringify(blankDB())],{type:'application/json'}));const res=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});return (await res.json()).id}
async function driveReadJson(fileId){try{const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:'Bearer '+STATE.accessToken}});if(!r.ok)return null;return await r.json()}catch(e){return null}}
async function driveWriteJson(fileId,name,data){if(!fileId)return false;try{const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name})],{type:'application/json'}));form.append('file',new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));const r=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`,{method:'PATCH',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});if(!r.ok)throw new Error('Drive write '+r.status);STATE.lastDriveSave=new Date();log('Drive JSON salvo','ok');return true}catch(e){STATE.lastError=e.message||String(e);log('Drive write falhou: '+STATE.lastError,'error');return false}}
async function driveSaveDB(){if(!STATE.driveReady)return false;DB.meta.updatedAt=nowIso();return driveWriteJson(STATE.driveDataFileId,CONFIG.DRIVE_DATA_FILE,DB)}
async function driveSavePortal(snap){if(!STATE.driveReady||!snap?.student?.email)return false;try{const name='portal_'+sanitizeEmail(snap.student.email)+'.json';const q=`name='${name}' and '${STATE.drivePortalFolderId}' in parents and trashed=false`;const found=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name)');let id=found.files?.[0]?.id;if(!id){const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name,parents:[STATE.drivePortalFolderId]})],{type:'application/json'}));form.append('file',new Blob([JSON.stringify(snap,null,2)],{type:'application/json'}));const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});id=(await r.json()).id}else{await driveWriteJson(id,name,snap)}await driveShare(id,snap.student.email,false);return true}catch(e){log('Drive portal falhou: '+(e.message||e),'error');return false}}
async function driveUploadFile(file,studentId=''){if(!STATE.driveReady||!file)return null;try{const st=byId(DB.students,studentId);const folderName=studentId?`alunos-${slug(st?.name||studentId)}`:'biblioteca';const parent=await driveEnsureFolder(folderName,STATE.driveFolderId);const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name:file.name,parents:[parent]})],{type:'application/json'}));form.append('file',file);const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink,mimeType,name,size',{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});if(!r.ok)throw new Error('Upload '+r.status);const data=await r.json();log('Arquivo enviado ao Drive: '+file.name,'ok');return{id:data.id,name:data.name||file.name,type:data.mimeType||file.type,size:Number(data.size)||file.size,driveId:data.id,driveLink:data.webViewLink||'',createdAt:nowIso()}}catch(e){STATE.lastError=e.message||String(e);log('Upload Drive falhou: '+STATE.lastError,'error');return null}}
async function driveShare(fileId,email,allowDownload=true){try{await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}/permissions?sendNotificationEmail=false`,{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken,'Content-Type':'application/json'},body:JSON.stringify({type:'user',role:'reader',emailAddress:email})});if(!allowDownload){await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?fields=id`,{method:'PATCH',headers:{Authorization:'Bearer '+STATE.accessToken,'Content-Type':'application/json'},body:JSON.stringify({copyRequiresWriterPermission:true})})}return true}catch(e){log('Share falhou: '+(e.message||e),'error');return false}}
async function driveFindPortal(email){try{const name='portal_'+sanitizeEmail(email)+'.json';const q=`name='${name}' and trashed=false`;const r=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name)');if(!r.files?.[0])return null;return driveReadJson(r.files[0].id)}catch(e){return null}}

async function bootAdmin(){status('Carregando dados…',0);await driveSetup();const local=loadLocal();const remote=await sbRead(STATE.userEmail);let driveData=null;if(STATE.driveReady)driveData=await driveReadJson(STATE.driveDataFileId);let chosen=normalizeDB(local);STATE.source='local';if(remote&&dataCount(remote)>0&&(dataCount(chosen)===0||newer(remote,chosen))){chosen=normalizeDB(remote);STATE.source='supabase'}if(driveData&&dataCount(driveData)>0&&(dataCount(chosen)===0||newer(driveData,chosen))){chosen=normalizeDB(driveData);STATE.source='drive'}DB=chosen;saveLocal();status('Fonte: '+STATE.source);showAdmin();await sbSaveDB();}
function cacheStudentPortal(email,snap){try{localStorage.setItem('lessonhub_student_portal_'+sanitizeEmail(email),JSON.stringify({cachedAt:nowIso(),snap}))}catch(e){}}
function loadCachedStudentPortal(email){try{const raw=localStorage.getItem('lessonhub_student_portal_'+sanitizeEmail(email));if(!raw)return null;const o=JSON.parse(raw);return o&&o.snap?o.snap:null}catch(e){return null}}
async function bootStudent(email){status('Carregando portal do aluno…',0);let snap=await sbRead(email);if(!snap||snap.meta?.kind!=='studentPortal'){await driveSetup();snap=await driveFindPortal(email)}if(snap&&snap.student){STATE.studentPortal=snap;cacheStudentPortal(email,snap);showStudent();status('Portal carregado');return}
  const cached=loadCachedStudentPortal(email);if(cached&&cached.student){STATE.studentPortal=cached;showStudent();status('Portal carregado do cache local. Sem conexão com Supabase/Drive.',5000);log('Portal do aluno restaurado do cache para '+email,'ok');return}
  try{const localDB=loadLocal();const st=(localDB.students||[]).find(s=>String(s.email||'').toLowerCase()===String(email).toLowerCase());if(st){const savedDB=DB;DB=localDB;const live=snapshotForStudent(st.id);DB=savedDB;if(live){STATE.studentPortal=live;cacheStudentPortal(email,live);showStudent();status('Portal gerado a partir dos dados locais deste navegador.',5000);log('Portal do aluno gerado do DB local para '+email,'ok');return}}}catch(e){}
  STATE.studentPortal={unauthorized:true,email};showStudent();status('Acesso não autorizado')}

function buildNav(){const pages=[['dashboard','Today'],['students','Students'],['lessons','Lessons'],['materials','Materials'],['portal','Student Portal'],['health','Health']];$('nav').innerHTML=pages.map(p=>`<button data-page="${p[0]}" onclick="showPage('${p[0]}')">${p[1]}</button>`).join('')+`<div class="actions"><button class="linkbtn" onclick="exportBackup()">backup</button><button class="linkbtn" onclick="backupInput.click()">importar</button><button class="linkbtn" onclick="driveSignIn()">reconectar Drive</button><button class="linkbtn" onclick="forgetSession()">sair</button></div>`}
function showPage(p){STATE.page=p;document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));$('page-'+p)?.classList.add('active');document.querySelectorAll('[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===p));render()}
function pageHead(title,sub,actions=''){return `<div class="page-head"><div class="page-title"><h2>${title}</h2><p>${sub}</p></div><div class="toolbar-left">${actions}</div></div>`}
function render(){if(STATE.mode!=='admin')return;buildNav();document.querySelectorAll('[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===STATE.page));renderDashboard();renderStudents();renderLessons();renderMaterials();renderPortalAdmin();renderHealth()}
function renderDashboard(){const todayLessons=DB.lessons.filter(l=>l.date===today());const toPlan=DB.lessons.filter(l=>l.planStatus==='a planejar');$('page-dashboard').innerHTML=pageHead('Today','Núcleo consolidado: alunos, aulas, materiais, portal e sincronização.',`<button class="btn" onclick="openLessonModal()">nova aula</button>`)+`<div class="grid"><div class="card"><div class="num">${DB.students.length}</div><div class="label">alunos</div></div><div class="card"><div class="num">${todayLessons.length}</div><div class="label">aulas hoje</div></div><div class="card"><div class="num">${toPlan.length}</div><div class="label">a planejar</div></div><div class="card"><div class="num">${STATE.source}</div><div class="label">fonte carregada</div></div></div><div class="two"><div class="panel"><div class="panel-title">Aulas de hoje</div><div class="list">${todayLessons.map(lessonCard).join('')||'<div class="empty">Nenhuma aula hoje.</div>'}</div></div><div class="panel"><div class="panel-title">Últimos logs</div>${logList()}</div></div>`}
function renderStudents(q=''){const query=String(q).toLowerCase();const rows=DB.students.filter(s=>(s.name+' '+s.email+' '+s.activeCourseName).toLowerCase().includes(query)).sort((a,b)=>a.name.localeCompare(b.name));$('page-students').innerHTML=pageHead('Students','Cadastro essencial, e-mail do portal e curso ativo.',`<button class="btn" onclick="openStudentModal()">novo aluno</button>`)+`<div class="toolbar"><input class="search" placeholder="buscar aluno..." oninput="renderStudents(this.value)"></div><div class="list">${rows.map(studentCard).join('')||'<div class="empty">Nenhum aluno cadastrado.</div>'}</div>`}
function studentCard(s){const lessons=DB.lessons.filter(l=>l.studentId===s.id);const next=lessons.filter(l=>!l.date||l.date>=today()).sort((a,b)=>String(a.date).localeCompare(String(b.date)))[0];return `<div class="item"><div class="item-title">${esc(s.name)}</div><div class="badges">${badge(s.status)}${badge(s.email||'sem e-mail',s.email?'ok':'warn')}${badge(s.activeCourseName||s.activeCourseLevel||'sem curso','blue')}${badge(`${lessons.length} aulas`)}</div><div class="meta">${next?`Próxima: ${fmtDate(next.date)} ${esc(next.startTime||'')}`:'Sem próxima aula.'}<br>${esc(s.goal||'Sem objetivo registrado.')}</div><div class="row-actions"><button class="linkbtn" onclick="openStudentModal('${s.id}')">editar</button><button class="linkbtn" onclick="openLessonModal('${s.id}')">nova aula</button><button class="linkbtn" onclick="publishPortal('${s.id}')">publicar portal</button><button class="linkbtn" onclick="previewStudent('${s.id}')">preview</button><button class="linkbtn" onclick="deleteStudent('${s.id}')">excluir</button></div></div>`}
function renderLessons(q=''){const query=String(q).toLowerCase();const rows=DB.lessons.filter(l=>(l.title+' '+studentName(l.studentId)+' '+l.date+' '+l.status).toLowerCase().includes(query)).sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')));$('page-lessons').innerHTML=pageHead('Lessons','Aulas reais salvas no DB único.',`<button class="btn" onclick="openLessonModal()">nova aula</button>`)+`<div class="toolbar"><input class="search" placeholder="buscar aula..." oninput="renderLessons(this.value)"></div><div class="list">${rows.map(lessonCard).join('')||'<div class="empty">Sem aulas.</div>'}</div>`}
function lessonCard(l){return `<div class="item"><div class="item-title">${esc(lessonTitle(l))}</div><div class="badges">${badge(l.title,'blue')}${badge(l.status)}${badge(l.planStatus||'')}${badge(l.finStatus||'')}${badge(money(l.value))}${badge(lessonMaterials(l).length+' materiais','ok')}</div><div class="meta">${esc(l.notes||'Sem notas.')}</div><div class="row-actions"><button class="linkbtn" onclick="openLessonModal('${l.studentId}','${l.id}')">editar</button><button class="linkbtn" onclick="openMaterialModal('${l.studentId}','','${l.id}')">material</button><button class="linkbtn" onclick="releaseLesson('${l.id}')">liberar</button><button class="linkbtn" onclick="deleteItem('lessons','${l.id}')">excluir</button></div></div>`}
function renderMaterials(q=''){const query=String(q).toLowerCase();const rows=DB.materials.filter(m=>(m.title+' '+m.type+' '+studentName(m.studentId)).toLowerCase().includes(query)).sort((a,b)=>String(b.createdAt||'').localeCompare(String(a.createdAt||'')));$('page-materials').innerHTML=pageHead('Materials','Metadados no Supabase, arquivos no Drive.',`<button class="btn" onclick="openMaterialModal()">novo material</button>`)+`<div class="toolbar"><input class="search" placeholder="buscar material..." oninput="renderMaterials(this.value)"></div><div class="list">${rows.map(materialCard).join('')||'<div class="empty">Sem materiais.</div>'}</div>`}
function materialCard(m){const att=m.attachments?.[0];return `<div class="item"><div class="item-title">${esc(m.title)}</div><div class="badges">${badge(m.type,'blue')}${badge(studentName(m.studentId))}${badge(m.studentVisible?'visível aluno':'interno',m.studentVisible?'ok':'warn')}${badge(att?.driveLink?'Drive':'sem arquivo',att?.driveLink?'ok':'warn')}</div><div class="meta">${esc(m.notes||'')}${att?`<br>Arquivo: ${esc(att.name||'arquivo')}`:''}</div><div class="row-actions"><button class="linkbtn" onclick="openMaterialViewer('${m.id}')">abrir</button><button class="linkbtn" onclick="openMaterialModal('${m.studentId||''}','${m.id}','${m.lessonId||''}')">editar</button><button class="linkbtn" onclick="replaceMaterial('${m.id}')">substituir arquivo</button><button class="linkbtn" onclick="toggleMaterial('${m.id}')">${m.studentVisible?'ocultar':'mostrar'}</button><button class="linkbtn" onclick="deleteItem('materials','${m.id}')">excluir</button></div></div>`}
function renderPortalAdmin(){const rows=DB.students.filter(s=>s.email);$('page-portal').innerHTML=pageHead('Student Portal','Publica snapshots filtrados por e-mail no Supabase. Drive continua abrindo arquivos.',`<button class="btn" onclick="publishAllPortals()">publicar todos</button>`)+`<div class="panel"><div class="panel-title">Portais</div><div class="list">${rows.map(s=>{const snap=snapshotForStudent(s.id);return `<div class="item"><div class="item-title">${esc(s.name)}</div><div class="badges">${badge(s.email,'blue')}${badge((snap?.lessons||[]).length+' aulas')}${badge((snap?.materials||[]).length+' materiais','ok')}</div><div class="row-actions"><button class="linkbtn" onclick="publishPortal('${s.id}')">publicar</button><button class="linkbtn" onclick="previewStudent('${s.id}')">preview</button></div></div>`}).join('')||'<div class="empty">Cadastre e-mail nos alunos.</div>'}</div></div>`}
function renderHealth(){const html=pageHead('Health','Diagnóstico do núcleo consolidado.',`<button class="btn" onclick="manualSaveAll()">salvar agora</button><button class="btn soft" onclick="exportBackup()">backup JSON</button>`)+`<div class="grid"><div class="card"><div class="num">${CONFIG.VERSION}</div><div class="label">versão</div></div><div class="card"><div class="num">${STATE.source}</div><div class="label">fonte inicial</div></div><div class="card"><div class="num">${STATE.driveReady?'OK':'—'}</div><div class="label">Drive files</div></div><div class="card"><div class="num">${sizeOf()}</div><div class="label">bytes JSON</div></div></div><div class="two"><div class="panel"><div class="panel-title">Arquitetura</div><div class="meta"><b>Supabase:</b> backend JSON de dados e portais. Se aparecer RLS, precisa liberar policy no Supabase.<br><b>Drive:</b> arquivos reais, links e fallback JSON/portal.<br><b>localStorage:</b> cache operacional.<br><b>Usuário:</b> ${esc(STATE.userEmail||'—')}<br><b>Último Supabase:</b> ${STATE.lastSupabaseSave?STATE.lastSupabaseSave.toLocaleTimeString('pt-BR'):'—'}<br><b>Último Drive:</b> ${STATE.lastDriveSave?STATE.lastDriveSave.toLocaleTimeString('pt-BR'):'—'}<br><b>Erro:</b> ${esc(STATE.lastError||'—')}</div></div><div class="panel"><div class="panel-title">Logs</div>${logList()}</div></div>`;$('page-health').innerHTML=html}
function renderHealthSafe(){if(STATE.mode==='admin'&&STATE.page==='health')try{renderHealth()}catch(e){}}
function logList(){return `<div class="list">${STATE.logs.slice(0,12).map(l=>`<div class="meta"><b>${new Date(l.at).toLocaleTimeString('pt-BR')}</b> · ${esc(l.msg)}</div>`).join('')||'<div class="empty">Sem logs ainda.</div>'}</div>`}
async function manualSaveAll(){saveLocal();await saveRemoteAll();toast('Salvo.')} 

function studentOptions(sel='',allowEmpty=false){if(!allowEmpty&&!sel&&DB.students.length===1)sel=DB.students[0].id;return `<select id="studentId"><option value="">${allowEmpty?'Biblioteca geral / sem aluno':'Selecione...'}</option>${DB.students.map(s=>`<option value="${s.id}" ${s.id===sel?'selected':''}>${esc(s.name)}</option>`).join('')}</select>`}
function openStudentModal(id=''){const s=byId(DB.students,id)||{};openModal(id?'Editar aluno':'Novo aluno','Ficha essencial para portal e aulas.',`<div class="form"><div class="field"><label>Nome</label><input id="stName" value="${esc(s.name||'')}"></div><div class="two"><div class="field"><label>E-mail do aluno</label><input id="stEmail" value="${esc(s.email||'')}"></div><div class="field"><label>Status</label><select id="stStatus">${['ativo','pausado','arquivado'].map(x=>`<option ${s.status===x?'selected':''}>${x}</option>`).join('')}</select></div></div><div class="two"><div class="field"><label>Nível ativo</label><input id="stLevel" value="${esc(s.activeCourseLevel||'')}"></div><div class="field"><label>Curso ativo</label><input id="stCourse" value="${esc(s.activeCourseName||'')}"></div></div><div class="two"><div class="field"><label>Valor padrão aula</label><input id="stValue" type="number" step="0.01" value="${s.defaultLessonValue||''}"></div><div class="field"><label>Telefone</label><input id="stPhone" value="${esc(s.phone||'')}"></div></div><div class="field"><label>Objetivo</label><textarea id="stGoal">${esc(s.goal||'')}</textarea></div><div class="field"><label>Notas internas</label><textarea id="stNotes">${esc(s.notes||'')}</textarea></div><button class="btn" onclick="saveStudent('${id}')">salvar</button></div>`)}
function saveStudent(id=''){if(!stName.value.trim())return toast('Nome obrigatório.');const s=byId(DB.students,id)||{id:uid('student'),createdAt:nowIso()};s.name=stName.value.trim();s.email=stEmail.value.trim().toLowerCase();s.status=stStatus.value;s.activeCourseLevel=stLevel.value.trim();s.activeCourseName=stCourse.value.trim()||s.activeCourseLevel;s.defaultLessonValue=Number(stValue.value)||0;s.phone=stPhone.value.trim();s.goal=stGoal.value.trim();s.notes=stNotes.value.trim();if(!id)DB.students.push(s);closeModal();scheduleSave();toast('Aluno salvo.')}
function deleteStudent(id){const s=byId(DB.students,id);if(!s)return;if(!confirm(`Excluir ${s.name}? Aulas e materiais vinculados também serão removidos do LessonHub. Arquivos no Drive não serão apagados.`))return;DB.students=DB.students.filter(x=>x.id!==id);DB.lessons=DB.lessons.filter(x=>x.studentId!==id);DB.materials=DB.materials.filter(x=>x.studentId!==id);DB.packages=DB.packages.filter(x=>x.studentId!==id);scheduleSave();toast('Aluno excluído.')}
function openLessonModal(studentId='',id=''){const l=byId(DB.lessons,id)||{};studentId=studentId||l.studentId||'';if(!studentId&&DB.students.length===1)studentId=DB.students[0].id;const st=byId(DB.students,studentId)||{};openModal(id?'Editar aula':'Nova aula','Aula real vinculada ao aluno.',`<div class="form"><div class="field"><label>Aluno</label>${studentOptions(studentId)}</div><div class="two"><div class="field"><label>Data</label><input id="lessonDate" type="date" value="${esc(l.date||today())}"></div><div class="field"><label>Horário</label><input id="lessonTime" type="time" value="${esc(l.startTime||'')}"></div></div><div class="field"><label>Título</label><input id="lessonTitle" value="${esc(l.title||'Aula')}"></div><div class="two"><div class="field"><label>Nível</label><input id="lessonLevel" value="${esc(l.level||st.activeCourseLevel||'')}"></div><div class="field"><label>Unidade / tema</label><input id="lessonUnit" value="${esc(l.unit||'')}"></div></div><div class="three"><div class="field"><label>Status</label><select id="lessonStatus">${['agendada','concluída','cancelada','reposição','pendente'].map(x=>`<option ${x===(l.status||'agendada')?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Financeiro</label><select id="lessonFin">${['paga','pendente','reposição','falta','extra'].map(x=>`<option ${x===(l.finStatus||'paga')?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Valor</label><input id="lessonValue" type="number" step="0.01" value="${l.value||st.defaultLessonValue||''}"></div></div><div class="field"><label>Notas</label><textarea id="lessonNotes">${esc(l.notes||'')}</textarea></div><button class="btn" onclick="saveLesson('${id}')">salvar</button></div>`);const stSelect=$('studentId'); if(stSelect)stSelect.addEventListener('change',()=>{const s=byId(DB.students,stSelect.value)||{};const lvl=$('lessonLevel'), val=$('lessonValue'); if(lvl)lvl.value=s.activeCourseLevel||''; if(val)val.value=s.defaultLessonValue||''})}
function saveLesson(id=''){
  try{
    const studentEl=$('studentId'), dateEl=$('lessonDate'), timeEl=$('lessonTime'), titleEl=$('lessonTitle'), levelEl=$('lessonLevel'), unitEl=$('lessonUnit'), statusEl=$('lessonStatus'), finEl=$('lessonFin'), valueEl=$('lessonValue'), notesEl=$('lessonNotes');
    if(!studentEl){toast('Erro: campo de aluno não encontrado. Reabra a janela da aula.');log('saveLesson: studentId inexistente','error');return}
    let sid=studentEl.value;
    if(!sid&&DB.students.length===1)sid=DB.students[0].id;
    if(!sid){toast('Escolha um aluno antes de salvar a aula.');return}
    const l=byId(DB.lessons,id)||{id:uid('lesson'),createdAt:nowIso()};
    l.studentId=sid;
    l.date=(dateEl&&dateEl.value)||today();
    l.startTime=(timeEl&&timeEl.value)||'';
    l.title=((titleEl&&titleEl.value)||'').trim()||'Aula';
    l.level=((levelEl&&levelEl.value)||'').trim()||(byId(DB.students,sid)?.activeCourseLevel||'');
    l.unit=((unitEl&&unitEl.value)||'').trim();
    l.status=(statusEl&&statusEl.value)||'agendada';
    l.finStatus=(finEl&&finEl.value)||'paga';
    l.planStatus=l.planStatus||'a planejar';
    l.value=Number((valueEl&&valueEl.value)||0)||0;
    l.notes=((notesEl&&notesEl.value)||'').trim();
    l.materialsStatus=l.materialsStatus||'pendente';
    l.studentPortalVisible=l.studentPortalVisible!==false;
    if(!id&&!DB.lessons.some(x=>x.id===l.id))DB.lessons.push(l);
    saveLocal();
    closeModal();
    STATE.page='lessons';
    showPage('lessons');
    setTimeout(()=>saveRemoteAll(),80);
    toast('Aula salva localmente. Sincronizando…');
    log('Aula salva localmente: '+l.title,'ok');
  }catch(err){
    console.error('saveLesson failed',err);
    log('Erro ao salvar aula: '+(err.message||err),'error');
    toast('Erro ao salvar aula: '+(err.message||err));
  }
}
function openMaterialModal(studentId='',id='',lessonId=''){const m=byId(DB.materials,id)||{};studentId=studentId||m.studentId||'';lessonId=lessonId||m.lessonId||'';openModal(id?'Editar material':'Novo material','Arquivo real fica no Drive; metadados ficam no Supabase.',`<div class="form"><div class="field"><label>Aluno ou biblioteca</label>${studentOptions(studentId,true)}</div><div class="field"><label>Aula vinculada</label><select id="matLesson"><option value="">Sem aula específica</option>${DB.lessons.filter(l=>!studentId||l.studentId===studentId).map(l=>`<option value="${l.id}" ${l.id===lessonId?'selected':''}>${esc(lessonTitle(l))} · ${esc(l.title)}</option>`).join('')}</select></div><div class="two"><div class="field"><label>Tipo</label><select id="matType">${['handout','homework','answer key','audio','video','test','rubric','extra','material'].map(x=>`<option ${x===(m.type||'material')?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Visível ao aluno</label><select id="matVisible"><option value="true" ${m.studentVisible!==false?'selected':''}>sim</option><option value="false" ${m.studentVisible===false?'selected':''}>não</option></select></div></div><div class="field"><label>Título</label><input id="matTitle" value="${esc(m.title||'')}"></div><div class="field"><label>Notas</label><textarea id="matNotes">${esc(m.notes||'')}</textarea></div><div class="field"><label>Arquivo</label><input id="matFile" type="file"><div class="subtle">Arquivo atual: ${esc(m.attachments?.[0]?.name||'nenhum')}</div></div><button class="btn" onclick="saveMaterial('${id}')">salvar</button></div>`)}
async function saveMaterial(id=''){const sid=$('studentId').value||'';const m=byId(DB.materials,id)||{id:uid('mat'),attachments:[],createdAt:nowIso()};m.studentId=sid;m.lessonId=matLesson.value;m.type=matType.value;m.studentVisible=matVisible.value==='true';m.title=matTitle.value.trim()||matType.value;m.notes=matNotes.value.trim();const file=matFile.files?.[0];if(file){const att=await driveUploadFile(file,sid);if(att)m.attachments=[att];else m.attachments=[{id:uid('file'),name:file.name,type:file.type,size:file.size,createdAt:nowIso()}]}if(!id)DB.materials.push(m);closeModal();scheduleSave();toast('Material salvo.')}
function replaceMaterial(id){STATE.currentMaterialId=id;$('materialFileInput').click()}
async function attachFileToCurrentMaterial(file){const m=byId(DB.materials,STATE.currentMaterialId);if(!file||!m)return;const att=await driveUploadFile(file,m.studentId);if(att)m.attachments=[att];scheduleSave();toast('Arquivo substituído.')}
function toggleMaterial(id){const m=byId(DB.materials,id);if(!m)return;m.studentVisible=!m.studentVisible;scheduleSave()}
function openMaterialViewer(id){const m=byId(DB.materials,id);if(!m)return;const att=m.attachments?.[0];$('viewerTitle').textContent=m.title;$('viewerSub').textContent=att?.name||'sem arquivo';if(att?.driveLink){const src=String(att.driveLink).replace('/view','/preview').replace('?usp=drive_link','');$('viewerFrame').innerHTML=`<iframe src="${esc(src)}"></iframe><div class="row-actions" style="margin-top:12px"><button class="btn soft" onclick="window.open('${esc(att.driveLink)}','_blank')">abrir original</button></div>`}else{$('viewerFrame').innerHTML='<div class="empty">Sem arquivo do Drive para visualizar.</div>'}$('viewerModal').style.display='flex'}
async function releaseLesson(id){const l=byId(DB.lessons,id);const st=byId(DB.students,l?.studentId);if(!l||!st?.email)return toast('Aluno sem e-mail.');const mats=lessonMaterials(l);let shared=0;for(const m of mats){for(const a of m.attachments||[]){if(a.driveId&&await driveShare(a.driveId,st.email,m.downloadAllowed!==false))shared++}}l.materialsStatus='liberado';await publishPortal(st.id);scheduleSave();toast(`Liberado: ${shared} arquivo(s) compartilhados.`)}
function deleteItem(k,id){if(!confirm('Excluir item do LessonHub? Arquivos no Drive não serão apagados.'))return;DB[k]=DB[k].filter(x=>x.id!==id);scheduleSave();toast('Excluído.')}
function previewStudent(id){const snap=snapshotForStudent(id);if(!snap)return toast('Aluno sem e-mail.');STATE.studentPortal=snap;showStudent()}

function showStudentPage(p){STATE.studentPage=p;document.querySelectorAll('[data-spage]').forEach(b=>b.classList.toggle('active',b.dataset.spage===p));renderStudent()}
function renderStudent(){const snap=STATE.studentPortal;if(!snap)return;if(snap.unauthorized){$('studentEmailBox').innerHTML=`não autorizado<br>${esc(snap.email||'')}`;$('studentApp').innerHTML=`<div class="student-panel"><div class="student-panel-title">Acesso não autorizado</div><p class="subtle">O e-mail ${esc(snap.email||'')} não está vinculado a um aluno publicado.</p></div>`;return}const st=snap.student,lessons=(snap.lessons||[]).sort((a,b)=>String(a.date||'').localeCompare(String(b.date||''))),mats=snap.materials||[],next=lessons.find(l=>!l.date||l.date>=today())||lessons[lessons.length-1],fin=snap.finance||{};$('studentEmailBox').innerHTML=`aluno conectado<br>${esc(st.email||'')}`;let html=`<section class="student-hero"><h2>Olá, ${esc(st.name)}.</h2><p class="subtle" style="margin-top:10px">Acesse suas aulas, materiais e informações publicadas.</p><div class="badges">${badge(st.course||st.level||'curso','blue')}${badge(fin.status||'financeiro')}</div></section>`;if(STATE.studentPage==='today'){html+=`<div class="student-grid"><div class="student-card"><div class="num">${next?fmtShort(next.date):'—'}</div><div class="label">próxima aula</div></div><div class="student-card"><div class="num">${next?.startTime||'—'}</div><div class="label">horário</div></div><div class="student-card"><div class="num">${mats.length}</div><div class="label">materiais</div></div><div class="student-card"><div class="num">${fin.status||'—'}</div><div class="label">financeiro</div></div></div><div class="student-panel"><div class="student-panel-title">Próxima aula</div>${next?studentLessonCard(next,mats):'<div class="empty">Sem aulas publicadas.</div>'}</div>`}else if(STATE.studentPage==='lessons'){html+=`<div class="student-panel"><div class="student-panel-title">Aulas</div>${lessons.map(l=>studentLessonCard(l,mats)).join('')||'<div class="empty">Sem aulas.</div>'}</div>`}else if(STATE.studentPage==='materials'){html+=`<div class="student-panel"><div class="student-panel-title">Materiais</div>${mats.map(studentMaterialCard).join('')||'<div class="empty">Sem materiais liberados.</div>'}</div>`}else{html+=`<div class="student-grid"><div class="student-card"><div class="num">${fin.status||'—'}</div><div class="label">status</div></div><div class="student-card"><div class="num">${fin.pending?money(fin.pending):money(0)}</div><div class="label">pendente</div></div></div>`}$('studentApp').innerHTML=html}
function studentLessonCard(l,mats){const lm=mats.filter(m=>m.lessonId===l.id||!m.lessonId);return `<div class="student-lesson"><div class="student-lesson-title">${esc(fmtDate(l.date))}${l.startTime?' · '+esc(l.startTime):''}</div><div class="badges">${badge(l.title,'blue')}${badge(lm.length+' materiais','ok')}</div><p class="subtle" style="margin-top:8px">${esc(l.notes||'')}</p>${lm.slice(0,4).map(studentMaterialCard).join('')}</div>`}
function studentMaterialCard(m){const att=m.attachments?.[0];return `<div class="student-resource"><div class="item-title">${esc(m.title)}</div><div class="badges">${badge(m.type||'material','blue')}${badge(att?.driveLink?'arquivo':'sem arquivo',att?.driveLink?'ok':'warn')}</div><div class="row-actions">${att?.driveLink?`<button class="linkbtn" onclick="window.open('${esc(att.driveLink)}','_blank')">abrir</button>`:''}</div></div>`}

function exportBackup(){saveLocal();const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lessonhub_v1_11_2_alpha_backup_'+today()+'.json';a.click();URL.revokeObjectURL(a.href);toast('Backup exportado.')}
function importBackup(file){if(!file)return;const r=new FileReader();r.onload=()=>{try{DB=normalizeDB(JSON.parse(r.result));saveLocal();scheduleSave();toast('Backup importado.')}catch(e){toast('Erro ao importar.')}};r.readAsText(file)}

Object.assign(window,{openStudentModal,saveStudent,deleteStudent,openLessonModal,saveLesson,openMaterialModal,saveMaterial,replaceMaterial,toggleMaterial,openMaterialViewer,deleteItem,closeViewer,closeModal,showPage,showStudentPage,publishPortal,publishAllPortals,previewStudent,releaseLesson,manualSaveAll,exportBackup,importBackup,forgetSession,driveSignIn});
function boot(){
  document.title='LessonHub v1.11.3-alpha — Session Cache + Robust Lesson Save';
  $('dateBox').innerHTML=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})+'<br>session cache + robust lesson save';
  const sess=lastSession();
  const hasLocal=(()=>{try{return !!localStorage.getItem(CONFIG.LOCAL_KEY)||!!localStorage.getItem('lessonhub_v1_4_data')}catch(e){return false}})();
  if(sess.email&&sess.role==='admin'&&hasLocal){
    STATE.userEmail=sess.email;
    STATE.source='local session';
    DB=loadLocal();
    showAdmin();
    status('Sessão local restaurada. Reconecte o Drive quando precisar enviar/abrir arquivos.',4500);
    log('Sessão local restaurada para '+sess.email,'ok');
  }else if(sess.email&&sess.role==='student'){
    const cached=loadCachedStudentPortal(sess.email);
    if(cached&&cached.student){
      STATE.userEmail=sess.email;
      STATE.studentPortal=cached;
      showStudent();
      status('Portal restaurado do cache local. Atualizando em segundo plano…',4500);
      log('Sessão do aluno restaurada do cache para '+sess.email,'ok');
    }else{
      showGate('Carregando portal…','Tentando restaurar a sessão do aluno.');
    }
  }else{
    showLogin('Carregando autenticação Google...');
  }
  const wait=setInterval(()=>{
    if(window.google&&google.accounts&&google.accounts.oauth2){
      clearInterval(wait);
      initGoogleDrive();
      if(STATE.mode==='login') $('loginMsg').textContent='Pronto para entrar.';
      if(sess.email&&sess.role==='student'){
        try{STATE.tokenClient.requestAccessToken({prompt:''})}catch(e){if(STATE.mode!=='student')showLogin('Entre com Google para abrir o portal do aluno.')}
      }
    }
  },200);
  setTimeout(()=>{if(!STATE.tokenClient&&STATE.mode==='login')$('loginMsg').textContent='Erro ao carregar autenticação Google. Recarregue a página.'},10000);
}
window.addEventListener('load',boot);
</script>
