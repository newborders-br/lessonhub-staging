function renderStudents(q=''){
  const query=String(q||'').toLowerCase();
  const rows=DB.students.filter(s=>!query||(s.name+' '+s.email+' '+s.activeCourseName).toLowerCase().includes(query)).sort((a,b)=>a.name.localeCompare(b.name));
  const tableRows=rows.map(s=>{
    const fin=financeForStudent(s.id);
    const course=s.courseId?byId(DB.courses,s.courseId):null;
    const allLessons=DB.lessons.filter(l=>l.studentId===s.id);
    const next=allLessons.filter(l=>l.date>=today()).sort((a,b)=>String(a.date).localeCompare(String(b.date)))[0];
    const sinceDate=s.createdAt?new Date(s.createdAt).toLocaleDateString('pt-BR',{month:'short',year:'numeric'}):'';
    const nextStr=next?`${fmtShort(next.date)}${next.startTime?' · '+next.startTime.slice(0,5):''}`:'-';
    const nextState=next?(next.planStatus==='preparada'?'preparada':'a planejar'):'';
    const finStr=fin.aCobrar.length>0?`${fin.aCobrar.length} a cobrar`:(fin.pending>0?money(fin.pending)+' pendente':'em dia');
    const finWarn=fin.aCobrar.length>0||fin.pending>0;
    const courseStr=course?.name||s.activeCourseName||'—';
    const levelStr=s.activeCourseLevel||'';
    const aulas=allLessons.length;
    return `<div class="student-row" onclick="showStudentFicha('${s.id}')">
      <div class="s-name">${esc(s.name)}<small>${sinceDate?'desde '+sinceDate:''}</small></div>
      <div class="s-course">${esc(courseStr)}<em>${levelStr?levelStr+' · ':''} ${aulas} aula${aulas!==1?'s':''}</em></div>
      <div class="s-next">${esc(nextStr)}<small>${esc(nextState)}</small></div>
      <div class="s-fin${finWarn?' warn':''}">${esc(finStr)}<small>LTV ${money(fin.ltv)}</small></div>
      <div class="s-arrow">→</div>
    </div>`;
  }).join('');
  $('page-students').innerHTML=`
    <div class="hero" style="margin-bottom:28px">
      <h1>Students</h1>
      <p class="lede">${rows.length} aluno${rows.length!==1?'s':''} encontrado${rows.length!==1?'s':''}.</p>
    </div>
    <div class="students-toolbar">
      <input type="text" class="search" placeholder="buscar por nome, curso ou e-mail…" oninput="renderStudents(this.value)" value="${esc(q)}" style="min-width:280px">
      <button class="btn" onclick="openStudentModal()">+ novo aluno</button>
    </div>
    <div class="student-row head">
      <div>Aluno</div><div>Curso</div><div>Próxima aula</div><div>Financeiro</div><div></div>
    </div>
    ${tableRows||'<div class="empty">Nenhum aluno cadastrado.</div>'}`;
}
function studentCard(s){const lessons=DB.lessons.filter(l=>l.studentId===s.id);const next=lessons.filter(l=>!l.date||l.date>=today()).sort((a,b)=>String(a.date).localeCompare(String(b.date)))[0];const fin=financeForStudent(s.id);const course=s.courseId?byId(DB.courses,s.courseId):null;const courseBadge=course?`<span class="badge" style="background:${esc(course.color||'#8b3a1f')}22;color:${esc(course.color||'#8b3a1f')};border-color:${esc(course.color||'#8b3a1f')}44">${esc(course.name)}</span>`:badge('sem curso','warn');return `<div class="item"><div class="item-title">${esc(s.name)}</div><div class="badges">${badge(s.status)}${badge(s.email||'sem e-mail',s.email?'ok':'warn')}${courseBadge}${badge(`${lessons.length} aulas`)}${badge('LTV '+money(fin.ltv),'ok')}${fin.aCobrar.length>0?badge(fin.aCobrar.length+' a cobrar','warn'):''}</div><div class="meta">${next?`Próxima: ${fmtDate(next.date)} ${esc(next.startTime||'')}`:'Sem próxima aula.'}<br>${esc(s.goal||'Sem objetivo registrado.')}</div><div class="row-actions"><button class="linkbtn" onclick="openStudentModal('${s.id}')">editar</button><button class="linkbtn" onclick="openLessonModal('${s.id}')">nova aula</button><button class="linkbtn" onclick="openPaymentModal('${s.id}')">novo pagamento</button><button class="linkbtn" onclick="previewStudent('${s.id}')">preview</button><button class="linkbtn" onclick="deleteStudent('${s.id}')">excluir</button></div></div>`}
function renderLessons(q='',periodo='todas'){
  const query=String(q||'').toLowerCase();
  const tod=today();
  const d=new Date(tod);const dow=d.getDay();
  const seg=new Date(d);seg.setDate(d.getDate()-(dow===0?6:dow-1));
  const dom=new Date(seg);dom.setDate(seg.getDate()+6);
  const segStr=seg.toISOString().slice(0,10);
  const domStr=dom.toISOString().slice(0,10);
  let rows=DB.lessons.filter(l=>{
    if(query&&!(l.title+' '+studentName(l.studentId)+' '+l.date+' '+l.status).toLowerCase().includes(query))return false;
    if(periodo==='hoje')return l.date===tod;
    if(periodo==='semana')return l.date>=segStr&&l.date<=domStr;
    if(periodo==='passadas')return l.date<tod;
    if(periodo==='futuras')return l.date>tod;
    return true;
  }).sort((a,b)=>periodo==='passadas'?String(b.date||'').localeCompare(String(a.date||'')):String(a.date||'').localeCompare(String(b.date||'')));
  const periodos=[['todas','Todas'],['hoje','Hoje'],['semana','Esta semana'],['futuras','Futuras'],['passadas','Passadas']];
  const sel=`<select style="border:0;border-bottom:1px solid var(--ink);padding:6px 0;background:transparent;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;outline:none;color:var(--ink)" onchange="renderLessons(document.querySelector('#page-lessons input')?.value||'',this.value)">${periodos.map(([v,l])=>`<option value="${v}" ${v===periodo?'selected':''}>${l}</option>`).join('')}</select>`;
  $('page-lessons').innerHTML=`<div class="hero" style="margin-bottom:28px"><h1>Lessons</h1><p class="lede">${rows.length} aula${rows.length!==1?'s':''} · ${periodo==='todas'?'todas':periodo}.</p></div><div style="display:flex;gap:16px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:28px"><input type="text" class="search" placeholder="buscar aula…" oninput="renderLessons(this.value,'${periodo}')" value="${esc(q)}" style="min-width:220px"><div style="display:flex;gap:12px;align-items:center">${sel}<button class="btn" onclick="openLessonModal()">+ nova aula</button></div></div><div>${rows.map(lessonCard).join('')||'<div class="empty">Sem aulas neste período.</div>'}</div>`
}
function lessonCard(l){
  const st=byId(DB.students,l.studentId);
  const course=l.courseId?byId(DB.courses,l.courseId):null;
  const isPlanned=l.planStatus==='preparada';
  const lMats=lessonMaterials(l);
  const hasPlan=!!l.plannedLessonId;
  const planMats=hasPlan?DB.materials.filter(m=>m.plannedLessonId===l.plannedLessonId&&!m.studentId):[];
  const needsSync=hasPlan&&planMats.length>0&&lMats.length===0;
  const stClass=l.status==='dada'?'ok':l.status==='cancelada'?'warn':'';
  const plClass=isPlanned?'ok':'todo';
  return `<div style="display:grid;grid-template-columns:90px 1fr auto;gap:20px;padding:16px 0;border-bottom:1px solid var(--line);align-items:start"><div><div style="font-family:'Instrument Serif',serif;font-size:28px;line-height:.9;letter-spacing:-.025em">${l.date?fmtShort(l.date):'—'}</div><div style="font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px">${l.startTime?l.startTime.slice(0,5):''}</div></div><div><div style="font-family:'Newsreader',serif;font-size:18px;line-height:1.1;letter-spacing:-.01em;margin-bottom:3px">${esc(st?.name||'Aluno')}</div><div style="font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">${esc(course?.name||st?.activeCourseName||'')}${l.level?' · '+esc(l.level):''}${l.title&&l.title!=='Aula'?' · '+esc(l.title):''}</div>${l.unit?`<div style="font-size:13.5px;color:var(--ink2)">${esc(l.unit)}</div>`:''}${l.notes?`<div style="font-size:13px;color:var(--muted);margin-top:4px;max-width:52ch">${esc(l.notes.substring(0,120))}${l.notes.length>120?'…':''}</div>`:''}${needsSync?`<div style="font-size:12px;color:var(--rust);margin-top:6px">⚠ ${planMats.length} material(is) da ficha não copiado(s). <button class="linkbtn" onclick="syncMaterialsFromPlanned('${l.id}')">copiar agora</button></div>`:''}<div class="row-actions" style="margin-top:10px"><button class="linkbtn" onclick="openLessonModal('${l.studentId}','${l.id}')">editar</button><button class="linkbtn" onclick="togglePlanStatus('${l.id}')">marcar ${isPlanned?'a planejar':'preparada'}</button><button class="linkbtn" onclick="openMaterialModal('${l.studentId}','','${l.id}')">material</button><button class="linkbtn" onclick="deleteItem('lessons','${l.id}')">excluir</button></div></div><div style="text-align:right;display:flex;flex-direction:column;gap:6px;align-items:flex-end;min-width:110px"><span class="tag-state ${stClass}">${l.status}</span><span class="tag-state ${plClass}">${l.planStatus||'a planejar'}</span>${lMats.length?`<span style="font-family:'Geist Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em">${lMats.length} mat.</span>`:''}${hasPlan?`<span style="font-family:'Geist Mono',monospace;font-size:10px;color:var(--blue);letter-spacing:.1em">ficha</span>`:''}</div></div>`;
}
function renderMaterials(q=''){
  const query=String(q||'').toLowerCase();
  const mats=DB.materials.filter(m=>!query||(m.title+' '+m.type+' '+(studentName(m.studentId)||'')).toLowerCase().includes(query));

  // Separar: com curso vs sem curso
  const comCurso=mats.filter(m=>{
    const l=byId(DB.lessons,m.lessonId);
    return l?.courseId||(m.plannedLessonId&&byId(DB.plannedLessons,m.plannedLessonId)?.courseId);
  });
  const semCurso=mats.filter(m=>!comCurso.includes(m));

  // Agrupar comCurso por curso → unidade → ficha
  const porCurso={};
  comCurso.forEach(m=>{
    const l=m.lessonId?byId(DB.lessons,m.lessonId):null;
    const pl=m.plannedLessonId?byId(DB.plannedLessons,m.plannedLessonId):null;
    const cid=l?.courseId||pl?.courseId||'';
    const uid2=pl?.unitId||'';
    const pid=m.plannedLessonId||'';
    if(!porCurso[cid])porCurso[cid]={units:{},outras:[]};
    if(uid2){
      if(!porCurso[cid].units[uid2])porCurso[cid].units[uid2]={planned:{},outras:[]};
      if(pid){
        if(!porCurso[cid].units[uid2].planned[pid])porCurso[cid].units[uid2].planned[pid]=[];
        porCurso[cid].units[uid2].planned[pid].push(m);
      } else {
        porCurso[cid].units[uid2].outras.push(m);
      }
    } else {
      porCurso[cid].outras.push(m);
    }
  });

  // Agrupar semCurso por aluno → data → título
  const porAluno={};
  semCurso.forEach(m=>{
    const sid=m.studentId||'__sem_aluno';
    if(!porAluno[sid])porAluno[sid]=[];
    porAluno[sid].push(m);
  });

  let html='';

  // Renderizar por curso
  const cursoIds=Object.keys(porCurso).sort((a,b)=>{
    const ca=byId(DB.courses,a)?.name||'';
    const cb=byId(DB.courses,b)?.name||'';
    return ca.localeCompare(cb);
  });

  cursoIds.forEach(cid=>{
    const c=byId(DB.courses,cid);
    const dot=c?.color?`<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${esc(c.color)};margin-right:8px;vertical-align:middle"></span>`:'';
    html+=`<div class="panel" style="margin-bottom:20px"><div class="panel-title" style="font-size:15px">${dot}${esc(c?.name||'Curso desconhecido')}</div>`;

    const {units,outras}=porCurso[cid];

    // Unidades em ordem
    const unitIds=Object.keys(units).sort((a,b)=>{
      const ua=byId(DB.units,a);const ub=byId(DB.units,b);
      return (ua?.order||0)-(ub?.order||0)||(ua?.name||'').localeCompare(ub?.name||'');
    });

    unitIds.forEach(uid2=>{
      const u=byId(DB.units,uid2);
      const uLabel=u?(u.code&&u.code.trim().toUpperCase()!==u.name.trim().toUpperCase()?esc(u.code)+' '+esc(u.name):esc(u.name)):'Unidade';html+=`<div style="margin:10px 0 4px;padding:6px 0;border-bottom:1px solid var(--line,#ddd)"><span class="subtle" style="font-size:11px;text-transform:uppercase;letter-spacing:.08em">${uLabel}</span></div>`;

      const {planned,outras:outrasFicha}=units[uid2];

      // Fichas em ordem
      const planIds=Object.keys(planned).sort((a,b)=>{
        const pa=byId(DB.plannedLessons,a);const pb=byId(DB.plannedLessons,b);
        return (pa?.order||0)-(pb?.order||0)||(pa?.code||'').localeCompare(pb?.code||'');
      });

      planIds.forEach(pid=>{
        const pl=byId(DB.plannedLessons,pid);
        const plLabel=pl?(pl.code&&pl.code.trim().toUpperCase()!==pl.title.trim().toUpperCase()?esc(pl.code)+' '+esc(pl.title):esc(pl.title)):'Aula planejada';html+=`<div style="margin:6px 0 2px;padding:4px 8px;background:var(--paper-2,#f5f2eb);font-size:12px"><b>${plLabel}</b></div>`;
        html+=`<div class="list" style="margin-bottom:4px">${planned[pid].map(materialCard).join('')}</div>`;
      });

      if(outrasFicha.length){
        html+=`<div style="margin:6px 0 2px;padding:4px 8px;font-size:12px;color:#888">Outras aulas</div>`;
        html+=`<div class="list">${outrasFicha.sort((a,b)=>String(a.createdAt).localeCompare(String(b.createdAt))).map(materialCard).join('')}</div>`;
      }
    });

    if(outras.length){
      if(unitIds.length)html+=`<div style="margin:10px 0 4px;padding:6px 0;border-bottom:1px solid var(--line,#ddd)"><span class="subtle" style="font-size:11px;text-transform:uppercase;letter-spacing:.08em">Sem unidade</span></div>`;
      html+=`<div class="list">${outras.sort((a,b)=>String(a.createdAt).localeCompare(String(b.createdAt))).map(materialCard).join('')}</div>`;
    }

    html+='</div>';
  });

  // Renderizar por aluno (sem curso)
  if(Object.keys(porAluno).length){
    html+=`<div class="panel" style="margin-bottom:20px"><div class="panel-title" style="font-size:15px">Sem curso vinculado</div>`;
    Object.keys(porAluno).sort((a,b)=>(studentName(a)||'').localeCompare(studentName(b)||'')).forEach(sid=>{
      const name=studentName(sid)||'Sem aluno';
      html+=`<div style="margin:10px 0 4px;padding:6px 0;border-bottom:1px solid var(--line,#ddd)"><span class="subtle" style="font-size:11px;text-transform:uppercase;letter-spacing:.08em">${esc(name)}</span></div>`;
      const sorted=porAluno[sid].sort((a,b)=>{
        const la=byId(DB.lessons,a.lessonId);const lb=byId(DB.lessons,b.lessonId);
        return String(la?.date||'').localeCompare(String(lb?.date||''))||a.title.localeCompare(b.title);
      });
      html+=`<div class="list">${sorted.map(materialCard).join('')}</div>`;
    });
    html+='</div>';
  }

  $('page-materials').innerHTML=pageHead('Materials','Metadados no Supabase, arquivos no Drive.',`<button class="btn" onclick="openMaterialModal()">novo material</button>`)+`<div class="toolbar"><input class="search" placeholder="buscar material..." oninput="renderMaterials(this.value)" value="${esc(q)}"></div>${html||'<div class="empty">Sem materiais.</div>'}`
}

let _reportYm='';

function _buildReportMonthOptions(selected){
  const hoje=today();let opts='';
  for(let i=0;i<24;i++){
    const d=new Date(hoje.slice(0,7)+'-15');d.setMonth(d.getMonth()-i);
    const ym=d.toISOString().slice(0,7);
    const label=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    opts+=`<option value="${ym}" ${ym===selected?'selected':''}>${label}</option>`;
  }
  return opts;
}

function _calcMonth(ym){
  const biz=DB.meta?.business||{};
  const aulasMes=DB.lessons.filter(l=>lessonCountsForPackage(l)&&String(l.date).slice(0,7)===ym);
  const cancelMes=DB.lessons.filter(l=>l.status==='cancelada'&&l.cancelNoticeOk===true&&String(l.date).slice(0,7)===ym);
  const linhas=[];
  aulasMes.sort((a,b)=>String(a.date).localeCompare(String(b.date))).forEach(l=>{
    const st=byId(DB.students,l.studentId);
    const pay=DB.payments.find(p=>p.lessonIds?.includes(l.id)&&!(p.auto&&!p.valor));
    const qtd=pay?.lessonIds?.length||1;
    const valorUnit=pay?(Number(pay.valor)||0)/qtd:(Number(l.value)||Number(st?.defaultLessonValue)||0);
    linhas.push({l,st,pay,valorUnit,pago:!!pay?.paid});
  });
  const totalBruto=linhas.reduce((s,r)=>s+r.valorUnit,0);
  const totalPago=linhas.filter(r=>r.pago).reduce((s,r)=>s+r.valorUnit,0);
  const totalACobrar=linhas.filter(r=>!r.pago).reduce((s,r)=>s+r.valorUnit,0);
  const prepMin=aulasMes.reduce((s,l)=>s+(Number(l.prepMinutes)||0),0);
  const totalHorasReais=aulasMes.length+(prepMin/60);
  const ticketMedio=aulasMes.length?totalBruto/aulasMes.length:0;
  const ticketReal=totalHorasReais?totalBruto/totalHorasReais:0;
  const alunosAtivos=new Set(aulasMes.map(l=>l.studentId));
  return{biz,aulasMes,cancelMes,linhas,totalBruto,totalPago,totalACobrar,prepMin,totalHorasReais,ticketMedio,ticketReal,alunosAtivos};
}

  const nomeMes=new Date(ym+'-15').toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const nomeMesCap=nomeMes.charAt(0).toUpperCase()+nomeMes.slice(1);
  const hoje=today();
  const nomeBiz=biz.razaoSocial||'New Borders · Erik · MEI';

        <tbody>${trRows}</tbody>
        <tfoot><tr><td colspan="2"></td><td class="rmono" style="color:var(--ok)">${money(recebido)}</td><td class="rmono r">${money(recebido+aRec)}</td></tr></tfoot>

function _buildYearHtml(ym){
  const ano=ym.slice(0,4);
  const hoje=today();const ymHoje=hoje.slice(0,7);
  // Calcular receita de todos os 12 meses do ano
  const meses=[];let maxReceita=0;
  for(let m=1;m<=12;m++){
    const ymMes=ano+'-'+(m<10?'0':'')+m;
    const {totalBruto,totalPago,aulasMes}=_calcMonth(ymMes);
    meses.push({ym:ymMes,mes:m,totalBruto,totalPago,n:aulasMes.length});
    if(totalBruto>maxReceita)maxReceita=totalBruto;
  }
  const peakVal=Math.max(...meses.map(x=>x.totalBruto));
  const MESES_PT=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

  const cellsHtml=meses.map(({ym:ymM,mes,totalBruto:tb,totalPago:tp,n})=>{
    const isCur=ymM===ymHoje;
    const isFuture=ymM>ymHoje;
    const isPeak=!isFuture&&tb===peakVal&&peakVal>0;
    const fill=maxReceita>0?Math.round((tb/maxReceita)*100):0;
    const cls=(isCur?'cur':'')+(isFuture?' future':'')+(isPeak&&!isFuture?' peak':'');
    return `<div class="year-cell ${cls}" style="--fill:${fill}%">
      <div class="ym">${MESES_PT[mes-1]}</div>
      <div>
        <div class="yv">${tb>0?money(tb).replace('R$\u00a0','').replace('R$ ',''):'—'}</div>
        <div class="yvs">${n?n+' aula'+(n!==1?'s':''):''}</div>
      </div>
    </div>`;
  }).join('');

  const totalAnoBruto=meses.reduce((s,m)=>s+m.totalBruto,0);
  const totalAnoPago=meses.reduce((s,m)=>s+m.totalPago,0);
  const totalAulas=meses.reduce((s,m)=>s+m.n,0);
  const ticketAno=totalAulas?totalAnoBruto/totalAulas:0;

  // Marcos do ano: primeiro aluno, primeiro pagamento, mês de pico
  const marcos=[];
  const primeiraAula=DB.lessons.filter(l=>String(l.date).startsWith(ano)).sort((a,b)=>String(a.date).localeCompare(String(b.date)))[0];
  if(primeiraAula){const st=byId(DB.students,primeiraAula.studentId);marcos.push({m:String(primeiraAula.date).slice(5,7),t:`Primeira aula do ano — ${esc(st?.name||'aluno')}`,v:money(Number(primeiraAula.value)||0)})}
  if(peakVal>0){const pm=meses.find(x=>x.totalBruto===peakVal&&x.totalBruto>0);if(pm)marcos.push({m:MESES_PT[pm.mes-1],t:`Mês de pico`,v:money(pm.totalBruto)})}

  const anotacaoHtml=marcos.length?`<div class="annot-strip">${marcos.map(({m,t,v})=>`<div class="annot-row"><div class="am">${m}</div><div class="at">${t}</div><div class="av">${v}</div></div>`).join('')}</div>`:'';

  return `<div class="year-wrap">
    <div class="year-grid">${cellsHtml}</div>
    <div class="year-totals">
      <div class="yt"><div class="n">${money(totalAnoBruto).replace('R$\u00a0','').replace('R$ ','')}</div><div class="l">Receita bruta ${ano}</div></div>
      <div class="yt"><div class="n"><em>${money(totalAnoPago).replace('R$\u00a0','').replace('R$ ','')}</em></div><div class="l">Recebido no ano</div></div>
      <div class="yt"><div class="n">${totalAulas}</div><div class="l">Aulas no ano</div></div>
      <div class="yt"><div class="n">${money(ticketAno).replace('R$\u00a0','').replace('R$ ','')}</div><div class="l">Ticket médio/aula</div></div>
    </div>
    ${anotacaoHtml}
  </div>`;
}

function gerarCSVRelatorio(ym){
  const {linhas}=_calcMonth(ym);
  const rows=[['Data','Aluno','Aula','Status','Valor'],...linhas.map(r=>[r.l.date||'',r.st?.name||'—',r.l.title||'Aula',r.pago?'pago':'a receber',String(r.valorUnit).replace('.',',')])];
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='fechamento-'+ym+'.csv';
  document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(a.href)},200);
  toast('CSV exportado.');
}

function autoCreatePendingPayments(){
  // IDs dos pagamentos auto nao pagos que serao removidos (para limpar lesson.paymentId)
  const removedAutoIds=new Set(DB.payments.filter(p=>p.auto&&!p.paid).map(p=>p.id));

  // Remove TODOS os pagamentos auto nao pagos - reconstroi limpo a cada chamada
  // Pagamentos manuais e auto ja pagos nunca sao tocados
  DB.payments=DB.payments.filter(p=>!(p.auto&&!p.paid));

  // allLinkedIds calculado UMA VEZ, fora do loop, so com pagamentos manuais/pagos
  const allLinkedIds=new Set(DB.payments.flatMap(p=>p.lessonIds||[]));

  DB.students.filter(s=>s.status==='ativo').forEach(st=>{
    const unpaid=DB.lessons.filter(l=>l.studentId===st.id&&lessonCountsForPackage(l)&&!allLinkedIds.has(l.id));
    if(!unpaid.length)return;
    const newPay={
      id:uid('pay'),
      studentId:st.id,
      paid:false,
      paidAt:'',
      method:'',
      notes:'',
      valor:unpaid.length*(Number(st.defaultLessonValue)||0),
      lessonIds:unpaid.map(l=>l.id),
      createdAt:nowIso(),
      auto:true
    };
    DB.payments.push(newPay);
    // Mantém lesson.paymentId em sincronia (antes so payment.lessonIds era atualizado)
    unpaid.forEach(l=>l.paymentId=newPay.id);
    // Adiciona ao set para que o proximo aluno nao reclame as mesmas aulas
    unpaid.forEach(l=>allLinkedIds.add(l.id));
  });

  // Limpa paymentId de aulas que pertenciam a pagamentos auto removidos
  // e que nao foram re-vinculadas acima
  if(removedAutoIds.size){
    DB.lessons.forEach(l=>{
      if(removedAutoIds.has(l.paymentId)){
        const reassigned=DB.payments.find(p=>p.auto&&p.lessonIds.includes(l.id));
        l.paymentId=reassigned?reassigned.id:'';
      }
    });
  }

  saveLocal();
}

function updatePaymentSummary(){const checks=[...document.querySelectorAll('.payLessonCheck:checked')];const summary=$('payCountSummary');if(summary)summary.textContent=checks.length+' aula(s) selecionada(s)';const valorEl=$('payValor');if(valorEl&&!valorEl.value){const total=checks.reduce((s,c)=>s+(Number(c.dataset.value)||0),0);if(total>0)valorEl.placeholder='sugestão: R$ '+total.toFixed(2).replace('.',',')}}
function paySelectNextN(studentId,n){const allLinkedElsewhere=new Set();DB.payments.forEach(p=>p.lessonIds.forEach(lid=>allLinkedElsewhere.add(lid)));const futureLessons=DB.lessons.filter(l=>l.studentId===studentId&&!allLinkedElsewhere.has(l.id)&&(!l.date||l.date>=today())).sort((a,b)=>String(a.date||'9999').localeCompare(String(b.date||'9999'))).slice(0,n);const ids=new Set(futureLessons.map(l=>l.id));document.querySelectorAll('.payLessonCheck').forEach(c=>{c.checked=ids.has(c.dataset.id)});updatePaymentSummary()}
function paySelectAllACobrar(studentId){const allLinkedElsewhere=new Set();DB.payments.forEach(p=>p.lessonIds.forEach(lid=>allLinkedElsewhere.add(lid)));const aCobrar=DB.lessons.filter(l=>l.studentId===studentId&&!allLinkedElsewhere.has(l.id)&&lessonCountsForPackage(l));const ids=new Set(aCobrar.map(l=>l.id));document.querySelectorAll('.payLessonCheck').forEach(c=>{c.checked=ids.has(c.dataset.id)});updatePaymentSummary()}
function savePayment(studentId,id=''){const checks=[...document.querySelectorAll('.payLessonCheck:checked')].map(c=>c.dataset.id);const sumFromLessons=[...document.querySelectorAll('.payLessonCheck:checked')].reduce((s,c)=>s+(Number(c.dataset.value)||0),0);const valor=Number($('payValor').value)||sumFromLessons||0;const paidStatus=$('payPaid').value==='true';const dateStr=$('payDate').value;const method=$('payMethod').value.trim();const notes=$('payNotes').value.trim();if(checks.length===0&&!confirm('Nenhuma aula selecionada. Criar pagamento mesmo assim? (Você pode vincular aulas depois.)'))return;const p=id?byId(DB.payments,id):{id:uid('pay'),studentId,createdAt:nowIso()};p.valor=valor;p.paid=paidStatus;p.paidAt=paidStatus?(dateStr?dateStr+'T12:00:00.000Z':nowIso()):'';p.method=method;p.notes=notes;p.lessonIds=checks;DB.lessons.forEach(l=>{if(checks.includes(l.id))l.paymentId=p.id;else if(l.paymentId===p.id)l.paymentId=''});if(!id)DB.payments.push(p);closeModal();scheduleSave();toast(id?'Pagamento atualizado.':'Pagamento criado com '+checks.length+' aula(s) vinculada(s).')}
function markPaymentPaid(payId){const p=byId(DB.payments,payId);if(!p)return;p.paid=true;p.paidAt=nowIso();scheduleSave();toast('Pagamento marcado como pago.')}
function openFinanceDetail(studentId){const st=byId(DB.students,studentId);const fin=financeForStudent(studentId);openModal('Histórico financeiro · '+st.name,`LTV acumulado: ${money(fin.ltv)} · Pendente: ${money(fin.pending)}`,`<div class="form"><div class="panel"><div class="panel-title">Pagamentos (${fin.pays.length})</div><div class="list">${fin.pays.map(p=>{const lessons=DB.lessons.filter(l=>p.lessonIds.includes(l.id));const given=lessons.filter(l=>lessonCountsForPackage(l)).length;const future=lessons.filter(l=>!lessonCountsForPackage(l)).length;return `<div class="item"><div class="item-title">${money(p.valor)}${p.method?' · '+esc(p.method):''}</div><div class="badges">${badge(p.paid?'pago':'pendente',p.paid?'ok':'warn')}${badge(lessons.length+' aula(s)')}${given?badge(given+' já dadas','ok'):''}${future?badge(future+' agendadas','blue'):''}</div><div class="meta subtle">Criado ${fmtDate(p.createdAt)}${p.paid&&p.paidAt?' · pago em '+fmtDate(p.paidAt):''}</div><div class="row-actions">${!p.paid?`<button class="linkbtn" onclick="markPaymentPaid('${p.id}');closeModal();openFinanceDetail('${studentId}')">marcar pago</button>`:''}<button class="linkbtn" onclick="openPaymentModal('${studentId}','${p.id}')">editar / vincular aulas</button>${p.paid?`<button class="linkbtn" onclick="printReceipt('${p.id}')">imprimir recibo</button>`:''}<button class="linkbtn" onclick="deletePayment('${p.id}','${studentId}')">excluir</button></div></div>`}).join('')||'<div class="empty">Sem histórico de pagamentos.</div>'}</div></div></div>`)}
function deletePayment(payId,studentId){const p=byId(DB.payments,payId);if(!p)return;if(!confirm('Excluir este pagamento? As aulas vinculadas voltarão para "a cobrar".'))return;DB.lessons.filter(l=>l.paymentId===payId).forEach(l=>l.paymentId='');DB.payments=DB.payments.filter(x=>x.id!==payId);DB.packages=DB.packages.filter(x=>x.id!==payId);saveLocal();clearTimeout(STATE.saveTimer);STATE.saveTimer=setTimeout(async()=>{await saveRemoteAll()},900);toast('Pagamento excluído.');closeModal();if(studentId)setTimeout(()=>{render();openFinanceDetail(studentId)},0);else render();}
function closeMonth(){const ym=today().slice(0,7);const ativos=DB.students.filter(s=>s.status==='ativo');const relatorio=ativos.map(s=>{const fin=financeForStudent(s.id);const aulasMes=DB.lessons.filter(l=>l.studentId===s.id&&lessonCountsForPackage(l)&&String(l.date).slice(0,7)===ym);const aCobrar=aulasMes.filter(l=>!l.paymentId);const linked=aulasMes.filter(l=>l.paymentId);return{s,fin,aulasMes,aCobrar,linked}}).filter(r=>r.aulasMes.length>0);const html=relatorio.map(r=>`<div class="item"><div class="item-title">${esc(r.s.name)}</div><div class="meta">${r.aulasMes.length} aula(s) dadas no mês · ${r.linked.length} já pagas · ${r.aCobrar.length} a cobrar</div>${r.aCobrar.length>0?`<div class="meta" style="color:#a63a2a">Registrar pagamento das ${r.aCobrar.length} aula(s) "a cobrar"? <button class="linkbtn" onclick="openPaymentModal('${r.s.id}')">novo pagamento</button></div>`:''}${r.fin.pays.filter(p=>p.paid&&String(p.paidAt).slice(0,7)===ym).map(p=>`<div class="meta"><button class="linkbtn" onclick="printReceipt('${p.id}')">imprimir recibo de ${money(p.valor)}</button></div>`).join('')}</div>`).join('')||'<div class="empty">Sem aulas dadas neste mês.</div>';openModal('Fechamento de '+ym,'Resumo do mês. Registre pagamento de aulas "a cobrar" e imprima recibos dos pagamentos pagos do mês.',`<div class="form"><div class="list">${html}</div></div>`)}
function openBusinessSettings(){const b=DB.meta.business||{};openModal('Dados fiscais','Aparecem no recibo. Apenas você vê.',`<div class="form"><div class="field"><label>CNPJ</label><input id="bizCnpj" value="${esc(b.cnpj||'')}" placeholder="00.000.000/0000-00"></div><div class="field"><label>Razão social / nome</label><input id="bizRazao" value="${esc(b.razaoSocial||'')}" placeholder="Erik Azevedo · New Borders"></div><div class="field"><label>Endereço</label><textarea id="bizEnd">${esc(b.endereco||'')}</textarea></div><button class="btn" onclick="saveBusinessSettings()">salvar</button></div>`)}
function saveBusinessSettings(){DB.meta.business={cnpj:$('bizCnpj').value.trim(),razaoSocial:$('bizRazao').value.trim(),endereco:$('bizEnd').value.trim()};closeModal();scheduleSave();toast('Dados fiscais salvos.')}
function printReceipt(payId){const p=byId(DB.payments,payId);if(!p){toast('Pagamento não encontrado.');return}if(!p.paid){toast('Pagamento não está marcado como pago.');return}const st=byId(DB.students,p.studentId);const lessons=DB.lessons.filter(l=>p.lessonIds.includes(l.id)).sort((a,b)=>String(a.date||'9999').localeCompare(String(b.date||'9999')));const biz=DB.meta.business||{};const linhas=lessons.map(l=>{const courseName=l.courseId?(byId(DB.courses,l.courseId)?.name||''):'';const statusTxt=l.status==='dada'?'dada':l.status==='cancelada'&&!l.cancelNoticeOk?'falta paga':l.status==='agendada'?'a realizar':l.status;return `<tr><td>${l.date?fmtDate(l.date):'data a definir'}${l.startTime?' '+l.startTime:''}</td><td>${esc(l.title||'Aula')}${courseName?'<br><span style="color:#777;font-size:11px">'+esc(courseName)+'</span>':''}</td><td>${statusTxt}</td></tr>`}).join('');const html=`<!doctype html><html><head><meta charset="utf-8"><title>Recibo · ${esc(st?.name||'aluno')}</title><style>body{font-family:Georgia,serif;max-width:680px;margin:32px auto;padding:24px;color:#222;line-height:1.5}.head{border-bottom:2px solid #222;padding-bottom:16px;margin-bottom:24px}.head h1{margin:0;font-size:22px}.head .sub{color:#777;font-size:13px}h2{font-size:16px;margin:24px 0 8px}table{width:100%;border-collapse:collapse;margin:12px 0}td,th{padding:6px 8px;border-bottom:1px solid #ddd;text-align:left;font-size:13px}.total{margin-top:16px;padding-top:16px;border-top:2px solid #222;font-size:18px;font-weight:bold;text-align:right}.foot{margin-top:48px;border-top:1px solid #ddd;padding-top:16px;font-size:12px;color:#777}@media print{body{margin:0}}</style></head><body><div class="head"><h1>Recibo de serviço</h1><div class="sub">Aulas particulares de idiomas</div></div><h2>Prestador</h2><div>${esc(biz.razaoSocial||'[razão social ou nome — configure em Finance · dados fiscais]')}</div><div>CNPJ: ${esc(biz.cnpj||'[CNPJ — configure em Finance · dados fiscais]')}</div><div>${esc(biz.endereco||'').replace(/\n/g,'<br>')}</div><h2>Aluno</h2><div>${esc(st?.name||'—')}</div>${st?.email?`<div>${esc(st.email)}</div>`:''}<h2>Aulas incluídas (${lessons.length})</h2><table><thead><tr><th>Data / horário</th><th>Aula</th><th>Status</th></tr></thead><tbody>${linhas||'<tr><td colspan="3" style="text-align:center;color:#999">Nenhuma aula vinculada a este pagamento.</td></tr>'}</tbody></table><div class="total">Total: ${money(p.valor)}</div><div style="margin-top:8px;font-size:13px;color:#555">Pago em ${fmtDate(p.paidAt)}${p.method?' · '+esc(p.method):''}</div><div class="foot">Documento gerado pelo LessonHub. Não substitui nota fiscal eletrônica quando exigida.</div><scr`+`ipt>window.print()</scr`+`ipt></body></html>`;const w=window.open('','_blank');if(!w){toast('Permita popups para imprimir o recibo.');return}w.document.write(html);w.document.close()}

function saveStudent(id=''){if(!stName.value.trim())return toast('Nome obrigatório.');const existing=byId(DB.students,id);const oldEmail=existing?String(existing.email||'').toLowerCase():'';const s=existing||{id:uid('student'),createdAt:nowIso()};s.name=stName.value.trim();s.email=stEmail.value.trim().toLowerCase();s.status=stStatus.value;s.courseId=$('stCourseId')?.value||'';s.activeCourseLevel=stLevel.value.trim();const c=s.courseId?byId(DB.courses,s.courseId):null;s.activeCourseName=c?c.name:s.activeCourseLevel;s.defaultLessonValue=Number(stValue.value)||0;s.phone=stPhone.value.trim();s.goal=stGoal.value.trim();s.notes=stNotes.value.trim();if(!id)DB.students.push(s);if(oldEmail&&oldEmail!==s.email){try{localStorage.removeItem('lessonhub_student_portal_'+sanitizeEmail(oldEmail))}catch(e){}sbDelete(oldEmail).catch(()=>{});log('E-mail do aluno mudou de '+oldEmail+' para '+s.email+'. Linha antiga limpa.','ok');}closeModal();scheduleSave();toast('Aluno salvo.')}
async function deleteStudent(id){const s=byId(DB.students,id);if(!s)return;if(!confirm(`Excluir ${s.name}? Aulas, materiais e pagamentos vinculados também serão removidos do LessonHub. Arquivos no Drive não serão apagados.`))return;const orphanEmail=s.email?String(s.email).toLowerCase():'';DB.students=DB.students.filter(x=>x.id!==id);DB.lessons=DB.lessons.filter(x=>x.studentId!==id);DB.materials=DB.materials.filter(x=>x.studentId!==id);DB.packages=DB.packages.filter(x=>x.studentId!==id);DB.payments=DB.payments.filter(x=>x.studentId!==id);if(STATE.portalHashes)delete STATE.portalHashes[id];if(orphanEmail){try{localStorage.removeItem('lessonhub_student_portal_'+sanitizeEmail(orphanEmail))}catch(e){}sbDelete(orphanEmail).catch(()=>{});}scheduleSave();toast('Aluno excluído.')}
function lessonSwitchTab(tab){
  ['ficha','materiais'].forEach(t=>{
    const panel=document.getElementById('ltab-panel-'+t);
    const btn=document.getElementById('ltab-'+t);
    if(!panel||!btn)return;
    const active=t===tab;
    panel.style.display=active?'block':'none';

function lessonMaterialsPanel(lessonId){
  if(!lessonId)return'<p style="color:var(--muted);font-size:13px;padding:12px 0">Salve a aula primeiro para gerenciar materiais.</p>';
  const mats=DB.materials.filter(m=>m.lessonId===lessonId);

    <p style="color:var(--muted);font-size:13px;margin:0 0 12px">Nenhum material vinculado a esta aula.</p>
    <button class="btn" style="font-size:12px" onclick="openMaterialModal('','','${lessonId}')">+ adicionar material</button>
  </div>`;
  const rows=mats.map(m=>{
    const att=m.attachments?.[0];
    const icon=m.type==='audio'?'🎵':m.type==='video'?'🎬':m.type==='homework'?'✏️':'📎';
    const visLabel=m.studentVisible
      ?`<span style="color:var(--green,#4caf50);font-size:11px">visível${m.releasedAt?' desde '+new Date(m.releasedAt).toLocaleDateString('pt-BR'):''}</span>`
      :`<span style="color:var(--muted);font-size:11px">${m.releaseAt?'agendado: '+new Date(m.releaseAt).toLocaleDateString('pt-BR'):'oculto'}</span>`;
    const toggleBtn=m.studentVisible
      ?`<button class="linkbtn" style="font-size:11px;color:var(--rust)" onclick="toggleLessonMaterial('${m.id}',false)">ocultar</button>`
      :`<button class="linkbtn" style="font-size:11px;color:var(--rust)" onclick="toggleLessonMaterial('${m.id}',true)">liberar agora</button>`;
    const dateInput=!m.studentVisible?`<input type="date" class="ff-input mono" style="font-size:11px;padding:3px 7px;width:auto;display:inline-block;margin-left:6px" value="${m.releaseAt||''}" onchange="setMaterialReleaseDate('${m.id}',this.value)" placeholder="liberar em…">`:'';
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:18px;flex-shrink:0">${icon}</span>

        <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(m.title)}</div>
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-top:2px">${visLabel}${dateInput}</div>
      </div>

    </div>`;
  }).join('');
  return `<div>
    <div style="margin-bottom:6px">${rows}</div>
    <div style="padding-top:8px"><button class="btn" style="font-size:12px" onclick="openMaterialModal('','','${lessonId}')">+ adicionar material</button></div>
  </div>`;
}
function toggleLessonMaterial(matId,visible){
  const m=byId(DB.materials,matId);if(!m)return;
  m.studentVisible=visible;
  if(visible){m.releasedAt=nowIso();m.releaseAt=null;}
  saveLocal();scheduleSave();
  // Re-render panel
  const panel=document.getElementById('ltab-panel-materiais');
  if(panel)panel.innerHTML=lessonMaterialsPanel(m.lessonId);
  toast(visible?'Material liberado para o aluno ✓':'Material ocultado.');
}
function setMaterialReleaseDate(matId,dateVal){
  const m=byId(DB.materials,matId);if(!m)return;
  m.releaseAt=dateVal||null;
  saveLocal();scheduleSave();
  toast(dateVal?'Liberação agendada para '+new Date(dateVal).toLocaleDateString('pt-BR'):'Agendamento removido.');
}
function checkScheduledMaterialReleases(){
  const now=new Date().toISOString().slice(0,10);
  let released=0;
  DB.materials.forEach(m=>{
    if(!m.studentVisible&&m.releaseAt&&m.releaseAt<=now){
      m.studentVisible=true;m.releasedAt=nowIso();m.releaseAt=null;released++;
    }
  });
  if(released>0){saveLocal();scheduleSave();log(released+' material(is) liberado(s) automaticamente por data','ok');}
}
function openLessonModal(studentId='',id=''){
  const l=byId(DB.lessons,id)||{};
  studentId=studentId||l.studentId||'';
  if(!studentId&&DB.students.length===1)studentId=DB.students[0].id;
  const st=byId(DB.students,studentId)||{};
  const fin=studentId?financeForStudent(studentId):null;
  const courseSelected=l.courseId||st.courseId||'';
  const courseOpts=`<option value="">— sem curso —</option>`+DB.courses.filter(c=>c.status!=='arquivado').map(c=>`<option value="${c.id}" ${courseSelected===c.id?'selected':''}>${esc(c.name)}</option>`).join('');
  const lessonStatus=l.status||'agendada';
  const planStatus=l.planStatus||'a planejar';
  const isCanceled=lessonStatus==='cancelada';
  // planejadas
  const filterCourseId=courseSelected;
  const plannedByCourse={};
  DB.plannedLessons.filter(p=>p.status!=='arquivado').forEach(p=>{
    if(filterCourseId&&p.courseId!==filterCourseId)return;
    const k=p.courseId||'sem curso';plannedByCourse[k]=plannedByCourse[k]||[];plannedByCourse[k].push(p);
  });
  let plannedOpts='<option value="">— escolher aula planejada —</option>';
  Object.keys(plannedByCourse).forEach(cid=>{
    const c=byId(DB.courses,cid);const unitMap={};
    plannedByCourse[cid].forEach(p=>{const k=p.unitId||'';unitMap[k]=unitMap[k]||[];unitMap[k].push(p)});

function saveLesson(id=''){
  try{
    const studentEl=$('studentId'), dateEl=$('lessonDate'), timeEl=$('lessonTime'), titleEl=$('lessonTitle'), levelEl=$('lessonLevel'), unitEl=$('lessonUnit'), statusEl=$('lessonStatus'), prepEl=$('lessonPrep'), cancelEl=$('lessonCancel'), notesEl=$('lessonNotes'), courseEl=$('lessonCourseId'), valueEl=$('lessonValue'), planEl=$('lessonPlanStatus'), studentNotesEl=$('lessonStudentNotes');
    if(!studentEl){toast('Erro: campo de aluno não encontrado. Reabra a janela da aula.');log('saveLesson: studentId inexistente','error');return}
    let sid=studentEl.value;
    if(!sid&&DB.students.length===1)sid=DB.students[0].id;
    if(!sid){toast('Escolha um aluno antes de salvar a aula.');return}
    const l=byId(DB.lessons,id)||{id:uid('lesson'),createdAt:nowIso()};
    l.studentId=sid;
    l.courseId=(courseEl&&courseEl.value)||byId(DB.students,sid)?.courseId||'';
    l.date=(dateEl&&dateEl.value)||today();
    l.startTime=(timeEl&&timeEl.value)||'';
    l.title=((titleEl&&titleEl.value)||'').trim()||'Aula';
    l.level=((levelEl&&levelEl.value)||'').trim()||(byId(DB.students,sid)?.activeCourseLevel||'');
    l.unit=((unitEl&&unitEl.value)||'').trim();
    l.status=(statusEl&&statusEl.value)||'agendada';
    l.value=Number((valueEl&&valueEl.value)||0)||0;
    l.prepMinutes=Number((prepEl&&prepEl.value)||0)||0;
    l.cancelNoticeOk=l.status==='cancelada'?((cancelEl&&cancelEl.value)==='true'):false;
    l.planStatus=(planEl&&planEl.value)||l.planStatus||'a planejar';
    l.notes=((notesEl&&notesEl.value)||'').trim();
    l.studentNotes=((studentNotesEl&&studentNotesEl.value)||'').trim();
    l.materialsStatus=l.materialsStatus||'pendente';
    l.studentPortalVisible=l.studentPortalVisible!==false;
    if(!l.paymentId)l.paymentId='';
    // Aplicar puxada de aula planejada (se houve)
    const isNew=!id&&!DB.lessons.some(x=>x.id===l.id);
    if(isNew&&STATE._pullPlannedId){
      l.plannedLessonId=STATE._pullPlannedId;
      const sourceMats=DB.materials.filter(m=>m.plannedLessonId===STATE._pullPlannedId&&!m.studentId);
      sourceMats.forEach(sm=>{
        const alreadyExists=DB.materials.some(m=>m.fromPlannedMaterialId===sm.id&&m.studentId===sid&&m.lessonId===l.id);
        if(alreadyExists)return;
        const newMat={id:uid('mat'),title:sm.title,type:sm.type,studentId:sid,lessonId:l.id,plannedLessonId:'',studentVisible:false,releaseAt:null,downloadAllowed:sm.downloadAllowed,attachments:(sm.attachments||[]).map(a=>({...a})),notes:sm.notes,createdAt:nowIso(),fromPlannedMaterialId:sm.id};
        DB.materials.push(newMat);
      });
      log('Materiais vinculados da ficha (ocultos): '+sourceMats.length,'ok');
    }
    STATE._pullPlannedId=null;
    if(isNew)DB.lessons.push(l);
    saveLocal();
    closeModal();
    STATE.page='lessons';
    showPage('lessons');
    setTimeout(()=>saveRemoteAll(),80);
    toast('Aula salva localmente. Sincronizando…');
    log('Aula salva localmente: '+l.title,'ok');
  }catch(err){
    console.error('saveLesson failed',err);
    log('Erro ao salvar aula: '+(err.message||err),'error');
    toast('Erro ao salvar aula: '+(err.message||err));
  }
}

}if(!id)DB.materials.push(m);if(!isPlannedMat&&m.studentId&&m.studentVisible&&STATE.driveReady){const st=byId(DB.students,m.studentId);if(st?.email){for(const a of m.attachments||[]){if(a.driveId&&!a.sharedWith?.includes(st.email)){if(await driveShare(a.driveId,st.email,m.downloadAllowed!==false)){a.sharedWith=a.sharedWith||[];a.sharedWith.push(st.email);}}}}}closeModal();scheduleSave();if(uploadWarning){toast(uploadWarning);log(uploadWarning,'warn');}else{toast('Material salvo.');}}

        <div class="student-card"><div class="num">${mats.length}</div><div class="label">materiais</div></div>
        <div class="student-card"><div class="num tag-state ${fin.status==='em dia'?'ok':fin.status==='pendente'?'warn':'todo'}">${fin.status||'—'}</div><div class="label">financeiro</div></div>
      </div></div>`;
  } else if(STATE.studentPage==='lessons'){
    const lessonItems=lessons.slice().reverse().map(l=>{
      const lm=mats.filter(m=>m.lessonId===l.id);
      const d=l.date?new Date(l.date):null;
      const mes=d?d.toLocaleDateString('pt-BR',{month:'short'}):'';
      const dia=d?String(d.getDate()).padStart(2,'0'):'—';
      const hora=l.startTime?l.startTime.slice(0,5):'';
      return `<div class="tl-item">
        <div class="tl-marker"><b>${dia}</b>${mes}${hora?'<br>'+hora:''}</div>
        <div class="tl-content">
          <div class="tl-heading">${esc(l.title||'Aula')}</div>
          ${l.unit?`<div style="font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">${esc(l.unit)}</div>`:''}
          ${l.studentNotes?`<div class="tl-desc">${esc(l.studentNotes).replace(/\n/g,'<br>')}</div>`:''}
          <div>${lm.map(m=>{const att=m.attachments?.[0];const hasFile=att&&(att.driveLink||att.youtubeUrl);return `<div class="tl-mat"><div><div class="tl-mat-t">${esc(m.title)}</div><div class="tl-mat-k">${esc(m.type||'material')}</div></div>${hasFile?`<button onclick="openStudentMaterial('${m.id}')">abrir →</button>`:`<span style="font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft)">em breve</span>`}</div>`;}).join('')}</div>
        </div>
      </div>`;
    }).join('');
    $('studentApp').innerHTML=`<div class="hero" style="margin-bottom:28px"><h1>Aulas &amp;<br><em>materiais.</em></h1><p class="lede">Tudo que Erik já te mandou, da mais recente pra mais antiga.</p></div><div class="timeline">${lessonItems||'<div class="empty">Sem aulas publicadas.</div>'}</div>`;
  } else if(STATE.studentPage==='materials'){
    const allMats=[...mats].sort((a,b)=>String(b.createdAt||'').localeCompare(String(a.createdAt||'')));
    $('studentApp').innerHTML=`<div class="hero" style="margin-bottom:28px"><h1>Materiais</h1><p class="lede">${allMats.length} ${allMats.length===1?'material disponível':'materiais disponíveis'}.</p></div><div>${allMats.map(m=>studentMaterialCard(m)).join('')||'<div class="empty">Sem materiais liberados.</div>'}</div>`;
  } else {
    $('studentApp').innerHTML=studentFinancePage(fin);
  }
}
function studentMaterialCard(m){

  </div>`;
}
function studentLessonCard(l,mats){

function studentFinancePage(fin){
  const pays=(fin.pays||[]).filter(p=>p.paid).sort((a,b)=>String(b.paidAt||'').localeCompare(String(a.paidAt||'')));
  const pending=(fin.pays||[]).filter(p=>!p.paid&&Number(p.valor)>0);
  const pendingTotal=pending.reduce((s,p)=>s+(Number(p.valor)||0),0);
  const paidTotal=fin.ltv||0;
  return `<div class="hero" style="margin-bottom:28px"><h1>Financeiro</h1><p class="lede">Suas aulas com Erik, fechamentos e o que está em aberto.</p></div>
  <div class="statement">
    <div><div class="st-h">Em aberto</div><div class="st-big${pendingTotal>0?' ':''}"><em>${pendingTotal>0?'R$':''}</em>${pendingTotal>0?money(pendingTotal).replace('R$','').trim():'0'}</div><div class="st-sub">${fin.aCobrar?.length>0?fin.aCobrar.length+' aula(s) a cobrar ainda não faturada(s).':pending.length>0?'Pagamento registrado, aguardando confirmação.':'Tudo certo!'}</div></div>
    <div><div class="st-h">Total investido</div><div class="st-big">${money(paidTotal)}</div><div class="st-sub">${pays.length} pagamento${pays.length!==1?'s':''} quitado${pays.length!==1?'s':''}.</div></div>
  </div>
  ${pays.length?`<div class="section-title">Histórico de pagamentos</div>
  <table class="pay-table">
    <thead><tr><th>Data</th><th>Aulas</th><th>Método</th><th>Valor</th><th></th></tr></thead>
    <tbody>${pays.map(p=>`<tr><td>${fmtDate(p.paidAt)}</td><td>${p.lessonIds?.length||0} aula(s)</td><td>${esc(p.method||'—')}</td><td class="val">${money(p.valor)}</td><td class="pay-state">pago</td></tr>`).join('')}</tbody>
  </table>`:''}`
}
function studentFinancePage(fin){const pays=(fin.pays||[]).sort((a,b)=>String(b.createdAt).localeCompare(String(a.createdAt)));const paid=pays.filter(p=>p.paid);const pending=pays.filter(p=>!p.paid);const future=fin.futureLinked||[];const aCobrar=fin.aCobrar||[];const paymentBlock=p=>{const linkedLessons=(fin.linkedLessons||[]).filter(l=>p.lessonIds.includes(l.id)).sort((a,b)=>String(a.date||'9999').localeCompare(String(b.date||'9999')));return `<div class="item"><div class="item-title">${money(p.valor)}${p.method?' · '+esc(p.method):''}</div><div class="badges">${badge(p.paid?'pago em '+fmtDate(p.paidAt):'pendente',p.paid?'ok':'warn')}${badge(p.lessonIds.length+' aula(s)')}</div>${linkedLessons.length?`<div class="meta">Aulas cobertas:<ul style="margin:6px 0 0 18px;padding:0">${linkedLessons.map(l=>`<li>${l.date?fmtDate(l.date):'sem data'}${l.startTime?' '+l.startTime:''} · ${esc(l.title)}${l.status==='dada'?'':l.status==='cancelada'&&!l.cancelNoticeOk?' <span style="color:#a63a2a">(falta paga)</span>':' <span style="color:#777">(a realizar)</span>'}</li>`).join('')}</ul></div>`:''}</div>`};const aCobrarBlock=aCobrar.length?`<div class="student-panel"><div class="student-panel-title">Aulas a cobrar</div><div class="meta">Estas aulas foram dadas e ainda não estão em um pagamento. Aguarde o registro.</div><div class="list">${aCobrar.map(l=>`<div class="item"><div class="item-title">${l.date?fmtDate(l.date):'sem data'}${l.startTime?' '+l.startTime:''}</div><div class="meta">${esc(l.title)}</div></div>`).join('')}</div></div>`:'';return `<div class="student-grid"><div class="student-card"><div class="num">${fin.status||'—'}</div><div class="label">status</div></div><div class="student-card"><div class="num">${future.length}</div><div class="label">aulas pagas a realizar</div></div><div class="student-card"><div class="num">${money(fin.ltv||0)}</div><div class="label">total investido</div></div><div class="student-card"><div class="num">${money(fin.pending||0)}</div><div class="label">pendente</div></div></div>${aCobrarBlock}${pending.length?`<div class="student-panel"><div class="student-panel-title">Pagamentos pendentes</div><div class="list">${pending.map(paymentBlock).join('')}</div></div>`:''}${paid.length?`<div class="student-panel"><div class="student-panel-title">Pagamentos quitados</div><div class="list">${paid.map(paymentBlock).join('')}</div></div>`:''}`}
function studentLessonCard(l,mats){const lm=mats.filter(m=>m.lessonId===l.id||!m.lessonId);return `<div class="student-lesson"><div class="student-lesson-title">${esc(fmtDate(l.date))}${l.startTime?' · '+esc(l.startTime):''}</div><div class="badges">${badge(l.title,'blue')}${badge(lm.length+' materiais','ok')}</div>${l.studentNotes?`<div class="student-panel" style="margin-top:10px;padding:10px;background:var(--paper-2,#f8f5f0);border-radius:4px"><div class="meta subtle" style="margin-bottom:4px"><b>Anotações da professora</b></div><div>${esc(l.studentNotes).replace(/\n/g,'<br>')}</div></div>`:''}${lm.slice(0,4).map(studentMaterialCard).join('')}</div>`}
function studentMaterialCard(m){const att=m.attachments?.[0];const hasFile=att&&(att.driveLink||att.youtubeUrl||att.storageUrl);return `<div class="student-resource"><div class="item-title">${esc(m.title)}</div><div class="badges">${badge(m.type||'material','blue')}${badge(hasFile?'arquivo disponível':'arquivo a caminho',hasFile?'ok':'warn')}</div>${m.notes?`<div class="meta">${esc(m.notes)}</div>`:''}<div class="row-actions">${hasFile?`<button class="linkbtn" onclick="openStudentMaterial('${m.id}')">abrir</button>`:`<span class="subtle">A professora está preparando o arquivo.</span>`}</div></div>`}
function openStudentMaterial(id){const snap=STATE.studentPortal;if(!snap)return;const m=(snap.materials||[]).find(x=>x.id===id);if(!m){toast('Material não disponível.');return;}const att=m.attachments?.[0];if(!att?.driveLink&&!att?.youtubeUrl&&!att?.storageUrl){toast('Arquivo ainda não disponível.');return}openMaterialViewer_raw(att,m.title,m.downloadAllowed!==false,m.id)}
function openMaterialViewer_raw(att,title,downloadAllowed,materialId){const t=$('viewerTitle');const s=$('viewerSub');const f=$('viewerFrame');const dl=$('viewerDlBtn');const screen=$('viewerScreen');if(!t||!s||!f||!screen)return;t.textContent=title;s.textContent=att?.name||'';f.innerHTML=buildViewerHtml(att,title,downloadAllowed);if(dl){const fileUrl=att?.storageUrl||att?.driveLink;if(fileUrl&&downloadAllowed){dl.style.display='block';dl.onclick=()=>window.open(fileUrl,'_blank')}else{dl.style.display='none'}}screen.style.display='block';document.body.style.overflow='hidden';screen.scrollTop=0;if(att?.storageUrl){const isPdf=String(att.name||att.storageUrl).toLowerCase().endsWith('.pdf')||String(att.type||'').includes('pdf');if(isPdf)setTimeout(()=>renderPdfViewer(att.storageUrl,materialId||pdfAnnotKey(att.storageUrl)),0);}}

function exportBackup(){saveLocal();const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lessonhub_v1_11_2_alpha_backup_'+today()+'.json';a.click();URL.revokeObjectURL(a.href);toast('Backup exportado.')}
function importBackup(file){if(!file)return;const r=new FileReader();r.onload=()=>{try{DB=normalizeDB(JSON.parse(r.result));saveLocal();scheduleSave();toast('Backup importado.')}catch(e){toast('Erro ao importar.')}};r.readAsText(file)}

function togglePlanStatus(id){const l=byId(DB.lessons,id);if(!l)return;l.planStatus=l.planStatus==='preparada'?'a planejar':'preparada';scheduleSave();toast('Marcada como '+l.planStatus+'.')}
function markLessonDone(id){const l=byId(DB.lessons,id);if(!l)return;l.status=l.status==='dada'?'agendada':'dada';scheduleSave();renderDashboard();toast(l.status==='dada'?'Aula marcada como dada ✓':'Aula desmarcada.');}
async function syncMaterialsFromPlanned(lessonId){const l=byId(DB.lessons,lessonId);if(!l||!l.plannedLessonId)return;const st=byId(DB.students,l.studentId);const sourceMats=DB.materials.filter(m=>m.plannedLessonId===l.plannedLessonId&&!m.studentId);if(!sourceMats.length){toast('Ficha não tem materiais pra copiar.');return}let copied=0,shared=0;for(const sm of sourceMats){const exists=DB.materials.some(m=>m.fromPlannedMaterialId===sm.id&&m.lessonId===lessonId);if(exists)continue;const newMat={id:uid('mat'),title:sm.title,type:sm.type,studentId:l.studentId,lessonId,plannedLessonId:'',studentVisible:sm.studentVisible,downloadAllowed:sm.downloadAllowed,attachments:(sm.attachments||[]).map(a=>({...a})),notes:sm.notes,createdAt:nowIso(),fromPlannedMaterialId:sm.id};DB.materials.push(newMat);copied++;if(st?.email&&newMat.studentVisible&&STATE.driveReady){for(const a of newMat.attachments||[]){if(a.driveId){const ok=await driveShare(a.driveId,st.email,newMat.downloadAllowed!==false);if(ok){a.sharedWith=a.sharedWith||[];if(!a.sharedWith.includes(st.email))a.sharedWith.push(st.email);shared++;}}}}}scheduleSave();toast(copied>0?`${copied} material(is) copiado(s)${shared>0?', '+shared+' compartilhado(s) com aluno':''}. Portal atualizado.`:'Materiais já estavam copiados.');}
function toggleUnitBlock(unitId){const el=document.getElementById('unit-'+unitId);if(el)el.classList.toggle('open')}
function applyPlannedLesson(){
  const pid=$('pullPlanned')?.value;
  if(!pid){toast('Escolha uma aula planejada primeiro.');return}
  const p=byId(DB.plannedLessons,pid);
  if(!p){toast('Aula planejada não encontrada.');return}
  const copyText=$('pullCopyText')?.checked!==false;
  const copyNotes=$('pullCopyNotes')?.checked!==false;
  if(copyText){
    const title=$('lessonTitle');if(title&&p.title)title.value=p.title;
    const level=$('lessonLevel');if(level&&p.level)level.value=p.level;
    const unit=$('lessonUnit');if(unit&&p.content)unit.value=p.content.split(';')[0].trim();
    const course=$('lessonCourseId');if(course&&p.courseId)course.value=p.courseId;
  }
  if(copyNotes){
    const notes=$('lessonNotes');if(notes&&p.privateNotes)notes.value=p.privateNotes;
    const sn=$('lessonStudentNotes');if(sn&&p.studentNotes)sn.value=p.studentNotes;
  }
  STATE._pullPlannedId=pid;
  toast('Ficha aplicada. Salve a aula para confirmar.');
}

// garantia explícita antes do Object.assign
window.applyPlannedLesson=applyPlannedLesson;
window.lessonSwitchTab=lessonSwitchTab;
window.toggleLessonMaterial=toggleLessonMaterial;
window.setMaterialReleaseDate=setMaterialReleaseDate;
window.toggleUnitBlock=toggleUnitBlock;
Object.assign(window,{openStudentModal,saveStudent,deleteStudent,showStudentFicha,openLessonModal,saveLesson,togglePlanStatus,markLessonDone,syncMaterialsFromPlanned,openMaterialModal,saveMaterial,replaceMaterial,toggleMaterial,openMaterialViewer,openMaterialViewer_raw,openStudentMaterial,deleteItem,closeViewer,closeModal,showPage,showStudentPage,previewStudent,manualSaveAll,exportBackup,importBackup,forgetSession,driveSignIn,openPaymentModal,savePayment,markPaymentPaid,deletePayment,openFinanceDetail,printReceipt,closeMonth,openBusinessSettings,saveBusinessSettings,paySelectNextN,paySelectAllACobrar,updatePaymentSummary,openCourseModal,saveCourse,archiveCourse,deleteCourse,courseNavTo,setCourseView,openUnitModal,saveUnit,archiveUnit,deleteUnit,openPlannedLessonModal,savePlannedLesson,archivePlannedLesson,deletePlannedLesson,switchPlannedTab,newPlannedMaterial,applyPlannedLesson,toggleUnitBlock,setReportMonth,switchReportTab,imprimirRelatorio,gerarCSVRelatorio});
function boot(){
  document.title='LessonHub v1.17.8-alpha — Supabase Storage + PDF Viewer';
  $('dateBox').innerHTML=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})+'<br>supabase storage · pdf.js viewer';
  const sess=lastSession();
  const hasLocal=(()=>{try{return !!localStorage.getItem(CONFIG.LOCAL_KEY)||!!localStorage.getItem('lessonhub_v1_4_data')}catch(e){return false}})();
  if(sess.email&&sess.role==='admin'&&hasLocal){
    STATE.userEmail=sess.email;
    STATE.source='local session';
    DB=loadLocal();
    checkScheduledMaterialReleases();
    showAdmin();
    status('Sessão local restaurada. Reconectando o Drive…',4500);
    log('Sessão local restaurada para '+sess.email,'ok');
    STATE.pendingDriveReconnect=true;
  }else if(sess.email&&sess.role==='student'){
    const cached=loadCachedStudentPortal(sess.email);
    if(cached&&cached.student){
      STATE.userEmail=sess.email;
      STATE.studentPortal=cached;
      showStudent();
      status('Portal carregado. Buscando atualizações…',2500);
      log('Sessão do aluno restaurada do cache para '+sess.email,'ok');
      // refresh em segundo plano: busca versão nova do Supabase mesmo com cache
      (async()=>{try{const fresh=await sbRead(sess.email);if(fresh&&fresh.meta?.kind==='studentPortal'&&fresh.student){const oldFp=JSON.stringify({l:cached.lessons,m:cached.materials,f:cached.finance});const newFp=JSON.stringify({l:fresh.lessons,m:fresh.materials,f:fresh.finance});if(oldFp!==newFp){STATE.studentPortal=fresh;cacheStudentPortal(sess.email,fresh);if(STATE.mode==='student'&&typeof renderStudent==='function')renderStudent();status('Portal atualizado.',3000);log('Portal do aluno atualizado do Supabase em segundo plano.','ok');}}}catch(e){log('Refresh do portal falhou: '+(e.message||e),'warn');}})();
    }else{
      showGate('Carregando portal…','Tentando restaurar a sessão do aluno.');
      setTimeout(()=>{
        if(STATE.mode!=='student'){
          showLogin('Sua sessão expirou. Clique em "Entrar com Google" para abrir seu portal.');
          log('Restauração silenciosa do aluno falhou (popup bloqueado ou sessão expirada). Voltando ao login.','warn');
        }
      },4500);
    }
  }else{
    showLogin('Carregando autenticação Google...');
  }
  const wait=setInterval(()=>{
    if(window.google&&google.accounts&&google.accounts.oauth2){
      clearInterval(wait);
      initGoogleDrive();
      if(STATE.mode==='login') $('loginMsg').textContent='Pronto para entrar.';
      if(sess.email&&sess.role==='student'&&STATE.mode!=='student'){
        try{STATE.tokenClient.requestAccessToken({prompt:''})}catch(e){if(STATE.mode!=='student')showLogin('Entre com Google para abrir o portal do aluno.')}
      }
      if(STATE.pendingDriveReconnect&&STATE.mode==='admin'){
        STATE.pendingDriveReconnect=false;
        STATE.silentDriveAttempt=true;
        try{
          STATE.tokenClient.requestAccessToken({prompt:''});
          // Se em 4s nao houve resposta, presume que virou popup e desiste
          setTimeout(()=>{
            if(STATE.silentDriveAttempt&&!STATE.driveReady&&STATE.mode==='admin'){
              STATE.silentDriveAttempt=false;
              log('Reconexão silenciosa do Drive não respondeu em 4s (provavelmente virou popup). Use o botão "⚠ conectar Drive" quando precisar.','warn');
              status('Drive não reconectou automaticamente. Clique em "⚠ conectar Drive" quando precisar enviar arquivos.',5000);
            }
          },4000);
        }catch(e){
          STATE.silentDriveAttempt=false;
          log('Reconexão automática do Drive falhou. Use o botão conectar Drive.','warn');
        }
      }
    }
  },200);
  setTimeout(()=>{if(!STATE.tokenClient&&STATE.mode==='login')$('loginMsg').textContent='Erro ao carregar autenticação Google. Recarregue a página.'},10000);
}
window.addEventListener('load',boot);
</script>
