<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LessonHub v2.0.0-alpha.2 · Admin Writer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#fbfaf7;--paper:#fffdf9;--ink:#181512;--muted:#756e67;--line:rgba(24,21,18,.14);--line2:rgba(24,21,18,.07);--wash:rgba(255,253,249,.78);--shadow:0 28px 80px rgba(35,28,20,.055);--danger:#9d2d25;--ok:#28745a}
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:radial-gradient(circle at 12% -8%,rgba(190,165,126,.14),transparent 28%),var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button,input,select,textarea{font:inherit}button{cursor:pointer}textarea{min-height:96px;resize:vertical}.shell{width:min(1260px,calc(100% - 32px));margin:0 auto;padding:30px 0 70px}.mast{border-bottom:1px solid var(--ink);padding:18px 0 20px;margin-bottom:16px;display:flex;justify-content:space-between;gap:20px;align-items:end}.logo{font-family:Georgia,serif;font-size:54px;line-height:.82;letter-spacing:-.075em;font-weight:400}.kicker{font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted)}.subtle{font-size:13px;color:var(--muted);line-height:1.55}.hero,.panel,.card,.item,.modal-box{background:var(--wash);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(18px)}.hero{border-color:var(--ink);padding:24px;margin-bottom:18px}.hero h2{font-family:Georgia,serif;font-size:44px;line-height:.92;letter-spacing:-.06em;font-weight:400;margin-bottom:10px}.btn{border:1px solid var(--ink);background:transparent;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.14em}.btn:hover{background:var(--ink);color:var(--paper)}.btn.soft{border-color:var(--line);color:var(--muted)}.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}.card{min-height:112px;padding:20px;display:flex;flex-direction:column;justify-content:space-between}.num{font-family:Georgia,serif;font-size:38px;letter-spacing:-.06em;line-height:.9;word-break:break-word}.label{font-size:10px;text-transform:uppercase;letter-spacing:.17em;color:var(--muted)}.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.panel{padding:20px;margin-bottom:16px}.panel-title{display:flex;justify-content:space-between;gap:14px;align-items:end;border-bottom:1px solid var(--ink);padding-bottom:10px;margin-bottom:14px}.panel-title h3{font-family:Georgia,serif;font-weight:400;font-size:27px;letter-spacing:-.04em}.list{display:grid;gap:10px}.item{padding:16px}.item-title{font-family:Georgia,serif;font-size:24px;font-weight:400;letter-spacing:-.045em}.meta{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.45}.info{margin-top:12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:8px 14px;border-top:1px solid var(--line2);padding-top:10px}.info div{font-size:12px;color:var(--muted);line-height:1.4}.info b{font-weight:500;color:var(--ink)}.actions{display:flex;gap:11px;flex-wrap:wrap;margin-top:12px}.actions button{border:0;background:transparent;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.13em;border-bottom:1px solid transparent;padding:0 0 3px}.actions button:hover{color:var(--ink);border-bottom-color:var(--ink)}.tabs{display:flex;gap:15px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:14px;margin:18px 0 20px}.tabs button{border:0;background:transparent;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.15em;padding:0 0 4px;border-bottom:1px solid transparent}.tabs button.active,.tabs button:hover{color:var(--ink);border-bottom-color:var(--ink)}.empty{border:1px dashed var(--line);padding:28px;text-align:center;color:var(--muted);background:rgba(255,255,255,.32)}.empty h3{font-family:Georgia,serif;font-size:27px;font-weight:400;letter-spacing:-.04em;color:var(--ink);margin-bottom:8px}.footer{border-top:1px solid var(--line);padding:14px 0 26px;margin-top:22px;display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:11px}.status{white-space:pre-wrap;margin-top:12px;font-size:12px;color:var(--muted);line-height:1.5}.bad{color:var(--danger)}.good{color:var(--ok)}.gate{position:fixed;inset:0;background:var(--bg);z-index:60;display:none;align-items:center;justify-content:center;text-align:center;padding:24px}.gate.active{display:flex}.gate h2{font-family:Georgia,serif;font-size:44px;font-weight:400;letter-spacing:-.06em;margin-bottom:10px}.modal{position:fixed;inset:0;background:rgba(24,21,18,.38);z-index:80;display:none;align-items:center;justify-content:center;padding:18px}.modal.active{display:flex}.modal-box{width:min(920px,100%);max-height:92vh;overflow:auto;padding:26px}.modal-head{display:flex;justify-content:space-between;gap:18px;border-bottom:1px solid var(--ink);padding-bottom:12px;margin-bottom:16px}.modal-head h2{font-family:Georgia,serif;font-size:34px;font-weight:400;letter-spacing:-.05em}.x{border:0;background:transparent;text-transform:uppercase;letter-spacing:.14em;font-size:10px;color:var(--muted)}.field{display:grid;gap:6px;margin-bottom:12px}.field label{font-size:10px;text-transform:uppercase;letter-spacing:.17em;color:var(--muted)}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.72);padding:11px 12px;color:var(--ink)}@media(max-width:820px){.shell{width:min(100% - 24px,1260px);padding-top:22px}.mast,.two,.three,.grid{grid-template-columns:1fr;display:grid}.logo{font-size:44px}.hero h2{font-size:36px}.modal{align-items:flex-start}.modal-box{margin-top:12px}}
</style>
</head>
<body>
<div class="gate active" id="gate"><div><h2>Carregando LessonHub…</h2><p class="subtle" id="gateText">Verificando sessão com segurança.</p></div></div>
<div class="shell">
<header class="mast"><div><h1 class="logo">Lesson<br>Hub</h1><p class="kicker" style="margin-top:12px">v2.0.0-alpha.2 · Admin Writer</p></div><p class="kicker" id="sessionMini">backend staging</p></header>
<main id="app"></main>
<footer class="footer"><span>Erik Azevedo (@prof.erikazevedo)</span><span id="footerMode">Supabase</span></footer>
</div>
<div class="modal" id="modal"><div class="modal-box"><div class="modal-head"><div><h2 id="modalTitle">Modal</h2><p class="subtle" id="modalSub"></p></div><button class="x" onclick="closeModal()">fechar</button></div><div id="modalBody"></div></div></div>
<script>
const SUPABASE_URL="https://ezgaqcxrbticangnnryo.supabase.co";
const SUPABASE_KEY="sb_publishable_k-Ch1aS1UkRR-OlDzAbH-Q_B4a8e7kE";
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
let state={session:null,user:null,email:"",profile:null,student:null,lessons:[],payments:[],materialsByLesson:{},admin:{students:[],lessons:[],payments:[],materials:[],links:[]}};
let loading=false,lastLoad=0,adminTab="today";
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmtDate(d){if(!d)return"—";const p=String(d).slice(0,10).split("-");return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d}
function fmtMoney(n){return(Number(n)||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function moneyNum(n){return Number(String(n||"").replace(",", "."))||0}
function gate(msg,show=true){document.getElementById("gateText").textContent=msg||"Carregando.";document.getElementById("gate").classList.toggle("active",!!show)}
function empty(t,x){return`<div class="empty"><h3>${esc(t)}</h3><p>${esc(x)}</p></div>`}
function openModal(title,sub,body){document.getElementById("modalTitle").textContent=title;document.getElementById("modalSub").textContent=sub||"";document.getElementById("modalBody").innerHTML=body;document.getElementById("modal").classList.add("active")}
function closeModal(){document.getElementById("modal").classList.remove("active")}
function toast(msg){alert(msg)}
function drivePreview(url){url=String(url||"").trim();if(!url)return"";let m=url.match(/\/presentation\/d\/([^\/]+)/);if(m)return`https://docs.google.com/presentation/d/${m[1]}/preview`;m=url.match(/\/document\/d\/([^\/]+)/);if(m)return`https://docs.google.com/document/d/${m[1]}/preview`;m=url.match(/\/spreadsheets\/d\/([^\/]+)/);if(m)return`https://docs.google.com/spreadsheets/d/${m[1]}/preview`;m=url.match(/\/file\/d\/([^\/]+)/);if(m)return`https://drive.google.com/file/d/${m[1]}/preview`;return url}
function driveDownload(url){url=String(url||"").trim();if(!url)return"";let m=url.match(/\/presentation\/d\/([^\/]+)/);if(m)return`https://docs.google.com/presentation/d/${m[1]}/export/pdf`;m=url.match(/\/document\/d\/([^\/]+)/);if(m)return`https://docs.google.com/document/d/${m[1]}/export?format=pdf`;m=url.match(/\/file\/d\/([^\/]+)/);if(m)return`https://drive.google.com/uc?export=download&id=${m[1]}`;return url}
function driveId(url){let m=String(url||"").match(/\/d\/([^\/]+)/);return m?m[1]:""}
async function signIn(){const redirectTo=window.location.href.split("#")[0].split("?")[0];const{error}=await client.auth.signInWithOAuth({provider:"google",options:{redirectTo}});if(error)alert("Erro no login: "+error.message)}
async function signOut(){try{gate("Saindo…");await client.auth.signOut()}finally{state={session:null,user:null,email:"",profile:null,student:null,lessons:[],payments:[],materialsByLesson:{},admin:{students:[],lessons:[],payments:[],materials:[],links:[]}};renderLogin();gate("",false)}}
async function init(){if(loading)return;loading=true;try{gate("Verificando sessão…");const{data,error}=await client.auth.getSession();if(error){renderLogin("Erro ao recuperar sessão: "+error.message);return}if(!data.session){renderLogin();return}state.session=data.session;state.user=data.session.user;state.email=(state.user.email||"").toLowerCase();await loadRoleAndData()}finally{gate("",false);loading=false}}
client.auth.onAuthStateChange(async(event,session)=>{if(event==="SIGNED_IN"&&session){state.session=session;state.user=session.user;state.email=(session.user.email||"").toLowerCase();await loadRoleAndData();gate("",false)}})
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible"){const g=document.getElementById("gate");if(g.classList.contains("active"))setTimeout(init,250)}})
function renderLogin(msg=""){document.getElementById("sessionMini").textContent="não conectado";document.getElementById("footerMode").textContent="login necessário";document.getElementById("app").innerHTML=`<section class="hero"><h2>Entrar no LessonHub</h2><p class="subtle">Backend v2.0 com Supabase. Entre com a conta vinculada em profiles.</p><div class="btn-row"><button class="btn" onclick="signIn()">entrar com Google</button></div><div class="status ${msg?'bad':''}">${esc(msg||"Aguardando login.")}</div></section>`}
async function loadRoleAndData(){gate("Buscando perfil…");document.getElementById("sessionMini").textContent=state.email;const{data:profile,error}=await client.from("profiles").select("*").eq("email",state.email).maybeSingle();if(error){renderLogin("Erro ao consultar profile:\n"+error.message);return}if(!profile){renderUnauthorized();return}state.profile=profile;if(profile.role==="admin"){await loadAdmin();return}if(profile.role==="student"){await loadStudent(profile);return}renderUnauthorized("Role desconhecida: "+profile.role)}
function renderUnauthorized(extra=""){document.getElementById("footerMode").textContent="acesso não autorizado";document.getElementById("app").innerHTML=`<section class="hero"><h2>Acesso não autorizado</h2><p class="subtle">O e-mail ${esc(state.email)} ainda não está vinculado ao LessonHub.</p>${extra?`<div class="status bad">${esc(extra)}</div>`:""}<div class="btn-row"><button class="btn" onclick="signOut()">sair</button></div></section>`}
async function loadAdmin(){gate("Carregando painel professor…");document.getElementById("footerMode").textContent="professor";const [students,lessons,payments,materials,links]=await Promise.all([client.from("students").select("*").order("created_at",{ascending:false}),client.from("lessons").select("*").order("date",{ascending:true}),client.from("payments").select("*").order("created_at",{ascending:false}),client.from("materials").select("*").order("created_at",{ascending:false}),client.from("lesson_materials").select("*")]);const errs=[students.error,lessons.error,payments.error,materials.error,links.error].filter(Boolean);if(errs.length){renderLogin("Erro admin:\n"+errs.map(e=>e.message).join("\n"));return}state.admin={students:students.data||[],lessons:lessons.data||[],payments:payments.data||[],materials:materials.data||[],links:links.data||[]};renderAdmin()}
function adminTabs(){return`<div class="tabs"><button class="${adminTab==='today'?'active':''}" onclick="adminTab='today';renderAdmin()">Hoje</button><button class="${adminTab==='students'?'active':''}" onclick="adminTab='students';renderAdmin()">Alunos</button><button class="${adminTab==='lessons'?'active':''}" onclick="adminTab='lessons';renderAdmin()">Aulas</button><button class="${adminTab==='materials'?'active':''}" onclick="adminTab='materials';renderAdmin()">Materiais</button><button class="${adminTab==='finance'?'active':''}" onclick="adminTab='finance';renderAdmin()">Financeiro</button></div>`}
function studentName(id){return(state.admin.students.find(s=>s.id===id)||{}).name||"Aluno"}
function renderAdmin(){const a=state.admin;document.getElementById("app").innerHTML=`<section class="hero"><h2>Professor</h2><p class="subtle">Admin Writer mínimo. Crie alunos, aulas, mensalidades e materiais sem SQL.</p><div class="btn-row"><button class="btn" onclick="openStudentForm()">novo aluno</button><button class="btn" onclick="openLessonForm()">nova aula</button><button class="btn" onclick="openPaymentForm()">nova mensalidade</button><button class="btn" onclick="openMaterialForm()">novo material</button><button class="btn soft" onclick="signOut()">sair</button></div></section><div class="grid"><div class="card"><div class="num">${a.students.length}</div><div class="label">alunos</div></div><div class="card"><div class="num">${a.lessons.length}</div><div class="label">aulas</div></div><div class="card"><div class="num">${a.payments.length}</div><div class="label">mensalidades</div></div><div class="card"><div class="num">${a.materials.length}</div><div class="label">materiais</div></div></div>${adminTabs()}${renderAdminTab()}`}
function renderAdminTab(){const a=state.admin;if(adminTab==="students")return`<section class="panel"><div class="panel-title"><h3>Alunos</h3><button class="btn" onclick="openStudentForm()">novo aluno</button></div><div class="list">${a.students.map(s=>`<div class="item"><div class="item-title">${esc(s.name)}</div><div class="meta">${esc([s.email,s.language,s.active_course_name,s.active_course_level,s.status].filter(Boolean).join(" · "))}</div><div class="actions"><button onclick="openStudentForm('${s.id}')">editar</button><button onclick="previewStudent('${s.id}')">ver como aluno</button><button onclick="openLessonForm('', '${s.id}')">nova aula</button></div></div>`).join("")||empty("Sem alunos","Cadastre o primeiro aluno.")}</div></section>`;if(adminTab==="lessons")return`<section class="panel"><div class="panel-title"><h3>Aulas</h3><button class="btn" onclick="openLessonForm()">nova aula</button></div><div class="list">${a.lessons.map(l=>`<div class="item"><div class="item-title">${esc(fmtDate(l.date))}${l.start_time?' · '+esc(String(l.start_time).slice(0,5)):''}</div><div class="meta">${esc(studentName(l.student_id))} · ${esc([l.title,l.course_name,l.level,l.unit].filter(Boolean).join(" · "))}</div><div class="info"><div><b>Materiais:</b> ${materialsForLessonAdmin(l.id).length}</div><div><b>Status:</b> ${esc(l.status||"agendada")}</div></div><div class="actions"><button onclick="openLessonForm('${l.id}')">editar</button><button onclick="openLinkMaterial('${l.id}')">vincular material</button></div></div>`).join("")||empty("Sem aulas","Crie uma aula para um aluno.")}</div></section>`;if(adminTab==="materials")return`<section class="panel"><div class="panel-title"><h3>Materiais</h3><button class="btn" onclick="openMaterialForm()">novo material</button></div><div class="list">${a.materials.map(m=>`<div class="item"><div class="item-title">${esc(m.title_student||m.title_internal||"Material")}</div><div class="meta">${esc([m.type,m.student_visible?'visível':'oculto',m.download_allowed?'download ok':'sem download'].filter(Boolean).join(" · "))}</div><div class="actions"><button onclick="openMaterialForm('${m.id}')">editar</button>${m.drive_preview_url?`<button onclick="window.open('${esc(m.drive_preview_url)}','_blank')">abrir</button>`:""}</div></div>`).join("")||empty("Sem materiais","Cadastre um link do Drive.")}</div></section>`;if(adminTab==="finance")return`<section class="panel"><div class="panel-title"><h3>Financeiro</h3><button class="btn" onclick="openPaymentForm()">nova mensalidade</button></div><div class="list">${a.payments.map(p=>`<div class="item"><div class="item-title">${esc(studentName(p.student_id))} · ${esc(p.month||"Mensalidade")}</div><div class="meta">${esc(p.status||"pendente")} · ${fmtMoney(p.amount)} · ${p.expected_lessons||0} aulas · próximo: ${fmtDate(p.next_payment_date)}</div><div class="actions"><button onclick="openPaymentForm('${p.id}')">editar</button></div></div>`).join("")||empty("Sem mensalidades","Cadastre a primeira mensalidade.")}</div></section>`;return`<div class="two"><section class="panel"><div class="panel-title"><h3>Próximas aulas</h3></div><div class="list">${a.lessons.slice(0,6).map(l=>`<div class="item"><div class="item-title">${esc(fmtDate(l.date))}${l.start_time?' · '+esc(String(l.start_time).slice(0,5)):''}</div><div class="meta">${esc(studentName(l.student_id))} · ${esc([l.title,l.course_name,l.level].filter(Boolean).join(" · "))}</div></div>`).join("")||empty("Sem aulas","Nenhuma aula cadastrada.")}</div></section><section class="panel"><div class="panel-title"><h3>Alunos recentes</h3></div><div class="list">${a.students.slice(0,6).map(s=>`<div class="item"><div class="item-title">${esc(s.name)}</div><div class="meta">${esc([s.email,s.active_course_name,s.active_course_level].filter(Boolean).join(" · "))}</div></div>`).join("")||empty("Sem alunos","Nenhum aluno cadastrado.")}</div></section></div>`}
function studentOptions(sel=""){return state.admin.students.map(s=>`<option value="${s.id}" ${s.id===sel?'selected':''}>${esc(s.name)} · ${esc(s.email||"")}</option>`).join("")}
function lessonOptions(sel=""){return state.admin.lessons.map(l=>`<option value="${l.id}" ${l.id===sel?'selected':''}>${esc(studentName(l.student_id))} · ${fmtDate(l.date)} · ${esc(l.title||"Aula")}</option>`).join("")}
function materialOptions(sel=""){return state.admin.materials.map(m=>`<option value="${m.id}" ${m.id===sel?'selected':''}>${esc(m.title_student||m.title_internal||"Material")}</option>`).join("")}
function materialsForLessonAdmin(id){const ids=state.admin.links.filter(x=>x.lesson_id===id).map(x=>x.material_id);return state.admin.materials.filter(m=>ids.includes(m.id))}
function openStudentForm(id=""){const s=state.admin.students.find(x=>x.id===id)||{};openModal(id?"Editar aluno":"Novo aluno","Cria/atualiza students e profile de aluno.",`<div class="two"><div class="field"><label>Nome</label><input id="stName" value="${esc(s.name||"")}"></div><div class="field"><label>E-mail</label><input id="stEmail" value="${esc(s.email||"")}"></div></div><div class="three"><div class="field"><label>Idioma</label><input id="stLanguage" value="${esc(s.language||"Português")}"></div><div class="field"><label>Curso ativo</label><input id="stCourse" value="${esc(s.active_course_name||"")}"></div><div class="field"><label>Nível ativo</label><input id="stLevel" value="${esc(s.active_course_level||"")}"></div></div><div class="two"><div class="field"><label>Telefone</label><input id="stPhone" value="${esc(s.phone||"")}"></div><div class="field"><label>Status</label><select id="stStatus">${["ativo","pausado","arquivado"].map(x=>`<option ${x===(s.status||"ativo")?"selected":""}>${x}</option>`).join("")}</select></div></div><div class="field"><label>Notas</label><textarea id="stNotes">${esc(s.notes||"")}</textarea></div><button class="btn" onclick="saveStudent('${id}')">salvar aluno</button>`)}
async function saveStudent(id=""){const row={name:val("stName"),email:val("stEmail").toLowerCase(),phone:val("stPhone"),language:val("stLanguage"),active_course_name:val("stCourse"),active_course_level:val("stLevel"),status:val("stStatus"),notes:val("stNotes")};if(!row.name||!row.email)return alert("Nome e e-mail são obrigatórios.");gate("Salvando aluno…");let res;if(id)res=await client.from("students").update(row).eq("id",id).select().single();else res=await client.from("students").insert(row).select().single();if(res.error){gate("",false);return alert(res.error.message)}const st=res.data;const prof=await client.from("profiles").upsert({email:st.email,role:"student",student_id:st.id},{onConflict:"email"});gate("",false);if(prof.error)return alert("Aluno salvo, mas profile falhou: "+prof.error.message);closeModal();await loadAdmin()}
function openLessonForm(id="",studentId=""){const l=state.admin.lessons.find(x=>x.id===id)||{};studentId=studentId||l.student_id||"";openModal(id?"Editar aula":"Nova aula","Cria/atualiza aula no Supabase.",`<div class="field"><label>Aluno</label><select id="lsStudent">${studentOptions(studentId)}</select></div><div class="two"><div class="field"><label>Data</label><input id="lsDate" type="date" value="${esc(l.date||"")}"></div><div class="field"><label>Horário</label><input id="lsTime" type="time" value="${esc(l.start_time?String(l.start_time).slice(0,5):"")}"></div></div><div class="three"><div class="field"><label>Idioma</label><input id="lsLanguage" value="${esc(l.language||"")}"></div><div class="field"><label>Curso</label><input id="lsCourse" value="${esc(l.course_name||"")}"></div><div class="field"><label>Nível</label><input id="lsLevel" value="${esc(l.level||"")}"></div></div><div class="two"><div class="field"><label>Unidade</label><input id="lsUnit" value="${esc(l.unit||"")}"></div><div class="field"><label>Título</label><input id="lsTitle" value="${esc(l.title||"Aula")}"></div></div><div class="three"><div class="field"><label>Status</label><select id="lsStatus">${["agendada","concluída","cancelada","reposição","pendente"].map(x=>`<option ${x===(l.status||"agendada")?"selected":""}>${x}</option>`).join("")}</select></div><div class="field"><label>Planejamento</label><select id="lsPlan">${["a planejar","preparado"].map(x=>`<option ${x===(l.plan_status||"a planejar")?"selected":""}>${x}</option>`).join("")}</select></div><div class="field"><label>Materiais</label><select id="lsMatStatus">${["pendente","preparado","liberado"].map(x=>`<option ${x===(l.materials_status||"pendente")?"selected":""}>${x}</option>`).join("")}</select></div></div><div class="field"><label>Notas</label><textarea id="lsNotes">${esc(l.notes||"")}</textarea></div><button class="btn" onclick="saveLesson('${id}')">salvar aula</button>`)}
async function saveLesson(id=""){const row={student_id:val("lsStudent"),date:val("lsDate")||null,start_time:val("lsTime")||null,language:val("lsLanguage"),course_name:val("lsCourse"),level:val("lsLevel"),unit:val("lsUnit"),title:val("lsTitle")||"Aula",status:val("lsStatus"),plan_status:val("lsPlan"),materials_status:val("lsMatStatus"),student_visible:true,notes:val("lsNotes")};if(!row.student_id)return alert("Escolha aluno.");gate("Salvando aula…");const res=id?await client.from("lessons").update(row).eq("id",id):await client.from("lessons").insert(row);gate("",false);if(res.error)return alert(res.error.message);closeModal();await loadAdmin()}
function openPaymentForm(id=""){const p=state.admin.payments.find(x=>x.id===id)||{};openModal(id?"Editar mensalidade":"Nova mensalidade","Mensalidade simples vinculada ao aluno.",`<div class="field"><label>Aluno</label><select id="payStudent">${studentOptions(p.student_id||"")}</select></div><div class="three"><div class="field"><label>Mês</label><input id="payMonth" placeholder="2026-05" value="${esc(p.month||"")}"></div><div class="field"><label>Valor</label><input id="payAmount" type="number" step="0.01" value="${esc(p.amount||"")}"></div><div class="field"><label>Status</label><select id="payStatus">${["pendente","pago","atrasado"].map(x=>`<option ${x===(p.status||"pendente")?"selected":""}>${x}</option>`).join("")}</select></div></div><div class="two"><div class="field"><label>Aulas previstas</label><input id="payLessons" type="number" value="${esc(p.expected_lessons||4)}"></div><div class="field"><label>Próximo pagamento</label><input id="payNext" type="date" value="${esc(p.next_payment_date||"")}"></div></div><button class="btn" onclick="savePayment('${id}')">salvar mensalidade</button>`)}
async function savePayment(id=""){const row={student_id:val("payStudent"),month:val("payMonth"),amount:moneyNum(val("payAmount")),status:val("payStatus"),expected_lessons:Number(val("payLessons"))||4,next_payment_date:val("payNext")||null};if(!row.student_id)return alert("Escolha aluno.");gate("Salvando mensalidade…");const res=id?await client.from("payments").update(row).eq("id",id):await client.from("payments").insert(row);gate("",false);if(res.error)return alert(res.error.message);closeModal();await loadAdmin()}
function openMaterialForm(id=""){const m=state.admin.materials.find(x=>x.id===id)||{};openModal(id?"Editar material":"Novo material","Salva metadados e link do Drive.",`<div class="two"><div class="field"><label>Título interno</label><input id="mtInternal" value="${esc(m.title_internal||"")}"></div><div class="field"><label>Título para aluno</label><input id="mtStudent" value="${esc(m.title_student||"")}"></div></div><div class="three"><div class="field"><label>Tipo</label><select id="mtType">${["handout","homework","audio","video","answer key","transcript","test","rubric","presentation","material"].map(x=>`<option ${x===(m.type||"handout")?"selected":""}>${x}</option>`).join("")}</select></div><div class="field"><label>Visível ao aluno</label><select id="mtVisible"><option value="true" ${m.student_visible!==false?"selected":""}>sim</option><option value="false" ${m.student_visible===false?"selected":""}>não</option></select></div><div class="field"><label>Download permitido</label><select id="mtDownload"><option value="true" ${m.download_allowed!==false?"selected":""}>sim</option><option value="false" ${m.download_allowed===false?"selected":""}>não</option></select></div></div><div class="field"><label>Link do Drive</label><input id="mtUrl" value="${esc(m.drive_preview_url||m.drive_download_url||"")}" placeholder="cole link do Google Drive/Docs/Slides"></div><div class="field"><label>Nota para aluno</label><textarea id="mtNote">${esc(m.student_note||"")}</textarea></div><div class="field"><label>Vincular a uma aula agora (opcional)</label><select id="mtLesson"><option value="">não vincular agora</option>${lessonOptions("")}</select></div><button class="btn" onclick="saveMaterial('${id}')">salvar material</button>`)}
async function saveMaterial(id=""){const raw=val("mtUrl"), row={title_internal:val("mtInternal"),title_student:val("mtStudent")||val("mtInternal")||"Material",type:val("mtType"),drive_file_id:driveId(raw),drive_preview_url:drivePreview(raw),drive_download_url:driveDownload(raw),student_visible:val("mtVisible")==="true",download_allowed:val("mtDownload")==="true",student_note:val("mtNote")};gate("Salvando material…");let res=id?await client.from("materials").update(row).eq("id",id).select().single():await client.from("materials").insert(row).select().single();if(res.error){gate("",false);return alert(res.error.message)}const lessonId=val("mtLesson");if(lessonId){const link=await client.from("lesson_materials").upsert({lesson_id:lessonId,material_id:res.data.id},{onConflict:"lesson_id,material_id"});if(link.error){gate("",false);return alert("Material salvo, vínculo falhou: "+link.error.message)}}gate("",false);closeModal();await loadAdmin()}
function openLinkMaterial(lessonId){openModal("Vincular material","Escolha um material existente para esta aula.",`<div class="field"><label>Material</label><select id="linkMat">${materialOptions("")}</select></div><button class="btn" onclick="saveLinkMaterial('${lessonId}')">vincular</button>`)}
async function saveLinkMaterial(lessonId){const materialId=val("linkMat");if(!materialId)return alert("Escolha material.");gate("Vinculando…");const res=await client.from("lesson_materials").upsert({lesson_id:lessonId,material_id:materialId},{onConflict:"lesson_id,material_id"});gate("",false);if(res.error)return alert(res.error.message);closeModal();await loadAdmin()}
function val(id){return(document.getElementById(id)?.value||"").trim()}
async function previewStudent(id){state.profile={role:"student",student_id:id};await loadStudent(state.profile)}
async function loadStudent(profile){gate("Carregando portal do aluno…");document.getElementById("footerMode").textContent="aluno";let student=null;if(profile.student_id){const r=await client.from("students").select("*").eq("id",profile.student_id).maybeSingle();if(r.error){renderLogin("Erro ao buscar student:\n"+r.error.message);return}student=r.data}if(!student){const r=await client.from("students").select("*").eq("email",state.email).maybeSingle();if(r.error){renderLogin("Erro ao buscar student por email:\n"+r.error.message);return}student=r.data}if(!student){renderUnauthorized("Profile existe, mas student não foi encontrado.");return}state.student=student;const lr=await client.from("lessons").select("*").eq("student_id",student.id).eq("student_visible",true).order("date",{ascending:true});if(lr.error){renderLogin("Erro ao buscar aulas:\n"+lr.error.message);return}state.lessons=lr.data||[];const pr=await client.from("payments").select("*").eq("student_id",student.id).order("month",{ascending:false});if(!pr.error)state.payments=pr.data||[];await loadMaterialsForLessons();renderStudentPortal()}
async function loadMaterialsForLessons(){state.materialsByLesson={};const ids=state.lessons.map(l=>l.id);if(!ids.length)return;const link=await client.from("lesson_materials").select("lesson_id, material_id").in("lesson_id",ids);if(link.error)return;const matIds=[...new Set((link.data||[]).map(x=>x.material_id))];if(!matIds.length)return;const mats=await client.from("materials").select("*").in("id",matIds).eq("student_visible",true);if(mats.error)return;for(const l of link.data||[]){const m=(mats.data||[]).find(x=>x.id===l.material_id);if(!m)continue;state.materialsByLesson[l.lesson_id] ||= [];state.materialsByLesson[l.lesson_id].push(m)}}
function studentTab(active){return`<div class="tabs"><button class="${active==='today'?'active':''}" onclick="renderStudentPortal()">Hoje</button><button class="${active==='lessons'?'active':''}" onclick="renderLessons()">Aulas</button><button class="${active==='materials'?'active':''}" onclick="renderMaterials()">Biblioteca</button><button class="${active==='finance'?'active':''}" onclick="renderFinance()">Financeiro</button></div>`}
function renderStudentPortal(){const s=state.student;const next=state.lessons.find(l=>!l.date||l.date>=new Date().toISOString().slice(0,10))||state.lessons[0];const pay=state.payments[0];document.getElementById("app").innerHTML=`<section class="hero"><h2>Olá, ${esc(s.name)}.</h2><p class="subtle">${esc(s.language||"Idioma não definido")} · ${esc(s.active_course_name||"Curso não definido")} · ${esc(s.active_course_level||"Nível não definido")}</p><div class="btn-row">${state.profile?.role==="admin"?`<button class="btn" onclick="loadAdmin()">voltar ao professor</button>`:""}<button class="btn soft" onclick="signOut()">sair</button></div></section>${studentTab("today")}<div class="grid"><div class="card"><div class="num">${next?fmtDate(next.date).slice(0,5):"—"}</div><div class="label">próxima aula</div></div><div class="card"><div class="num">${next?.start_time?String(next.start_time).slice(0,5):"—"}</div><div class="label">horário</div></div><div class="card"><div class="num">${Object.values(state.materialsByLesson).flat().length}</div><div class="label">materiais</div></div><div class="card"><div class="num">${pay?.status||"—"}</div><div class="label">mensalidade</div></div></div><div class="two"><section class="panel"><div class="panel-title"><h3>Próxima aula</h3></div>${next?lessonCard(next):empty("Nenhuma aula","Suas aulas aparecerão aqui quando forem cadastradas.")}</section><section class="panel"><div class="panel-title"><h3>Financeiro</h3></div>${pay?paymentCard(pay):empty("Sem mensalidade","Nenhuma mensalidade cadastrada ainda.")}</section></div>`}
function lessonCard(l){const mats=state.materialsByLesson[l.id]||[];return`<div class="item"><div class="item-title">${esc(fmtDate(l.date))}${l.start_time?" · "+esc(String(l.start_time).slice(0,5)):""}</div><div class="meta">${esc([l.title,l.course_name,l.level,l.unit].filter(Boolean).join(" · "))}</div><div class="info"><div><b>Materiais:</b> ${mats.length?mats.length+" liberado(s)":"ainda não liberados"}</div><div><b>Status:</b> ${esc(l.status||"agendada")}</div></div><div class="actions"><button onclick="renderLessons()">ver aulas</button>${mats[0]?`<button onclick="openMaterial('${mats[0].id}')">abrir material</button>`:""}</div></div>`}
function paymentCard(p){return`<div class="item"><div class="item-title">${esc(p.month||"Mensalidade")}</div><div class="meta">${esc(p.status||"pendente")} · ${fmtMoney(p.amount)} · ${p.expected_lessons||0} aulas previstas</div><div class="info"><div><b>Próximo pagamento:</b> ${p.next_payment_date?fmtDate(p.next_payment_date):"—"}</div></div></div>`}
function renderLessons(){document.getElementById("app").innerHTML=`<section class="hero"><h2>Aulas</h2><p class="subtle">Aulas carregadas diretamente do Supabase.</p></section>${studentTab("lessons")}<section class="panel"><div class="panel-title"><h3>Suas aulas</h3></div><div class="list">${state.lessons.map(lessonCard).join("")||empty("Nenhuma aula","Nenhuma aula visível no backend.")}</div></section>`}
function renderMaterials(){const all=[];for(const l of state.lessons){for(const m of state.materialsByLesson[l.id]||[])all.push({l,m})}document.getElementById("app").innerHTML=`<section class="hero"><h2>Biblioteca</h2><p class="subtle">Materiais liberados para este aluno.</p></section>${studentTab("materials")}<section class="panel"><div class="panel-title"><h3>Materiais</h3></div><div class="list">${all.map(x=>materialCard(x.m,x.l)).join("")||empty("Nenhum material","Nenhum material liberado ainda.")}</div></section>`}
function materialCard(m,l){const title=m.title_student||typeLabel(m.type);const meta=["Aula de "+fmtDate(l.date),l.unit,m.student_note].filter(Boolean).join(" · ");return`<div class="item"><div class="item-title">${esc(title)}</div><div class="meta">${esc(meta)}</div><div class="actions"><button onclick="openMaterial('${m.id}')">abrir</button></div></div>`}
function typeLabel(type){const labels={handout:"Handout",homework:"Homework",audio:"Audio",video:"Video","answer key":"Answer key",transcript:"Transcript",test:"Test",rubric:"Rubric",presentation:"Slides"};return labels[String(type||"").toLowerCase()]||"Material"}
function openMaterial(id){const all=Object.values(state.materialsByLesson).flat();const m=all.find(x=>x.id===id);if(!m)return alert("Material não encontrado.");const url=m.drive_preview_url||m.drive_download_url;if(!url)return alert("Material encontrado, mas ainda sem URL do Drive.");window.open(url,"_blank")}
function renderFinance(){document.getElementById("app").innerHTML=`<section class="hero"><h2>Financeiro</h2><p class="subtle">Resumo simples para o aluno.</p></section>${studentTab("finance")}<section class="panel"><div class="panel-title"><h3>Mensalidades</h3></div><div class="list">${state.payments.map(paymentCard).join("")||empty("Sem mensalidade","Nenhuma mensalidade cadastrada ainda.")}</div></section>`}
init();
</script>
</body>
</html>
