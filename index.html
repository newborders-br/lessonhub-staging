<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LessonHub v2.0.0-alpha · Supabase Portal Test</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#fbfaf7;--paper:#fffdf9;--ink:#181512;--muted:#756e67;--line:rgba(24,21,18,.14);--line2:rgba(24,21,18,.07);--wash:rgba(255,253,249,.74);--shadow:0 28px 80px rgba(35,28,20,.055)}
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:radial-gradient(circle at 12% -8%,rgba(190,165,126,.14),transparent 28%),var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button,input{font:inherit}button{cursor:pointer}.shell{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:30px 0 70px}.mast{border-bottom:1px solid var(--ink);padding:18px 0 20px;margin-bottom:16px;display:flex;justify-content:space-between;gap:20px;align-items:end}.logo{font-family:Georgia,serif;font-size:54px;line-height:.82;letter-spacing:-.075em;font-weight:400}.kicker{font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted)}.subtle{font-size:13px;color:var(--muted);line-height:1.55}.hero,.panel,.card,.item{background:var(--wash);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(18px)}.hero{border-color:var(--ink);padding:24px;margin-bottom:18px}.hero h2{font-family:Georgia,serif;font-size:44px;line-height:.92;letter-spacing:-.06em;font-weight:400;margin-bottom:10px}.login{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:18px}input{border:1px solid var(--line);background:rgba(255,255,255,.72);padding:11px 12px;width:100%}.btn{border:1px solid var(--ink);background:transparent;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.14em}.btn:hover{background:var(--ink);color:var(--paper)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}.card{min-height:120px;padding:20px;display:flex;flex-direction:column;justify-content:space-between}.num{font-family:Georgia,serif;font-size:38px;letter-spacing:-.06em;line-height:.9}.label{font-size:10px;text-transform:uppercase;letter-spacing:.17em;color:var(--muted)}.two{display:grid;grid-template-columns:1.08fr .92fr;gap:16px}.panel{padding:20px;margin-bottom:16px}.panel-title{display:flex;justify-content:space-between;gap:14px;align-items:end;border-bottom:1px solid var(--ink);padding-bottom:10px;margin-bottom:14px}.panel-title h3{font-family:Georgia,serif;font-weight:400;font-size:27px;letter-spacing:-.04em}.list{display:grid;gap:10px}.item{padding:16px}.item-title{font-family:Georgia,serif;font-size:24px;font-weight:400;letter-spacing:-.045em}.meta{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.45}.info{margin-top:12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:8px 14px;border-top:1px solid var(--line2);padding-top:10px}.info div{font-size:12px;color:var(--muted);line-height:1.4}.info b{font-weight:500;color:var(--ink)}.actions{display:flex;gap:11px;flex-wrap:wrap;margin-top:12px}.actions button{border:0;background:transparent;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.13em;border-bottom:1px solid transparent;padding:0 0 3px}.actions button:hover{color:var(--ink);border-bottom-color:var(--ink)}.tabs{display:flex;gap:15px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:14px;margin:18px 0 20px}.tabs button{border:0;background:transparent;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.15em;padding:0 0 4px;border-bottom:1px solid transparent}.tabs button.active,.tabs button:hover{color:var(--ink);border-bottom-color:var(--ink)}.empty{border:1px dashed var(--line);padding:28px;text-align:center;color:var(--muted);background:rgba(255,255,255,.32)}.empty h3{font-family:Georgia,serif;font-size:27px;font-weight:400;letter-spacing:-.04em;color:var(--ink);margin-bottom:8px}.footer{border-top:1px solid var(--line);padding:14px 0 26px;margin-top:22px;display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:11px}.status{white-space:pre-wrap;margin-top:12px;font-size:12px;color:var(--muted);line-height:1.5}.bad{color:#9d2d25}.good{color:#28745a}@media(max-width:800px){.shell{width:min(100% - 24px,1180px);padding-top:22px}.mast,.two,.grid,.login{grid-template-columns:1fr;display:grid}.logo{font-size:44px}.hero h2{font-size:36px}}
</style>
</head>
<body>
<div class="shell">
<header class="mast"><div><h1 class="logo">Lesson<br>Hub</h1><p class="kicker" style="margin-top:12px">v2.0.0-alpha · Supabase Portal Test</p></div><p class="kicker">backend prototype</p></header>
<section class="hero"><h2>Supabase conectado?</h2><p class="subtle">Teste separado para provar que o backend carrega dados em navegador limpo.</p><div class="login"><input id="emailInput" placeholder="Digite o e-mail para testar" value="erikdeazv@gmail.com"><button class="btn" onclick="loadByEmail()">carregar</button></div><div class="status" id="statusBox">Aguardando teste.</div></section>
<main id="app"></main>
<footer class="footer"><span>Erik Azevedo (@prof.erikazevedo)</span><span>Supabase URL: https://ezgaqcxrbticangnnryo.supabase.co</span></footer>
</div>
<script>
const SUPABASE_URL = 'https://ezgaqcxrbticangnnryo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_k-Ch1aS1UkRR-OlDzAbH-Q_B4a8e7kE';
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let state = {email:'',profile:null,student:null,lessons:[],payments:[],materialsByLesson:{}};
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmtDate(d){if(!d)return '—';const p=String(d).slice(0,10).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d}
function fmtMoney(n){return (Number(n)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function setStatus(msg,ok=null){const el=document.getElementById('statusBox');el.className='status '+(ok===true?'good':ok===false?'bad':'');el.textContent=msg}
function empty(t,x){return `<div class="empty"><h3>${esc(t)}</h3><p>${esc(x)}</p></div>`}
async function loadByEmail(){
 const email=document.getElementById('emailInput').value.trim().toLowerCase();
 state={email,profile:null,student:null,lessons:[],payments:[],materialsByLesson:{}};
 document.getElementById('app').innerHTML='';
 if(!email)return setStatus('Digite um e-mail.',false);
 setStatus('Consultando profile no Supabase...');
 const {data:profile,error:profileError}=await client.from('profiles').select('*').eq('email',email).maybeSingle();
 if(profileError)return setStatus('Erro ao consultar profiles:\n'+profileError.message+'\n\nSe aparecer permission denied, precisamos configurar policies.',false);
 if(!profile){setStatus('Nenhum profile encontrado para '+email,false);renderUnknown(email);return}
 state.profile=profile;
 if(profile.role==='admin'){setStatus('Admin encontrado. Carregando resumo...',true);await renderAdmin();return}
 if(profile.role==='student'){setStatus('Aluno encontrado. Carregando portal...',true);await loadStudent(profile);return}
 setStatus('Role desconhecida: '+profile.role,false);
}
async function loadStudent(profile){
 let student=null;
 if(profile.student_id){const r=await client.from('students').select('*').eq('id',profile.student_id).maybeSingle();if(r.error)return setStatus('Erro ao buscar student:\n'+r.error.message,false);student=r.data}
 if(!student){const r=await client.from('students').select('*').eq('email',state.email).maybeSingle();if(r.error)return setStatus('Erro ao buscar student por email:\n'+r.error.message,false);student=r.data}
 if(!student){setStatus('Profile existe, mas students não foi encontrado.',false);renderUnknown(state.email);return}
 state.student=student;
 const lr=await client.from('lessons').select('*').eq('student_id',student.id).eq('student_visible',true).order('date',{ascending:true});
 if(lr.error)return setStatus('Erro ao buscar lessons:\n'+lr.error.message,false);
 state.lessons=lr.data||[];
 const pr=await client.from('payments').select('*').eq('student_id',student.id).order('month',{ascending:false});
 if(!pr.error)state.payments=pr.data||[];
 await loadMaterialsForLessons();
 setStatus(`Aluno carregado: ${student.name}\nAulas: ${state.lessons.length}\nPagamentos: ${state.payments.length}`,true);
 renderStudentPortal();
}
async function loadMaterialsForLessons(){
 state.materialsByLesson={};
 const ids=state.lessons.map(l=>l.id); if(!ids.length)return;
 const link=await client.from('lesson_materials').select('lesson_id, material_id').in('lesson_id',ids);
 if(link.error){console.warn(link.error);return}
 const matIds=[...new Set((link.data||[]).map(x=>x.material_id))]; if(!matIds.length)return;
 const mats=await client.from('materials').select('*').in('id',matIds).eq('student_visible',true);
 if(mats.error){console.warn(mats.error);return}
 for(const l of link.data||[]){const m=(mats.data||[]).find(x=>x.id===l.material_id);if(!m)continue;state.materialsByLesson[l.lesson_id] ||= [];state.materialsByLesson[l.lesson_id].push(m)}
}
function renderUnknown(email){document.getElementById('app').innerHTML=`<section class="panel"><div class="panel-title"><h3>Acesso não encontrado</h3></div>${empty('Sem perfil','Não há profile/student para '+email+'.')}</section>`}
async function renderAdmin(){
 const [s,l,p]=await Promise.all([client.from('students').select('id',{count:'exact',head:true}),client.from('lessons').select('id',{count:'exact',head:true}),client.from('payments').select('id',{count:'exact',head:true})]);
 document.getElementById('app').innerHTML=`<section class="hero"><h2>Professor</h2><p class="subtle">Admin reconhecido pelo backend. Este alpha só valida leitura.</p></section><div class="grid"><div class="card"><div class="num">${s.count??'—'}</div><div class="label">alunos</div></div><div class="card"><div class="num">${l.count??'—'}</div><div class="label">aulas</div></div><div class="card"><div class="num">${p.count??'—'}</div><div class="label">mensalidades</div></div><div class="card"><div class="num">2.0</div><div class="label">backend alpha</div></div></div>`;
}
function tab(active){return `<div class="tabs"><button class="${active==='today'?'active':''}" onclick="renderStudentPortal()">Hoje</button><button class="${active==='lessons'?'active':''}" onclick="renderLessons()">Aulas</button><button class="${active==='materials'?'active':''}" onclick="renderMaterials()">Biblioteca</button><button class="${active==='finance'?'active':''}" onclick="renderFinance()">Financeiro</button></div>`}
function renderStudentPortal(){
 const s=state.student, lessons=state.lessons, next=lessons.find(l=>!l.date||l.date>=new Date().toISOString().slice(0,10))||lessons[0], pay=state.payments[0];
 document.getElementById('app').innerHTML=`<section class="hero"><h2>Olá, ${esc(s.name)}.</h2><p class="subtle">${esc(s.language||'Idioma não definido')} · ${esc(s.active_course_name||'Curso não definido')} · ${esc(s.active_course_level||'Nível não definido')}</p></section>${tab('today')}<div class="grid"><div class="card"><div class="num">${next?fmtDate(next.date).slice(0,5):'—'}</div><div class="label">próxima aula</div></div><div class="card"><div class="num">${next?.start_time?String(next.start_time).slice(0,5):'—'}</div><div class="label">horário</div></div><div class="card"><div class="num">${Object.values(state.materialsByLesson).flat().length}</div><div class="label">materiais</div></div><div class="card"><div class="num">${pay?.status||'—'}</div><div class="label">mensalidade</div></div></div><div class="two"><section class="panel"><div class="panel-title"><h3>Próxima aula</h3></div>${next?lessonCard(next):empty('Nenhuma aula','Suas aulas aparecerão aqui quando forem cadastradas.')}</section><section class="panel"><div class="panel-title"><h3>Financeiro</h3></div>${pay?paymentCard(pay):empty('Sem mensalidade','Nenhuma mensalidade cadastrada ainda.')}</section></div>`;
}
function lessonCard(l){const mats=state.materialsByLesson[l.id]||[];return `<div class="item"><div class="item-title">${esc(fmtDate(l.date))}${l.start_time?' · '+esc(String(l.start_time).slice(0,5)):''}</div><div class="meta">${esc([l.title,l.course_name,l.level,l.unit].filter(Boolean).join(' · '))}</div><div class="info"><div><b>Materiais:</b> ${mats.length?mats.length+' liberado(s)':'ainda não liberados'}</div><div><b>Status:</b> ${esc(l.status||'agendada')}</div></div><div class="actions"><button onclick="renderLessons()">ver aulas</button>${mats[0]?`<button onclick="openMaterial('${mats[0].id}')">abrir material</button>`:''}</div></div>`}
function paymentCard(p){return `<div class="item"><div class="item-title">${esc(p.month||'Mensalidade')}</div><div class="meta">${esc(p.status||'pendente')} · ${fmtMoney(p.amount)} · ${p.expected_lessons||0} aulas previstas</div><div class="info"><div><b>Próximo pagamento:</b> ${p.next_payment_date?fmtDate(p.next_payment_date):'—'}</div></div></div>`}
function renderLessons(){document.getElementById('app').innerHTML=`<section class="hero"><h2>Aulas</h2><p class="subtle">Aulas carregadas diretamente do Supabase.</p></section>${tab('lessons')}<section class="panel"><div class="panel-title"><h3>Suas aulas</h3></div><div class="list">${state.lessons.map(lessonCard).join('')||empty('Nenhuma aula','Nenhuma aula visível no backend.')}</div></section>`}
function renderMaterials(){const all=[];for(const l of state.lessons){for(const m of state.materialsByLesson[l.id]||[])all.push({l,m})}document.getElementById('app').innerHTML=`<section class="hero"><h2>Biblioteca</h2><p class="subtle">Materiais liberados para este aluno.</p></section>${tab('materials')}<section class="panel"><div class="panel-title"><h3>Materiais</h3></div><div class="list">${all.map(x=>materialCard(x.m,x.l)).join('')||empty('Nenhum material','Nenhum material liberado ainda.')}</div></section>`}
function materialCard(m,l){const title=m.title_student||typeLabel(m.type);const meta=['Aula de '+fmtDate(l.date),l.unit,m.student_note].filter(Boolean).join(' · ');return `<div class="item"><div class="item-title">${esc(title)}</div><div class="meta">${esc(meta)}</div><div class="actions"><button onclick="openMaterial('${m.id}')">abrir</button></div></div>`}
function typeLabel(type){const labels={handout:'Handout',homework:'Homework',audio:'Audio',video:'Video','answer key':'Answer key',transcript:'Transcript',test:'Test',rubric:'Rubric'};return labels[String(type||'').toLowerCase()]||'Material'}
function openMaterial(id){const all=Object.values(state.materialsByLesson).flat();const m=all.find(x=>x.id===id);if(!m)return alert('Material não encontrado.');const url=m.drive_preview_url||m.drive_download_url;if(!url)return alert('Material encontrado no banco, mas ainda sem URL do Drive.');window.open(url,'_blank')}
function renderFinance(){document.getElementById('app').innerHTML=`<section class="hero"><h2>Financeiro</h2><p class="subtle">Resumo simples para o aluno.</p></section>${tab('finance')}<section class="panel"><div class="panel-title"><h3>Mensalidades</h3></div><div class="list">${state.payments.map(paymentCard).join('')||empty('Sem mensalidade','Nenhuma mensalidade cadastrada ainda.')}</div></section>`}
</script>
</body>
</html>
