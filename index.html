<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#f5f1e9">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=Geist:wght@300..600&family=Geist+Mono:wght@400..500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
<title>LessonHub v1.17.8-alpha — New Borders</title>
<style>
/* ============================================================
   LessonHub v1.16 · Sprint 1 — Tokens + Tipografia
   Bloco 0+1+2 do editorial.html
   ============================================================ */
:root{
  --paper:#f5f1e9;
  --paper2:#faf7f0;
  --ink:#1a1714;
  --ink2:#3a342d;
  --muted:#857b71;
  --soft:#b4aba0;
  --line:rgba(26,23,20,.16);
  --line2:rgba(26,23,20,.08);
  --rust:#9a4626;
  --rust-soft:#c97a55;
  --ok:#3e6b4a;
  --warn:#8a6312;
  --bad:#9a4626;
  --blue:#315f8f;
  /* aliases de compatibilidade */
  --bg:var(--paper);
  --shadow:none;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Geist',ui-sans-serif,system-ui,sans-serif;
  font-size:14.5px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"ss01","cv11";
}
button,input,textarea,select{font:inherit;color:inherit}
button{cursor:pointer;background:none;border:0;padding:0}
a{color:inherit}
.hidden{display:none!important}

/* ---------- shell: rail + main ---------- */
body.student-mode #adminShell{display:none}
body:not(.student-mode) #studentShell{display:none}

#adminShell{min-height:100vh;display:grid;grid-template-columns:88px 1fr}
.rail{border-right:1px solid var(--line);padding:28px 0 28px 22px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;justify-content:space-between;background:var(--paper)}
.mark{font-family:'Instrument Serif',Georgia,serif;font-size:30px;line-height:.85;letter-spacing:-.04em;font-weight:400}
.mark em{font-style:italic;color:var(--rust)}
.rail-meta{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);writing-mode:vertical-rl;transform:rotate(180deg);line-height:1.6;margin-top:auto}
.rail-foot{font-family:'Geist Mono',ui-monospace,monospace;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);line-height:1.6}
.main-content{padding:28px 56px 80px;max-width:1280px;width:100%;margin:0 auto}

/* ---------- topbar ---------- */
.topbar{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--ink);padding-bottom:18px;margin-bottom:28px;gap:24px;flex-wrap:wrap}
.crumbs{font-family:'Geist Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.crumbs b{color:var(--ink);font-weight:500}
.topbar-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.datebox{font-family:'Geist Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);text-align:right;line-height:1.7}
.datebox b{color:var(--ink);font-weight:500}

/* ---------- nav ---------- */
.nav{display:flex;gap:20px;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:28px;flex-wrap:wrap}
.nav button,.linkbtn{font-family:'Geist',sans-serif;font-size:13.5px;color:var(--muted);padding-bottom:3px;border-bottom:1px solid transparent;transition:color .12s,border-color .12s;font-weight:400;letter-spacing:.01em}
.nav button:hover,.linkbtn:hover{color:var(--ink)}
.nav button.active{color:var(--ink);border-bottom-color:var(--rust)}
.actions{margin-left:auto;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.page{display:none}.page.active{display:block}

/* ---------- page head ---------- */
.page-head{display:flex;justify-content:space-between;gap:20px;align-items:end;margin-bottom:24px}
.page-title h2{
  font-family:'Instrument Serif',Georgia,serif;
  font-weight:400;font-size:54px;line-height:.9;
  letter-spacing:-.035em;
}
.page-title p{
  font-family:'Newsreader',Georgia,serif;
  font-size:16px;color:var(--ink2);margin-top:8px;line-height:1.45;
}

/* ---------- layout grids ---------- */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

/* ---------- cards (KPI) ---------- */
.card{
  padding:22px;min-height:120px;
  display:flex;flex-direction:column;justify-content:space-between;
  border:1px solid var(--line);background:var(--paper2);
}
.card .num{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:42px;letter-spacing:-.04em;font-weight:400;line-height:.9;
}
.card .num em{font-style:italic;color:var(--rust)}
.label{
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:10px;text-transform:uppercase;letter-spacing:.18em;
  color:var(--muted);margin-top:10px;
}

/* ---------- panels ---------- */
.panel{border:1px solid var(--line);background:var(--paper2);padding:20px;margin-bottom:16px}
.panel-title{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:24px;font-weight:400;letter-spacing:-.03em;
  border-bottom:1px solid var(--ink);padding-bottom:10px;margin-bottom:14px;
}

/* ---------- list items ---------- */
.list{display:grid;gap:0}
.item{
  padding:16px 0;
  border-bottom:1px solid var(--line);
}
.item:last-child{border-bottom:0}
.item-title{
  font-family:'Newsreader',Georgia,serif;
  font-size:20px;font-weight:400;letter-spacing:-.015em;line-height:1.15;
  margin-bottom:6px;
}
.item:hover{background:rgba(154,70,38,.025)}
.meta{font-size:13.5px;color:var(--ink2);line-height:1.5}
.subtle{color:var(--muted);font-size:13px;line-height:1.55}

/* ---------- badges → estado tipográfico (bloco 4) ---------- */
.badges{display:flex;gap:12px;flex-wrap:wrap;margin:6px 0;align-items:baseline}
/* manter compatibilidade .badge mas no novo visual */
.badge{
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);
  /* sem caixa, sem fundo, sem borda — só tipografia */
}
.badge.ok{color:var(--ok)}
.badge.warn{color:var(--warn)}
.badge.bad,.badge.danger{color:var(--bad)}
.badge.blue{color:var(--blue)}
/* tag-state: alias explícito do bloco 4 */
.tag-state{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase}
.tag-state.ok{color:var(--ok)}
.tag-state.warn{color:var(--warn)}
.tag-state.todo{color:var(--rust)}

/* ---------- row-actions ---------- */
.row-actions{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-top:10px}
.linkbtn{
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);border-bottom:1px solid transparent;
  transition:color .12s,border-color .12s;
}
.linkbtn:hover{color:var(--rust);border-bottom-color:var(--rust)}

/* ---------- empty state ---------- */
.empty{
  padding:40px;text-align:center;
  border:1px dashed var(--line);
  color:var(--soft);
  font-family:'Newsreader',Georgia,serif;
  font-style:italic;font-size:16px;
}

/* ---------- toolbar + search ---------- */
.toolbar{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:18px}
input[type=text].search,input.search{
  background:transparent;
  border:0;border-bottom:1px solid var(--ink);
  padding:6px 0;outline:none;
  color:var(--ink);font-size:15px;
  font-family:'Newsreader',Georgia,serif;
  min-width:240px;
}
input[type=text].search::placeholder,input.search::placeholder{color:var(--soft);font-style:italic}
input[type=text].search:focus,input.search:focus{border-bottom-color:var(--rust)}

/* ---------- forms ---------- */
.form{display:grid;gap:14px}
.field{display:grid;gap:5px}
.field label,.micro{
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);
}
input:not(.search),textarea,select{
  width:100%;
  background:transparent;
  border:0;border-bottom:1px solid var(--line);
  padding:8px 0;outline:none;color:var(--ink);
  font-size:14.5px;
  border-radius:0;
}
textarea{min-height:80px;resize:vertical;border:1px solid var(--line);padding:10px}
input:focus,textarea:focus,select:focus{border-bottom-color:var(--rust);background:transparent}
textarea:focus{border-color:var(--rust)}

/* ---------- botões ---------- */
.btn{
  border:1px solid var(--ink);
  padding:10px 16px;
  font-family:'Geist Mono',ui-monospace,monospace;
  font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink);
  transition:all .12s;
  border-radius:0;
  background:transparent;
}
.btn:hover{background:var(--ink);color:var(--paper)}
.btn.soft{border-color:var(--line);color:var(--muted)}
.btn.soft:hover{border-color:var(--ink);color:var(--ink);background:transparent}
.btn.danger{border-color:var(--bad);color:var(--bad)}
.btn.danger:hover{background:var(--bad);color:var(--paper)}
.btn.rust{border-color:var(--rust);color:var(--rust)}
.btn.rust:hover{background:var(--rust);color:var(--paper)}

/* ---------- modal ---------- */
.modal{
  position:fixed;inset:0;
  background:rgba(26,23,20,.52);
  display:none;align-items:center;justify-content:center;
  padding:22px;z-index:80;
}
.modal-box{
  width:min(880px,100%);max-height:90vh;overflow:auto;
  padding:28px;
  background:var(--paper2);
  border:1px solid var(--ink);
}
.modal-head{
  display:flex;justify-content:space-between;gap:16px;
  margin-bottom:16px;border-bottom:1px solid var(--ink);padding-bottom:12px;
}
.modal-title{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:28px;letter-spacing:-.03em;font-weight:400;
}
.modal-sub{font-family:'Newsreader',Georgia,serif;font-size:15px;color:var(--ink2);margin-top:4px}

/* ---------- toast + statusbar ---------- */
.toast{
  position:fixed;right:18px;bottom:18px;
  background:var(--ink);color:var(--paper);
  padding:12px 16px;font-size:12px;
  font-family:'Geist Mono',ui-monospace,monospace;
  letter-spacing:.1em;text-transform:uppercase;
  display:none;z-index:100;
}
.statusbar{
  position:fixed;left:18px;bottom:18px;z-index:70;
  border:1px solid var(--line);background:var(--paper2);
  padding:9px 14px;font-size:10px;text-transform:uppercase;
  letter-spacing:.14em;color:var(--muted);display:none;
}

/* ---------- login ---------- */
#loginScreen{
  position:fixed;inset:0;z-index:90;background:var(--paper);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:28px;text-align:center;
}
.login-logo{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:80px;font-weight:400;letter-spacing:-.05em;line-height:.85;
}
.login-logo em{font-style:italic;color:var(--rust)}
.google-btn{
  display:flex;align-items:center;gap:12px;
  padding:14px 28px;background:#fff;border:1px solid var(--line);
  font-size:15px;color:var(--ink2);cursor:pointer;
}
.privacy-gate{
  position:fixed;inset:0;z-index:89;
  display:flex;align-items:center;justify-content:center;
  text-align:center;padding:28px;background:var(--paper);color:var(--ink);
}
.privacy-gate h2{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:clamp(36px,8vw,58px);line-height:.9;
  letter-spacing:-.06em;font-weight:400;margin-bottom:16px;
}
.privacy-gate p{max-width:540px;margin:0 auto;color:var(--muted);font-size:14px;line-height:1.55}

/* ---------- student portal shell ---------- */
.student-shell{
  min-height:100vh;display:grid;
  grid-template-columns:88px 1fr;
}
body.portal-mode{background:#fbf9f3}
body.portal-mode .rail{background:#fbf9f3;border-right-color:var(--line2)}
.student-hero{
  border-bottom:1px solid var(--ink);padding:28px 0 28px;margin-bottom:24px;
}
.student-hero h2{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:54px;line-height:.9;letter-spacing:-.035em;font-weight:400;
}
.student-hero h2 em{font-style:italic;color:var(--rust)}
.student-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.student-card{
  padding:20px;min-height:100px;
  display:flex;flex-direction:column;justify-content:space-between;
  border:1px solid var(--line);background:var(--paper2);
}
.student-card .num{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:38px;letter-spacing:-.04em;font-weight:400;line-height:.9;
}
.student-panel{border:1px solid var(--line);background:var(--paper2);padding:20px;margin-bottom:16px}
.student-panel-title{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:22px;font-weight:400;letter-spacing:-.03em;
  border-bottom:1px solid var(--ink);padding-bottom:10px;margin-bottom:14px;
}
.student-lesson,.student-resource{
  border-bottom:1px solid var(--line);padding:14px 0;
}
.student-lesson-title{
  font-family:'Newsreader',Georgia,serif;
  font-size:20px;letter-spacing:-.015em;
}

/* ---------- student nav ---------- */
.student-nav{display:flex;gap:20px;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:24px;flex-wrap:wrap}
.student-nav button{font-family:'Geist',sans-serif;font-size:13.5px;color:var(--muted);padding-bottom:3px;border-bottom:1px solid transparent;transition:color .12s,border-color .12s}
.student-nav button.active{color:var(--ink);border-bottom-color:var(--rust)}
.student-nav button:hover{color:var(--ink)}

/* ---------- viewer ---------- */
.viewer-frame iframe{
  width:min(1000px,calc(100vw - 28px));
  height:calc(100vh - 100px);
  border:0;background:white;
}
@media(max-width:700px){
}

/* ---------- misc ---------- */
.danger-note{border-left:2px solid var(--bad);padding-left:12px;color:var(--bad)}
.lesson-row--done{opacity:.6}
.lesson-row--done .lesson-time{color:var(--muted)}
.linkbtn--done{color:var(--ok)!important}
.linkbtn--done:hover{color:var(--ok)!important;border-bottom-color:var(--ok)!important}

/* ---------- hero (bloco 5 Today) ---------- */
.hero{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(0,1fr);gap:64px;align-items:end;margin-bottom:44px;padding-bottom:32px;border-bottom:1px solid var(--line)}
.hero h1{font-family:'Instrument Serif',Georgia,serif;font-weight:400;font-size:72px;line-height:.9;letter-spacing:-.035em}
.hero h1 em{font-style:italic;color:var(--rust)}
.hero .lede{font-family:'Newsreader',Georgia,serif;font-size:18px;line-height:1.45;color:var(--ink2);max-width:46ch}
.hero .lede strong{font-weight:500;color:var(--ink)}
.cols-2{display:grid;grid-template-columns:minmax(0,2fr) minmax(0,1fr);gap:48px}
.section-title{font-family:'Geist Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--ink);padding-bottom:10px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:baseline}
.section-title .count{color:var(--soft)}
/* lesson-row */
.lesson-row{display:grid;grid-template-columns:104px 1fr auto;gap:24px;padding:18px 0;border-bottom:1px solid var(--line);align-items:start}
.lesson-row:last-child{border-bottom:0}
.lesson-time{font-family:'Instrument Serif',Georgia,serif;font-size:38px;line-height:.9;letter-spacing:-.025em}
.lesson-time .ampm{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;color:var(--muted);letter-spacing:.14em;display:block;margin-top:4px;text-transform:uppercase}
.lesson-body .name{font-family:'Newsreader',Georgia,serif;font-size:22px;line-height:1.1;letter-spacing:-.015em;margin-bottom:4px}
.lesson-body .course{font-family:'Geist Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.lesson-body .topic{font-size:14px;color:var(--ink2);max-width:48ch;line-height:1.5}
.lesson-meta{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:130px}
.lesson-meta .val{font-family:'Geist Mono',ui-monospace,monospace;font-size:12px;color:var(--muted)}
/* sidebar metrics */
.side-stack{display:flex;flex-direction:column;gap:24px}
.metric{border-top:1px solid var(--ink);padding-top:14px}
.metric .num{font-family:'Instrument Serif',Georgia,serif;font-size:58px;line-height:.9;letter-spacing:-.03em}
.metric .num em{font-style:italic;color:var(--rust)}
.metric .lbl{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:6px}
.metric .delta{font-size:13px;color:var(--ink2);margin-top:4px}
/* bloco 6 students list */
.students-toolbar{display:flex;justify-content:space-between;align-items:center;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.student-row{display:grid;grid-template-columns:1.6fr 1.4fr 1fr 1fr 40px;gap:24px;padding:18px 0;border-bottom:1px solid var(--line);align-items:center;cursor:pointer;transition:background .12s}
.student-row:hover{background:rgba(154,70,38,.03)}
.student-row.head{cursor:default;border-bottom:1px solid var(--ink);padding:10px 0;font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.student-row.head:hover{background:transparent}
.s-name{font-family:'Newsreader',Georgia,serif;font-size:20px;line-height:1.1;letter-spacing:-.015em}
.s-name small{display:block;font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-top:3px}
.s-course{font-size:13.5px;color:var(--ink2)}
.s-course em{font-style:normal;color:var(--muted);font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.08em;display:block;margin-top:2px}
.s-next{font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;color:var(--ink);letter-spacing:.04em}
.s-next small{color:var(--muted);display:block;margin-top:2px;letter-spacing:.14em;text-transform:uppercase;font-size:9.5px}
.s-fin{font-family:'Geist Mono',ui-monospace,monospace;font-size:11.5px;color:var(--ink)}
.s-fin small{display:block;font-size:9.5px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
.s-fin.warn{color:var(--rust)}
.s-arrow{text-align:right;font-family:'Instrument Serif',Georgia,serif;font-size:22px;color:var(--soft);transition:color .12s,transform .12s}
.student-row:hover .s-arrow{color:var(--rust);transform:translateX(3px)}
/* ---------- form system (bloco 14) ---------- */
.form-section{padding:0 0 32px;border-bottom:1px solid var(--line);margin-bottom:32px}
.form-section:last-of-type{border-bottom:0;margin-bottom:0;padding-bottom:0}
.form-section-title{font-family:'Geist Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink);border-bottom:1px solid var(--ink);padding-bottom:10px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:baseline}
.form-section-title .help{color:var(--muted);font-size:12px;letter-spacing:0;text-transform:none;font-style:italic;font-family:'Newsreader',serif;font-weight:400}
.form-row{margin-bottom:24px}.form-row:last-child{margin-bottom:0}
.form-row.split{display:grid;grid-template-columns:1fr 1fr;gap:32px}
.form-row.split3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px}
.form-row.split2-1{display:grid;grid-template-columns:2fr 1fr;gap:32px}
.ff-label{display:block;font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.ff-label .req{color:var(--rust);margin-left:3px;letter-spacing:0}
.ff-label .hint{font-family:'Newsreader',serif;font-style:italic;font-size:12.5px;letter-spacing:0;text-transform:none;color:var(--muted);margin-left:10px;font-weight:400}
.ff-input,.ff-select,.ff-textarea{width:100%;border:0;border-bottom:1px solid var(--ink);background:transparent;padding:6px 0 10px;font-family:'Newsreader',serif;font-size:17px;color:var(--ink);letter-spacing:-.005em;outline:0;border-radius:0;line-height:1.4}
.ff-input:focus,.ff-select:focus,.ff-textarea:focus{border-bottom-color:var(--rust);outline:none}
.ff-input::placeholder,.ff-textarea::placeholder{color:var(--soft);font-style:italic}
.ff-input.mono{font-family:'Geist Mono',ui-monospace,monospace;font-size:14px;letter-spacing:.02em}
.ff-input.ff-large{font-family:'Instrument Serif',serif;font-size:42px;line-height:1;letter-spacing:-.03em;font-weight:400;padding:8px 0 12px}
.ff-textarea{resize:vertical;min-height:88px;line-height:1.55;font-size:16px}
.ff-select{appearance:none;-webkit-appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 10px) 60%,calc(100% - 5px) 60%;background-size:4px 4px;background-repeat:no-repeat;cursor:pointer;padding-right:20px}
.ff-seg{display:inline-flex;border:1px solid var(--ink);white-space:nowrap;overflow:hidden}
.ff-seg .seglbl{padding:9px 14px;font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-right:1px solid var(--ink);transition:all .12s;line-height:1;background:transparent;user-select:none;white-space:nowrap;flex-shrink:0}
.ff-seg .seglbl:last-child{border-right:0}
.ff-seg .seglbl:hover{color:var(--ink)}
.ff-seg .seglbl.on{background:var(--ink);color:var(--paper)}
.ff-schedule{display:flex;flex-direction:column;gap:16px}
.ff-sched-row{display:grid;grid-template-columns:1fr 1fr auto;gap:24px;align-items:end}
.ff-sched-row .ff-remove{background:none;border:0;color:var(--soft);cursor:pointer;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:0 0 10px;line-height:1}
.ff-sched-row .ff-remove:hover{color:var(--rust)}
.ff-add-row{font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--rust);background:none;border:0;padding:12px 0 0;cursor:pointer;line-height:1}
.ff-add-row:hover{text-decoration:underline}
.form-actions{display:flex;justify-content:space-between;gap:16px;padding-top:24px;border-top:1px solid var(--ink);margin-top:36px;flex-wrap:wrap;align-items:center}
.form-actions .right{display:flex;gap:12px;align-items:center}
.form-meta{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft)}
.modal-box.ff-modal{padding:36px;max-width:min(800px,100%)}
.ff-modal .modal-head{margin-bottom:28px}
@media(max-width:700px){.form-row.split,.form-row.split3,.form-row.split2-1{grid-template-columns:1fr}.ff-sched-row{grid-template-columns:1fr 1fr;gap:14px}.ff-input.ff-large{font-size:28px}}
/* ---------- ficha edit inline (bloco 8) ---------- */
.ficha-display{display:block}
.ficha-edit{display:none}
.page-students.editing .ficha-display{display:none}
.page-students.editing .ficha-edit{display:block}
.edit-banner{display:none;align-items:center;justify-content:space-between;gap:18px;padding:12px 20px;border:1px solid var(--rust);background:rgba(154,70,38,.06);margin-bottom:24px;font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--rust);position:sticky;top:0;z-index:10}
.page-students.editing .edit-banner{display:flex}
.edit-banner .eb-actions{display:flex;gap:10px}
.edit-banner button{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:8px 14px;border:1px solid var(--rust);background:transparent;color:var(--rust);cursor:pointer;line-height:1}
.edit-banner button.primary{background:var(--rust);color:var(--paper)}
.edit-banner button.ghost{border-color:var(--line);color:var(--muted);background:transparent}
.edit-banner button.ghost:hover{border-color:var(--ink);color:var(--ink)}
.ficha-edit-btn{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:8px 14px;border:1px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;line-height:1;display:inline-flex;align-items:center;gap:6px}
.ficha-edit-btn:hover{background:var(--ink);color:var(--paper)}
.course-head{display:grid;grid-template-columns:minmax(0,1.6fr) minmax(0,1fr);gap:48px;align-items:end;border-bottom:1px solid var(--ink);padding-bottom:28px;margin-bottom:36px}
.course-head h1{font-family:'Instrument Serif',Georgia,serif;font-size:clamp(48px,7vw,84px);line-height:.88;letter-spacing:-.04em;font-weight:400}

.course-head dl{display:grid;grid-template-columns:1fr 1fr;gap:14px 24px}
.course-head dl dt{font-family:'Geist Mono',ui-monospace,monospace;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.course-head dl dd{font-family:'Geist Mono',monospace;font-size:12.5px;color:var(--ink2);letter-spacing:.02em}
.course-head dl dd em{font-style:italic;color:var(--rust)}
.unit-block{border-top:1px solid var(--line);padding:0}
.unit-block:first-of-type{border-top:1px solid var(--ink)}
.unit-block .uh{display:grid;grid-template-columns:96px 1fr auto auto;gap:24px;align-items:baseline;cursor:pointer;padding:20px 0;transition:background .12s;user-select:none}
.unit-block .uh:hover{background:rgba(154,70,38,.03)}
.unit-block .uno{font-family:'Instrument Serif',Georgia,serif;font-size:42px;line-height:1;letter-spacing:-.03em;color:var(--ink);transition:color .12s}
.unit-block.open .uno{color:var(--rust)}
.unit-block .un{font-family:'Newsreader',Georgia,serif;font-size:22px;line-height:1.15;letter-spacing:-.015em}
.unit-block .un small{display:block;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.unit-block .ucount{font-family:'Geist Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.04em;text-align:right;white-space:nowrap}
.unit-block .uchev{font-family:'Instrument Serif',Georgia,serif;font-size:24px;color:var(--soft);transition:transform .15s,color .12s;line-height:1}
.unit-block.open .uchev{transform:rotate(90deg);color:var(--rust)}
.unit-block .ubody{display:none;padding:8px 0 28px 120px}
.unit-block.open .ubody{display:block}
.unit-block .udesc{font-family:'Newsreader',Georgia,serif;font-size:15px;color:var(--muted);line-height:1.5;max-width:62ch;margin-bottom:14px;font-style:italic}
.lesson-list{display:flex;flex-direction:column}
.lesson-list .lli{display:grid;grid-template-columns:60px 1fr auto auto;gap:20px;padding:11px 0;border-bottom:1px solid var(--line2);align-items:baseline}
.lesson-list .lli:last-child{border-bottom:0}
.lesson-list .lli.current{background:rgba(154,70,38,.05);padding-left:14px;padding-right:14px;margin:0 -14px;border-left:2px solid var(--rust)}
.lesson-list .lcode{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.08em;color:var(--muted)}
.lesson-list .ltitle{font-family:'Newsreader',Georgia,serif;font-size:16px;line-height:1.3;letter-spacing:-.01em}
.lesson-list .ltitle small{display:block;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--muted);margin-top:3px;text-transform:uppercase}
.lesson-list .ltitle .cur-tag{font-family:'Geist Mono',monospace;font-size:9.5px;letter-spacing:.18em;color:var(--rust);text-transform:uppercase;margin-left:8px}
.lesson-list .lmat{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;white-space:nowrap}
.lesson-list .ledit{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;color:var(--soft);text-transform:uppercase;cursor:pointer;background:none;border:0;padding:0}

/* ---------- course-head stripe (bloco 10) ---------- */
.course-head{position:relative}
.course-head .ch-stripe{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--rust)}

/* ---------- unit grid V2 ---------- */
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.unit-card{padding:22px 22px 18px;border:1px solid var(--line);background:var(--paper2);cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:12px;min-height:200px}
.unit-card:hover{border-color:var(--ink);transform:translateY(-2px)}
.unit-card .uc-num{font-family:'Instrument Serif',Georgia,serif;font-size:36px;line-height:1;letter-spacing:-.025em;color:var(--rust)}
.unit-card .uc-name{font-family:'Newsreader',Georgia,serif;font-size:18px;line-height:1.25;letter-spacing:-.01em}
.unit-card .uc-stats{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:auto}
.unit-card .uc-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.unit-card .uc-chip{width:26px;height:26px;border-radius:50%;background:var(--ink);color:var(--paper);font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.04em;display:flex;align-items:center;justify-content:center;text-transform:uppercase}

/* ---------- trilha V3 ---------- */
.trilha{display:grid;grid-template-columns:80px 1fr;gap:0}
.trilha-unit{display:contents}
.tmark-col{display:flex;flex-direction:column;align-items:flex-end;padding-right:24px;padding-top:4px;position:relative}
.tmark-num{font-family:'Instrument Serif',Georgia,serif;font-size:38px;line-height:1;letter-spacing:-.03em;color:var(--ink)}
.tmark-code{font-family:'Geist Mono',monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.tmark-dot{width:10px;height:10px;border-radius:50%;background:var(--rust);position:absolute;right:-5px;top:8px;border:2px solid var(--paper)}
.tmark-line{width:1px;background:var(--line);flex:1;margin-right:4px;margin-top:6px;min-height:20px}
.trilha-body-col{padding:0 0 40px 28px;border-left:1px solid var(--line)}
.trilha-unit-name{font-family:'Newsreader',Georgia,serif;font-size:22px;line-height:1.2;letter-spacing:-.015em;margin-bottom:6px}
.trilha-unit-desc{font-size:14px;color:var(--muted);line-height:1.5;max-width:62ch;margin-bottom:14px;font-style:italic;font-family:'Newsreader',serif}
.trilha-lessons{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.tl-chip{font-family:'Geist Mono',monospace;font-size:10px;border:1px solid var(--line);padding:4px 10px;color:var(--ink2);cursor:pointer;transition:border-color .12s,color .12s;line-height:1.4}
.tl-chip:hover{border-color:var(--rust);color:var(--rust)}
.tl-chip em{font-style:italic;color:var(--ink)}
/* ---------- viewer (bloco 12) ---------- */
.viewer-bar{display:grid;grid-template-columns:80px 1fr 80px;align-items:center;height:40px;border-bottom:1px solid var(--line);padding:0 16px;position:sticky;top:0;z-index:25;background:var(--paper)}
.vb-back{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px;cursor:pointer;background:transparent;border:0;padding:0;white-space:nowrap}
.vb-back:hover{color:var(--ink)}
.vb-title{text-align:center}
.vb-title b{font-family:'Geist Mono',ui-monospace,monospace;font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.vb-title small{display:none}
.vb-actions{display:flex;gap:10px;align-items:center;justify-content:flex-end}
.vb-dl{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);cursor:pointer;background:transparent;border:0;padding:0}

/* cinema: YouTube e Drive continuam com fundo escuro */
.cinema-frame{background:#141210;color:#e7decd;position:relative;min-height:82vh;display:flex;align-items:flex-start;justify-content:center;overflow:hidden;padding:0}

.cinema-top{position:absolute;top:0;left:0;right:0;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;color:rgba(231,222,205,.5);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;pointer-events:none;z-index:2;transition:opacity .25s;background:linear-gradient(rgba(20,18,16,.6),transparent)}
.cinema-frame:hover .cinema-top{color:rgba(231,222,205,.9)}
.cinema-bottom{position:absolute;bottom:0;left:0;right:0;padding:16px 24px;display:flex;justify-content:space-between;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(231,222,205,.4);z-index:2;background:linear-gradient(transparent,rgba(20,18,16,.6))}

/* PDF viewer moderno — split layout */
#pdfViewerSplit{display:grid;grid-template-columns:1fr 340px;min-height:calc(100vh - 40px);align-items:start;gap:0}
#pdfViewerSplit.notebook-collapsed{grid-template-columns:1fr 0}
#pdfViewerSplit.notebook-collapsed #pdfNotebook{display:none}
#pdfViewerWrap{background:var(--paper2);min-height:100vh;position:relative;border-right:1px solid var(--line)}
#pdfToolbar{position:sticky;top:0;z-index:20;background:var(--paper);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:0;padding:0 12px;height:44px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#pdfToolbar::-webkit-scrollbar{display:none}
#pdfToolbar .tb-group{display:flex;align-items:center;gap:2px;padding:0 8px;border-right:1px solid var(--line2);flex-shrink:0}
#pdfToolbar .tb-group:last-child{border-right:0;margin-left:auto}
@media(max-width:700px){
  #pdfToolbar{
    position:fixed;
    bottom:70px;
    right:12px;
    top:auto;left:auto;transform:none;
    height:auto;width:44px;
    flex-direction:column;
    padding:4px 0;
    border:1px solid var(--line);
    background:var(--paper2);
    box-shadow:0 2px 16px rgba(26,23,20,.16);
    border-radius:8px;
    overflow-y:auto;
    max-height:70vh;
    z-index:50;gap:0;
    /* recolhido por padrão: esconde o conteúdo, mostra só o toggle */
    display:none;
  }
  #pdfToolbar.tb-open{display:flex}
  #pdfToolbar .tb-group{
    flex-direction:column;padding:4px 0;
    border-right:none;border-bottom:1px solid var(--line2);
    width:44px;align-items:center;gap:1px;
  }
  #pdfToolbar .tb-group:last-child{border-bottom:none}
  #pdfToolbarToggle{
    display:flex;
    position:fixed;bottom:18px;right:12px;
    width:44px;height:44px;
    background:var(--ink);color:var(--paper);
    border:none;border-radius:50%;
    align-items:center;justify-content:center;
    z-index:51;
    box-shadow:0 2px 10px rgba(26,23,20,.25);
    font-size:18px;cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    transition:background .12s;
  }
  #pdfToolbarToggle.tb-open{background:var(--rust)}
  #pdfPageLabel{display:none}
}
.tb-btn{height:36px;min-width:36px;padding:0 8px;border:0;background:transparent;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.04em;color:var(--muted);transition:background .1s,color .1s;gap:5px;-webkit-tap-highlight-color:transparent}
.tb-btn:hover{background:var(--line2);color:var(--ink)}
.tb-btn.active{background:var(--ink);color:var(--paper)}
.tb-btn svg{width:16px;height:16px;flex-shrink:0}
#pdfZoomLabel{font-family:'Geist Mono',monospace;font-size:11px;color:var(--muted);min-width:40px;text-align:center}
#pdfPageLabel{font-family:'Geist Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap}
#pdfScrollArea{overflow-y:auto;padding:16px 0 80px;display:flex;flex-direction:column;align-items:center;gap:16px}
.pdf-page-wrap{position:relative;box-shadow:0 2px 12px rgba(26,23,20,.10),0 0 0 1px rgba(26,23,20,.07);background:#fff;display:block;line-height:0;max-width:calc(100vw - 16px)}
@media(max-width:700px){
  #pdfScrollArea{padding:0 0 80px;gap:0;align-items:stretch}
  .pdf-page-wrap{max-width:100vw;width:100%!important;box-shadow:none;border-radius:0}
}
.pdf-page-wrap canvas.pdf-render{display:block;width:100%;height:auto}
.pdf-page-wrap canvas.pdf-annot{position:absolute;inset:0;width:100%;height:100%;touch-action:auto}
.pdf-page-wrap canvas.pdf-annot.mode-pen,
.pdf-page-wrap canvas.pdf-annot.mode-highlight,
.pdf-page-wrap canvas.pdf-annot.mode-eraser,
.pdf-page-wrap canvas.pdf-annot.mode-textnote{touch-action:none}
.pdf-page-wrap canvas.pdf-annot.mode-cursor{cursor:default}
.pdf-page-wrap canvas.pdf-annot.mode-pen,.pdf-page-wrap canvas.pdf-annot.mode-highlight{cursor:crosshair}
.pdf-page-wrap canvas.pdf-annot.mode-eraser{cursor:cell}
.pdf-page-wrap canvas.pdf-annot.mode-textnote{cursor:text}
/* Inline text annotation — só letras, sem underline */
.pdf-page-wrap .pdf-text-annot{
  position:absolute;
  background:transparent;
  border:1px solid transparent;
  padding:2px 4px 2px 2px;
  min-width:60px;
  z-index:10;
  cursor:default;
  display:flex;
  flex-direction:row;
  align-items:flex-start;
  gap:2px;
  border-radius:2px;
  transition:border-color .12s;
}
.pdf-text-annot:hover,.pdf-text-annot.editing{border-color:rgba(154,70,38,.35)}
.pdf-text-annot.editing{background:rgba(255,252,248,.92)}
.pdf-text-handle{
  font-size:11px;color:var(--soft);cursor:grab;
  user-select:none;line-height:1.5;padding:0 1px;
  opacity:0;transition:opacity .12s;flex-shrink:0;margin-top:1px;
}
.pdf-text-annot:hover .pdf-text-handle,
.pdf-text-annot.editing .pdf-text-handle{opacity:1}
.pdf-text-handle:active{cursor:grabbing}
.pdf-text-content{
  outline:none;min-width:40px;min-height:1em;
  white-space:pre-wrap;word-break:break-word;
  font-size:13px;font-family:'Geist',sans-serif;color:#1a3a6b;
  line-height:1.45;
}
.pdf-text-content:empty:before{content:attr(data-placeholder);color:var(--soft);font-style:italic;font-size:12px}
.pdf-text-annot.mode-cursor-visible .pdf-text-handle{display:none}
/* Tamanho no toolbar - grupo texto */
#pdfTextSizeGroup{display:none;align-items:center;gap:4px;padding:0 8px;border-right:1px solid var(--line2)}
#pdfTextSizeGroup.visible{display:flex}
#pdfTextSizeSelect{font-family:'Geist Mono',monospace;font-size:11px;border:0;border-bottom:1px solid var(--line);background:transparent;color:var(--muted);padding:2px 0;outline:none;cursor:pointer;width:36px}ht:1.4;
  white-space:nowrap;
  overflow:hidden;
  resize:none;
  box-sizing:border-box;
}
.pdf-page-wrap .pdf-text-annot:focus{
  background:rgba(250,247,240,.55);
  white-space:pre-wrap;
  overflow:visible;
  min-width:80px;
}
.pdf-page-wrap .pdf-text-annot.mode-cursor-visible{
  /* sem underline no modo cursor */
  border:none;
}
.pdf-page-wrap .pdf-text-annot:empty::before{
  content:attr(placeholder);
  color:rgba(49,95,143,.4);
  pointer-events:none;
  font-style:italic;
  font-size:11px;
}
.annot-color-btn{width:14px;height:14px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:border-color .1s,transform .1s;-webkit-tap-highlight-color:transparent}
.annot-color-btn:hover{transform:scale(1.2)}
.annot-color-btn.active{border-color:var(--ink);transform:scale(1.15)}
/* Caderno lateral */
#pdfNotebook{background:var(--paper2);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;border-left:1px solid var(--line)}
.nb-head{padding:14px 18px 10px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.nb-title{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.nb-toggle{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);cursor:pointer;background:none;border:0;padding:0;transition:color .1s}
.nb-toggle:hover{color:var(--rust)}
.nb-toolbar{padding:8px 18px;border-bottom:1px solid var(--line2);display:flex;gap:2px;flex-shrink:0}
.nb-btn{height:28px;padding:0 8px;border:0;background:transparent;cursor:pointer;border-radius:3px;font-family:'Geist Mono',monospace;font-size:11px;color:var(--muted);transition:background .1s,color .1s;display:flex;align-items:center;justify-content:center}
.nb-btn:hover{background:var(--line2);color:var(--ink)}
.nb-btn.active{background:var(--ink);color:var(--paper)}
.nb-editor{flex:1;overflow-y:auto;padding:18px;outline:none;font-family:'Newsreader',Georgia,serif;font-size:16px;line-height:1.6;color:var(--ink);min-height:200px}
.nb-editor:empty::before{content:attr(placeholder);color:var(--soft);pointer-events:none;font-style:italic}
.nb-editor h2{font-family:'Instrument Serif',serif;font-size:22px;font-weight:400;letter-spacing:-.02em;margin:18px 0 8px;border-bottom:1px solid var(--line2);padding-bottom:6px}
.nb-editor h2:first-child{margin-top:0}
.nb-editor b,.nb-editor strong{font-weight:600}
.nb-editor i,.nb-editor em{font-style:italic}

  if(STATE.mode!=='admin')return;
  STATE.portalHashes=STATE.portalHashes||{};

  for(const st of DB.students.filter(s=>s.email&&s.status!=='arquivado')){

      return `<div class="cinema-frame"><div class="cinema-top"><span>${esc(title)}</span><span>Imagem${downloadAllowed?' · download liberado':''}</span></div><div style="text-align:center;padding:40px 40px 0"><img src="${esc(att.storageUrl)}" style="max-width:100%;border:1px solid rgba(26,23,20,.1)"></div><div class="cinema-bottom"><span>${esc(att.name||title)}</span><span></span></div></div>`;
    }
    return `<div class="cinema-frame"><div class="cinema-top"><span>${esc(title)}</span><span>arquivo</span></div><div style="text-align:center;padding:80px 40px"><p style="font-family:'Newsreader',serif;font-size:18px;font-style:italic;color:#666;margin-bottom:24px">${esc(att.name||title)}</p>${downloadAllowed?`<a href="${esc(att.storageUrl)}" target="_blank" class="btn">baixar arquivo ↓</a>`:'<p style="font-size:13px;color:#999">Arquivo disponível. Download não liberado neste material.</p>'}</div><div class="cinema-bottom"><span>${esc(att.name||title)}</span><span>Supabase Storage</span></div></div>`;
  }
  if(att?.driveLink){
    const fileId=String(att.driveId||att.driveLink).match(/[-\w]{25,}/)?.[0]||'';
    const src=fileId?`https://drive.google.com/file/d/${fileId}/preview?rm=minimal`:String(att.driveLink).replace('/view','/preview').replace(/[\?&]usp=[^&]*/g,'').replace(/\?$/,'');
    return `<div class="cinema-frame"><div class="cinema-top"><span>${esc(title)}</span><span>Drive · ${downloadAllowed?'download liberado':'só visualização'}</span></div><iframe src="${esc(src)}" allow="autoplay" allowfullscreen></iframe><div class="cinema-bottom"><span>${esc(att.name||title)}</span><span>setas do teclado pra navegar</span></div></div>`;
  }
  return `<div style="padding:80px;text-align:center"><p style="font-family:'Newsreader',serif;font-size:18px;color:var(--muted);font-style:italic">Sem arquivo disponível para visualização.</p></div>`;
}
/* ── PDF Viewer: zoom + anotações ── */
const PDF_STATE={doc:null,zoom:1,mode:'cursor',color:'#9a4626',size:3,textFontSize:13,annots:{},textAnnots:{},annotKey:'',materialId:'',notebookDebounce:null,annotDebounce:null};

/* ── Identificação do contexto: quem é o usuário atual e qual material ── */
function pdfCurrentEmail(){
  if(STATE.mode==='student'&&STATE.studentPortal?.student?.email)return STATE.studentPortal.student.email;
  if(STATE.mode==='admin')return STATE.userEmail||'admin';
  return 'guest';
}
function pdfAnnotKey(url){return'lh_annot_'+btoa(url.slice(-60)).replace(/[^a-z0-9]/gi,'_')}

/* ── Persistência Supabase: lê e salva notas por aluno ── */
async function pdfLoadUserNotes(materialId){
  const email=pdfCurrentEmail();
  if(!email||email==='guest')return{canvasAnnots:{},textAnnots:{},notebook:''};
  try{
    const snap=await sbRead(email);
    // Para admin, as notas ficam no próprio DB local — usa localStorage como fallback
    if(!snap){
      const local=localStorage.getItem('lh_pdnnotes_'+email+'_'+materialId);
      if(local)return JSON.parse(local);
      return{canvasAnnots:{},textAnnots:{},notebook:''};
    }
    const notes=(snap.pdfNotes||{})[materialId]||{};
    return{canvasAnnots:notes.canvasAnnots||{},textAnnots:notes.textAnnots||{},notebook:notes.notebook||''};
  }catch(e){return{canvasAnnots:{},textAnnots:{},notebook:''};}
}
async function pdfSaveUserNotes(materialId,canvasAnnots,textAnnots,notebook){
  const email=pdfCurrentEmail();
  if(!email||email==='guest')return;
  // Fallback localStorage imediato
  try{localStorage.setItem('lh_pdnnotes_'+email+'_'+materialId,JSON.stringify({canvasAnnots,textAnnots,notebook}))}catch(e){}
  // Salvar no Supabase
  try{
    let snap=await sbRead(email);
    if(!snap){
      // Para o admin, usa DB diretamente
      if(STATE.mode==='admin'){
        DB._pdfNotes=DB._pdfNotes||{};
        DB._pdfNotes[materialId]={canvasAnnots,textAnnots,notebook,savedAt:nowIso()};
        saveLocal();scheduleSave();
        return;
      }
      snap={pdfNotes:{}};
    }
    snap.pdfNotes=snap.pdfNotes||{};
    snap.pdfNotes[materialId]={canvasAnnots,textAnnots,notebook,savedAt:nowIso()};
    await sbWrite(email,snap);
    const st=$('nbStatus');if(st)st.textContent='salvo '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }catch(e){const st=$('nbStatus');if(st)st.textContent='erro ao salvar';}
}
function pdfDebouncedSave(){
  clearTimeout(PDF_STATE.annotDebounce);
  PDF_STATE.annotDebounce=setTimeout(()=>{
    pdfSaveUserNotes(PDF_STATE.materialId,PDF_STATE.annots,PDF_STATE.textAnnots,PDF_STATE.notebook||'');
  },1200);
  const st=$('nbStatus');if(st)st.textContent='salvando…';
}

/* Limpar anotações de canvas */
function pdfClearAnnots(){
  PDF_STATE.annots={};
  pdfDebouncedSave();
  renderPdfViewer._redrawAll&&renderPdfViewer._redrawAll();
}
window.pdfClearAnnots=pdfClearAnnots;

function renderPdfViewer(url,materialId){
  PDF_STATE.materialId=materialId||pdfAnnotKey(url);
  PDF_STATE.annots={};PDF_STATE.textAnnots={};PDF_STATE.notebook='';

  /* ── carregar notas do Supabase e então renderizar ── */
  pdfLoadUserNotes(PDF_STATE.materialId).then(saved=>{
    PDF_STATE.annots=saved.canvasAnnots||{};
    PDF_STATE.textAnnots=saved.textAnnots||{};
    PDF_STATE.notebook=saved.notebook||'';
    // Iniciar caderno
    const editor=document.getElementById('nbEditor');
    if(editor){
      editor.innerHTML=PDF_STATE.notebook;
      editor.addEventListener('input',()=>{
        PDF_STATE.notebook=editor.innerHTML;
        clearTimeout(PDF_STATE.notebookDebounce);
        PDF_STATE.notebookDebounce=setTimeout(()=>pdfDebouncedSave(),600);
        const st=$('nbStatus');if(st)st.textContent='salvando…';
      });
    }
    doRender();
  });

  function buildUI(doc){
    const container=document.getElementById('pdfScrollArea');
    if(!container)return;
    container.innerHTML='';
    PDF_STATE.doc=doc;
    const isMobile=window.innerWidth<=700;
    const pageWidth=isMobile?window.innerWidth:Math.min((document.getElementById('pdfViewerWrap')||document.body).offsetWidth-64,960);
    for(let i=1;i<=doc.numPages;i++){renderPage(doc,i,pageWidth,container);}
    const pl=document.getElementById('pdfPageLabel');if(pl)pl.textContent='1 / '+doc.numPages;
    log('PDF renderizado: '+doc.numPages+' página(s)','ok');
  }
  function renderPage(doc,pageNum,baseWidth,container){
    doc.getPage(pageNum).then(pg=>{
      const vp0=pg.getViewport({scale:1});
      const scale=(baseWidth/vp0.width)*PDF_STATE.zoom*2;
      const vp=pg.getViewport({scale});
      const wrap=document.createElement('div');
      wrap.className='pdf-page-wrap';
      wrap.dataset.page=pageNum;
      wrap.style.width=Math.round(vp.width/2)+'px';
      const render=document.createElement('canvas');
      render.className='pdf-render';
      render.width=vp.width;render.height=vp.height;
      const annot=document.createElement('canvas');
      annot.className='pdf-annot mode-'+PDF_STATE.mode;
      annot.width=vp.width;annot.height=vp.height;
      wrap.appendChild(render);wrap.appendChild(annot);
      container.appendChild(wrap);
      pg.render({canvasContext:render.getContext('2d'),viewport:vp});
      // Recarregar anotações de canvas desta página
      if(PDF_STATE.annots[pageNum]){
        const img=new Image();
        img.onload=()=>annot.getContext('2d').drawImage(img,0,0);
        img.src=PDF_STATE.annots[pageNum];
      }
      // Recarregar anotações de texto desta página
      const pageTextAnnots=(PDF_STATE.textAnnots[pageNum]||[]);
      pageTextAnnots.forEach(ta=>addTextAnnotEl(wrap,pageNum,ta));
      attachAnnotEvents(annot,pageNum,wrap);
    });
  }

  /* ── Elemento de anotação de texto inline (estilo preenchimento de formulário) ── */
  function addTextAnnotEl(wrap,pageNum,ta){
    const el=document.createElement('div');
    el.className='pdf-text-annot';
    el.style.left=(ta.x*100)+'%';
    el.style.top=(ta.y*100)+'%';
    // handle de drag — só aparece no hover via CSS
    const handle=document.createElement('div');
    handle.className='pdf-text-handle';
    handle.textContent='⠿';
    el.appendChild(handle);
    // área editável — tamanho vem do toolbar (PDF_STATE.textFontSize)
    const textEl=document.createElement('div');
    textEl.className='pdf-text-content';
    textEl.contentEditable='true';
    textEl.setAttribute('data-placeholder','…');
    if(ta.text)textEl.textContent=ta.text;
    const fs=ta.fontSize||PDF_STATE.textFontSize||13;
    ta.fontSize=fs;
    textEl.style.fontSize=fs+'px';
    el.appendChild(textEl);
    // drag via handle
    handle.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();
      const startX=e.clientX,startY=e.clientY;
      const startL=ta.x*wrap.offsetWidth,startT=ta.y*wrap.offsetHeight;
      const onMove=ev=>{
        const newL=Math.max(0,Math.min(wrap.offsetWidth-80,startL+ev.clientX-startX));
        const newT=Math.max(0,Math.min(wrap.offsetHeight-40,startT+ev.clientY-startY));
        ta.x=newL/wrap.offsetWidth;ta.y=newT/wrap.offsetHeight;
        el.style.left=(ta.x*100)+'%';el.style.top=(ta.y*100)+'%';
      };
      const onUp=()=>{
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
        pdfDebouncedSave();
      };
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
    // atualizar tamanho quando toolbar muda (enquanto editando)
    textEl.addEventListener('focus',()=>{
      el.classList.remove('mode-cursor-visible');
      el.classList.add('editing');
      // sincronizar toolbar com tamanho atual
      const szSel=document.getElementById('pdfTextSizeSelect');
      if(szSel)szSel.value=ta.fontSize||13;
    });
    textEl.addEventListener('blur',()=>{
      ta.text=textEl.textContent||'';
      el.classList.remove('editing');
      if(!ta.text){el.remove();PDF_STATE.textAnnots[pageNum]=(PDF_STATE.textAnnots[pageNum]||[]).filter(x=>x!==ta);}
      pdfDebouncedSave();
      if(window.innerWidth<=700&&PDF_STATE.mode==='textnote')setTimeout(()=>{if(PDF_STATE.mode==='textnote')setMode('cursor');},150);
    });
    textEl.addEventListener('keydown',e=>{if(e.key==='Escape'){textEl.blur();}e.stopPropagation();});
    // clicar no elemento no modo cursor abre edição
    el.addEventListener('click',e=>{
      if(PDF_STATE.mode==='cursor'||PDF_STATE.mode==='textnote'){e.stopPropagation();textEl.focus();}
    });
    // mudança de tamanho do toolbar atualiza textEl focado
    el._updateSize=(sz)=>{ta.fontSize=sz;textEl.style.fontSize=sz+'px';pdfDebouncedSave();};
    wrap.appendChild(el);
    if(!ta.text)requestAnimationFrame(()=>textEl.focus());
  }

  function attachAnnotEvents(canvas,pageNum,wrap){
    let drawing=false,lx=0,ly=0;
    function getPos(e){
      const r=canvas.getBoundingClientRect();
      const scaleX=canvas.width/r.width,scaleY=canvas.height/r.height;
      const src=e.touches?e.touches[0]:e;
      return[(src.clientX-r.left)*scaleX,(src.clientY-r.top)*scaleY];
    }
    function down(e){
      if(PDF_STATE.mode==='cursor')return;
      // Modo nota de texto: adicionar campo inline no ponto clicado
      if(PDF_STATE.mode==='textnote'){
        const r=wrap.getBoundingClientRect();
        const src=e.touches?e.touches[0]:e;
        const nx=(src.clientX-r.left)/r.width;
        const ny=(src.clientY-r.top)/r.height;
        const ta={x:nx,y:ny,text:''};
        PDF_STATE.textAnnots[pageNum]=PDF_STATE.textAnnots[pageNum]||[];
        PDF_STATE.textAnnots[pageNum].push(ta);
        addTextAnnotEl(wrap,pageNum,ta);
        pdfDebouncedSave();
        return;
      }
      e.preventDefault();drawing=true;
      [lx,ly]=getPos(e);
      const ctx=canvas.getContext('2d');
      ctx.beginPath();ctx.moveTo(lx,ly);
    }
    function move(e){
      if(!drawing)return;
      e.preventDefault();
      const [cx,cy]=getPos(e);
      const ctx=canvas.getContext('2d');
      if(PDF_STATE.mode==='eraser'){
        ctx.clearRect(cx-20,cy-20,40,40);
      } else {
        ctx.globalAlpha=PDF_STATE.mode==='highlight'?0.35:1;
        ctx.strokeStyle=PDF_STATE.color;
        ctx.lineWidth=PDF_STATE.mode==='highlight'?PDF_STATE.size*5:PDF_STATE.size;
        ctx.lineCap='round';ctx.lineJoin='round';
        ctx.lineTo(cx,cy);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cx,cy);
      }
      lx=cx;ly=cy;
    }
    function up(e){
      if(!drawing)return;
      drawing=false;
      PDF_STATE.annots[pageNum]=canvas.toDataURL();
      pdfDebouncedSave();
    }
    canvas.addEventListener('mousedown',down);
    canvas.addEventListener('mousemove',move);
    canvas.addEventListener('mouseup',up);
    canvas.addEventListener('mouseleave',up);
    canvas.addEventListener('touchstart',down,{passive:false});
    canvas.addEventListener('touchmove',move,{passive:false});
    canvas.addEventListener('touchend',up);
    canvas.className='pdf-annot mode-'+PDF_STATE.mode;
  }
  function setMode(m){
    // toggle: clicar em textnote quando já ativo volta pro cursor
    if(m==='textnote'&&PDF_STATE.mode==='textnote') m='cursor';
    PDF_STATE.mode=m;
    document.querySelectorAll('.tb-btn[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
    document.querySelectorAll('.pdf-annot').forEach(c=>{
      c.className='pdf-annot mode-'+m;
      c.style.pointerEvents=(m==='cursor')?'none':'auto';
      c.style.touchAction=(m==='cursor')?'auto':'none';
    });
    document.querySelectorAll('.pdf-text-annot').forEach(el=>{
      el.classList.toggle('mode-cursor-visible',m==='cursor');
    });
    // mostrar/esconder grupo de tamanho de texto
    const szGroup=document.getElementById('pdfTextSizeGroup');
    if(szGroup)szGroup.classList.toggle('visible',m==='textnote');
    // click-outside para desativar modo texto
    if(m==='textnote'){
      const offHandler=e=>{
        const inPdf=e.target.closest('.pdf-page-wrap,.pdf-text-annot,#pdfToolbar');
        if(!inPdf){setMode('cursor');document.removeEventListener('click',offHandler,true);}
      };
      setTimeout(()=>document.addEventListener('click',offHandler,true),100);
    }
    if(window.innerWidth<=700){
      const tb=document.getElementById('pdfToolbar');
      const tbt=document.getElementById('pdfToolbarToggle');
      if(tb)tb.classList.remove('tb-open');
      if(tbt)tbt.classList.remove('tb-open');
    }
  }
  function setZoom(z){
    PDF_STATE.zoom=Math.max(0.5,Math.min(3,z));
    document.getElementById('pdfZoomLabel').textContent=Math.round(PDF_STATE.zoom*100)+'%';
    rebuildPages();
  }
  window.__pdfSetZoom=setZoom;
  window.__pdfSetMode=setMode;
  function rebuildPages(){
    const doc=PDF_STATE.doc;if(!doc)return;
    const container=document.getElementById('pdfScrollArea');if(!container)return;
    container.innerHTML='';
    const isMobile=window.innerWidth<=700;
    const pageWidth=isMobile?window.innerWidth:Math.min((document.getElementById('pdfViewerWrap')||document.body).offsetWidth-64,960);
    for(let i=1;i<=doc.numPages;i++){renderPage(doc,i,pageWidth,container);}
  }
  renderPdfViewer._redrawAll=rebuildPages;

  // Toolbar vertical — só essencial: ferramentas, cores, zoom, limpar
  const toolbar=document.getElementById('pdfToolbar');
  if(toolbar){
    const COLORS=['#9a4626','#315f8f','#3e6b4a','#1a1714','#c97a55'];
    toolbar.innerHTML=`
      <div class="tb-group">
        <button class="tb-btn active" data-mode="cursor" title="Cursor" onclick="window.__pdfSetMode('cursor')">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2l4 10 2-4 4-2z"/></svg>
        </button>
        <button class="tb-btn" data-mode="pen" title="Caneta" onclick="window.__pdfSetMode('pen')">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2l3 3-7 7H2v-3z"/></svg>
        </button>
        <button class="tb-btn" data-mode="highlight" title="Marcador" onclick="window.__pdfSetMode('highlight')">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10l3-6h2l3 6"/><line x1="4" y1="8" x2="10" y2="8"/></svg>
        </button>
        <button class="tb-btn" data-mode="textnote" title="Texto (clica na página)" onclick="window.__pdfSetMode('textnote')">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="10" height="9" rx="1"/><line x1="4" y1="5" x2="10" y2="5"/><line x1="4" y1="7.5" x2="8" y2="7.5"/></svg>
        </button>
        <button class="tb-btn" data-mode="eraser" title="Borracha" onclick="window.__pdfSetMode('eraser')">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="5" width="10" height="6" rx="1"/><line x1="5" y1="5" x2="5" y2="11"/></svg>
        </button>
      </div>
      <div class="tb-group" id="pdfTextSizeGroup">
        <select id="pdfTextSizeSelect" title="Tamanho do texto" onchange="PDF_STATE.textFontSize=Number(this.value);document.querySelectorAll('.pdf-text-annot.editing').forEach(el=>{if(el._updateSize)el._updateSize(PDF_STATE.textFontSize)})">
          ${[10,12,13,14,16,20,24].map(sz=>`<option value="${sz}" ${sz===13?'selected':''}>${sz}</option>`).join('')}
        </select>
      </div>
      <div class="tb-group" id="pdfColorGroup">
        ${COLORS.map(c=>`<button class="annot-color-btn ${c===PDF_STATE.color?'active':''}" style="background:${c}" title="${c}" onclick="PDF_STATE.color='${c}';document.querySelectorAll('.annot-color-btn').forEach(b=>b.classList.toggle('active',b.style.background==='${c}' || b.style.backgroundColor==='${c}'))"></button>`).join('')}
      </div>
      <div class="tb-group">
        <button class="tb-btn" title="Diminuir zoom" onclick="window.__pdfSetZoom(PDF_STATE.zoom-0.25)">−</button>
        <span id="pdfZoomLabel" class="tb-btn" style="cursor:default;font-size:9px">100%</span>
        <button class="tb-btn" title="Aumentar zoom" onclick="window.__pdfSetZoom(PDF_STATE.zoom+0.25)">+</button>
      </div>
      <div class="tb-group">
        <button class="tb-btn" title="Limpar anotações de caneta" onclick="if(confirm('Apagar todas as marcações de caneta/marcador? As notas de texto ficam.'))pdfClearAnnots()" style="color:var(--bad)">✕</button>
      </div>`;
    document.querySelectorAll('.tb-btn[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===PDF_STATE.mode));

    // Mobile: botão flutuante pra abrir/fechar toolbar
    let tbToggle=document.getElementById('pdfToolbarToggle');
    if(!tbToggle){
      tbToggle=document.createElement('button');
      tbToggle.id='pdfToolbarToggle';
      tbToggle.innerHTML='<svg width="18" height="18" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2l3 3-7 7H2v-3z"/></svg>';
      tbToggle.title='Ferramentas';
      document.getElementById('viewerScreen')?.appendChild(tbToggle);
    }
    function updateToggleVisibility(){
      tbToggle.style.display=window.innerWidth<=700?'flex':'none';
    }
    updateToggleVisibility();
    window.removeEventListener('resize',updateToggleVisibility);
    window.addEventListener('resize',updateToggleVisibility);
    tbToggle.onclick=()=>{
      const tb=document.getElementById('pdfToolbar');
      const open=tb.classList.toggle('tb-open');
      tbToggle.classList.toggle('tb-open',open);
      // Fechar ao clicar fora
      if(open){
        setTimeout(()=>{
          function outsideClick(e){
            if(!tb.contains(e.target)&&e.target!==tbToggle){
              tb.classList.remove('tb-open');
              tbToggle.classList.remove('tb-open');
              document.removeEventListener('touchstart',outsideClick);
              document.removeEventListener('mousedown',outsideClick);
            }
          }
          document.addEventListener('touchstart',outsideClick,{once:false});
          document.addEventListener('mousedown',outsideClick,{once:false});
        },10);
      }
    };
  } // end if(toolbar)

  function doRender(){
    const scroll=document.getElementById('pdfScrollArea');
    if(!scroll)return;
    scroll.innerHTML='<div style="text-align:center;padding:60px;color:var(--muted);font-family:\'Geist Mono\',monospace;font-size:12px;letter-spacing:.1em">carregando PDF…</div>';
    window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    window.pdfjsLib.getDocument(url).promise.then(buildUI).catch(e=>{
      if(scroll)scroll.innerHTML='<div style="text-align:center;padding:40px;color:#9a4626;font-family:monospace;font-size:12px">Erro ao carregar PDF: '+e.message+'</div>';
      log('PDF render falhou: '+e.message,'error');
    });
  }
  if(window.pdfjsLib){doRender();return;}
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  s.onload=doRender;
  s.onerror=()=>{const sc=document.getElementById('pdfScrollArea');if(sc)sc.innerHTML='<div style="text-align:center;padding:40px;color:#9a4626;font-family:monospace;font-size:12px">Não foi possível carregar o PDF.js.</div>';log('PDF.js falhou','error');};
  document.head.appendChild(s);
}
function openMaterialViewer(id){
  const m=byId(DB.materials,id);
  if(!m){toast('Material não encontrado ou excluído.');return;}
  const att=m.attachments?.[0];
  const t=$('viewerTitle');const s=$('viewerSub');const f=$('viewerFrame');const dl=$('viewerDlBtn');const screen=$('viewerScreen');
  if(!t||!s||!f||!screen)return;
  t.textContent=m.title;
  s.textContent=[m.type,att?.name].filter(Boolean).join(' · ');
  f.innerHTML=buildViewerHtml(att,m.title,m.downloadAllowed!==false);
  if(dl){
    const hasDl=(att?.driveLink||att?.storageUrl)&&m.downloadAllowed!==false;
    if(hasDl){dl.style.display='block';dl.id='viewerDlBtn';dl.onclick=()=>window.open(att.storageUrl||att.driveLink,'_blank')}
    else{dl.style.display='none'}
  }
  screen.style.display='block';document.body.style.overflow='hidden';screen.scrollTop=0;
  if(att?.storageUrl){
    const isPdf=String(att.name||att.storageUrl).toLowerCase().endsWith('.pdf')||String(att.type||'').includes('pdf');
    if(isPdf)setTimeout(()=>renderPdfViewer(att.storageUrl,m.id),0);
  }
}

function sb(){if(!STATE.sb)STATE.sb=supabase.createClient(CONFIG.SB_URL,CONFIG.SB_KEY);return STATE.sb}
async function sbRead(email){try{const {data,error}=await sb().from(CONFIG.SB_TABLE).select('data,updated_at').eq('user_email',String(email).toLowerCase()).maybeSingle();if(error)throw error;return data?.data||null}catch(e){STATE.lastError=e.message||String(e);log('Supabase read falhou: '+STATE.lastError,'error');return null}}
async function sbWrite(email,data){try{const payload={user_email:String(email).toLowerCase(),data,updated_at:nowIso()};const {error}=await sb().from(CONFIG.SB_TABLE).upsert(payload,{onConflict:'user_email'});if(error)throw error;STATE.lastSupabaseSave=new Date();log('Supabase salvo para '+email,'ok');return true}catch(e){STATE.lastError=e.message||String(e);log('Supabase save falhou: '+STATE.lastError+' · dados mantidos no cache/Drive quando possível','error');return false}}
async function sbDelete(email){try{const {error}=await sb().from(CONFIG.SB_TABLE).delete().eq('user_email',String(email).toLowerCase());if(error)throw error;log('Supabase: linha de '+email+' apagada','ok');return true}catch(e){STATE.lastError=e.message||String(e);log('Supabase delete falhou: '+STATE.lastError,'error');return false}}
async function sbSaveDB(){if(!STATE.userEmail)return false;DB.meta.updatedAt=nowIso();return sbWrite(STATE.userEmail,DB)}

/* ── Supabase Storage: biblioteca de materiais de curso ── */
async function sbStorageUpload(file,plannedId){
  try{
    const client=sb();
    log('Storage: upload '+file.name+' ('+Math.round(file.size/1024)+'KB) bucket='+CONFIG.SB_BUCKET,'info');
    const ext=(file.name.split('.').pop()||'bin').toLowerCase();
    const key='planned/'+plannedId+'/'+uid('f')+'.'+ext;
    const {data,error}=await client.storage.from(CONFIG.SB_BUCKET).upload(key,file,{
      cacheControl:'3600',upsert:false,contentType:file.type||'application/octet-stream'
    });
    if(error){const det=error.message+(error.statusCode?' ['+error.statusCode+']':'')+(error.error?' ('+error.error+')':'');throw new Error(det);}
    const {data:pub}=client.storage.from(CONFIG.SB_BUCKET).getPublicUrl(key);
    log('Storage upload ok: '+key,'ok');
    return{id:uid('file'),name:file.name,type:file.type||'',size:file.size,storageKey:key,storageUrl:pub?.publicUrl||'',createdAt:nowIso()};
  }catch(e){
    log('Storage upload falhou: '+(e.message||String(e)),'error');
    return null;
  }
}
async function sbStorageDelete(key){
  try{const{error}=await sb().storage.from(CONFIG.SB_BUCKET).remove([key]);if(error)throw error;log('Storage delete ok: '+key,'ok');return true;}catch(e){log('Storage delete falhou: '+(e.message||e),'warn');return false;}
}
function isStorageUrl(url){return String(url||'').includes('supabase.co/storage')}

function initGoogleDrive(){STATE.tokenClient=google.accounts.oauth2.initTokenClient({client_id:CONFIG.DRIVE_CLIENT_ID,scope:CONFIG.DRIVE_SCOPES,callback:handleGoogleToken})}
function driveSignIn(){if(STATE.tokenClient)STATE.tokenClient.requestAccessToken({prompt:'consent'});else showLogin('Aguarde o carregamento do Google.')} window.driveSignIn=driveSignIn;
async function handleGoogleToken(resp){STATE.silentDriveAttempt=false;if(resp.error){showLogin('Erro de autenticação.');return}showGate('Carregando LessonHub…','Login recebido. Carregando dados e sincronizações.');STATE.accessToken=resp.access_token;let email='';try{const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+STATE.accessToken}});if(r.ok){const u=await r.json();email=String(u.email||'').toLowerCase()}}catch(e){}STATE.userEmail=email;if(!email){showLogin('Não consegui ler o e-mail da conta.');return}log('Login Google: '+email,'ok');if(email===CONFIG.ADMIN_EMAIL){rememberSession(email,'admin');await bootAdmin()}else{rememberSession(email,'student');await bootStudent(email)}}
async function driveApi(path,opts={}){const r=await fetch('https://www.googleapis.com/drive/v3/'+path,{...opts,headers:{Authorization:'Bearer '+STATE.accessToken,...(opts.headers||{})}});if(!r.ok)throw new Error('Drive '+r.status);return r.json()}
async function driveEnsureFolder(name,parentId=''){const q=parentId?`name='${name}' and '${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`:`name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;const found=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name)');if(found.files?.[0])return found.files[0].id;const body={name,mimeType:'application/vnd.google-apps.folder'};if(parentId)body.parents=[parentId];const made=await driveApi('files?fields=id',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return made.id}
async function driveSetup(){try{STATE.driveFolderId=await driveEnsureFolder(CONFIG.DRIVE_FOLDER);STATE.drivePortalFolderId=await driveEnsureFolder(CONFIG.DRIVE_PORTAL_FOLDER,STATE.driveFolderId);STATE.driveDataFileId=await driveEnsureJsonFile(CONFIG.DRIVE_DATA_FILE,STATE.driveFolderId);STATE.driveReady=true;log('Drive pronto','ok');if(STATE.mode==='admin')buildNav();return true}catch(e){STATE.lastError=e.message||String(e);log('Drive setup falhou: '+STATE.lastError,'error');return false}}
async function driveEnsureJsonFile(name,folderId){const q=`name='${name}' and '${folderId}' in parents and trashed=false`;const r=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name)');if(r.files?.[0])return r.files[0].id;const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name,parents:[folderId]})],{type:'application/json'}));form.append('file',new Blob([JSON.stringify(blankDB())],{type:'application/json'}));const res=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});return (await res.json()).id}
async function driveReadJson(fileId){try{const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:'Bearer '+STATE.accessToken}});if(!r.ok)return null;return await r.json()}catch(e){return null}}
async function driveWriteJson(fileId,name,data){if(!fileId)return false;try{const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name})],{type:'application/json'}));form.append('file',new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));const r=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`,{method:'PATCH',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});if(!r.ok)throw new Error('Drive write '+r.status);STATE.lastDriveSave=new Date();log('Drive JSON salvo','ok');return true}catch(e){STATE.lastError=e.message||String(e);log('Drive write falhou: '+STATE.lastError,'error');return false}}
async function driveSaveDB(){if(!STATE.driveReady)return false;DB.meta.updatedAt=nowIso();return driveWriteJson(STATE.driveDataFileId,CONFIG.DRIVE_DATA_FILE,DB)}
async function driveSavePortal(snap){if(!STATE.driveReady||!snap?.student?.email)return false;try{const name='portal_'+sanitizeEmail(snap.student.email)+'.json';const q=`name='${name}' and '${STATE.drivePortalFolderId}' in parents and trashed=false`;const found=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name)');let id=found.files?.[0]?.id;if(!id){const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name,parents:[STATE.drivePortalFolderId]})],{type:'application/json'}));form.append('file',new Blob([JSON.stringify(snap,null,2)],{type:'application/json'}));const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});id=(await r.json()).id}else{await driveWriteJson(id,name,snap)}await driveShare(id,snap.student.email,false);return true}catch(e){log('Drive portal falhou: '+(e.message||e),'error');return false}}
async function driveUploadFile(file,studentId=''){if(!STATE.driveReady||!file)return null;try{const st=byId(DB.students,studentId);const folderName=studentId?`alunos-${slug(st?.name||studentId)}`:'biblioteca';const parent=await driveEnsureFolder(folderName,STATE.driveFolderId);const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name:file.name,parents:[parent]})],{type:'application/json'}));form.append('file',file);const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink,mimeType,name,size',{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});if(!r.ok)throw new Error('Upload '+r.status);const data=await r.json();log('Arquivo enviado ao Drive: '+file.name,'ok');return{id:data.id,name:data.name||file.name,type:data.mimeType||file.type,size:Number(data.size)||file.size,driveId:data.id,driveLink:data.webViewLink||'',createdAt:nowIso()}}catch(e){STATE.lastError=e.message||String(e);log('Upload Drive falhou: '+STATE.lastError,'error');return null}}
async function driveShare(fileId,email,allowDownload=true){try{await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}/permissions?sendNotificationEmail=false`,{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken,'Content-Type':'application/json'},body:JSON.stringify({type:'user',role:'reader',emailAddress:email})});if(!allowDownload){await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?fields=id`,{method:'PATCH',headers:{Authorization:'Bearer '+STATE.accessToken,'Content-Type':'application/json'},body:JSON.stringify({copyRequiresWriterPermission:true})})}return true}catch(e){log('Share falhou: '+(e.message||e),'error');return false}}
async function dailyBackupIfDue(){if(!STATE.driveReady||STATE.mode!=='admin')return;try{const today=nowIso().slice(0,10);const lastBackup=localStorage.getItem('lessonhub_last_backup_date');if(lastBackup===today){log('Backup diário do Drive já feito hoje ('+today+').','ok');return}const folderId=await driveEnsureFolder(CONFIG.DRIVE_BACKUP_FOLDER,STATE.driveFolderId);const name='lessonhub-backup-'+today+'.json';const q=`name='${name}' and '${folderId}' in parents and trashed=false`;const found=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id)');if(found.files?.[0]){localStorage.setItem('lessonhub_last_backup_date',today);log('Backup '+today+' já existe no Drive. Marcado como feito.','ok');return}const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name,parents:[folderId]})],{type:'application/json'}));form.append('file',new Blob([JSON.stringify(DB,null,2)],{type:'application/json'}));const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+STATE.accessToken},body:form});if(!r.ok)throw new Error('Backup upload '+r.status);localStorage.setItem('lessonhub_last_backup_date',today);log('Backup diário '+today+' salvo no Drive.','ok');await pruneOldBackups(folderId);}catch(e){log('Backup diário falhou: '+(e.message||e),'warn');}}
async function pruneOldBackups(folderId){try{const q=`'${folderId}' in parents and trashed=false`;const found=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name,createdTime)&pageSize=200');const files=(found.files||[]).filter(f=>/^lessonhub-backup-\d{4}-\d{2}-\d{2}\.json$/.test(f.name));const cutoff=Date.now()-CONFIG.BACKUP_RETENTION_DAYS*24*60*60*1000;let removed=0;for(const f of files){const ts=new Date(f.createdTime).getTime();if(ts<cutoff){await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}`,{method:'DELETE',headers:{Authorization:'Bearer '+STATE.accessToken}});removed++;}}if(removed>0)log('Backups antigos podados: '+removed+' arquivo(s) removidos.','ok');}catch(e){log('Poda de backups falhou: '+(e.message||e),'warn');}}
async function driveFindPortal(email){try{const name='portal_'+sanitizeEmail(email)+'.json';const q=`name='${name}' and trashed=false`;const r=await driveApi('files?q='+encodeURIComponent(q)+'&fields=files(id,name)');if(!r.files?.[0])return null;return driveReadJson(r.files[0].id)}catch(e){return null}}

async function bootAdmin(){status('Carregando dados…',0);await driveSetup();const local=loadLocal();const remote=await sbRead(STATE.userEmail);let driveData=null;if(STATE.driveReady)driveData=await driveReadJson(STATE.driveDataFileId);let chosen=normalizeDB(local);STATE.source='local';if(remote&&dataCount(remote)>0&&(dataCount(chosen)===0||newer(remote,chosen))){chosen=normalizeDB(remote);STATE.source='supabase'}if(driveData&&dataCount(driveData)>0&&(dataCount(chosen)===0||newer(driveData,chosen))){chosen=normalizeDB(driveData);STATE.source='drive'}DB=chosen;saveLocal();status('Fonte: '+STATE.source);showAdmin();await sbSaveDB();dailyBackupIfDue().catch(()=>{});}
function cacheStudentPortal(email,snap){try{localStorage.setItem('lessonhub_student_portal_'+sanitizeEmail(email),JSON.stringify({cachedAt:nowIso(),snap}))}catch(e){}}
function loadCachedStudentPortal(email){try{const raw=localStorage.getItem('lessonhub_student_portal_'+sanitizeEmail(email));if(!raw)return null;const o=JSON.parse(raw);return o&&o.snap?o.snap:null}catch(e){return null}}
async function bootStudent(email){status('Carregando portal do aluno…',0);let snap=await sbRead(email);if(!snap||snap.meta?.kind!=='studentPortal'){await driveSetup();snap=await driveFindPortal(email)}if(snap&&snap.student){STATE.studentPortal=snap;cacheStudentPortal(email,snap);showStudent();status('Portal carregado');return}
  const cached=loadCachedStudentPortal(email);if(cached&&cached.student){STATE.studentPortal=cached;showStudent();status('Portal carregado do cache local. Sem conexão com Supabase/Drive.',5000);log('Portal do aluno restaurado do cache para '+email,'ok');return}
  try{const localDB=loadLocal();const st=(localDB.students||[]).find(s=>String(s.email||'').toLowerCase()===String(email).toLowerCase());if(st){const savedDB=DB;DB=localDB;const live=snapshotForStudent(st.id);DB=savedDB;if(live){STATE.studentPortal=live;cacheStudentPortal(email,live);showStudent();status('Portal gerado a partir dos dados locais deste navegador.',5000);log('Portal do aluno gerado do DB local para '+email,'ok');return}}}catch(e){}
  STATE.studentPortal={unauthorized:true,email};showStudent();status('Acesso não autorizado')}

function buildNav(){
  const pages=[['dashboard','Today'],['students','Students'],['lessons','Lessons'],['courses','Courses'],['materials','Materials'],['finance','Finance'],['portal','Student Portal'],['health','Health']];
  const driveBtn=STATE.driveReady
    ?`<button class="linkbtn" onclick="driveSignIn()" title="Drive conectado">Drive ✓</button>`
    :`<button class="btn soft" onclick="driveSignIn()" title="Conecte para enviar arquivos">⚠ Drive</button>`;
  $('nav').innerHTML=pages.map(p=>`<button data-page="${p[0]}" onclick="showPage('${p[0]}')">${p[1]}</button>`).join('')
    +`<div class="actions"><button class="linkbtn" onclick="exportBackup()">backup</button><button class="linkbtn" onclick="backupInput.click()">importar</button>${driveBtn}<button class="linkbtn" onclick="forgetSession()">sair</button></div>`;
  // atualiza crumbs
  const pageLabels={dashboard:'Today',students:'Students',lessons:'Lessons',courses:'Courses',materials:'Materials',finance:'Finance',portal:'Student Portal',health:'Health'};
  if($('crumbs'))$('crumbs').innerHTML=`<b>LessonHub</b> · ${pageLabels[STATE.page]||'Admin'}`;
  // data
  const d=new Date();const dias=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
  const meses=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  if($('dateBox'))$('dateBox').innerHTML=`${dias[d.getDay()]}<br><b>${d.getDate()} ${meses[d.getMonth()]} ${d.getFullYear()}</b>`;
}
function showPage(p){STATE.page=p;document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));$('page-'+p)?.classList.add('active');document.querySelectorAll('[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===p));render()}

  const ativos=DB.students.filter(s=>s.status==='ativo').length;
